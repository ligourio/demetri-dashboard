  const [notifPermission,setNotifPerm] = useState(()=>PUSH.isSupported()?PUSH.getPermission():'unsupported');
  const [notifBannerDismissed,setNotifBannerDismissed] = useState(()=>LS.get("notif_banner_dismissed",false));
  const [showSettings,setShowSettings] = useState(false);
  // Nova ref
  const novaSendRef = useRef({ref:null});

  useEffect(()=>{
    const handler=()=>setIsDesktop(window.innerWidth>=768);
    window.addEventListener('resize',handler);
    return ()=>window.removeEventListener('resize',handler);
  },[]);

  useEffect(()=>{ LS.set("activities",activities); },[activities]);
  useEffect(()=>{ LS.set("weekTasks",weekTasks); },[weekTasks]);
  useEffect(()=>{ LS.set("projects",projects); },[projects]);

  useEffect(()=>{
    if(authed){
      checkGoogleStatus().then(connected=>setGoogleConnected(connected));
      fetchToday();
      fetchWeek();
      // ── OAUTH FIX: handle return from Google OAuth ──
      // GitHub Pages may return with ?code=... or ?cal=connected
      const params = new URLSearchParams(window.location.search);
      if (params.get("cal") === "connected" || params.get("code")) {
        setGoogleConnected(true);
        window.history.replaceState({}, "", window.location.pathname);
      }
      // Register service worker for push
      if (PUSH.isSupported()) PUSH.registerSW();
    }
  },[authed]);

  // Schedule event reminders once events are loaded
  useEffect(()=>{
    if (events.length > 0 && notifPermission === 'granted') {
      PUSH.scheduleEventReminders(events);
      PUSH.scheduleBriefing(events);
    }
  },[events, notifPermission]);

  const enableNotifications = async () => {
    const result = await PUSH.requestPermission();
    setNotifPerm(result);
    if (result === 'granted') {
      await PUSH.registerSW();
      PUSH.scheduleBriefing(events);
      PUSH.scheduleEventReminders(events);
    }
  };

  const fetchToday=async()=>{
    setCalLoad(true); setSynced(false);
    try{
      const today = new Date();
      const start = new Date(today.setHours(0,0,0,0)).toISOString();
      const end   = new Date(today.setHours(23,59,59,999)).toISOString();
      const data  = await fetchCalendarEvents(start, end);
      if(data.error&&data.notConnected){ setSynced(false); setCalLoad(false); return; }
      if(data.events){
        setEvents(data.events.map((e,i)=>({...e,color:EVT_COLORS[i%EVT_COLORS.length]})));
        setSynced(true);
      }
    }catch(err){ console.error(err); }
    setCalLoad(false);
  };

  const fetchWeek=async()=>{
    setWkLoad(true);
    try{
      const s=new Date(); s.setDate(s.getDate()+1); s.setHours(0,0,0,0);
      const e=new Date(); e.setDate(e.getDate()+7); e.setHours(23,59,59,999);
      const data=await fetchCalendarEvents(s.toISOString(), e.toISOString());
      if(data.events){ setWeekEvents(data.events.map((ev,i)=>({...ev,color:EVT_COLORS[i%EVT_COLORS.length]}))); }
    }catch{}
    setWkLoad(false);
  };

  const addEventToCalendar=async({title,date,time,duration_minutes=60})=>{
    setAddingEvent(true);
    try{
      const data=await addCalendarEvent(title,date,time,duration_minutes);
      if(data.success){ setTimeout(()=>{ fetchToday(); fetchWeek(); },1000); }
    }catch(err){console.error(err);}
    setAddingEvent(false);
    setShowAddEvent(false);
  };

  const handleAction=useCallback((tool,input)=>{
    switch(tool){
      case "mark_habit": setHabits(p=>p.map(h=>h.name.toLowerCase()===input.habit_name?.toLowerCase()?{...h,done:input.done}:h)); return `${input.habit_name} marked ${input.done?"done":"undone"}`;
      case "log_activity": setActs(p=>[{time:nowTime(),text:input.text},...p]); return `Logged: "${input.text}"`;
      case "clear_log": setActs([]); return "Activity log cleared";
      case "navigate_to": setTab(input.tab); return `Switched to ${input.tab}`;
      case "add_project": setProjects(p=>[{id:Date.now(),name:input.name,tag:input.tag||"personal",status:"To do",note:"",tasks:[],ti:""},...p]); return `Project "${input.name}" added`;
      case "log_habit_time": setHabitTimes(p=>({...p,[input.habit_name]:Math.round(((p[input.habit_name]||input.minutes)+input.minutes)/2)})); return `Logged ${input.minutes}min for ${input.habit_name}`;
      case "add_calendar_event": addEventToCalendar(input); return `Adding "${input.title}" to calendar…`;
      case "add_week_task": setWeekTasks(p=>({...p,[input.date]:[...(p[input.date]||[]),{text:input.text,done:false}]})); return `Task added for ${input.date}`;
      case "set_focus": setFocusItems((input.items||[]).slice(0,3).map((t,i)=>({id:Date.now()+i,text:t,done:false}))); return "Focus list updated";
      case "predict_schedule": return "Generating schedule prediction…";
      case "delete_calendar_event": setEvents(p=>p.filter(e=>!e.title.toLowerCase().includes(input.title?.toLowerCase()))); return `Removed "${input.title}" from view`;
      case "reschedule_event": addEventToCalendar({title:input.title,date:input.new_date,time:input.new_time||"09:00",duration_minutes:60}); return `Rescheduling "${input.title}" to ${input.new_date}`;
      default: return null;
    }
  },[]);

  const sendBarMessage=async()=>{
    if(!barInput.trim()||barLoading) return;
    const msg=barInput.trim(); setBarInput(""); setBarLoading(true); setBarReply("");
    try{
      const done=habits.filter(h=>h.done).map(h=>h.name);
      const evts=events.map(e=>e.title).slice(0,3);
      const data=await callAPI([{role:"user",content:`You are Nova, Demetri's assistant. Answer briefly (1-2 sentences max) or take action.\nContext: habits done=${done.join(",")||"none"}, today=${evts.join(",")||"none"}, time=${nowTime()}\nMessage: ${msg}`}],{system:"You are Nova. Be extremely concise — 1-2 sentences. Use tools when action is implied.",tools:TOOLS});
      const tooluse=(data.content||[]).filter(b=>b.type==="tool_use");
      const acts=[]; for(const t of tooluse){const r=handleAction(t.name,t.input);if(r)acts.push(r);}
      const reply=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      setBarReply(reply||(acts.length?acts.join(" · "):"Done!"));
    }catch{ setBarReply("Something went wrong."); }
    setBarLoading(false);
  };

  const toggleHabit=id=>setHabits(p=>p.map(h=>{
    if(h.id!==id) return h;
    if(!h.done){
      if(h.startTime){ const m=Math.round((Date.now()-h.startTime)/60000); if(m>1&&m<600) setHabitTimes(prev=>({...prev,[h.name]:Math.round(((prev[h.name]||m)+m)/2)})); }
      return{...h,done:true,startTime:null};
    }
    return{...h,done:false,startTime:Date.now()};
  }));

  const addActivity=()=>{ if(!actInput.trim()) return; setActs(p=>[{time:nowTime(),text:actInput.trim()},...p]); setActInput(""); };

  if(!authed) return <><style>{css}</style><Login onLogin={(tok)=>{ setAuthed(true); setSessionToken(tok); }}/></>;

  const done=habits.filter(h=>h.done).length;
  const pct=Math.round((done/habits.length)*100);
  const tLabel={soon:"Soon",later:"Later",done:"Done"};
  const tCls={soon:"t-soon",later:"t-later",done:"t-done"};
  const showBar = tab!=="nova";

  const CalendarConnectButton = () => (
    <button style={{background:"#fff",color:"#111",border:"none",borderRadius:"10px",padding:"8px 16px",fontFamily:"inherit",fontSize:"13px",fontWeight:"600",cursor:"pointer"}}
      onClick={async()=>{ const url=await getGoogleAuthUrl(); window.location.href=url; }}>
      📅 Connect Google Calendar
    </button>
  );

  return (
    <>
      <style>{css}</style>
      {showAddEvent&&<AddEventModal onSave={addEventToCalendar} onClose={()=>setShowAddEvent(false)} adding={addingEvent}/>}
      {showSettings&&<SettingsModal onClose={()=>setShowSettings(false)} notifPermission={notifPermission} onEnableNotifs={enableNotifications}/>}

      <div className="shell">
        {/* ── HEADER ── */}
        <div className="hd">
          <div><div className="hd-g">{greeting()}</div><div className="hd-n">Demetri</div></div>
          {isDesktop&&(
            <div className="desktop-tabs">
              {TABS.map(n=>(<button key={n.id} className={`dtab ${tab===n.id?"a":""}`} onClick={()=>setTab(n.id)}>{n.lbl}</button>))}
            </div>
          )}
          <div className="hd-r">
            <div className="hd-d">{fmtDate()}</div>
            {googleConnected&&<button className="lockbtn" onClick={async()=>{ await callWorker("google_disconnect",{}); setGoogleConnected(false); setSynced(false); setEvents([]); setWeekEvents([]); }}>Disconnect Cal</button>}
            <button className="lockbtn" onClick={()=>setShowSettings(true)}>⚙ Settings</button>
            <button className="lockbtn" onClick={async()=>{ await callWorker("logout",{},{token:sessionToken}).catch(()=>{}); AUTH.clear(); setAuthed(false); setSessionToken(null); }}>Lock</button>
          </div>
        </div>

        {/* Mobile progress bar */}
        {!isDesktop&&(
          <div className="pw">
            <div className="pr"><span className="pl">Today's progress</span><span className="pp">{pct}%</span></div>
            <div className="pt"><div className="pf" style={{width:`${pct}%`}}/></div>
            <div className="pst">
              <div className="psi"><b>{done}/{habits.length}</b> habits</div>
              <div className="psi"><b>{events.length}</b> events</div>
              <div className="psi"><b>{activities.length}</b> logged</div>
              <div className="psi"><b>{projects.length}</b> projects</div>
            </div>
          </div>
        )}

        {/* Notification banner */}
        {!notifBannerDismissed && notifPermission === 'default' && (
          <NotifBanner
            onEnable={async()=>{ await enableNotifications(); setNotifBannerDismissed(true); LS.set("notif_banner_dismissed",true); }}
            onDismiss={()=>{ setNotifBannerDismissed(true); LS.set("notif_banner_dismissed",true); }}
          />
        )}

        {/* ── DESKTOP LAYOUT ── */}
        {isDesktop&&(
          <div className="desktop-body">
            {tab==="today"&&(<>
              <div className="desktop-panel" style={{gridRow:"span 2",display:"flex",flexDirection:"column",padding:0,overflow:"hidden"}}>
                <div style={{padding:"14px 16px 0",flexShrink:0}}>
                  <NovaSummary habits={habits} events={events} activities={activities} habitTimes={habitTimes}/>
                </div>
                <div style={{padding:"14px 16px 0",flex:1,overflowY:"auto"}}>
                  <div className="panel-hd"><span className="panel-title">Calendar</span><div className="sbtn-row"><button className="sbtn" onClick={()=>setShowAddEvent(true)}>+ Event</button><button className="sbtn" onClick={fetchToday}>{calLoad?"…":"↻"}</button></div></div>
                  {synced&&<div className="syncbar"><div className="sdot"/>Synced with Google Calendar</div>}
                  {calLoad&&<div className="empty">Fetching events…</div>}
                  {!calLoad&&!synced&&<div style={{textAlign:"center",padding:"12px 0"}}>{!googleConnected&&<CalendarConnectButton/>}</div>}
                  {!calLoad&&synced&&events.length===0&&<div className="empty">No events today!</div>}
                  {events.map((ev,i)=>{const s=evStatus(ev.start);return(<div className="ev" key={i}><div className="edot" style={{background:ev.color}}/><div className="ebody"><div className="etitle">{ev.title}</div><div className="etime">{fmtTime(ev.start)}{ev.end?` – ${fmtTime(ev.end)}`:""}</div></div><div className={`etag ${{soon:"t-soon",later:"t-later",done:"t-done"}[s]}`}>{{"soon":"Soon","later":"Later","done":"Done"}[s]}</div></div>);})}
                </div>
              </div>
              <div className="desktop-panel" style={{overflowY:"auto"}}>
                <div className="panel-hd"><span className="panel-title">Top 3 Focus</span><span style={{fontSize:"11px",color:"var(--muted)"}}>{focusItems.length}/3</span></div>
                <FocusList items={focusItems} setItems={setFocusItems}/>
                <div style={{marginTop:"16px",paddingTop:"16px",borderTop:"1px solid var(--b1)"}}>
                  <div className="panel-hd"><span className="panel-title">Habits</span></div>
                  {habits.map(h=>(<div key={h.id} className={`hab ${h.done?"on":""}`} onClick={()=>toggleHabit(h.id)}><div className="hico">{h.icon}</div><div className="hbody"><div className="hname">{h.name}</div><div className="hstr">🔥 <b>{h.streak+(h.done?1:0)}d</b></div></div>{habitTimes[h.name]&&<span className="havg">~{habitTimes[h.name]}min</span>}<div className="hck">{h.done?"✓":""}</div></div>))}
                </div>
              </div>
              <div className="desktop-panel" style={{overflowY:"auto"}}>
                <div className="desktop-stats">
                  <div className="dstat"><div className="dstat-val" style={{color:"var(--green)"}}>{pct}%</div><div className="dstat-lbl">Done</div></div>
                  <div className="dstat"><div className="dstat-val" style={{color:"var(--blue)"}}>{events.length}</div><div className="dstat-lbl">Events</div></div>
                  <div className="dstat"><div className="dstat-val" style={{color:"var(--amber)"}}>{activities.length}</div><div className="dstat-lbl">Logged</div></div>
                  <div className="dstat"><div className="dstat-val" style={{color:"var(--nova)"}}>{projects.length}</div><div className="dstat-lbl">Projects</div></div>
                </div>
                <div style={{marginTop:"12px"}}>
                  <div className="panel-hd"><span className="panel-title">Activity Log</span>{activities.length>0&&<button className="sbtn" onClick={()=>setActs([])}>Clear</button>}</div>
                  <div className="irow"><input className="ifield" placeholder="What did you just do?" value={actInput} onChange={e=>setActInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addActivity()}/><button className="iplus" onClick={addActivity}>+</button></div>
                  {activities.slice(0,6).map((a,i)=><div className="logitem" key={i}><span className="logtime">{a.time}</span><span className="logtxt">{a.text}</span></div>)}
                </div>
              </div>
              <div className="desktop-panel nova-panel">
                <NovaChat habits={habits} events={events} weekEvents={weekEvents} activities={activities} projects={projects} habitTimes={habitTimes} onAction={handleAction} onSendFromBar={novaSendRef.current}/>
              </div>
            </>)}

            {tab==="week"&&(<>
              <div className="desktop-panel" style={{gridColumn:"span 2",gridRow:"span 2",display:"flex",flexDirection:"column",overflow:"hidden"}}>
                <div className="panel-hd" style={{flexShrink:0}}><span className="panel-title">Upcoming Week</span><div className="sbtn-row"><button className="sbtn" onClick={()=>setShowAddEvent(true)}>+ Event</button><button className="sbtn" onClick={fetchWeek}>{weekCalLoad?"Syncing…":"↻ Sync"}</button></div></div>
                {weekCalLoad&&<div className="syncbar"><div className="sdot"/>Syncing calendar…</div>}
                {!weekCalLoad&&weekEvents.length>0&&<div className="syncbar"><div className="sdot"/>{weekEvents.length} events from Google Calendar</div>}
                <div style={{flex:1,overflowY:"auto"}}><WeekView weekTasks={weekTasks} setWeekTasks={setWeekTasks} weekEvents={weekEvents} weekCalLoad={weekCalLoad}/></div>
              </div>
              <div className="desktop-panel" style={{display:"flex",flexDirection:"column",overflow:"hidden",padding:0}}>
                <div style={{padding:"14px 16px 0",flexShrink:0}}><div className="panel-hd"><span className="panel-title">Week Summary</span></div><WeekNovaSummary weekEvents={weekEvents} weekTasks={weekTasks} habits={habits}/></div>
              </div>
              <div className="desktop-panel nova-panel">
                <NovaChat habits={habits} events={events} weekEvents={weekEvents} activities={activities} projects={projects} habitTimes={habitTimes} onAction={handleAction} onSendFromBar={novaSendRef.current}/>
              </div>
            </>)}

            {tab==="nova"&&(<>
              <div className="desktop-panel" style={{overflowY:"auto"}}>
                <div className="panel-hd"><span className="panel-title">Chat History</span></div>
                <NovaSidebar onSendFromBar={novaSendRef.current}/>
              </div>
              <div className="desktop-panel nova-panel" style={{gridColumn:"span 2",gridRow:"span 2"}}>
                <NovaChat habits={habits} events={events} weekEvents={weekEvents} activities={activities} projects={projects} habitTimes={habitTimes} onAction={handleAction} onSendFromBar={novaSendRef.current} fullMode={true}/>
              </div>
              <div className="desktop-panel" style={{overflowY:"auto"}}>
                <div className="panel-hd"><span className="panel-title">Context</span></div>
                <div style={{fontSize:"12px",color:"var(--muted)",lineHeight:1.6}}>
                  <p style={{marginBottom:"8px"}}>Nova knows about:</p>
                  <div style={{fontSize:"11px",color:"var(--soft)"}}>
                    <div>✦ {habits.filter(h=>h.done).length}/{habits.length} habits done today</div>
                    <div>✦ {events.length} calendar events</div>
                    <div>✦ {activities.length} logged activities</div>
                    <div>✦ {projects.length} active projects</div>
                    <div style={{marginTop:"8px",color:"var(--muted)"}}>Upload any file to share context with Nova</div>
                  </div>
                </div>
              </div>
            </>)}

            {tab==="log"&&(<>
              <div className="desktop-panel" style={{gridRow:"span 2",display:"flex",flexDirection:"column",overflow:"hidden"}}>
                <div className="panel-hd"><span className="panel-title">Quick Log</span></div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"8px",marginBottom:"16px"}}>
                  {["Gym","Studied","Attended class","Slept 8hrs","Cardio"].map(q=>(<button key={q} className="sbtn" style={{borderRadius:"20px",padding:"6px 14px"}} onClick={()=>{const t=nowTime();setActs(p=>[{time:t,text:q},...p]);}}>{q}</button>))}
                </div>
                <div className="irow"><input className="ifield" placeholder="Or type a custom log…" value={actInput} onChange={e=>setActInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addActivity()}/><button className="iplus" onClick={addActivity}>+</button></div>
                <div className="panel-hd" style={{marginTop:"8px"}}><span className="panel-title">Activity Log</span>{activities.length>0&&<button className="sbtn" onClick={()=>setActs([])}>Clear</button>}</div>
                <div style={{flex:1,overflowY:"auto"}}>
                  {activities.length===0?<div className="empty">Nothing logged yet.</div>:activities.map((a,i)=><div className="logitem" key={i}><span className="logtime">{a.time}</span><span className="logtxt">{a.text}</span></div>)}
                </div>
              </div>
              <div className="desktop-panel nova-panel" style={{gridColumn:"span 2",gridRow:"span 2"}}>
                <NovaChat habits={habits} events={events} weekEvents={weekEvents} activities={activities} projects={projects} habitTimes={habitTimes} onAction={handleAction} onSendFromBar={novaSendRef.current}/>
              </div>
            </>)}

            {tab==="projects"&&(<>
              {activeProject
                ? <div style={{gridColumn:"span 3",gridRow:"span 2",overflow:"hidden"}}>
                    <ProjectWorkspace project={activeProject} projects={projects} setProjects={setProjects} onBack={()=>setActiveProject(null)} habits={habits} events={events} weekEvents={weekEvents} activities={activities} habitTimes={habitTimes} onAction={handleAction}/>
                  </div>
                : <>
                    <div className="desktop-panel" style={{gridColumn:"span 2",gridRow:"span 2",display:"flex",flexDirection:"column",overflow:"hidden"}}>
                      <Projects projects={projects} setProjects={setProjects} onOpenProject={(proj)=>setActiveProject(proj)} activeProject={activeProject}/>
                    </div>
                    <div className="desktop-panel nova-panel">
                      <NovaChat habits={habits} events={events} weekEvents={weekEvents} activities={activities} projects={projects} habitTimes={habitTimes} onAction={handleAction} onSendFromBar={novaSendRef.current}/>
                    </div>
                  </>
              }
            </>)}
          </div>
        )}

        {/* ── MOBILE LAYOUT ── */}
        {!isDesktop&&(<>
          {tab==="today"&&(<>
            <NovaSummary habits={habits} events={events} activities={activities} habitTimes={habitTimes}/>
            <FocusList items={focusItems} setItems={setFocusItems}/>
            <div className="sec">
              <div className="sh">
                <span className="stitle">Calendar</span>
                <div className="sbtn-row">
                  <button className="sbtn" onClick={()=>setShowAddEvent(true)}>+ Event</button>
                  <button className="sbtn" onClick={fetchToday}>{calLoad?"…":"Refresh"}</button>
                </div>
              </div>
              {synced&&<div className="syncbar"><div className="sdot"/>Synced with Google Calendar</div>}
              {calLoad&&<div className="empty">Fetching events…</div>}
              {!calLoad&&!synced&&(
                <div style={{textAlign:"center",padding:"16px 0"}}>
                  {googleConnected
                    ?<div className="empty">No events today.<br/><button className="sbtn" style={{marginTop:"8px"}} onClick={fetchToday}>Try again</button></div>
                    :<div><div style={{fontSize:"13px",color:"var(--muted)",marginBottom:"12px"}}>Connect Google Calendar to see your events here.</div><CalendarConnectButton/></div>
                  }
                </div>
              )}
              {!calLoad&&synced&&events.length===0&&<div className="empty">No events today — enjoy the free day!</div>}
              {events.map((ev,i)=>{const s=evStatus(ev.start);return(<div className="ev" key={i} style={{animationDelay:`${i*.05}s`}}><div className="edot" style={{background:ev.color}}/><div className="ebody"><div className="etitle">{ev.title}</div><div className="etime">{fmtTime(ev.start)}{ev.end?` – ${fmtTime(ev.end)}`:""}</div></div><div className={`etag ${tCls[s]}`}>{tLabel[s]}</div></div>);})}
            </div>
            <div className="sec">
              <div className="sh"><span className="stitle">Habits</span></div>
              {habits.map(h=>(<div key={h.id} className={`hab ${h.done?"on":""}`} onClick={()=>toggleHabit(h.id)}><div className="hico">{h.icon}</div><div className="hbody"><div className="hname">{h.name}</div><div className="hstr">🔥 <b>{h.streak+(h.done?1:0)} day streak</b></div></div>{habitTimes[h.name]&&<span className="havg">~{habitTimes[h.name]}min</span>}<div className="hck">{h.done?"✓":""}</div></div>))}
            </div>
            <div className="spacer"/>
          </>)}

          {tab==="week"&&(
            <div className="sec">
              <div className="sh"><span className="stitle">Upcoming Week</span><div className="sbtn-row"><button className="sbtn" onClick={()=>setShowAddEvent(true)}>+ Event</button><button className="sbtn" onClick={fetchWeek}>{weekCalLoad?"Syncing…":"↻ Sync"}</button></div></div>
              {weekCalLoad&&<div className="syncbar"><div className="sdot"/>Syncing calendar…</div>}
              {!weekCalLoad&&weekEvents.length>0&&<div className="syncbar"><div className="sdot"/>{weekEvents.length} events synced</div>}
              {!weekCalLoad&&weekEvents.length===0&&<div className="empty" style={{padding:"8px 0"}}>No events found — tap ↻ Sync to fetch.</div>}
              <WeekView weekTasks={weekTasks} setWeekTasks={setWeekTasks} weekEvents={weekEvents} weekCalLoad={weekCalLoad}/>
              <div className="spacer"/>
            </div>
          )}

          {tab==="nova"&&<NovaChat habits={habits} events={events} weekEvents={weekEvents} activities={activities} projects={projects} habitTimes={habitTimes} onAction={handleAction} onSendFromBar={novaSendRef.current}/>}

          {tab==="log"&&(
            <div className="sec">
              <div className="sh"><span className="stitle">Activity Log</span>{activities.length>0&&<button className="sbtn" onClick={()=>setActs([])}>Clear</button>}</div>
              <div className="irow"><input className="ifield" placeholder="What did you just do?" value={actInput} onChange={e=>setActInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addActivity()}/><button className="iplus" onClick={addActivity}>+</button></div>
              {activities.length===0?<div className="empty">Nothing logged yet.<br/>Start tracking your day above.</div>:activities.map((a,i)=>(<div className="logitem" key={i} style={{animationDelay:`${i*.04}s`}}><span className="logtime">{a.time}</span><span className="logtxt">{a.text}</span></div>))}
              <div className="spacer"/>
            </div>
          )}

          {tab==="projects"&&(
            activeProject
              ? <ProjectWorkspace project={activeProject} projects={projects} setProjects={setProjects} onBack={()=>setActiveProject(null)} habits={habits} events={events} weekEvents={weekEvents} activities={activities} habitTimes={habitTimes} onAction={handleAction}/>
              : <Projects projects={projects} setProjects={setProjects} onOpenProject={(proj)=>setActiveProject(proj)} activeProject={activeProject}/>
          )}
        </>)}

        {/* Nova quick bar */}
        {showBar&&!isDesktop&&(
          <div className="nova-bar">
            <div className="nova-bar-av">✦</div>
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:"4px"}}>
              {barReply&&<div className="nova-bar-reply">{barReply}</div>}
              <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                <input className="nova-bar-input" placeholder="Ask Nova…" value={barInput} onChange={e=>setBarInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendBarMessage()}/>
                <button className="nova-bar-send" onClick={sendBarMessage} disabled={!barInput.trim()||barLoading}>{barLoading?"…":"↑"}</button>
              </div>
            </div>
          </div>
        )}

        {/* Nav */}
        <div className="nav">
          {TABS.map(n=>(<button key={n.id} className={`nbtn ${tab===n.id?"a":""}`} onClick={()=>setTab(n.id)}><span className="nico">{n.ico}</span><span className="nlbl">{n.lbl}</span></button>))}
        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
