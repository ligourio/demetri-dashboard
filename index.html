// ── AUTH HELPERS ──
const AUTH = {
  getToken:  () => LS.get("session_token", null),
  getExpiry: () => LS.get("session_expiry", null),
  isValid:   () => {
    const token = LS.get("session_token", null);
    const expiry = LS.get("session_expiry", null);
    if (!token || !expiry) return false;
    return new Date(expiry) > new Date();
  },
  save:  (token, expiresAt) => { LS.set("session_token", token); LS.set("session_expiry", expiresAt); },
  clear: () => { localStorage.removeItem("session_token"); localStorage.removeItem("session_expiry"); },
};

// ── 2FA HELPERS (TOTP — RFC 6238) ──
const TOTP = {
  // Generate a random base32 secret
  generateSecret: () => {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
    let s = '';
    for (let i = 0; i < 32; i++) s += chars[Math.floor(Math.random() * chars.length)];
    return s;
  },
  // Decode base32
  b32decode: (s) => {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
    let bits = 0, val = 0;
    const out = [];
    for (const c of s.toUpperCase().replace(/=+$/,'')) {
      val = (val << 5) | chars.indexOf(c);
      bits += 5;
      if (bits >= 8) { bits -= 8; out.push((val >> bits) & 0xff); }
    }
    return new Uint8Array(out);
  },
  // HMAC-SHA1 via SubtleCrypto
  hmacSHA1: async (keyBytes, msgBytes) => {
    const key = await crypto.subtle.importKey('raw', keyBytes, {name:'HMAC',hash:'SHA-1'}, false, ['sign']);
    const sig = await crypto.subtle.sign('HMAC', key, msgBytes);
    return new Uint8Array(sig);
  },
  // Generate 6-digit OTP for current 30s window
  generate: async (secret) => {
    const counter = Math.floor(Date.now() / 1000 / 30);
    const msg = new ArrayBuffer(8);
    const view = new DataView(msg);
    view.setUint32(4, counter, false);
    const keyBytes = TOTP.b32decode(secret);
    const hash = await TOTP.hmacSHA1(keyBytes, new Uint8Array(msg));
    const offset = hash[hash.length - 1] & 0x0f;
    const code = ((hash[offset] & 0x7f) << 24 | hash[offset+1] << 16 | hash[offset+2] << 8 | hash[offset+3]) % 1000000;
    return String(code).padStart(6, '0');
  },
  // Verify (±1 window tolerance)
  verify: async (secret, token) => {
    const counter = Math.floor(Date.now() / 1000 / 30);
    for (let delta = -1; delta <= 1; delta++) {
      const c = counter + delta;
      const msg = new ArrayBuffer(8);
      const view = new DataView(msg);
      view.setUint32(4, c, false);
      const keyBytes = TOTP.b32decode(secret);
      const hash = await TOTP.hmacSHA1(keyBytes, new Uint8Array(msg));
      const offset = hash[hash.length - 1] & 0x0f;
      const code = ((hash[offset] & 0x7f) << 24 | hash[offset+1] << 16 | hash[offset+2] << 8 | hash[offset+3]) % 1000000;
      if (String(code).padStart(6,'0') === token) return true;
    }
    return false;
  },
  otpauthUrl: (secret, label='Nova Dashboard', issuer='Nova') =>
    `otpauth://totp/${encodeURIComponent(issuer)}:${encodeURIComponent(label)}?secret=${secret}&issuer=${encodeURIComponent(issuer)}&algorithm=SHA1&digits=6&period=30`,
};

// ── PUSH NOTIFICATION HELPERS ──
const PUSH = {
  isSupported: () => 'serviceWorker' in navigator && 'Notification' in window,
  getPermission: () => Notification.permission,
  requestPermission: async () => {
    if (!PUSH.isSupported()) return 'unsupported';
    const result = await Notification.requestPermission();
    return result;
  },
  registerSW: async () => {
    if (!('serviceWorker' in navigator)) return null;
    try {
      const reg = await navigator.serviceWorker.register('./sw.js', { scope: '/Nova-Dashboard/' });
      return reg;
    } catch (e) {
      console.warn('SW registration failed:', e);
      return null;
    }
  },
  scheduleBriefing: async (events) => {
    if (!('serviceWorker' in navigator)) return;
    const reg = await navigator.serviceWorker.ready.catch(() => null);
    if (!reg) return;
    reg.active?.postMessage({ type: 'SCHEDULE_BRIEFING', events });
  },
  scheduleEventReminders: async (events) => {
    if (!('serviceWorker' in navigator) || Notification.permission !== 'granted') return;
    const reg = await navigator.serviceWorker.ready.catch(() => null);
    if (!reg) return;
    events.forEach(ev => {
      if (!ev.start) return;
      const t = new Date(ev.start) - Date.now() - 10 * 60 * 1000; // 10 min before
      if (t < 0 || t > 8 * 3600 * 1000) return; // only within 8h
      setTimeout(() => {
        reg.active?.postMessage({ type: 'REMIND_EVENT', title: ev.title, time: fmtTime(ev.start) });
      }, t);
    });
  },
  // Fallback local notification (no SW needed)
  showLocal: (title, body) => {
    if (Notification.permission !== 'granted') return;
    new Notification(title, { body, icon: '/Nova-Dashboard/icon-192.png' });
  },
};

const callWorker = async (action, payload={}, token=null) => {
  const headers = { "Content-Type": "application/json" };
  const t = token || AUTH.getToken();
  if (t) headers["X-Session-Token"] = t;
  const res = await fetch(API, {
    method: "POST",
    headers,
    body: JSON.stringify({ action, ...payload }),
  });
  return res.json();
};

const callAPI = async (messages, opts={}) => {
  return callWorker("ai", { payload: { model: MODEL, max_tokens: 2000, ...opts, messages } });
};

const parseCalJSON = data => {
  const candidates = [];
  for (const b of (data.content||[])) {
    const raw = (b.type==="mcp_tool_result" ? b.content?.[0]?.text : null) || b.text || "";
    if (!raw) continue;
    try { const a=JSON.parse(raw.replace(/```json|```/g,"").trim()); if(Array.isArray(a)){ candidates.push(...a); continue; } } catch {}
    const m = raw.match(/\[[\s\S]*?\]/g);
    if (m) for (const s of m) try { const a=JSON.parse(s); if(Array.isArray(a)) candidates.push(...a); } catch {}
  }
  return candidates;
};

  .wbody{padding:0 16px 4px;}
  .witem{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--b1);}
  .wdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .wtime{font-size:11px;color:var(--muted);flex-shrink:0;min-width:44px;}
  .wtxt{font-size:13px;color:var(--soft);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .wck{width:16px;height:16px;border-radius:50%;border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;cursor:pointer;transition:all .2s;flex-shrink:0;}
  .wck.on{background:#22c55e;border-color:#22c55e;color:var(--bg);}
  .wadd{display:flex;align-items:center;gap:8px;padding:8px 16px;border-top:1px solid var(--b1);}
  .winput{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:13px;color:var(--text);}
  .winput::placeholder{color:var(--muted);}
  .wplus{font-size:18px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0 2px;}

  /* LOG */
  .irow{display:flex;gap:8px;margin-bottom:14px;}
  .ifield{flex:1;background:var(--card);border:1px solid var(--b1);border-radius:10px;padding:12px 14px;font-family:inherit;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;}
  .ifield:focus{border-color:var(--b2);}
  .ifield::placeholder{color:var(--muted);}
  .iplus{width:44px;height:44px;border-radius:10px;background:var(--nova);border:none;cursor:pointer;font-size:20px;color:#fff;font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .iplus:hover{opacity:.85;}
  .logitem{display:flex;gap:12px;padding:11px 14px;background:var(--card);border:1px solid var(--b1);border-radius:10px;margin-bottom:7px;animation:up .25s ease both;}
  .logtime{font-size:11px;color:var(--muted);flex-shrink:0;padding-top:2px;min-width:42px;}
  .logtxt{font-size:13px;color:var(--soft);line-height:1.4;}

  /* NOVA CHAT */
  .novawrap{display:flex;flex-direction:column;flex:1;}
  .novahd{padding:22px 24px 0;display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .novaav{width:38px;height:38px;border-radius:50%;background:var(--nova);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .novanm{font-size:16px;font-weight:600;}
  .novast{font-size:12px;color:var(--green);display:flex;align-items:center;gap:5px;}
  .novastd{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite;}
  .chatmsgs{flex:1;overflow-y:auto;padding:0 24px;display:flex;flex-direction:column;gap:10px;min-height:260px;max-height:400px;}
  .chatmsgs::-webkit-scrollbar{width:4px;}
  .chatmsgs::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px;}
  .msg{display:flex;flex-direction:column;animation:up .25s ease both;max-width:86%;}
  .msg.u{align-self:flex-end;align-items:flex-end;}
  .msg.n{align-self:flex-start;align-items:flex-start;}
  .mbub{padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.55;}
  .msg.u .mbub{background:var(--nova);color:#fff;border-bottom-right-radius:4px;}
  .msg.n .mbub{background:var(--card);border:1px solid var(--b1);color:var(--soft);border-bottom-left-radius:4px;}
  .mtime{font-size:10px;color:var(--muted);margin-top:4px;padding:0 4px;}
  .apill{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:var(--nova-bg);border:1px solid var(--nova-border);color:var(--nova2);border-radius:20px;padding:4px 10px;margin-top:6px;}
  .sess-div{display:flex;align-items:center;gap:10px;margin:8px 0;}
  .sess-line{flex:1;height:1px;background:var(--b1);}
  .sess-lbl{font-size:10px;color:var(--muted);white-space:nowrap;padding:3px 8px;background:var(--surf);border:1px solid var(--b1);border-radius:20px;cursor:pointer;}
  .sess-lbl:hover{color:var(--soft);}
  .chatia{padding:14px 24px 0;display:flex;gap:8px;align-items:flex-end;}
  .chatinput{flex:1;background:var(--card);border:1px solid var(--b1);border-radius:12px;padding:12px 14px;font-family:inherit;font-size:14px;color:var(--text);outline:none;resize:none;min-height:46px;max-height:120px;line-height:1.4;}
  .chatinput:focus{border-color:var(--b2);}
  .chatinput::placeholder{color:var(--muted);}
  .csend{width:44px;height:44px;border-radius:10px;background:var(--nova);border:none;cursor:pointer;font-size:18px;color:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .csend:hover{opacity:.85;}
  .csend:disabled{opacity:.3;cursor:default;}
  .micbtn{width:44px;height:44px;border-radius:10px;background:var(--surf);border:1px solid var(--b1);cursor:pointer;font-size:18px;color:var(--soft);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .micbtn:hover{border-color:var(--b2);color:var(--text);}
  .micbtn.rec{background:rgba(248,113,113,.12);border-color:var(--red);color:var(--red);}
  .novahint{font-size:12px;color:var(--muted);text-align:center;padding:8px 24px 0;}

  /* NOVA QUICK BAR */
  .nova-bar{position:sticky;bottom:68px;background:rgba(17,17,17,.96);backdrop-filter:blur(20px);border-top:1px solid var(--b1);padding:10px 16px;display:flex;align-items:center;gap:8px;z-index:49;}
  .nova-bar-av{width:26px;height:26px;border-radius:50%;background:var(--nova);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
  .nova-bar-input{flex:1;background:var(--card);border:1px solid var(--b1);border-radius:20px;padding:9px 14px;font-family:inherit;font-size:13px;color:var(--text);outline:none;}
  .nova-bar-input:focus{border-color:rgba(167,139,250,.4);}
  .nova-bar-input::placeholder{color:var(--muted);}
  .nova-bar-send{width:34px;height:34px;border-radius:50%;background:var(--nova2);border:none;cursor:pointer;font-size:15px;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .nova-bar-send:hover{opacity:.85;}
  .nova-bar-send:disabled{opacity:.3;cursor:default;}
  .nova-bar-reply{font-size:12px;color:var(--soft);padding:6px 14px 0;line-height:1.5;}

  /* ADD EVENT MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px;}
  .modal{background:var(--surf);border:1px solid var(--b2);border-radius:16px;padding:24px;width:100%;max-width:360px;}
  .modal-title{font-size:16px;font-weight:600;margin-bottom:18px;}
  .mfield{width:100%;background:var(--card);border:1px solid var(--b1);border-radius:10px;padding:11px 14px;font-family:inherit;font-size:14px;color:var(--text);outline:none;margin-bottom:10px;}
  .mfield:focus{border-color:var(--b2);}
  .mfield::placeholder{color:var(--muted);}
  .mrow{display:flex;gap:8px;}
  .mbtnrow{display:flex;gap:8px;margin-top:6px;}
  .mok{flex:1;background:#fff;color:#111;border:none;border-radius:10px;padding:11px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}
  .mok:hover{opacity:.88;}
  .mcancel{flex:1;background:none;color:var(--soft);border:1px solid var(--b1);border-radius:10px;padding:11px;font-family:inherit;font-size:14px;cursor:pointer;}
  .mcancel:hover{border-color:var(--b2);color:var(--text);}

  /* ═══ PROJECTS (polished) ═══ */
  .projwrap{padding:22px 24px 0;}
  .ptagrow{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .ptbtn{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--b1);background:none;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s;}
  .ptbtn:hover{border-color:var(--b2);color:var(--soft);}
  .ptbtn.ap{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.3);color:var(--blue);}
  .ptbtn.ac{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.3);color:var(--nova);}
  .ptbtn.aw{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3);color:var(--amber);}
  .frow{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .fbtn{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--b1);background:none;color:var(--muted);cursor:pointer;font-family:inherit;}
  .fbtn.a{background:var(--surf);border-color:var(--b2);color:var(--text);}

  /* Project card — polished */
  .pcard{background:var(--card);border:1px solid var(--b1);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,transform .15s;animation:up .3s ease both;position:relative;overflow:hidden;}
  .pcard::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;border-radius:3px 0 0 3px;opacity:0;transition:opacity .2s;}
  .pcard.tag-personal::before{background:var(--blue);opacity:1;}
  .pcard.tag-creative::before{background:var(--nova);opacity:1;}
  .pcard.tag-work::before{background:var(--amber);opacity:1;}
  .pcard:hover{border-color:var(--b2);transform:translateY(-1px);}
  .pcard.active{border-color:var(--nova);}

  .pctop{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-left:6px;}
  .pctitle{font-size:14px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
  .pctag{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:500;flex-shrink:0;letter-spacing:.3px;}
  .tg-personal{background:rgba(96,165,250,.1);color:var(--blue);}
  .tg-creative{background:rgba(167,139,250,.1);color:var(--nova);}
  .tg-work{background:rgba(251,191,36,.1);color:var(--amber);}

  /* Status badge */
  .pstatus{font-size:11px;font-weight:500;padding:2px 10px;border-radius:20px;flex-shrink:0;}
  .ps-todo{background:rgba(107,107,128,.12);color:var(--muted);}
  .ps-progress{background:rgba(245,158,11,.1);color:var(--amber);}
  .ps-done{background:rgba(34,197,94,.1);color:var(--green);}

  /* Project task progress bar */
  .proj-progress{padding-left:6px;margin-bottom:10px;}
  .proj-progress-bar{height:3px;background:var(--b1);border-radius:99px;overflow:hidden;margin-top:4px;}
  .proj-progress-fill{height:100%;border-radius:99px;transition:width .4s ease;}
  .proj-progress-label{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;}

  /* Project meta row */
  .pmeta{display:flex;align-items:center;gap:10px;padding-left:6px;margin-top:4px;}
  .pmeta-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;}

  /* Open chevron */
  .popen{font-size:11px;color:var(--nova);background:var(--nova-bg);border:1px solid var(--nova-border);border-radius:20px;padding:3px 10px;white-space:nowrap;flex-shrink:0;transition:background .15s;}
  .pcard:hover .popen{background:rgba(99,102,241,.15);}

  .pcstat{font-size:12px;background:none;border:1px solid var(--b1);border-radius:8px;color:var(--soft);padding:3px 8px;font-family:inherit;cursor:pointer;outline:none;flex-shrink:0;}
  .pcdel{font-size:14px;color:var(--muted);background:none;border:none;cursor:pointer;opacity:0;flex-shrink:0;padding:2px 4px;}
  .pcard:hover .pcdel{opacity:1;}
  .pcnote{width:100%;background:var(--surf);border:1px solid var(--b1);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:12px;color:var(--soft);outline:none;resize:none;margin-top:2px;line-height:1.5;}
  .pcnote:focus{border-color:var(--b2);}
  .pcnote::placeholder{color:var(--muted);}
  .pctasks{margin-top:8px;border-top:1px solid var(--b1);padding-top:8px;}
  .pcti{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;color:var(--soft);border-bottom:1px solid var(--b1);}
  .pctick{width:15px;height:15px;border-radius:50%;border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;cursor:pointer;flex-shrink:0;}
  .pctick.on{background:#22c55e;border-color:#22c55e;color:var(--bg);}
  .pcstrike{text-decoration:line-through;color:var(--muted);}
  .pcadd{display:flex;gap:6px;margin-top:6px;}
  .pcinput{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:12px;color:var(--text);border-bottom:1px solid var(--b1);padding:4px 0;}
  .pcinput::placeholder{color:var(--muted);}
  .pcplus{font-size:17px;color:var(--muted);background:none;border:none;cursor:pointer;}

  /* Projects empty state */
  .proj-empty{text-align:center;padding:40px 24px;color:var(--muted);}
  .proj-empty-icon{font-size:32px;margin-bottom:12px;}
  .proj-empty-title{font-size:15px;font-weight:500;color:var(--soft);margin-bottom:6px;}
  .proj-empty-sub{font-size:13px;line-height:1.6;}

  /* Project stats row */
  .proj-stats{display:flex;gap:8px;margin-bottom:16px;}
  .proj-stat{flex:1;background:var(--card);border:1px solid var(--b1);border-radius:10px;padding:10px;text-align:center;}
  .proj-stat-val{font-size:18px;font-weight:600;margin-bottom:2px;}
  .proj-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}

  /* ═══ NOTIFICATIONS BANNER ═══ */
  .notif-banner{display:flex;align-items:center;gap:10px;background:rgba(99,102,241,.08);border:1px solid var(--nova-border);border-radius:12px;padding:12px 14px;margin:12px 24px 0;font-size:13px;color:var(--soft);}
  .notif-banner-icon{font-size:16px;flex-shrink:0;}
  .notif-banner-text{flex:1;line-height:1.4;}
  .notif-enable{font-size:12px;font-weight:600;color:var(--nova);background:none;border:none;cursor:pointer;font-family:inherit;padding:0;white-space:nowrap;}
  .notif-enable:hover{color:var(--nova2);}
  .notif-dismiss{font-size:14px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px;}

  /* ═══ SETTINGS / 2FA MODAL ═══ */
  .settings-modal{background:var(--surf);border:1px solid var(--b2);border-radius:20px;padding:28px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;}
  .settings-modal::-webkit-scrollbar{width:4px;}
  .settings-modal::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px;}
  .settings-section{margin-bottom:24px;}
  .settings-section-title{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--b1);}
  .settings-row:last-child{border-bottom:none;}
  .settings-row-label{font-size:14px;color:var(--text);}
  .settings-row-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .toggle{width:40px;height:22px;background:var(--b2);border-radius:99px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none;outline:none;}
  .toggle.on{background:var(--nova);}
  .toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;}
  .toggle.on::after{transform:translateX(18px);}
  /* QR code wrapper */
  .qr-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:16px 0;}
  .qr-box{background:#fff;border-radius:12px;padding:12px;display:inline-block;}
  #qrcode canvas, #qrcode img{display:block;}
  .secret-display{font-family:monospace;font-size:13px;letter-spacing:2px;background:var(--b1);border:1px solid var(--b2);border-radius:8px;padding:8px 14px;color:var(--soft);word-break:break-all;text-align:center;}
  .totp-steps{font-size:12px;color:var(--muted);line-height:1.7;}
  .totp-steps li{margin-left:16px;margin-bottom:4px;}
  .totp-verify-row{display:flex;gap:8px;margin-top:10px;}
  .totp-input{flex:1;background:var(--card);border:1px solid var(--b1);border-radius:10px;padding:10px 14px;font-family:monospace;font-size:18px;color:var(--text);outline:none;text-align:center;letter-spacing:4px;}
  .totp-input:focus{border-color:var(--nova);}
  .totp-verify-btn{background:var(--nova);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .totp-verify-btn:hover{opacity:.85;}
  .totp-active-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--green);background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:20px;padding:4px 12px;}

  /* MISC */
  .dots{display:flex;gap:4px;padding:3px 0;}
  .dot{width:4px;height:4px;border-radius:50%;background:var(--muted);animation:bounce 1.2s ease-in-out infinite;}
  .dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:20px 0;line-height:1.6;}
  .spacer{height:28px;}

  /* NAV */
  .nav{position:sticky;bottom:0;margin-top:auto;background:rgba(17,17,17,.97);backdrop-filter:blur(20px);border-top:1px solid var(--b1);display:flex;padding:10px 12px 24px;gap:4px;z-index:50;}
  .nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:10px;cursor:pointer;background:none;border:1px solid transparent;color:var(--muted);font-family:inherit;transition:all .15s;}
  .nbtn.a{color:var(--text);background:var(--surf);border-color:var(--b2);}
  .nico{font-size:16px;line-height:1;}
  .nlbl{font-size:9px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;}

  /* ── DESKTOP LAYOUT (768px+) ── */
  @media (min-width: 768px) {
    body { overflow: hidden; height: 100vh; }
    .shell { max-width: 100%; height: 100vh; overflow: hidden; }
    .hd { padding:0;background:var(--surf);border-bottom:1px solid var(--b1);height:52px;display:flex;align-items:center;padding:0 24px;flex-shrink:0; }
    .hd-g { display: none; }
    .hd-n { font-size: 16px; font-weight: 600; }
    .hd-r { display: flex; align-items: center; gap: 16px; margin-left: auto; }
    .hd-d { margin-bottom: 0; font-size: 12px; }
    .desktop-tabs { display:flex;align-items:center;gap:2px;margin-left:28px; }
    .dtab { font-size:12px;font-weight:500;color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;border:none;background:none;font-family:inherit;transition:all .15s; }
    .dtab:hover { color: var(--text); background: var(--card); }
    .dtab.a { color:var(--text);background:var(--card);border:1px solid var(--b2);border-bottom:2px solid var(--nova); }
    .nav { display: none; }
    .nova-bar { display: none; }
    .pw { display: none; }
    .desktop-body { display:grid;grid-template-columns:1fr 1fr 380px;grid-template-rows:1fr 1fr;gap:12px;padding:12px;flex:1;overflow:hidden;height:calc(100vh - 52px); }
    .desktop-panel { background:var(--card);border:1px solid var(--b1);border-radius:12px;overflow-y:auto;padding:16px;display:flex;flex-direction:column; }
    .desktop-panel::-webkit-scrollbar { width: 4px; }
    .desktop-panel::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 4px; }
    .desktop-panel.nova-panel { grid-row:span 2;border-color:rgba(167,139,250,0.2);padding:0;overflow:hidden; }
    .desktop-panel.full-width { grid-column: span 2; }
    .panel-hd { display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-shrink:0; }
    .panel-title { font-size:11px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted); }
    .desktop-stats { display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;flex-shrink:0; }
    .dstat { background:var(--surf);border:1px solid var(--b1);border-radius:10px;padding:10px 12px;text-align:center; }
    .dstat-val { font-size:20px;font-weight:600;line-height:1;margin-bottom:3px; }
    .dstat-lbl { font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px; }
    .habits-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
    .sec { padding: 0; }
    .sec + .sec { margin-top:16px;padding-top:16px;border-top:1px solid var(--b1); }
    .sh { margin-bottom: 10px; }
    .novawrap { height: 100%; }
    .novahd { padding:16px 18px 0;margin-bottom:10px; }
    .chatmsgs { max-height:none;flex:1;padding:0 18px; }
    .chatia { padding: 12px 18px 0; }
    .novahint { padding: 6px 18px 0; }
    /* Project cards on desktop */
    .projwrap { padding: 0; }
    .notif-banner { margin: 0 0 12px; }
  }
`;

// ── LOGIN ──
function Login({ onLogin }) {
  const [pw,setPw]=useState(""); const [err,setErr]=useState(""); const [loading,setLoading]=useState(false);
  const go=async()=>{
    if(!pw.trim()||loading) return;
    setLoading(true); setErr("");
    try {
      const data = await callWorker("login", { password: pw });
      if (data.token) { AUTH.save(data.token, data.expiresAt); onLogin(data.token); }
      else { setErr(data.error || "Incorrect password."); if (data.locked) setErr(data.error); }
    } catch { setErr("Connection error. Check your internet and try again."); }
    setPw(""); setLoading(false);
  };
  return (
    <div className="lw"><div className="lb">
      <div className="lt">Welcome back, Demetri.</div>
      <div className="ls">Enter your password to continue.</div>
      <label className="fl">Password</label>
      <input className="fi" type="password" placeholder="••••••••••" value={pw}
        onChange={e=>{setPw(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&go()} autoFocus/>
      <button className="lbtn" onClick={go} style={{opacity:loading?.7:1}}>{loading?"Signing in…":"Sign in"}</button>
      {err&&<div className="lerr">{err}</div>}
    </div></div>
  );
}

// ── NOVA SUMMARY ──
function NovaSummary({ habits, events, activities, habitTimes }) {
  const [text,setText]=useState(""); const [eta,setEta]=useState(""); const [load,setLoad]=useState(false);
  const run=useCallback(async()=>{
    setLoad(true); setText(""); setEta("");
    try{
      const done=habits.filter(h=>h.done).map(h=>h.name);
      const rem=habits.filter(h=>!h.done).map(h=>habitTimes[h.name]?`${h.name}(~${habitTimes[h.name]}min)`:h.name);
      const evts=events.map(e=>`${e.title}${e.start?" at "+fmtTime(e.start):""}`).slice(0,4);
      const logs=activities.slice(0,4).map(a=>`${a.time}:${a.text}`);
      const data=await callAPI([{role:"user",content:`You are Nova, Demetri's assistant. Warm brief daily summary (3-4 sentences): what's done, what's left, one sleep/routine tip. End exactly with: ETA: [time or "All done!"]
Time:${new Date().toLocaleTimeString()} | ${fmtDate()}
Done:${done.join(",")||"none"} | Remaining:${rem.join(",")||"all done!"}
Calendar:${evts.join(",")||"none"} | Log:${logs.join(";")||"empty"}
Avg times:${Object.entries(habitTimes).map(([k,v])=>`${k}:${v}min`).join(",")||"none tracked"}`}]);
      const full=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      const m=full.match(/ETA:\s*(.+)/i);
      if(m){setEta(m[1].trim());setText(full.replace(/ETA:\s*.+/i,"").trim());}else setText(full);
    }catch{}
    setLoad(false);
  },[habits,events,activities,habitTimes]);
  useEffect(()=>{run();},[]);
  useEffect(()=>{ if(habits.filter(h=>h.done).length>0) run(); },[habits.filter(h=>h.done).length]);
  return (
    <div className="nsum">
      <div className="nst">
        <div className="nav2">✦</div>
        <span className="nlbl">Nova · Daily Summary</span>
        <button className="nref" onClick={run}>↻</button>
      </div>
      {load?<div className="dots"><div className="dot"/><div className="dot"/><div className="dot"/></div>
           :<div className="ntxt">{text||"Complete some habits to get your summary."}</div>}
      {eta&&<div className="neta">⏱ Estimated finish: <b>{eta}</b></div>}
    </div>
  );
}

// ── FOCUS LIST ──
function FocusList({ items, setItems }) {
  const [input,setInput]=useState("");
  const add=()=>{ if(!input.trim()||items.length>=3) return; setItems(p=>[...p,{id:Date.now(),text:input.trim(),done:false}]); setInput(""); };
  const toggle=id=>setItems(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const del=id=>setItems(p=>p.filter(t=>t.id!==id));
  const nums=["1","2","3"]; const numCls=["p1","p2","p3"];
  return (
    <div className="focus-wrap">
      <div className="focus-card">
        <div className="focus-hd"><span className="focus-title">Top 3 Focus</span><span style={{fontSize:"11px",color:"var(--muted)"}}>{items.length}/3</span></div>
        {items.length===0&&<div className="focus-empty">What are your 3 priorities today?</div>}
        {items.map((t,i)=>(
          <div className="focus-item" key={t.id} style={{cursor:"pointer"}} onClick={()=>toggle(t.id)}>
            <span className={`focus-num ${numCls[i]||""}`}>{nums[i]}</span>
            <div className={`focus-ck ${t.done?"on":""}`}>{t.done?"✓":""}</div>
            <span className={`focus-txt ${t.done?"on":""}`}>{t.text}</span>
            <button style={{fontSize:"13px",color:"var(--muted)",background:"none",border:"none",cursor:"pointer",opacity:.6,padding:"0 2px"}}
              onClick={e=>{e.stopPropagation();del(t.id);}}>✕</button>
          </div>
        ))}
        {items.length<3&&(
          <div className="focus-input-row">
            <input className="focus-input" placeholder={`Priority ${items.length+1}…`} value={input}
              onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
            <button className="focus-add" onClick={add}>+</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ADD EVENT MODAL ──
function AddEventModal({ onSave, onClose, adding }) {
  const [title,setTitle]=useState(""); const [date,setDate]=useState(dateKey(new Date()));
  const [time,setTime]=useState("09:00"); const [dur,setDur]=useState("60");
  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-title">Add Calendar Event</div>
        <input className="mfield" placeholder="Event title" value={title} onChange={e=>setTitle(e.target.value)} autoFocus/>
        <div className="mrow">
          <input className="mfield" type="date" value={date} onChange={e=>setDate(e.target.value)} style={{marginBottom:0,flex:1}}/>
          <input className="mfield" type="time" value={time} onChange={e=>setTime(e.target.value)} style={{marginBottom:0,flex:1}}/>
        </div>
        <input className="mfield" placeholder="Duration (minutes)" value={dur} onChange={e=>setDur(e.target.value)} style={{marginTop:10}}/>
        <div className="mbtnrow">
          <button className="mcancel" onClick={onClose}>Cancel</button>
          <button className="mok" onClick={()=>title.trim()&&onSave({title:title.trim(),date,time,duration_minutes:parseInt(dur)||60})} disabled={adding}>
            {adding?"Adding…":"Add Event"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── WEEK VIEW ──
function WeekView({ weekTasks, setWeekTasks, weekEvents, weekCalLoad }) {
  const days=next7();
  const [expanded,setExpanded]=useState({});
  const [inputs,setInputs]=useState({});
  const toggle=k=>setExpanded(p=>({...p,[k]:!p[k]}));
  const toggleTask=(k,i)=>setWeekTasks(p=>({...p,[k]:(p[k]||[]).map((t,j)=>j===i?{...t,done:!t.done}:t)}));
  const addTask=k=>{ const v=(inputs[k]||"").trim(); if(!v) return; setWeekTasks(p=>({...p,[k]:[...(p[k]||[]),{text:v,done:false}]})); setInputs(p=>({...p,[k]:""})); };
  const calForDay=d=>weekEvents.filter(ev=>{ try{ return new Date(ev.start).toDateString()===d.toDateString(); }catch{return false;} });
  return (
    <div>
      {days.map((day,i)=>{
        const k=dateKey(day); const tasks=weekTasks[k]||[]; const cal=calForDay(day); const total=tasks.length+cal.length; const open=expanded[k];
        return (
          <div className="wday" key={k} style={{animationDelay:`${i*.05}s`}}>
            <div className="wdh" onClick={()=>toggle(k)}>
              <div className="wdhl"><span className="wdow">{DOW[day.getDay()]}</span><span className="wdate">{day.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span></div>
              <span className={`wcount${total>0?" has":""}`}>{weekCalLoad?"…":total>0?`${total} item${total>1?"s":""}`:"Free"} {open?"▲":"▼"}</span>
            </div>
            {open&&<>
              <div className="wbody">
                {cal.map((ev,j)=>(<div className="witem" key={`c${j}`}><div className="wdot" style={{background:ev.color||"#60a5fa"}}/><span className="wtime">{fmtTime(ev.start)}</span><span className="wtxt">{ev.title}</span></div>))}
                {tasks.map((t,j)=>(<div className="witem" key={`t${j}`} style={{cursor:"pointer"}} onClick={()=>toggleTask(k,j)}><div className={`wck ${t.done?"on":""}`}>{t.done?"✓":""}</div><span className="wtxt" style={{textDecoration:t.done?"line-through":"none",color:t.done?"var(--muted)":"var(--soft)"}}>{t.text}</span></div>))}
                {total===0&&<div style={{fontSize:"12px",color:"var(--muted)",padding:"7px 0",borderTop:"1px solid var(--b1)"}}>Nothing scheduled</div>}
              </div>
              <div className="wadd">
                <input className="winput" placeholder="Add a task…" value={inputs[k]||""} onChange={e=>setInputs(p=>({...p,[k]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addTask(k)}/>
                <button className="wplus" onClick={()=>addTask(k)}>+</button>
              </div>
            </>}
          </div>
        );
      })}
    </div>
  );
}

// ── NOVA CHAT ──
function NovaChat({ habits, events, weekEvents, activities, projects, habitTimes, onAction, onSendFromBar, projectContext=null, fullMode=false }) {
  const savedSessions=LS.get("nova_sessions",[]);
  const projectIntro = projectContext ? {role:"nova",text:`Hey! I'm Nova — let's work on your project: "${projectContext.name}". What's the goal?`,time:nowTime(),actions:[]} : null;
  const INTRO={role:"nova",text:"Hey! I'm Nova — your personal assistant. Each session starts fresh, but you can access and continue any past conversation from History. Try: \"predict my schedule\" or \"add gym tomorrow at 7am\".",time:nowTime(),actions:[]};
  const [sessions,setSessions]=useState(savedSessions);
  const [current,setCurrent]=useState([projectIntro||INTRO]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [rec,setRec]=useState(false);
  const [showHistory,setShowHistory]=useState(false);
  const fileRef=useRef(null); const botRef=useRef(null); const recRef=useRef(null);

  useEffect(()=>{ botRef.current?.scrollIntoView({behavior:"smooth"}); },[current,loading]);
  useEffect(()=>{ LS.set("nova_sessions",sessions); },[sessions]);

  const loadSession=(s)=>{ setCurrent([INTRO,...s.messages]); setShowHistory(false); };
  useEffect(()=>{ if(onSendFromBar){ onSendFromBar.ref=send; onSendFromBar.loadSession=loadSession; } },[]);

  const sysPrompt=()=>{
    const done=habits.filter(h=>h.done).map(h=>h.name);
    const evts=events.map(e=>`${e.title}${e.start?" at "+fmtTime(e.start):""}`).slice(0,5);
    const wevts=weekEvents.slice(0,10).map(e=>`${e.title} on ${fmtShort(e.start)}${e.start?" at "+fmtTime(e.start):""}`);
    const log=activities.slice(0,6).map(a=>`${a.time}:${a.text}`);
    const projs=projects.map(p=>`${p.name}(${p.tag},${p.status})`).slice(0,5);
    const times=Object.entries(habitTimes).map(([k,v])=>`${k}:${v}min`).join(",");
    const past=sessions.slice(-3).map(s=>s.messages.filter(m=>m.role==="user").map(m=>m.text).slice(-2).join(" | ")).join("\n");
    return `You are Nova, Demetri's smart personal assistant at Western University. Be warm, concise, helpful. Use tools when intent matches.\nState — ${fmtDate()} | ${new Date().toLocaleTimeString()}\nHabits done:${done.join(",")||"none"} | Today:${evts.join(",")||"none"}\nWeek:${wevts.join("; ")||"none"} | Log:${log.join(";")||"empty"}\nProjects:${projs.join(";")||"none"} | Avg habit times:${times||"none"}\nPast sessions:\n${past||"none"}`;
  };

  const send=useCallback(async text=>{
    if(!text?.trim()||loading) return;
    const userMsg={role:"user",text:text.trim(),time:nowTime(),actions:[]};
    const updated=[...current,userMsg];
    setCurrent(updated); setLoading(true);
    try{
      const apiMsgs=updated.filter(m=>m!==INTRO).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
      const data=await callAPI(apiMsgs.slice(-20),{system:sysPrompt(),tools:TOOLS});
      const tblocks=(data.content||[]).filter(b=>b.type==="text");
      const tooluse=(data.content||[]).filter(b=>b.type==="tool_use");
      const acts=[]; for(const t of tooluse){const r=onAction(t.name,t.input);if(r)acts.push(r);}
      const reply=tblocks.map(b=>b.text).join("").trim()||(acts.length?"Done!":"Something went wrong.");
      const novaMsg={role:"nova",text:reply,time:nowTime(),actions:acts};
      const final=[...updated,novaMsg];
      setCurrent(final);
      const sid=sessId();
      setSessions(p=>{ const ex=p.findIndex(s=>s.id===sid); const entry={id:sid,messages:final.filter(m=>m!==INTRO)}; if(ex>=0){const n=[...p];n[ex]=entry;return n;} return [...p,entry].slice(-20); });
    }catch{ setCurrent(p=>[...p,{role:"nova",text:"Something went wrong. Check your connection.",time:nowTime(),actions:[]}]); }
    setLoading(false);
  },[current,loading,habits,events,weekEvents,activities,projects,habitTimes,sessions,onAction]);

  if(onSendFromBar) onSendFromBar.ref=send;

  const startVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Voice not supported. Try Chrome.");return;}
    if(rec){recRef.current?.stop();return;}
    const r=new SR(); r.lang="en-US"; r.interimResults=false; r.continuous=false; recRef.current=r;
    r.onstart=()=>setRec(true); r.onend=()=>setRec(false); r.onerror=()=>setRec(false);
    r.onresult=e=>setInput(e.results[0][0].transcript);
    r.start();
  };

  return (
    <div className="novawrap">
      <div className="novahd">
        <div className="novaav">✦</div>
        <div style={{flex:1}}><div className="novanm">Nova</div><div className="novast"><div className="novastd"/>Online</div></div>
        <button className="sbtn" onClick={()=>setShowHistory(p=>!p)}>{showHistory?"← Back":"History"}</button>
        {showHistory&&sessions.length>0&&<button className="sbtn" style={{marginLeft:"6px"}} onClick={()=>{setSessions([]);LS.set("nova_sessions",[]);}}>Clear</button>}
      </div>
      <div className="chatmsgs">
        {!showHistory&&current.map((m,i)=>(<div key={i} className={`msg ${m.role==="user"?"u":"n"}`}><div className="mbub">{m.text}</div>{m.actions?.map((a,j)=><div key={j} className="apill">✓ {a}</div>)}<div className="mtime">{m.time}</div></div>))}
        {showHistory&&sessions.length===0&&<div className="empty">No conversation history yet.</div>}
        {showHistory&&[...sessions].reverse().map((s,si)=>(<div key={si}><div className="sess-div"><div className="sess-line"/><span className="sess-lbl" onClick={()=>{setCurrent([INTRO,...s.messages]);setShowHistory(false);}}>{s.id} — tap to continue ↗</span><div className="sess-line"/></div>{s.messages.slice(-3).map((m,j)=>(<div key={j} className={`msg ${m.role==="user"?"u":"n"}`}><div className="mbub">{m.text}</div><div className="mtime">{m.time}</div></div>))}</div>))}
        {loading&&<div className="msg n" style={{opacity:.7}}><div className="mbub" style={{fontSize:"13px",color:"var(--muted)"}}>Nova is thinking…</div></div>}
        <div ref={botRef}/>
      </div>
      {!showHistory&&<>
        <div className="chatia">
          <button className={`micbtn ${rec?"rec":""}`} onClick={startVoice}>{rec?"⏹":"🎤"}</button>
          <textarea className="chatinput" placeholder="Ask Nova anything…" value={input} rows={1}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);setInput("");}}}/>
          <button className="micbtn" onClick={()=>fileRef.current?.click()}>📎</button>
          <input ref={fileRef} type="file" style={{display:"none"}} accept="*/*" multiple onChange={()=>{}}/>
          <button className="csend" onClick={()=>{send(input);setInput("");}} disabled={!input.trim()||loading}>↑</button>
        </div>
        <div className="novahint">{rec?"🔴 Listening…":"Enter to send · 📎 attach files · Try: \"predict my schedule\""}</div>
      </>}
      <div className="spacer"/>
    </div>
  );
}

// ── PROJECT WORKSPACE ──
function ProjectWorkspace({ project, projects, setProjects, onBack, habits, events, weekEvents, activities, habitTimes, onAction }) {
  const storageKey = `proj_chats_${project.id}`;
  const savedChats = LS.get(storageKey, []);
  const makeNewChat = () => ({id:Date.now(), name:`Chat ${Date.now()}`, messages:[], created:nowTime()});
  const [chats, setChats] = useState(savedChats.length>0 ? savedChats : [makeNewChat()]);
  const [activeChatId, setActiveChatId] = useState(chats[0]?.id);
  const [editingName, setEditingName] = useState(false);

  useEffect(()=>{ LS.set(storageKey, chats); },[chats]);

  const activeChat = chats.find(c=>c.id===activeChatId) || chats[0];
  const updateChatMessages = (msgs) => setChats(p=>p.map(c=>c.id===activeChatId?{...c,messages:msgs}:c));
  const newChat = () => { const c = makeNewChat(); setChats(p=>[...p,c]); setActiveChatId(c.id); };
  const deleteChat = (id) => { const remaining = chats.filter(c=>c.id!==id); if(remaining.length===0){ const c=makeNewChat(); setChats([c]); setActiveChatId(c.id); } else { setChats(remaining); if(activeChatId===id) setActiveChatId(remaining[0].id); } };
  const renameChat = (id, name) => setChats(p=>p.map(c=>c.id===id?{...c,name}:c));

  const upd = (f,v) => setProjects(p=>p.map(pr=>pr.id===project.id?{...pr,[f]:v}:pr));
  const addTask = () => { if(!project.ti?.trim()) return; setProjects(p=>p.map(pr=>pr.id===project.id?{...pr,tasks:[...(pr.tasks||[]),{id:Date.now(),text:pr.ti.trim(),done:false}],ti:""}:pr)); };
  const toggleTask = (tid) => setProjects(p=>p.map(pr=>pr.id===project.id?{...pr,tasks:(pr.tasks||[]).map(t=>t.id===tid?{...t,done:!t.done}:t)}:pr));
  const statusColor={"To do":"var(--muted)","In progress":"var(--amber)","Done":"var(--green)"};

  return (
    <div style={{display:"flex",height:"calc(100vh - 52px)",overflow:"hidden"}}>
      <div style={{width:"240px",flexShrink:0,background:"var(--surf)",borderRight:"1px solid var(--b1)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"14px 16px",borderBottom:"1px solid var(--b1)"}}>
          <button className="sbtn" style={{marginBottom:"10px",fontSize:"11px"}} onClick={onBack}>← All Projects</button>
          <div style={{fontSize:"15px",fontWeight:"600",color:"var(--text)",marginBottom:"4px"}}>{project.name}</div>
          <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
            <span className={`pctag tg-${project.tag}`}>{project.tag}</span>
            <select className="pcstat" value={project.status} style={{color:statusColor[project.status]||"var(--muted)",fontSize:"11px"}} onChange={e=>upd("status",e.target.value)}>
              {["To do","In progress","Done"].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <div style={{padding:"10px 16px",borderBottom:"1px solid var(--b1)"}}>
          <div style={{fontSize:"10px",color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"6px"}}>Notes</div>
          <textarea className="pcnote" rows={3} placeholder="Notes & ideas…" value={project.note||""} onChange={e=>upd("note",e.target.value)} style={{width:"100%"}}/>
        </div>
        <div style={{padding:"10px 16px",borderBottom:"1px solid var(--b1)",flex:"0 0 auto"}}>
          <div style={{fontSize:"10px",color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"6px"}}>Tasks</div>
          <div style={{maxHeight:"120px",overflowY:"auto"}}>
            {(project.tasks||[]).map(t=>(<div key={t.id} className="pcti" style={{cursor:"pointer"}} onClick={()=>toggleTask(t.id)}><div className={`pctick ${t.done?"on":""}`}>{t.done?"✓":""}</div><span className={t.done?"pcstrike":""}>{t.text}</span></div>))}
          </div>
          <div className="pcadd" style={{marginTop:"6px"}}>
            <input className="pcinput" placeholder="Add task…" value={project.ti||""} onChange={e=>upd("ti",e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()}/>
            <button className="pcplus" onClick={addTask}>+</button>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
            <div style={{fontSize:"10px",color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.5px"}}>Chats</div>
            <button className="sbtn" style={{fontSize:"10px",padding:"2px 8px"}} onClick={newChat}>+ New</button>
          </div>
          {chats.map(c=>(<div key={c.id} style={{padding:"8px 10px",borderRadius:"8px",cursor:"pointer",marginBottom:"4px",background:c.id===activeChatId?"var(--nova-bg)":"none",border:`1px solid ${c.id===activeChatId?"var(--nova-border)":"transparent"}`,display:"flex",alignItems:"center",gap:"6px"}} onClick={()=>setActiveChatId(c.id)}>
            <div style={{flex:1,overflow:"hidden"}}><div style={{fontSize:"12px",color:c.id===activeChatId?"var(--nova2)":"var(--soft)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div><div style={{fontSize:"10px",color:"var(--muted)"}}>{c.messages.length} messages</div></div>
            {chats.length>1&&<button style={{fontSize:"11px",color:"var(--muted)",background:"none",border:"none",cursor:"pointer",flexShrink:0,opacity:0.6}} onClick={e=>{e.stopPropagation();deleteChat(c.id);}}>✕</button>}
          </div>))}
        </div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:"var(--bg)"}}>
        <div style={{height:"44px",borderBottom:"1px solid var(--b1)",display:"flex",alignItems:"center",padding:"0 16px",gap:"10px",flexShrink:0,background:"var(--surf)"}}>
          <div style={{width:"24px",height:"24px",borderRadius:"50%",background:"var(--nova)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",color:"#fff",flexShrink:0}}>✦</div>
          {editingName
            ? <input style={{flex:1,background:"none",border:"none",outline:"none",fontFamily:"inherit",fontSize:"13px",fontWeight:"500",color:"var(--text)"}} value={activeChat?.name||""} autoFocus onChange={e=>renameChat(activeChatId,e.target.value)} onBlur={()=>setEditingName(false)} onKeyDown={e=>e.key==="Enter"&&setEditingName(false)}/>
            : <div style={{flex:1,fontSize:"13px",fontWeight:"500",color:"var(--text)",cursor:"pointer"}} onClick={()=>setEditingName(true)}>{activeChat?.name||"Chat"} <span style={{fontSize:"10px",color:"var(--muted)"}}>· click to rename</span></div>
          }
          <div style={{fontSize:"11px",color:"var(--nova2)",background:"var(--nova-bg)",border:"1px solid var(--nova-border)",borderRadius:"20px",padding:"2px 10px"}}>{project.name}</div>
        </div>
        <ProjectNovaChat project={project} chat={activeChat} onUpdateMessages={updateChatMessages} habits={habits} events={events} weekEvents={weekEvents} activities={activities} habitTimes={habitTimes} onAction={onAction}/>
      </div>
    </div>
  );
}

function ProjectNovaChat({ project, chat, onUpdateMessages, habits, events, activities, habitTimes, onAction }) {
  const INTRO = {role:"nova",text:`Hey! I'm Nova. Let's work on "${project.name}". I'll help you brainstorm, plan, and build — and everything we discuss is saved to this project chat.`,time:nowTime(),actions:[]};
  const [msgs, setMsgs] = useState(chat?.messages?.length>0 ? chat.messages : [INTRO]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [rec, setRec] = useState(false);
  const fileRef = useRef(null); const botRef = useRef(null); const recRef = useRef(null);

  useEffect(()=>{ botRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs,loading]);
  useEffect(()=>{ onUpdateMessages(msgs); },[msgs]);
  useEffect(()=>{ if(chat?.messages?.length>0) setMsgs(chat.messages); else setMsgs([INTRO]); },[chat?.id]);

  const sysPrompt = () => {
    const done=habits.filter(h=>h.done).map(h=>h.name);
    return `You are Nova, Demetri's personal assistant in PROJECT MODE for: "${project.name}" (${project.tag}, status: ${project.status}).\nProject notes: ${project.note||"none"}\nProject tasks: ${(project.tasks||[]).map(t=>`${t.done?"✓":"○"} ${t.text}`).join(", ")||"none"}\nToday: habits done=${done.join(",")||"none"}\nBe warm, specific, and actionable.`;
  };

  const send = async (text) => {
    if(!text?.trim()||loading) return;
    const userMsg={role:"user",text:text.trim(),time:nowTime(),actions:[]};
    const updated=[...msgs,userMsg];
    setMsgs(updated); setInput(""); setLoading(true);
    try{
      const apiMsgs=updated.filter(m=>m!==INTRO).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
      const data=await callAPI(apiMsgs.slice(-20),{system:sysPrompt()});
      const reply=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim()||"Something went wrong.";
      setMsgs(p=>[...p,{role:"nova",text:reply,time:nowTime(),actions:[]}]);
    }catch{ setMsgs(p=>[...p,{role:"nova",text:"Connection error. Try again.",time:nowTime(),actions:[]}]); }
    setLoading(false);
  };

  const startVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Voice not supported.");return;}
    if(rec){recRef.current?.stop();return;}
    const r=new SR(); r.lang="en-US"; r.interimResults=false; r.continuous=false; recRef.current=r;
    r.onstart=()=>setRec(true); r.onend=()=>setRec(false); r.onerror=()=>setRec(false);
    r.onresult=e=>setInput(e.results[0][0].transcript);
    r.start();
  };

  return (
    <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:"10px"}}>
        {msgs.map((m,i)=>(<div key={i} className={`msg ${m.role==="user"?"u":"n"}`}><div className="mbub">{m.text}</div><div className="mtime">{m.time}</div></div>))}
        {loading&&<div className="msg n" style={{opacity:.7}}><div className="mbub" style={{fontSize:"13px",color:"var(--muted)"}}>Nova is thinking…</div></div>}
        <div ref={botRef}/>
      </div>
      <div style={{borderTop:"1px solid var(--b1)",padding:"12px 20px",display:"flex",gap:"8px",alignItems:"flex-end",flexShrink:0,background:"var(--surf)"}}>
        <button className={`micbtn ${rec?"rec":""}`} onClick={startVoice}>{rec?"⏹":"🎤"}</button>
        <textarea className="chatinput" placeholder={`Ask Nova about ${project.name}…`} value={input} rows={1}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);setInput("");}}}
          style={{flex:1}}/>
        <button className="micbtn" onClick={()=>fileRef.current?.click()}>📎</button>
        <input ref={fileRef} type="file" style={{display:"none"}} accept="*/*" multiple onChange={()=>{}}/>
        <button className="csend" onClick={()=>{send(input);setInput("");}} disabled={!input.trim()||loading}>↑</button>
      </div>
    </div>
  );
}

// ── PROJECTS (polished) ──
function Projects({ projects, setProjects, onOpenProject=null, activeProject=null }) {
  const [name,setName]=useState(""); const [tag,setTag]=useState("personal"); const [filter,setFilter]=useState("all");
  const tags=["personal","creative","work"];
  const tagActiveCls={personal:"ap",creative:"ac",work:"aw"};
  const statusCls={"To do":"ps-todo","In progress":"ps-progress","Done":"ps-done"};

  const add=()=>{
    if(!name.trim()) return;
    const newProj={id:Date.now(),name:name.trim(),tag,status:"To do",note:"",tasks:[],ti:""};
    setProjects(p=>[newProj,...p]);
    setName("");
    if(onOpenProject) onOpenProject(newProj);
  };

  const del=(id,e)=>{ e.stopPropagation(); setProjects(p=>p.filter(pr=>pr.id!==id)); if(activeProject?.id===id&&onOpenProject) onOpenProject(null); };
  const filtered=filter==="all"?projects:projects.filter(p=>p.tag===filter);

  // Stats
  const total=projects.length;
  const inProgress=projects.filter(p=>p.status==="In progress").length;
  const done=projects.filter(p=>p.status==="Done").length;
  const totalTasks=projects.reduce((a,p)=>(a+(p.tasks||[]).length),0);
  const doneTasks=projects.reduce((a,p)=>(a+(p.tasks||[]).filter(t=>t.done).length),0);

  return (
    <div className="projwrap">
      {/* Input row */}
      <div className="irow">
        <input className="ifield" placeholder="New project… (Enter to create &amp; open)" value={name}
          onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
        <button className="iplus" onClick={add}>+</button>
      </div>

      {/* Tag selector */}
      <div className="ptagrow">
        {tags.map(t=><button key={t} className={`ptbtn ${tag===t?tagActiveCls[t]:""}`} onClick={()=>setTag(t)}>{t[0].toUpperCase()+t.slice(1)}</button>)}
      </div>

      {/* Stats row */}
      {total > 0 && (
        <div className="proj-stats">
          <div className="proj-stat"><div className="proj-stat-val" style={{color:"var(--blue)"}}>{total}</div><div className="proj-stat-lbl">Total</div></div>
          <div className="proj-stat"><div className="proj-stat-val" style={{color:"var(--amber)"}}>{inProgress}</div><div className="proj-stat-lbl">Active</div></div>
          <div className="proj-stat"><div className="proj-stat-val" style={{color:"var(--green)"}}>{done}</div><div className="proj-stat-lbl">Done</div></div>
          <div className="proj-stat"><div className="proj-stat-val" style={{color:"var(--nova)"}}>{totalTasks>0?Math.round((doneTasks/totalTasks)*100):0}%</div><div className="proj-stat-lbl">Tasks</div></div>
        </div>
      )}

      {/* Filter row */}
      <div className="frow">
        {["all",...tags].map(f=><button key={f} className={`fbtn${filter===f?" a":""}`} onClick={()=>setFilter(f)}>{f[0].toUpperCase()+f.slice(1)}</button>)}
      </div>

      {/* Empty state */}
      {filtered.length===0 && (
        <div className="proj-empty">
          <div className="proj-empty-icon">◫</div>
          <div className="proj-empty-title">No projects yet</div>
          <div className="proj-empty-sub">Type a name above and press Enter to create your first project.</div>
        </div>
      )}

      {/* Project cards */}
      {filtered.map((pr,i)=>{
        const taskCount=(pr.tasks||[]).length;
        const taskDone=(pr.tasks||[]).filter(t=>t.done).length;
        const taskPct=taskCount>0?Math.round((taskDone/taskCount)*100):0;
        const isActive=activeProject?.id===pr.id;
        return (
          <div key={pr.id} className={`pcard tag-${pr.tag}${isActive?" active":""}`}
            style={{animationDelay:`${i*.05}s`}}
            onClick={()=>onOpenProject&&onOpenProject(pr)}>
            {/* Top row */}
            <div className="pctop">
              <span className="pctitle">{pr.name}</span>
              <span className={`pctag tg-${pr.tag}`}>{pr.tag}</span>
              <span className={`pstatus ${statusCls[pr.status]||"ps-todo"}`}>{pr.status}</span>
              <span className="popen">{isActive?"Active ✦":"Open →"}</span>
              <button className="pcdel" onClick={e=>del(pr.id,e)}>✕</button>
            </div>

            {/* Note preview */}
            {pr.note&&<div style={{fontSize:"12px",color:"var(--muted)",marginBottom:"8px",paddingLeft:"6px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pr.note}</div>}

            {/* Task progress bar */}
            {taskCount > 0 && (
              <div className="proj-progress">
                <div className="proj-progress-label">
                  <span>{taskDone}/{taskCount} tasks</span>
                  <span>{taskPct}%</span>
                </div>
                <div className="proj-progress-bar">
                  <div className="proj-progress-fill" style={{
                    width:`${taskPct}%`,
                    background: taskPct===100 ? "var(--green)" : pr.tag==="work" ? "var(--amber)" : pr.tag==="creative" ? "var(--nova)" : "var(--blue)"
                  }}/>
                </div>
              </div>
            )}

            {/* Meta */}
            <div className="pmeta">
              {taskCount===0 && <span className="pmeta-item" style={{color:"var(--muted)",fontStyle:"italic"}}>No tasks yet</span>}
              {pr.note && !taskCount && <span className="pmeta-item">📝 Has notes</span>}
            </div>
          </div>
        );
      })}
      <div className="spacer"/>
    </div>
  );
}

// ── WEEK NOVA SUMMARY ──
function WeekNovaSummary({ weekEvents, weekTasks, habits }) {
  const [text,setText]=useState(""); const [load,setLoad]=useState(false);
  const run=useCallback(async()=>{
    setLoad(true); setText("");
    try{
      const evts=weekEvents.slice(0,8).map(e=>`${e.title} on ${fmtShort(e.start)}`);
      const taskCount=Object.values(weekTasks).flat().length;
      const done=habits.filter(h=>h.done).map(h=>h.name);
      const data=await callAPI([{role:"user",content:`You are Nova. Give a brief, warm weekly overview (3-4 sentences). Cover: upcoming events, any patterns you notice, one productivity tip for the week ahead.\nWeek events: ${evts.join(", ")||"none scheduled"}\nWeek tasks: ${taskCount} tasks added\nHabits done today: ${done.join(", ")||"none yet"}`}]);
      const t=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      setText(t);
    }catch{}
    setLoad(false);
  },[weekEvents,weekTasks,habits]);
  useEffect(()=>{run();},[weekEvents.length]);
  return (
    <div style={{marginBottom:"12px"}}>
      <div className="nsum" style={{margin:0}}>
        <div className="nst"><div className="nav2">✦</div><span className="nlbl">Nova · Week Ahead</span><button className="nref" onClick={run}>↻</button></div>
        {load?<div className="dots"><div className="dot"/><div className="dot"/><div className="dot"/></div>:<div className="ntxt">{text||"Sync your calendar to get a weekly summary."}</div>}

    </div>
  );
}

// ── SETTINGS MODAL (with 2FA) ──
function SettingsModal({ onClose, notifPermission, onEnableNotifs }) {
  const [twoFAEnabled, setTwoFAEnabled] = useState(()=>!!LS.get("totp_enabled", false));
  const [twoFASecret, setTwoFASecret] = useState(()=>LS.get("totp_secret", null));
  const [setupStep, setSetupStep] = useState(null); // null | 'qr' | 'verify' | 'done'
  const [verifyCode, setVerifyCode] = useState("");
  const [verifyErr, setVerifyErr] = useState("");
  const [verifying, setVerifying] = useState(false);
  const [pendingSecret, setPendingSecret] = useState(null);
  const qrRef = useRef(null);
  const [qrRendered, setQrRendered] = useState(false);

  const startSetup = () => {
    const secret = TOTP.generateSecret();
    setPendingSecret(secret);
    setSetupStep('qr');
    setVerifyCode("");
    setVerifyErr("");
    setQrRendered(false);
  };

  // Render QR code once the container is in the DOM
  useEffect(()=>{
    if (setupStep === 'qr' && pendingSecret && qrRef.current && !qrRendered) {
      qrRef.current.innerHTML = "";
      try {
        new QRCode(qrRef.current, {
          text: TOTP.otpauthUrl(pendingSecret),
          width: 160, height: 160,
          correctLevel: QRCode.CorrectLevel.M,
        });
        setQrRendered(true);
      } catch (e) {
        qrRef.current.innerHTML = `<div style="font-size:11px;color:var(--muted);padding:8px;text-align:center">QR unavailable — enter secret manually</div>`;
      }
    }
  },[setupStep, pendingSecret, qrRendered]);

  const doVerify = async () => {
    if (verifyCode.length !== 6) { setVerifyErr("Enter the 6-digit code."); return; }
    setVerifying(true); setVerifyErr("");
    const ok = await TOTP.verify(pendingSecret, verifyCode);
    if (ok) {
      LS.set("totp_secret", pendingSecret);
      LS.set("totp_enabled", true);
      setTwoFASecret(pendingSecret);
      setTwoFAEnabled(true);
      setSetupStep('done');
    } else {
      setVerifyErr("Code didn't match — try again.");
    }
    setVerifying(false);
  };

  const disable2FA = () => {
    LS.set("totp_enabled", false);
    LS.set("totp_secret", null);
    setTwoFAEnabled(false);
    setTwoFASecret(null);
    setSetupStep(null);
  };

  const notifLabel = notifPermission === 'granted' ? '✓ Enabled' : notifPermission === 'denied' ? 'Blocked in browser' : 'Not enabled';
  const notifColor = notifPermission === 'granted' ? 'var(--green)' : notifPermission === 'denied' ? 'var(--red)' : 'var(--muted)';

  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="settings-modal">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}}>
          <div style={{fontSize:"18px",fontWeight:"600"}}>Settings</div>
          <button className="sbtn" onClick={onClose}>Done</button>
        </div>

        {/* Notifications */}
        <div className="settings-section">
          <div className="settings-section-title">Notifications</div>
          <div className="settings-row">
            <div><div className="settings-row-label">Push notifications</div><div className="settings-row-sub" style={{color:notifColor}}>{notifLabel}</div></div>
            {notifPermission === 'default' && (
              <button className="sbtn" style={{color:"var(--nova)",borderColor:"var(--nova-border)"}} onClick={onEnableNotifs}>Enable</button>
            )}
            {notifPermission === 'denied' && (
              <span style={{fontSize:"11px",color:"var(--muted)"}}>Allow in browser settings</span>
            )}
          </div>
          <div className="settings-row">
            <div><div className="settings-row-label">Daily briefing</div><div className="settings-row-sub">8:00 AM summary of your day</div></div>
            <span style={{fontSize:"12px",color:notifPermission==='granted'?"var(--green)":"var(--muted)"}}>{notifPermission==='granted'?"Active":"Needs notifications"}</span>
          </div>
          <div className="settings-row">
            <div><div className="settings-row-label">Calendar reminders</div><div className="settings-row-sub">10 min before events</div></div>
            <span style={{fontSize:"12px",color:notifPermission==='granted'?"var(--green)":"var(--muted)"}}>{notifPermission==='granted'?"Active":"Needs notifications"}</span>
          </div>
        </div>

        {/* Security */}
        <div className="settings-section">
          <div className="settings-section-title">Security</div>
          <div className="settings-row">
            <div>
              <div className="settings-row-label">Two-factor authentication</div>
              <div className="settings-row-sub">TOTP — works with Google Authenticator, Authy, etc.</div>
            </div>
            {twoFAEnabled
              ? <span className="totp-active-badge">✓ On</span>
              : <button className="sbtn" style={{color:"var(--nova)",borderColor:"var(--nova-border)"}} onClick={startSetup}>Set up</button>
            }
          </div>
          {twoFAEnabled && !setupStep && (
            <div style={{paddingTop:"8px",display:"flex",gap:"8px"}}>
              <button className="sbtn" onClick={startSetup}>Regenerate key</button>
              <button className="sbtn" style={{color:"var(--red)",borderColor:"rgba(248,113,113,.3)"}} onClick={disable2FA}>Disable 2FA</button>
            </div>
          )}

          {/* QR setup flow */}
          {setupStep === 'qr' && pendingSecret && (
            <div className="qr-wrap">
              <div style={{fontSize:"13px",color:"var(--soft)",textAlign:"center"}}>Scan with your authenticator app</div>
              <div className="qr-box" ref={qrRef}/>
              <div style={{fontSize:"11px",color:"var(--muted)"}}>Or enter manually:</div>
              <div className="secret-display">{pendingSecret}</div>
              <ol className="totp-steps">
                <li>Open Google Authenticator or Authy</li>
                <li>Tap + → Scan QR code (or "Enter a setup key")</li>
                <li>Enter the code below to confirm</li>
              </ol>
              <div className="totp-verify-row">
                <input className="totp-input" placeholder="000000" maxLength={6} value={verifyCode}
                  onChange={e=>setVerifyCode(e.target.value.replace(/\D/g,""))}
                  onKeyDown={e=>e.key==="Enter"&&doVerify()}/>
                <button className="totp-verify-btn" onClick={doVerify} disabled={verifying}>{verifying?"…":"Verify"}</button>
              </div>
              {verifyErr&&<div style={{fontSize:"12px",color:"var(--red)",textAlign:"center"}}>{verifyErr}</div>}
              <button className="sbtn" onClick={()=>setSetupStep(null)}>Cancel</button>
            </div>
          )}

          {setupStep === 'done' && (
            <div style={{textAlign:"center",padding:"12px 0",fontSize:"13px",color:"var(--green)"}}>
              ✓ 2FA is now active. Your dashboard is protected.
            </div>
          )}
        </div>

        {/* Account */}
        <div className="settings-section">
          <div className="settings-section-title">Account</div>
          <div className="settings-row">
            <div><div className="settings-row-label">Session</div><div className="settings-row-sub">Password-protected</div></div>
            <button className="sbtn" onClick={()=>{ AUTH.clear(); window.location.reload(); }}>Lock now</button>
          </div>
        </div>

        {/* OAuth debug info */}
        <div className="settings-section">
          <div className="settings-section-title">Google Calendar</div>
          <div className="settings-row">
            <div><div className="settings-row-label">Redirect URI</div><div className="settings-row-sub" style={{fontFamily:"monospace",fontSize:"10px",wordBreak:"break-all",color:"var(--soft)"}}>{REDIRECT_URI}</div></div>
          </div>
          <div style={{fontSize:"11px",color:"var(--muted)",lineHeight:1.6,paddingTop:"4px"}}>
            Make sure this exact URI is in your Google Cloud Console → Credentials → OAuth 2.0 → Authorized redirect URIs. Your Cloudflare Worker must also use this same URI when building the OAuth URL.
          </div>
        </div>
      </div>
    </div>
  );
}
