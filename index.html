// ── CONSTANTS ──
const REDIRECT_URI = "https://ligourio.github.io/Nova-Dashboard";
const API   = "https://nova-proxy.dkaloudis07.workers.dev";
const MODEL = "claude-sonnet-4-20250514";
const EVT_COLORS = ["#60a5fa","#4ade80","#f87171","#fbbf24","#a78bfa","#fb923c"];
const DOW   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const TABS  = [

// ── HELPERS ──
const greeting  = () => { const h=new Date().getHours(); return h<12?"Good morning":h<17?"Good afternoon":"Good evening"; };
const fmtDate   = () => new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
const fmtTime   = iso => { try{ return new Date(iso).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); }catch{ return ""; }};
const fmtShort  = iso => { try{ return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric"}); }catch{ return ""; }};
const nowTime   = () => new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const dateKey   = d => { try{ return d.toISOString().split("T")[0]; }catch{ return ""; }};
const evStatus  = s => { try{ const d=(new Date(s)-Date.now())/60000; return d<0?"done":d<60?"soon":"later"; }catch{ return "later"; }};
const next7     = () => Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()+i+1); return d; });
const sessId    = () => new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
const todayStr  = () => new Date().toDateString();

// ── LOCALSTORAGE ──
const LS = {
  get: (k,d) => { try{ const v=localStorage.getItem(k); return v!==null?JSON.parse(v):d; }catch{ return d; }},
  set: (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch{}},
  del: (k)   => { try{ localStorage.removeItem(k); }catch{}},
};

// ── AUTH ──
const AUTH = {
  isValid: () => {
    const t=LS.get("session_token",null), e=LS.get("session_expiry",null);
    return !!(t && e && new Date(e) > new Date());
  },
  save:  (token,expiresAt) => { LS.set("session_token",token); LS.set("session_expiry",expiresAt); },
  clear: () => { LS.del("session_token"); LS.del("session_expiry"); },
  token: () => LS.get("session_token",null),
};

// ── TOTP (2FA) ──
const TOTP = {
  generateSecret: () => { const c='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567'; let s=''; for(let i=0;i<32;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; },
  b32decode: s => { const c='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567'; let bits=0,val=0; const out=[]; for(const ch of s.toUpperCase().replace(/=+$/,'')){ val=(val<<5)|c.indexOf(ch); bits+=5; if(bits>=8){bits-=8;out.push((val>>bits)&0xff);}} return new Uint8Array(out); },
  hmacSHA1: async (k,m) => { const key=await crypto.subtle.importKey('raw',k,{name:'HMAC',hash:'SHA-1'},false,['sign']); return new Uint8Array(await crypto.subtle.sign('HMAC',key,m)); },
  generate: async secret => {
    const ctr=Math.floor(Date.now()/1000/30), msg=new ArrayBuffer(8), v=new DataView(msg);
    v.setUint32(4,ctr,false);
    const h=await TOTP.hmacSHA1(TOTP.b32decode(secret),new Uint8Array(msg));
    const off=h[h.length-1]&0x0f;
    return String(((h[off]&0x7f)<<24|h[off+1]<<16|h[off+2]<<8|h[off+3])%1000000).padStart(6,'0');
  },
  verify: async (secret,token) => {
    const ctr=Math.floor(Date.now()/1000/30);
    for(let d=-1;d<=1;d++){
      const msg=new ArrayBuffer(8); new DataView(msg).setUint32(4,ctr+d,false);
      const h=await TOTP.hmacSHA1(TOTP.b32decode(secret),new Uint8Array(msg));
      const off=h[h.length-1]&0x0f;
      if(String(((h[off]&0x7f)<<24|h[off+1]<<16|h[off+2]<<8|h[off+3])%1000000).padStart(6,'0')===token) return true;
    }
    return false;
  },
  otpauthUrl: (s,l='Nova Dashboard',i='Nova') => `otpauth://totp/${encodeURIComponent(i)}:${encodeURIComponent(l)}?secret=${s}&issuer=${encodeURIComponent(i)}&algorithm=SHA1&digits=6&period=30`,
};

// ── PUSH ──
const PUSH = {
  ok:      () => 'serviceWorker' in navigator && 'Notification' in window,
  perm:    () => PUSH.ok() ? Notification.permission : 'unsupported',
  request: async () => { if(!PUSH.ok()) return 'unsupported'; return Notification.requestPermission(); },
  regSW:   async () => {
    if(!('serviceWorker' in navigator)) return null;
    try { return await navigator.serviceWorker.register('./sw.js',{scope:'/Nova-Dashboard/'}); } catch(e){ console.warn('SW:',e); return null; }
  },
  scheduleAll: async events => {
    if(!('serviceWorker' in navigator)) return;
    const reg = await navigator.serviceWorker.ready.catch(()=>null);
    reg?.active?.postMessage({ type:'SCHEDULE_ALL', events });
  },
  sendRecap: async (events,summary) => {
    if(!('serviceWorker' in navigator)||PUSH.perm()!=='granted') return;
    const reg = await navigator.serviceWorker.ready.catch(()=>null);
    reg?.active?.postMessage({ type:'SHOW_RECAP', events, summary });
  },
};

// ── API CALLS ──
const callWorker = async (action, payload={}) => {
  const headers = {"Content-Type":"application/json"};
  const t = AUTH.token();
  if(t) headers["X-Session-Token"] = t;
  const res = await fetch(API,{ method:"POST", headers, body:JSON.stringify({action,...payload}) });
  return res.json();
};
const callAPI = async (messages, opts={}) =>
  callWorker("ai",{payload:{model:MODEL,max_tokens:2000,...opts,messages}});

// ── MEMORY ──
const saveMemory = (session_id, summary) =>
  callWorker("nova_save_memory", { session_id, summary });

const getMemories = (limit=30) =>
  callWorker("nova_get_memories", { limit });

// ── WEB SEARCH ──
const searchWeb = (query, max_results=5) =>
  callWorker("search_web", { query, max_results });

// ── CALENDAR ──
const fetchCalendarEvents = (timeMin,timeMax) => callWorker("calendar_events",{timeMin,timeMax});
const addCalendarEvent    = (title,date,time,duration_minutes=60,description="") =>
  callWorker("calendar_add",{title,date,time,duration_minutes,description});
const getGoogleAuthUrl    = async () => { const d=await callWorker("google_auth_url",{redirect_uri:REDIRECT_URI}); return d.url; };
const checkGoogleStatus   = ()        => callWorker("google_status",{}).then(d=>d.connected);

// ══════════════════════════════════════════════════════════════
// COMPONENTS
// ══════════════════════════════════════════════════════════════

function Login({ onLogin }) {
  const [pw,setPw]=useState(""); const [err,setErr]=useState(""); const [loading,setLoading]=useState(false);
  const go=async()=>{
    if(!pw.trim()||loading) return;
    setLoading(true); setErr("");
    try{
      const d=await callWorker("login",{password:pw});
      if(d.token){ AUTH.save(d.token,d.expiresAt); onLogin(d.token); }
      else setErr(d.error||"Incorrect password.");
    }catch{ setErr("Connection error."); }
    setPw(""); setLoading(false);
  };
  return(
    <div className="lw"><div className="lb">
      <div className="lt">Welcome back, Demetri.</div>
      <div className="ls">Enter your password to continue.</div>
      <label className="fl">Password</label>
      <input className="fi" type="password" placeholder="••••••••••" value={pw}
        onChange={e=>{setPw(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&go()} autoFocus/>
      <button className="lbtn" onClick={go} style={{opacity:loading?.7:1}}>{loading?"Signing in…":"Sign in"}</button>
      {err&&<div className="lerr">{err}</div>}
    </div></div>
  );
}

// ── CALENDAR PROGRESS (replaces habits) ──
function CalendarProgress({ events, completedEvents, onToggle, novaMotivation }) {
  const total = events.length;
  const done  = events.filter(e=>completedEvents.has(e.id||e.title)).length;
  const pct   = total>0 ? Math.round((done/total)*100) : 0;
  const allDone = total>0 && done===total;

  return(
    <div className="cal-progress">
      <div className="cal-prog-hd">
        <span className="cal-prog-label">{allDone?"🎉 All done for today!":"Today's schedule"}</span>
        <span className="cal-prog-pct">{total>0?`${pct}%`:""}</span>
      </div>
      <div className="cal-prog-bar">
        <div className={`cal-prog-fill${allDone?" done":""}`} style={{width:`${total>0?pct:0}%`}}/>
      </div>
      {total===0 ? (
        <div className="cal-empty">
          <div className="cal-empty-msg">No events today</div>
          {novaMotivation&&<div className="cal-nova-msg">✦ {novaMotivation}</div>}
        </div>
      ) : (
        <div className="cal-tasks">
          {events.map((ev,i)=>{
            const key=ev.id||ev.title;
            const isDone=completedEvents.has(key);
            return(
              <div key={i} className={`cal-task${isDone?" done":""}`} onClick={()=>onToggle(key)}>
                <div className="cal-task-ck">{isDone?"✓":""}</div>
                <div className="cal-task-body">
                  <div className="cal-task-title">{ev.title}</div>
                  <div className="cal-task-time">{fmtTime(ev.start)}{ev.end?` – ${fmtTime(ev.end)}`:""}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── NOVA SUMMARY ──
function NovaSummary({ events, activities, completedEvents }) {
  const [text,setText]=useState(""); const [eta,setEta]=useState(""); const [load,setLoad]=useState(false);
  const run=useCallback(async()=>{
    setLoad(true); setText(""); setEta("");
    try{
      const done=events.filter(e=>completedEvents.has(e.id||e.title)).map(e=>e.title);
      const rem=events.filter(e=>!completedEvents.has(e.id||e.title)).map(e=>`${e.title}${e.start?" at "+fmtTime(e.start):""}`);
      const logs=activities.slice(0,4).map(a=>`${a.time}:${a.text}`);
      const d=await callAPI([{role:"user",content:`You are Nova. Warm brief daily summary (3-4 sentences): what's done, what's left, one tip. End exactly with: ETA: [time or "All done!"]
Time:${new Date().toLocaleTimeString()} | ${fmtDate()}
Done:${done.join(",")||"none"} | Remaining:${rem.join(",")||"all done!"}
Log:${logs.join(";")||"empty"}`}]);
      const full=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      const m=full.match(/ETA:\s*(.+)/i);
      if(m){setEta(m[1].trim());setText(full.replace(/ETA:\s*.+/i,"").trim());}else setText(full);
    }catch{}
    setLoad(false);
  },[events,activities,completedEvents]);
  useEffect(()=>{run();},[]);
  return(
    <div className="nsum">
      <div className="nst"><div className="nav2">✦</div><span className="nlbl">Nova · Daily Summary</span><button className="nref" onClick={run}>↻</button></div>
      {load?<div className="dots"><div className="dot"/><div className="dot"/><div className="dot"/></div>
           :<div className="ntxt">{text||"No events yet — add some to get your summary."}</div>}
      {eta&&<div className="neta">⏱ Estimated finish: <b>{eta}</b></div>}
    </div>
  );
}

// ── FOCUS LIST (persisted) ──
function FocusList({ items, setItems }) {
  const [input,setInput]=useState("");
  const add=()=>{ if(!input.trim()||items.length>=3) return; setItems(p=>[...p,{id:Date.now(),text:input.trim(),done:false}]); setInput(""); };
  const toggle=id=>setItems(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const del=id=>setItems(p=>p.filter(t=>t.id!==id));
  const nums=["1","2","3"]; const numCls=["p1","p2","p3"];
  return(
    <div className="focus-wrap">
      <div className="focus-card">
        <div className="focus-hd"><span className="focus-title">Top 3 Focus</span><span style={{fontSize:"11px",color:"var(--muted)"}}>{items.length}/3</span></div>
        {items.length===0&&<div className="focus-empty">What are your 3 priorities today?</div>}
        {items.map((t,i)=>(
          <div className="focus-item" key={t.id}>
            <span className={`focus-num ${numCls[i]||""}`}>{nums[i]}</span>
            <div className={`focus-ck ${t.done?"on":""}`} onClick={()=>toggle(t.id)}>{t.done?"✓":""}</div>
            <span className={`focus-txt ${t.done?"on":""}`} style={{cursor:"pointer"}} onClick={()=>toggle(t.id)}>{t.text}</span>
            <button className="focus-del" onClick={e=>{e.stopPropagation();del(t.id);}}>✕</button>
          </div>
        ))}
        {items.length<3&&(
          <div className="focus-input-row">
            <input className="focus-input" placeholder={`Priority ${items.length+1}…`} value={input}
              onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
            <button className="focus-add" onClick={add}>+</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── WEEK VIEW ──
function WeekView({ weekTasks, setWeekTasks, weekEvents, weekCalLoad }) {
  const days=next7();
  const [expanded,setExpanded]=useState({});
  const [inputs,setInputs]=useState({});
  const toggle=k=>setExpanded(p=>({...p,[k]:!p[k]}));
  const toggleTask=(k,i)=>setWeekTasks(p=>({...p,[k]:(p[k]||[]).map((t,j)=>j===i?{...t,done:!t.done}:t)}));
  const addTask=k=>{ const v=(inputs[k]||"").trim(); if(!v) return; setWeekTasks(p=>({...p,[k]:[...(p[k]||[]),{text:v,done:false}]})); setInputs(p=>({...p,[k]:""})); };
  const calForDay=d=>weekEvents.filter(ev=>{ try{ return new Date(ev.start).toDateString()===d.toDateString(); }catch{return false;}});
  return(
    <div>
      {days.map((day,i)=>{
        const k=dateKey(day); const tasks=weekTasks[k]||[]; const cal=calForDay(day); const total=tasks.length+cal.length; const open=expanded[k];
        return(
          <div className="wday" key={k} style={{animationDelay:`${i*.05}s`}}>
            <div className="wdh" onClick={()=>toggle(k)}>
              <div className="wdhl"><span className="wdow">{DOW[day.getDay()]}</span><span className="wdate">{day.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span></div>
              <span className={`wcount${total>0?" has":""}`}>{weekCalLoad?"…":total>0?`${total} item${total>1?"s":""}`:"Free"} {open?"▲":"▼"}</span>
            </div>
            {open&&<>
              <div className="wbody">
                {cal.map((ev,j)=>(<div className="witem" key={`c${j}`}><div className="wdot" style={{background:ev.color||"#60a5fa"}}/><span className="wtime">{fmtTime(ev.start)}</span><span className="wtxt">{ev.title}</span></div>))}
                {tasks.map((t,j)=>(<div className="witem" key={`t${j}`} style={{cursor:"pointer"}} onClick={()=>toggleTask(k,j)}><div className={`wck ${t.done?"on":""}`}>{t.done?"✓":""}</div><span className="wtxt" style={{textDecoration:t.done?"line-through":"none",color:t.done?"var(--muted)":"var(--soft)"}}>{t.text}</span></div>))}
                {total===0&&<div style={{fontSize:"12px",color:"var(--muted)",padding:"7px 0",borderTop:"1px solid var(--b1)"}}>Nothing scheduled</div>}
              </div>
              <div className="wadd">
                <input className="winput" placeholder="Add a task…" value={inputs[k]||""} onChange={e=>setInputs(p=>({...p,[k]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addTask(k)}/>
                <button className="wplus" onClick={()=>addTask(k)}>+</button>
              </div>
            </>}
          </div>
        );
      })}
    </div>
  );
}

// ── NOVA CHAT — BUILD B (persistent memory + web search + verified tools) ──
function NovaChat({ events, weekEvents, activities, projects, completedEvents, onAction, isDesktop, desktopSidebarOpen, setDesktopSidebarOpen }) {
  const INTRO = {role:"nova",text:"Hey! I'm Nova — your personal Jarvis. I remember everything across our sessions, I can search the web, and I have full control of your dashboard. What do you need?",time:nowTime(),actions:[]};
  const [sessions,setSessions]   = useState(()=>LS.get("nova_sessions",[]));
  const [current,setCurrent]     = useState([INTRO]);
  const [input,setInput]         = useState("");
  const [loading,setLoading]     = useState(false);
  const [rec,setRec]             = useState(false);
  const [mobileSidebarOpen,setMobileSidebarOpen] = useState(false);
  const [supabaseMemory,setSupabaseMemory] = useState([]);
  const [memoryLoaded,setMemoryLoaded]     = useState(false);
  const botRef = useRef(null); const recRef = useRef(null); const fileRef = useRef(null);

  const sidebarOpen    = isDesktop ? desktopSidebarOpen : mobileSidebarOpen;
  const setSidebarOpen = isDesktop ? setDesktopSidebarOpen : setMobileSidebarOpen;

  useEffect(()=>{ botRef.current?.scrollIntoView({behavior:"smooth"}); },[current,loading]);
  useEffect(()=>{ LS.set("nova_sessions",sessions); },[sessions]);

  // Load persistent memory from Supabase on mount
  useEffect(()=>{
    if(memoryLoaded) return;
    getMemories(30).then(data=>{
      if(data.memories) setSupabaseMemory(data.memories);
      setMemoryLoaded(true);
    }).catch(()=>setMemoryLoaded(true));
  },[]);

  // Build memory string from Supabase + local sessions
  const buildMemory = () => {
    const supaLines = supabaseMemory.slice(0,20).map(m=>{
      const date = new Date(m.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric"});
      return `[${date}] ${m.summary}`;
    });
    const localLines = sessions.slice(-5).map(s=>{
      const msgs = s.messages.filter(m=>m.role==="user").map(m=>m.text).slice(-2).join(" | ");
      return `[${s.id}] ${msgs}`;
    });
    const all = [...supaLines, ...localLines];
    return all.length ? all.join("\n") : "No prior sessions yet.";
  };

  const sysPrompt = () => {
    const done  = events.filter(e=>completedEvents.has(e.id||e.title)).map(e=>e.title);
    const rem   = events.filter(e=>!completedEvents.has(e.id||e.title)).map(e=>`${e.title}${e.start?" at "+fmtTime(e.start):""}`);
    const wevts = weekEvents.slice(0,8).map(e=>`${e.title} on ${fmtShort(e.start)}`);
    const log   = activities.slice(0,6).map(a=>`${a.time}:${a.text}`);
    const projs = projects.map(p=>`${p.name}(${p.tag},${p.status})`).slice(0,5);
    const mem   = buildMemory();
    return `You are Nova, Demetri's personal AI assistant — his Jarvis. You have full control of his dashboard and can search the web for real-time information.

CURRENT STATE — ${fmtDate()} | ${new Date().toLocaleTimeString()}
Today done: ${done.join(",")||"none"}
Today remaining: ${rem.join(",")||"all done!"}
This week: ${wevts.join("; ")||"none"}
Activity log: ${log.join(";")||"empty"}
Projects: ${projs.join(";")||"none"}

MEMORY (past sessions):
${mem}

INSTRUCTIONS:
- Use tools freely — the dashboard is your terminal for output. When asked to do something, DO it with tools, don't just say you will.
- Use search_web any time Demetri asks about current events, weather, news, prices, schedules, or anything requiring up-to-date information.
- When Demetri shares personal info (routine, goals, preferences), acknowledge it warmly — it's already being saved to your memory.
- Be warm, smart, concise. You are Jarvis — proactive, capable, always on.`;
  };

  // Auto-save memory after each conversation turn
  const autoSaveMemory = useCallback(async (messages, sid) => {
    try {
      const userMsgs = messages.filter(m=>m.role==="user").map(m=>m.text).slice(-3);
      const novaMsgs = messages.filter(m=>m.role==="nova").map(m=>m.text).slice(-2);
      if (!userMsgs.length) return;
      // Summarise the exchange for memory
      const summaryData = await callAPI([{role:"user",content:`Summarise this conversation exchange in 1-2 sentences, focusing on what Demetri told Nova or asked for. Be specific — include names, times, preferences mentioned.
User said: ${userMsgs.join(" | ")}
Nova replied: ${novaMsgs.join(" | ")}`}]);
      const summary = (summaryData.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      if (summary) {
        await saveMemory(sid, summary);
        // Update local supabase memory cache
        setSupabaseMemory(p=>[{session_id:sid,summary,created_at:new Date().toISOString()},...p].slice(0,30));
      }
    } catch(e) { console.warn("Memory save failed:", e); }
  },[]);

  const send = useCallback(async text=>{
    if(!text?.trim()||loading) return;
    const userMsg={role:"user",text:text.trim(),time:nowTime(),actions:[]};
    const updated=[...current,userMsg];
    setCurrent(updated); setLoading(true);
    try{
      const apiMsgs=updated.filter(m=>m!==INTRO).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
      const data=await callAPI(apiMsgs.slice(-20),{system:sysPrompt(),tools:TOOLS});
      const tblocks=(data.content||[]).filter(b=>b.type==="text");
      const tooluse=(data.content||[]).filter(b=>b.type==="tool_use");

      // Handle tools — including web search
      const acts=[];
      const searchResults=[];
      for(const t of tooluse){
        if(t.name==="search_web"){
          try{
            const sr=await searchWeb(t.input.query, t.input.max_results||5);
            searchResults.push({query:t.input.query, ...sr});
            acts.push(`Searched: "${t.input.query}"`);
          }catch(e){ acts.push(`Search failed: ${e.message}`); }
        } else {
          const r=onAction(t.name,t.input);
          if(r) acts.push(r);
        }
      }

      // If there were search results, do a follow-up to incorporate them
      let reply = tblocks.map(b=>b.text).join("").trim();
      if(searchResults.length>0){
        const searchContext = searchResults.map(sr=>{
          const top = sr.results?.slice(0,3).map(r=>`${r.title}: ${r.content}`).join("\n") || "";
          return `Query: "${sr.query}"\nDirect answer: ${sr.answer||"N/A"}\nSources:\n${top}`;
        }).join("\n\n");
        const followUp = await callAPI([
          ...apiMsgs.slice(-10),
          {role:"user", content:`The search returned these results:\n\n${searchContext}\n\nNow answer Demetri's question using this information. Be conversational and specific.`}
        ],{system:sysPrompt()});
        const followReply=(followUp.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
        if(followReply) reply=followReply;
      }

      if(!reply && acts.length) reply = acts.join("\n");
      if(!reply) reply = "Something went wrong — please try again.";

      const novaMsg={role:"nova",text:reply,time:nowTime(),actions:acts.filter(a=>!a.startsWith("Searched:"))};
      const final=[...updated,novaMsg];
      setCurrent(final);

      // Save to local sessions
      const sid=sessId();
      setSessions(p=>{ const ex=p.findIndex(s=>s.id===sid); const entry={id:sid,messages:final.filter(m=>m!==INTRO)}; if(ex>=0){const n=[...p];n[ex]=entry;return n;} return [...p,entry].slice(-30); });

      // Auto-save memory to Supabase
      autoSaveMemory(final.filter(m=>m!==INTRO), sid);
    }catch(e){
      setCurrent(p=>[...p,{role:"nova",text:"Something went wrong. Check your connection.",time:nowTime(),actions:[]}]);
      console.error(e);
    }
    setLoading(false);
  },[current,loading,events,weekEvents,activities,projects,completedEvents,sessions,supabaseMemory,onAction,autoSaveMemory]);

  const loadSession=s=>{ setCurrent([INTRO,...s.messages]); setSidebarOpen(false); };
  const deleteSession=id=>setSessions(p=>p.filter(s=>s.id!==id));

  const startVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Voice not supported. Try Chrome.");return;}
    if(rec){recRef.current?.stop();return;}
    const r=new SR(); r.lang="en-US"; r.interimResults=false; r.continuous=false; recRef.current=r;
    r.onstart=()=>setRec(true); r.onend=()=>setRec(false); r.onerror=()=>setRec(false);
    r.onresult=e=>setInput(e.results[0][0].transcript);
    r.start();
  };

  const SidebarContent = ()=>(
    <>
      <div className="nova-sidebar-hd">
        <span className="nova-sidebar-title">Chat History</span>
        <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
          {sessions.length>0&&<button className="sbtn" style={{fontSize:"10px",padding:"2px 8px"}} onClick={()=>{setSessions([]);LS.set("nova_sessions",[]);}}>Clear</button>}
          <button className="nova-sidebar-close" onClick={()=>setSidebarOpen(false)}>✕</button>
        </div>
      </div>
      <div className="nova-sidebar-list">
        {sessions.length===0&&<div className="empty" style={{padding:"20px 8px"}}>No history yet.</div>}
        {[...sessions].reverse().map((s,i)=>(
          <div key={i} className="nova-sess-item" style={{position:"relative"}}>
            <div onClick={()=>loadSession(s)}>
              <div className="nova-sess-id">{s.id}</div>
              <div className="nova-sess-preview">{s.messages?.filter(m=>m.role==="user").slice(-1)[0]?.text?.slice(0,50)||"…"}</div>
              <div className="nova-sess-cont">Continue →</div>
            </div>
            <button style={{position:"absolute",top:"8px",right:"8px",fontSize:"11px",color:"var(--muted)",background:"none",border:"none",cursor:"pointer",opacity:.5}} onClick={()=>deleteSession(s.id)}>✕</button>
          </div>
        ))}
      </div>
    </>
  );

  return(
    <div className="nova-page">
      {/* Sidebar overlay (mobile) */}
      {!isDesktop&&<div className={`nova-sidebar-overlay${sidebarOpen?" open":""}`} onClick={()=>setSidebarOpen(false)}/>}
      {/* Sidebar */}
      <div className={`nova-sidebar${sidebarOpen?" open":""}`}><SidebarContent/></div>
      {/* Main chat */}
      <div className="novawrap">
        <div className="novahd">
          <button className="nova-sidebar-toggle" style={{position:"relative",width:"34px",height:"34px",padding:0}} onClick={()=>setSidebarOpen(p=>!p)}>☰</button>
          <div className="novaav" style={{marginLeft:"4px"}}>✦</div>
          <div style={{flex:1,marginLeft:"8px"}}>
            <div className="novanm">Nova</div>
            <div className="novast"><div className="novastd"/>Online · remembers everything</div>
          </div>
          <button className="sbtn" onClick={()=>setCurrent([INTRO])}>New chat</button>
        </div>
        <div className="chatmsgs">
          {current.map((m,i)=>(
            <div key={i} className={`msg ${m.role==="user"?"u":"n"}`}>
              <div className="mbub">{m.text}</div>
              {m.actions?.map((a,j)=><div key={j} className="apill">✓ {a}</div>)}
              <div className="mtime">{m.time}</div>
            </div>
          ))}
          {loading&&<div className="msg n" style={{opacity:.7}}><div className="mbub" style={{fontSize:"13px",color:"var(--muted)"}}>Nova is thinking…</div></div>}
          <div ref={botRef}/>
        </div>
        <div className="chatia">
          <button className={`micbtn ${rec?"rec":""}`} onClick={startVoice}>{rec?"⏹":"🎤"}</button>
          <textarea className="chatinput" placeholder="Ask Nova anything…" value={input} rows={1}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);setInput("");}}}/>
          <button className="micbtn" onClick={()=>fileRef.current?.click()}>📎</button>
          <input ref={fileRef} type="file" style={{display:"none"}} accept="*/*" multiple onChange={()=>{}}/>
          <button className="csend" onClick={()=>{send(input);setInput("");}} disabled={!input.trim()||loading}>↑</button>
        </div>
        <div style={{height:"8px"}}/>
      </div>
    </div>
  );
}

// ── PROJECTS ──
function Projects({ projects, setProjects, onOpenProject, activeProject }) {
  const [name,setName]=useState(""); const [tag,setTag]=useState("personal"); const [filter,setFilter]=useState("all");
  const tags=["personal","creative","work"];
  const tagActiveCls={personal:"ap",creative:"ac",work:"aw"};
  const statusCls={"To do":"ps-todo","In progress":"ps-progress","Done":"ps-done"};
  const add=()=>{
    if(!name.trim()) return;
    const p={id:Date.now(),name:name.trim(),tag,status:"To do",note:"",tasks:[],ti:""};
    setProjects(prev=>[p,...prev]); setName("");
    if(onOpenProject) onOpenProject(p);
  };
  const del=(id,e)=>{ e.stopPropagation(); setProjects(p=>p.filter(pr=>pr.id!==id)); };
  const filtered=filter==="all"?projects:projects.filter(p=>p.tag===filter);
  const total=projects.length, inProg=projects.filter(p=>p.status==="In progress").length, done=projects.filter(p=>p.status==="Done").length;
  const totalTasks=projects.reduce((a,p)=>a+(p.tasks||[]).length,0);
  const doneTasks=projects.reduce((a,p)=>a+(p.tasks||[]).filter(t=>t.done).length,0);
  return(
    <div className="projwrap">
      <div className="irow">
        <input className="ifield" placeholder="New project… (Enter to create)" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
        <button className="iplus" onClick={add}>+</button>
      </div>
      <div className="ptagrow">
        {tags.map(t=><button key={t} className={`ptbtn ${tag===t?tagActiveCls[t]:""}`} onClick={()=>setTag(t)}>{t[0].toUpperCase()+t.slice(1)}</button>)}
      </div>
      {total>0&&(
        <div className="proj-stats">
          <div className="proj-stat"><div className="proj-stat-val" style={{color:"var(--blue)"}}>{total}</div><div className="proj-stat-lbl">Total</div></div>
          <div className="proj-stat"><div className="proj-stat-val" style={{color:"var(--amber)"}}>{inProg}</div><div className="proj-stat-lbl">Active</div></div>
          <div className="proj-stat"><div className="proj-stat-val" style={{color:"var(--green)"}}>{done}</div><div className="proj-stat-lbl">Done</div></div>
          <div className="proj-stat"><div className="proj-stat-val" style={{color:"var(--nova)"}}>{totalTasks>0?Math.round((doneTasks/totalTasks)*100):0}%</div><div className="proj-stat-lbl">Tasks</div></div>
        </div>
      )}
      <div className="frow">
        {["all",...tags].map(f=><button key={f} className={`fbtn${filter===f?" a":""}`} onClick={()=>setFilter(f)}>{f[0].toUpperCase()+f.slice(1)}</button>)}
      </div>
      {filtered.length===0&&(
        <div className="proj-empty"><div className="proj-empty-icon">◫</div><div className="proj-empty-title">No projects yet</div></div>
      )}
      {filtered.map((pr,i)=>{
        const tc=(pr.tasks||[]).length, td=(pr.tasks||[]).filter(t=>t.done).length;
        const pct=tc>0?Math.round((td/tc)*100):0;
        return(
          <div key={pr.id} className={`pcard tag-${pr.tag}${activeProject?.id===pr.id?" active":""}`} style={{animationDelay:`${i*.05}s`}} onClick={()=>onOpenProject&&onOpenProject(pr)}>
            <div className="pctop">
              <span className="pctitle">{pr.name}</span>
              <span className={`pctag tg-${pr.tag}`}>{pr.tag}</span>
              <span className={`pstatus ${statusCls[pr.status]||"ps-todo"}`}>{pr.status}</span>
              <span className="popen">{activeProject?.id===pr.id?"Active ✦":"Open →"}</span>
              <button className="pcdel" onClick={e=>del(pr.id,e)}>✕</button>
            </div>
            {pr.note&&<div style={{fontSize:"12px",color:"var(--muted)",marginBottom:"8px",paddingLeft:"6px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pr.note}</div>}
            {tc>0&&(
              <div className="proj-progress">
                <div className="proj-progress-label"><span>{td}/{tc} tasks</span><span>{pct}%</span></div>
                <div className="proj-progress-bar">
                  <div className="proj-progress-fill" style={{width:`${pct}%`,background:pct===100?"var(--green)":pr.tag==="work"?"var(--amber)":pr.tag==="creative"?"var(--nova)":"var(--blue)"}}/>
                </div>
              </div>
            )}
          </div>
        );
      })}
      <div className="spacer"/>
    </div>
  );
}

  const [activeChatId,setActiveChatId]=useState(()=>{ const s=LS.get(storageKey,[]); return s[0]?.id||Date.now(); });

  const toggleTask=tid=>setProjects(p=>p.map(pr=>pr.id===project.id?{...pr,tasks:(pr.tasks||[]).map(t=>t.id===tid?{...t,done:!t.done}:t)}:pr));

        <div style={{padding:"12px 14px",borderBottom:"1px solid var(--b1)"}}>

          <div style={{fontSize:"14px",fontWeight:"600",marginBottom:"4px"}}>{project.name}</div>

            <span className={`pctag tg-${project.tag}`}>{project.tag}</span>

              {["To do","In progress","Done"].map(s=><option key={s}>{s}</option>)}

          </div>
          <div className="pcadd" style={{marginTop:"4px"}}>

}

function ProjectNovaChat({ project, chat, onUpdateMessages, events, activities, completedEvents, onAction }) {
  const INTRO={role:"nova",text:`Hey! I'm Nova. Let's work on "${project.name}". What's the goal?`,time:nowTime(),actions:[]};
  const [msgs,setMsgs]=useState(chat?.messages?.length>0?chat.messages:[INTRO]);
  const [input,setInput]=useState(""); const [loading,setLoading]=useState(false);
  const botRef=useRef(null);
  useEffect(()=>{ botRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs,loading]);
  useEffect(()=>{ onUpdateMessages(msgs); },[msgs]);
  useEffect(()=>{ if(chat?.messages?.length>0) setMsgs(chat.messages); else setMsgs([INTRO]); },[chat?.id]);
  const send=async text=>{
    if(!text?.trim()||loading) return;
    const u={role:"user",text:text.trim(),time:nowTime(),actions:[]};
    const updated=[...msgs,u]; setMsgs(updated); setInput(""); setLoading(true);
    try{
      const api=updated.filter(m=>m!==INTRO).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
      const d=await callAPI(api.slice(-20),{system:`You are Nova in PROJECT MODE for "${project.name}" (${project.tag}, ${project.status}). Notes: ${project.note||"none"}. Tasks: ${(project.tasks||[]).map(t=>`${t.done?"✓":"○"} ${t.text}`).join(", ")||"none"}. Be specific and actionable.`});
      const reply=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim()||"Something went wrong.";
      setMsgs(p=>[...p,{role:"nova",text:reply,time:nowTime(),actions:[]}]);
    }catch{ setMsgs(p=>[...p,{role:"nova",text:"Connection error.",time:nowTime(),actions:[]}]); }
    setLoading(false);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
      <div style={{flex:1,overflowY:"auto",padding:"14px 18px",display:"flex",flexDirection:"column",gap:"10px"}}>
        {msgs.map((m,i)=>(<div key={i} className={`msg ${m.role==="user"?"u":"n"}`}><div className="mbub">{m.text}</div><div className="mtime">{m.time}</div></div>))}
        {loading&&<div className="msg n" style={{opacity:.7}}><div className="mbub" style={{fontSize:"13px",color:"var(--muted)"}}>Nova is thinking…</div></div>}
        <div ref={botRef}/>
      </div>
      <div style={{borderTop:"1px solid var(--b1)",padding:"10px 18px",display:"flex",gap:"8px",alignItems:"flex-end",flexShrink:0,background:"var(--surf)"}}>
        <textarea className="chatinput" placeholder={`Ask Nova about ${project.name}…`} value={input} rows={1} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);setInput("");}}} style={{flex:1}}/>
        <button className="csend" onClick={()=>{send(input);setInput("");}} disabled={!input.trim()||loading}>↑</button>
      </div>
    </div>
  );
}

// ── SETTINGS MODAL ──
function SettingsModal({ onClose, notifPermission, onEnableNotifs }) {
  const [twoFAEnabled,setTwoFAEnabled]=useState(()=>!!LS.get("totp_enabled",false));
  const [pendingSecret,setPendingSecret]=useState(null);
  const [setupStep,setSetupStep]=useState(null);
  const [verifyCode,setVerifyCode]=useState(""); const [verifyErr,setVerifyErr]=useState(""); const [verifying,setVerifying]=useState(false);
  const qrRef=useRef(null); const [qrRendered,setQrRendered]=useState(false);
  const startSetup=()=>{ const s=TOTP.generateSecret(); setPendingSecret(s); setSetupStep('qr'); setVerifyCode(""); setVerifyErr(""); setQrRendered(false); };
  useEffect(()=>{
    if(setupStep==='qr'&&pendingSecret&&qrRef.current&&!qrRendered){
      qrRef.current.innerHTML="";
      try{ new QRCode(qrRef.current,{text:TOTP.otpauthUrl(pendingSecret),width:160,height:160,correctLevel:QRCode.CorrectLevel.M}); setQrRendered(true); }
      catch{ qrRef.current.innerHTML=`<div style="font-size:11px;color:var(--muted);padding:8px;text-align:center">QR unavailable — enter secret manually</div>`; }
    }
  },[setupStep,pendingSecret,qrRendered]);
  const doVerify=async()=>{
    if(verifyCode.length!==6){setVerifyErr("Enter the 6-digit code.");return;}
    setVerifying(true); setVerifyErr("");
    const ok=await TOTP.verify(pendingSecret,verifyCode);
    if(ok){ LS.set("totp_secret",pendingSecret); LS.set("totp_enabled",true); setTwoFAEnabled(true); setSetupStep('done'); }
    else setVerifyErr("Code didn't match — try again.");
    setVerifying(false);
  };
  const notifLabel=notifPermission==='granted'?'✓ Enabled':notifPermission==='denied'?'Blocked in browser':'Not enabled';
  const notifColor=notifPermission==='granted'?'var(--green)':notifPermission==='denied'?'var(--red)':'var(--muted)';
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="settings-modal">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}}>
          <div style={{fontSize:"18px",fontWeight:"600"}}>Settings</div>
          <button className="sbtn" onClick={onClose}>Done</button>
        </div>
        <div className="settings-section">
          <div className="settings-section-title">Notifications</div>
          <div className="settings-row">
            <div><div className="settings-row-label">Push notifications</div><div className="settings-row-sub" style={{color:notifColor}}>{notifLabel}</div></div>
            {notifPermission==='default'&&<button className="sbtn" style={{color:"var(--nova)",borderColor:"var(--nova-border)"}} onClick={onEnableNotifs}>Enable</button>}
          </div>
          <div className="settings-row">
            <div><div className="settings-row-label">Daily recap</div><div className="settings-row-sub">9:00 AM — notification + dashboard card</div></div>
            <span style={{fontSize:"12px",color:notifPermission==='granted'?"var(--green)":"var(--muted)"}}>{notifPermission==='granted'?"Active":"Needs notifications"}</span>
          </div>
          <div className="settings-row">
            <div><div className="settings-row-label">Event reminders</div><div className="settings-row-sub">30 min + 10 min before events</div></div>
            <span style={{fontSize:"12px",color:notifPermission==='granted'?"var(--green)":"var(--muted)"}}>{notifPermission==='granted'?"Active":"Needs notifications"}</span>
          </div>
        </div>
        <div className="settings-section">
          <div className="settings-section-title">Security</div>
          <div className="settings-row">
            <div><div className="settings-row-label">Two-factor authentication</div><div className="settings-row-sub">TOTP — Google Authenticator, Authy</div></div>
            {twoFAEnabled?<span className="totp-active-badge">✓ On</span>:<button className="sbtn" style={{color:"var(--nova)",borderColor:"var(--nova-border)"}} onClick={startSetup}>Set up</button>}
          </div>
          {twoFAEnabled&&!setupStep&&<div style={{paddingTop:"8px",display:"flex",gap:"8px"}}><button className="sbtn" onClick={startSetup}>Regenerate</button><button className="sbtn" style={{color:"var(--red)",borderColor:"rgba(248,113,113,.3)"}} onClick={()=>{LS.set("totp_enabled",false);LS.del("totp_secret");setTwoFAEnabled(false);setSetupStep(null);}}>Disable 2FA</button></div>}
          {setupStep==='qr'&&pendingSecret&&(
            <div className="qr-wrap">
              <div style={{fontSize:"13px",color:"var(--soft)",textAlign:"center"}}>Scan with your authenticator app</div>
              <div className="qr-box" ref={qrRef}/>
              <div className="secret-display">{pendingSecret}</div>
              <ol className="totp-steps"><li>Open Google Authenticator or Authy</li><li>Tap + → Scan QR code</li><li>Enter the 6-digit code to confirm</li></ol>
              <div className="totp-verify-row">
                <input className="totp-input" placeholder="000000" maxLength={6} value={verifyCode} onChange={e=>setVerifyCode(e.target.value.replace(/\D/g,""))} onKeyDown={e=>e.key==="Enter"&&doVerify()}/>
                <button className="totp-verify-btn" onClick={doVerify} disabled={verifying}>{verifying?"…":"Verify"}</button>
              </div>
              {verifyErr&&<div style={{fontSize:"12px",color:"var(--red)",textAlign:"center"}}>{verifyErr}</div>}
              <button className="sbtn" onClick={()=>setSetupStep(null)}>Cancel</button>
            </div>
          )}
          {setupStep==='done'&&<div style={{textAlign:"center",padding:"12px 0",fontSize:"13px",color:"var(--green)"}}>✓ 2FA is now active.</div>}
        </div>
        <div className="settings-section">
          <div className="settings-section-title">Account</div>
          <div className="settings-row">
            <div><div className="settings-row-label">Lock session</div></div>
            <button className="sbtn" onClick={()=>{AUTH.clear();window.location.reload();}}>Lock now</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// APP
// ══════════════════════════════════════════════════════════════
function App() {
  const [authed,setAuthed]       = useState(()=>AUTH.isValid());
  const [isDesktop,setIsDesktop] = useState(()=>window.innerWidth>=768);
  const [tab,setTab]             = useState("today");

  // ── ALL STATE PERSISTED ──
  const [events,setEvents]         = useState(()=>LS.get("events_today",[]));
  const [weekEvents,setWeekEvents] = useState(()=>LS.get("events_week",[]));
  const [activities,setActs]       = useState(()=>LS.get("activities",[]));
  const [actInput,setActInput]     = useState("");
  const [weekTasks,setWeekTasks]   = useState(()=>LS.get("weekTasks",{}));
  const [focusItems,setFocusItems] = useState(()=>{
    // Reset focus items daily
    const saved = LS.get("focus_items",{});
    if(saved.date===todayStr()) return saved.items||[];
    return [];
  });
  const [completedEvents,setCompletedEvents] = useState(()=>{
    const saved = LS.get("completed_events",{});
    if(saved.date===todayStr()) return new Set(saved.keys||[]);
    return new Set();
  });
  const [projects,setProjects]     = useState(()=>LS.get("projects",[]));
  const [activeProject,setActiveProject] = useState(null);
  const [googleConnected,setGoogleConnected] = useState(false);
  const [synced,setSynced]         = useState(false);
  const [calLoad,setCalLoad]       = useState(false);
  const [weekCalLoad,setWkLoad]    = useState(false);
  const [showAddEvent,setShowAddEvent] = useState(false);
  const [addingEvent,setAddingEvent]   = useState(false);
  const [showSettings,setShowSettings] = useState(false);
  const [notifPermission,setNotifPerm] = useState(()=>PUSH.ok()?PUSH.perm():'unsupported');
  const [novaMotivation,setNovaMotivation] = useState(()=>LS.get("nova_motivation",""));
  const [recapCard,setRecapCard]   = useState(()=>LS.get("recap_card",null));
  const [desktopSidebarOpen,setDesktopSidebarOpen] = useState(false);
  // Auto-refresh timer
  const syncTimerRef = useRef(null);

  useEffect(()=>{
    const h=()=>setIsDesktop(window.innerWidth>=768);
    window.addEventListener('resize',h);
    return()=>window.removeEventListener('resize',h);
  },[]);

  // ── PERSIST ALL STATE ──
  useEffect(()=>{ LS.set("activities",activities); },[activities]);
  useEffect(()=>{ LS.set("weekTasks",weekTasks); },[weekTasks]);
  useEffect(()=>{ LS.set("projects",projects); },[projects]);
  useEffect(()=>{ LS.set("focus_items",{date:todayStr(),items:focusItems}); },[focusItems]);
  useEffect(()=>{ LS.set("completed_events",{date:todayStr(),keys:[...completedEvents]}); },[completedEvents]);
  useEffect(()=>{ LS.set("events_today",events); },[events]);
  useEffect(()=>{ LS.set("events_week",weekEvents); },[weekEvents]);

  // ── INIT ──
  useEffect(()=>{
    if(!authed) return;
    // Check OAuth return
    const params=new URLSearchParams(window.location.search);
    if(params.get("cal")==="connected"||params.get("code")){
      setGoogleConnected(true);
      window.history.replaceState({},"",window.location.pathname);
    }
    // Register SW
    if(PUSH.ok()) PUSH.regSW();
    // Check google status + fetch calendar
    checkGoogleStatus().then(connected=>{
      setGoogleConnected(connected);
      if(connected){ fetchToday(); fetchWeek(); }
    });
    // Auto-refresh every 5 minutes (#9)
    syncTimerRef.current = setInterval(()=>{
      checkGoogleStatus().then(c=>{ if(c){ fetchToday(); fetchWeek(); } });
    }, 5*60*1000);
    // Listen for SW background sync signal
    if('serviceWorker' in navigator){
      navigator.serviceWorker.addEventListener('message',e=>{
        if(e.data?.type==='BG_SYNC_CALENDAR'){ fetchToday(); fetchWeek(); }
      });
    }
    // Generate motivation for empty days
    fetchNovaMotivation();
    // Show 9am recap card if it's past 9am today
    checkRecapCard();
    return()=>clearInterval(syncTimerRef.current);
  },[authed]);

  // Schedule push reminders whenever events or permission changes
  useEffect(()=>{
    if(notifPermission==='granted'&&events.length>0){
      PUSH.scheduleAll(events);
    }
  },[events,notifPermission]);

  const fetchNovaMotivation=async()=>{
    const saved=LS.get("nova_motivation_date","");
    if(saved===todayStr()) return;
    try{
      const d=await callAPI([{role:"user",content:"Give Demetri one short (max 12 words), punchy motivational message for a free day. No emojis. Just the message."}]);
      const t=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      if(t){ setNovaMotivation(t); LS.set("nova_motivation",t); LS.set("nova_motivation_date",todayStr()); }
    }catch{}
  };

  const checkRecapCard=()=>{
    const saved=LS.get("recap_card_date","");
    if(saved===todayStr()){
      const card=LS.get("recap_card_data",null);
      if(card) setRecapCard(card);
    }
  };

  const generateRecapCard=useCallback(async(evts)=>{
    if(LS.get("recap_card_date","")===todayStr()) return;
    try{
      const evtList=evts.slice(0,5).map(e=>`${fmtTime(e.start)} ${e.title}`).join(", ")||"no events";
      const d=await callAPI([{role:"user",content:`You are Nova. Write a warm 2-sentence morning recap for Demetri's day. Events: ${evtList}. Be specific and encouraging.`}]);
      const t=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      if(t){
        const card={text:t,time:nowTime()};
        setRecapCard(card);
        LS.set("recap_card_data",card);
        LS.set("recap_card_date",todayStr());
        PUSH.sendRecap(evts,t);
      }
    }catch{}
  },[]);

  const fetchToday=async()=>{
    setCalLoad(true); setSynced(false);
    try{
      const today=new Date();
      const start=new Date(today.setHours(0,0,0,0)).toISOString();
      const end=new Date(today.setHours(23,59,59,999)).toISOString();
      const data=await fetchCalendarEvents(start,end);
      if(data.error&&data.notConnected){ setSynced(false); setCalLoad(false); return; }
      if(data.events){
        const colored=data.events.map((e,i)=>({...e,color:EVT_COLORS[i%EVT_COLORS.length]}));
        setEvents(colored); setSynced(true);
        // Generate recap if it's morning
        const h=new Date().getHours();
        if(h>=9&&h<12) generateRecapCard(colored);
      }
    }catch(e){ console.error(e); }
    setCalLoad(false);
  };

  const fetchWeek=async()=>{
    setWkLoad(true);
    try{
      const s=new Date(); s.setDate(s.getDate()+1); s.setHours(0,0,0,0);
      const e=new Date(); e.setDate(e.getDate()+7); e.setHours(23,59,59,999);
      const data=await fetchCalendarEvents(s.toISOString(),e.toISOString());
      if(data.events) setWeekEvents(data.events.map((ev,i)=>({...ev,color:EVT_COLORS[i%EVT_COLORS.length]})));
    }catch{}
    setWkLoad(false);
  };

  const addEventToCalendar=async({title,date,time,duration_minutes=60})=>{
    setAddingEvent(true);
    try{
      await addCalendarEvent(title,date,time,duration_minutes);
      setTimeout(()=>{fetchToday();fetchWeek();},1000);
    }catch(e){console.error(e);}
    setAddingEvent(false); setShowAddEvent(false);
  };

  const handleAction=useCallback((tool,input)=>{
    switch(tool){
      case "log_activity":      setActs(p=>[{time:nowTime(),text:input.text},...p]); return `Logged: "${input.text}"`;
      case "delete_log":        setActs(p=>p.filter(a=>!a.text.toLowerCase().includes(input.text?.toLowerCase()))); return `Deleted log entry`;
      case "clear_log":         setActs([]); return "Activity log cleared";
      case "navigate_to":       setTab(input.tab); return `Switched to ${input.tab}`;
      case "add_project":       setProjects(p=>[{id:Date.now(),name:input.name,tag:input.tag||"personal",status:"To do",note:"",tasks:[],ti:""},...p]); return `Project "${input.name}" added`;
      case "add_calendar_event":addEventToCalendar(input); return `Adding "${input.title}" to calendar…`;
      case "add_week_task":     setWeekTasks(p=>({...p,[input.date]:[...(p[input.date]||[]),{text:input.text,done:false}]})); return `Task added for ${input.date}`;
      case "set_focus":         setFocusItems((input.items||[]).slice(0,3).map((t,i)=>({id:Date.now()+i,text:t,done:false}))); return "Focus list updated";
      case "complete_event_task":setCompletedEvents(p=>{ const n=new Set(p); const ev=events.find(e=>e.title.toLowerCase().includes(input.title?.toLowerCase())); if(ev) n.add(ev.id||ev.title); return n; }); return `Marked "${input.title}" done`;
      case "delete_calendar_event":setEvents(p=>p.filter(e=>!e.title.toLowerCase().includes(input.title?.toLowerCase()))); return `Removed "${input.title}"`;
      case "reschedule_event":  addEventToCalendar({title:input.title,date:input.new_date,time:input.new_time||"09:00",duration_minutes:60}); return `Rescheduling "${input.title}"`;
      case "predict_schedule":  return "Generating optimized schedule…";
      case "search_web":        return null; // handled directly in NovaChat
      default: return null;
    }
  },[events]);

  const toggleCompletedEvent=useCallback(key=>{
    setCompletedEvents(p=>{ const n=new Set(p); n.has(key)?n.delete(key):n.add(key); return n; });
  },[]);

  const addActivity=()=>{ if(!actInput.trim()) return; setActs(p=>[{time:nowTime(),text:actInput.trim()},...p]); setActInput(""); };
  const deleteActivity=text=>setActs(p=>p.filter(a=>a.text!==text));

  const enableNotifications=async()=>{
    const r=await PUSH.request(); setNotifPerm(r);
    if(r==='granted'){ await PUSH.regSW(); PUSH.scheduleAll(events); }
  };

  if(!authed) return <><style>{css}</style><Login onLogin={()=>setAuthed(true)}/></>;

  const tLabel={soon:"Soon",later:"Later",done:"Done"};
  const tCls  ={soon:"t-soon",later:"t-later",done:"t-done"};

  const CalConnectBtn=()=>(
    <button style={{background:"#fff",color:"#111",border:"none",borderRadius:"10px",padding:"8px 16px",fontFamily:"inherit",fontSize:"13px",fontWeight:"600",cursor:"pointer"}}
      onClick={async()=>{ const url=await getGoogleAuthUrl(); window.location.href=url; }}>
      📅 Connect Google Calendar
    </button>
  );

  // ── Desktop stats ──
  const total=events.length, doneEvts=[...completedEvents].length;
  const pct=total>0?Math.round((doneEvts/total)*100):0;

  return(
    <>
      <style>{css}</style>
      {showAddEvent&&<AddEventModal onSave={addEventToCalendar} onClose={()=>setShowAddEvent(false)} adding={addingEvent}/>}
      {showSettings&&<SettingsModal onClose={()=>setShowSettings(false)} notifPermission={notifPermission} onEnableNotifs={enableNotifications}/>}

      <div className="shell">
        {/* ── HEADER ── */}
        <div className="hd">
          <div><div className="hd-g">{greeting()}</div><div className="hd-n">Demetri</div></div>
          {isDesktop&&(
            <div className="desktop-tabs">
              {TABS.map(n=>(<button key={n.id} className={`dtab ${tab===n.id?"a":""}`} onClick={()=>setTab(n.id)}>{n.lbl}</button>))}
            </div>
          )}
          <div className="hd-r">
            <div className="hd-d">{fmtDate()}</div>
            <div className="hd-btns">
              {googleConnected&&<button className="lockbtn" onClick={async()=>{await callWorker("google_disconnect",{});setGoogleConnected(false);setSynced(false);setEvents([]);setWeekEvents([]);}}>Disconnect Cal</button>}
              <button className="lockbtn" onClick={()=>setShowSettings(true)}>⚙ Settings</button>
              <button className="lockbtn" onClick={()=>{AUTH.clear();setAuthed(false);}}>Lock</button>
            </div>
          </div>
        </div>

        {/* Mobile: calendar progress bar */}
        {!isDesktop&&(
          <CalendarProgress events={events} completedEvents={completedEvents} onToggle={toggleCompletedEvent} novaMotivation={novaMotivation}/>
        )}

        {/* ── DESKTOP LAYOUT ── */}
        {isDesktop&&(
          <div className="desktop-body">
            {tab==="today"&&(<>
              {/* Col 1: Summary + Calendar */}
              <div className="desktop-panel" style={{gridRow:"span 2",display:"flex",flexDirection:"column",padding:0,overflow:"hidden"}}>
                <div style={{padding:"14px 16px 0",flexShrink:0}}>
                  <NovaSummary events={events} activities={activities} completedEvents={completedEvents}/>
                  {recapCard&&(
                    <div className="recap-card" style={{margin:"12px 0 0"}}>
                      <div className="recap-hd"><span className="recap-title">☀️ Morning Recap</span><button className="recap-close" onClick={()=>setRecapCard(null)}>✕</button></div>
                      <div className="recap-body">{recapCard.text}</div>
                    </div>
                  )}
                </div>
                <div style={{padding:"14px 16px 0",flex:1,overflowY:"auto"}}>
                  <div className="panel-hd">
                    <span className="panel-title">Today's Schedule</span>
                    <div className="sbtn-row">
                      <button className="sbtn" onClick={()=>setShowAddEvent(true)}>+ Event</button>
                      <button className="sbtn" onClick={fetchToday}>{calLoad?"…":"↻"}</button>
                    </div>
                  </div>
                  {/* Desktop progress bar */}
                  {total>0&&(
                    <div style={{marginBottom:"12px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:"12px",color:"var(--muted)",marginBottom:"6px"}}>
                        <span>{doneEvts}/{total} complete</span><span>{pct}%</span>
                      </div>
                      <div style={{height:"4px",background:"var(--b1)",borderRadius:"99px",overflow:"hidden"}}>
                        <div style={{height:"100%",borderRadius:"99px",background:pct===100?"var(--green)":"var(--nova)",width:`${pct}%`,transition:"width .5s ease"}}/>
                      </div>
                    </div>
                  )}
                  {synced&&<div className="syncbar"><div className="sdot"/>Synced · auto-refreshes every 5 min</div>}
                  {calLoad&&<div className="empty">Fetching events…</div>}
                  {!calLoad&&!synced&&<div style={{textAlign:"center",padding:"12px 0"}}>{!googleConnected&&<CalConnectBtn/>}</div>}
                  {!calLoad&&synced&&events.length===0&&(
                    <div className="cal-empty">
                      <div className="cal-empty-msg">No events today</div>
                      {novaMotivation&&<div className="cal-nova-msg">✦ {novaMotivation}</div>}
                    </div>
                  )}
                  {events.map((ev,i)=>{
                    const key=ev.id||ev.title; const isDone=completedEvents.has(key); const s=evStatus(ev.start);
                    return(
                      <div className={`ev${isDone?" ":""}`} key={i} style={{opacity:isDone?.6:1,cursor:"pointer"}} onClick={()=>toggleCompletedEvent(key)}>
                        <div className="edot" style={{background:ev.color}}/>
                        <div className="ebody">
                          <div className="etitle" style={{textDecoration:isDone?"line-through":"none"}}>{ev.title}</div>
                          <div className="etime">{fmtTime(ev.start)}{ev.end?` – ${fmtTime(ev.end)}`:""}</div>
                        </div>
                        <div className={`etag ${tCls[s]}`}>{isDone?"Done":tLabel[s]}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
              {/* Col 2: Focus + Log */}
              <div className="desktop-panel" style={{overflowY:"auto"}}>
                <div className="panel-hd"><span className="panel-title">Top 3 Focus</span></div>
                <FocusList items={focusItems} setItems={setFocusItems}/>
                <div style={{marginTop:"16px",paddingTop:"16px",borderTop:"1px solid var(--b1)"}}>
                  <div className="panel-hd"><span className="panel-title">Activity Log</span>{activities.length>0&&<button className="sbtn" onClick={()=>setActs([])}>Clear</button>}</div>
                  <div className="irow"><input className="ifield" placeholder="What did you just do?" value={actInput} onChange={e=>setActInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addActivity()}/><button className="iplus" onClick={addActivity}>+</button></div>
                  {activities.slice(0,8).map((a,i)=><div className="logitem" key={i}><span className="logtime">{a.time}</span><span className="logtxt">{a.text}</span><button className="logdel" onClick={()=>deleteActivity(a.text)}>✕</button></div>)}
                </div>
              </div>
              {/* Col 2 bottom: Stats */}
              <div className="desktop-panel" style={{overflowY:"auto"}}>
                <div className="desktop-stats">
                  <div className="dstat"><div className="dstat-val" style={{color:"var(--green)"}}>{pct}%</div><div className="dstat-lbl">Done</div></div>
                  <div className="dstat"><div className="dstat-val" style={{color:"var(--blue)"}}>{events.length}</div><div className="dstat-lbl">Events</div></div>
                  <div className="dstat"><div className="dstat-val" style={{color:"var(--amber)"}}>{activities.length}</div><div className="dstat-lbl">Logged</div></div>
                  <div className="dstat"><div className="dstat-val" style={{color:"var(--nova)"}}>{projects.length}</div><div className="dstat-lbl">Projects</div></div>
                </div>
                {recapCard&&(
                  <div className="recap-card" style={{margin:"0 0 12px"}}>
                    <div className="recap-hd"><span className="recap-title">☀️ Morning Recap</span><button className="recap-close" onClick={()=>setRecapCard(null)}>✕</button></div>
                    <div className="recap-body">{recapCard.text}</div>
                  </div>
                )}
              </div>
              {/* Col 3: Nova */}
              <div className="desktop-panel nova-panel">
                <NovaChat events={events} weekEvents={weekEvents} activities={activities} projects={projects} completedEvents={completedEvents} onAction={handleAction} isDesktop={isDesktop} desktopSidebarOpen={desktopSidebarOpen} setDesktopSidebarOpen={setDesktopSidebarOpen}/>
              </div>
            </>)}

            {tab==="week"&&(<>
              <div className="desktop-panel" style={{gridColumn:"span 2",gridRow:"span 2",display:"flex",flexDirection:"column",overflow:"hidden"}}>
                <div className="panel-hd" style={{flexShrink:0}}>
                  <span className="panel-title">Upcoming Week</span>
                  <div className="sbtn-row"><button className="sbtn" onClick={()=>setShowAddEvent(true)}>+ Event</button><button className="sbtn" onClick={fetchWeek}>{weekCalLoad?"Syncing…":"↻ Sync"}</button></div>
                </div>
                {weekCalLoad&&<div className="syncbar"><div className="sdot"/>Syncing…</div>}
                {!weekCalLoad&&weekEvents.length>0&&<div className="syncbar"><div className="sdot"/>{weekEvents.length} events · auto-syncing</div>}
                <div style={{flex:1,overflowY:"auto"}}><WeekView weekTasks={weekTasks} setWeekTasks={setWeekTasks} weekEvents={weekEvents} weekCalLoad={weekCalLoad}/></div>
              </div>
              <div className="desktop-panel nova-panel">
                <NovaChat events={events} weekEvents={weekEvents} activities={activities} projects={projects} completedEvents={completedEvents} onAction={handleAction} isDesktop={isDesktop} desktopSidebarOpen={desktopSidebarOpen} setDesktopSidebarOpen={setDesktopSidebarOpen}/>
              </div>
              <div className="desktop-panel" style={{overflowY:"auto"}}>
                <div className="panel-hd"><span className="panel-title">Week Summary</span></div>
                <div className="nsum" style={{margin:0}}>
                  <div className="nst"><div className="nav2">✦</div><span className="nlbl">Nova · Week</span></div>
                  <div className="ntxt">{weekEvents.length>0?`${weekEvents.length} events across the next 7 days.`:"Sync your calendar to see the week ahead."}</div>
                </div>
              </div>
            </>)}

            {tab==="nova"&&(<>
              <div className="desktop-panel" style={{overflowY:"auto",gridRow:"span 2"}}>
                <div className="panel-hd"><span className="panel-title">Context</span></div>
                <div style={{fontSize:"12px",color:"var(--muted)",lineHeight:1.8}}>
                  <div>✦ {[...completedEvents].length}/{events.length} events done</div>
                  <div>✦ {activities.length} logged today</div>
                  <div>✦ {projects.length} projects</div>
                  <div>✦ {weekEvents.length} events this week</div>
                  <div style={{marginTop:"10px",paddingTop:"10px",borderTop:"1px solid var(--b1)"}}>
                    <div style={{fontSize:"10px",fontWeight:"600",letterSpacing:"1px",textTransform:"uppercase",color:"var(--muted)",marginBottom:"6px"}}>Nova capabilities</div>
                    <div style={{color:"var(--green)"}}>✓ Persistent memory</div>
                    <div style={{color:"var(--green)"}}>✓ Web search (Tavily)</div>
                    <div style={{color:"var(--green)"}}>✓ Calendar control</div>
                    <div style={{color:"var(--green)"}}>✓ Dashboard control</div>
                    <div style={{color:"var(--green)"}}>✓ Voice input</div>
                  </div>
                  <div style={{marginTop:"10px",fontSize:"11px",color:"var(--muted)"}}>
                    Nova remembers your last 30 sessions via Supabase and injects them into every conversation automatically.
                  </div>
                </div>
              </div>
              <div className="desktop-panel nova-panel" style={{gridColumn:"span 2",gridRow:"span 2"}}>
                <NovaChat events={events} weekEvents={weekEvents} activities={activities} projects={projects} completedEvents={completedEvents} onAction={handleAction} isDesktop={isDesktop} desktopSidebarOpen={desktopSidebarOpen} setDesktopSidebarOpen={setDesktopSidebarOpen} fullMode/>
              </div>
            </>)}

            {tab==="log"&&(<>
              <div className="desktop-panel" style={{gridRow:"span 2",display:"flex",flexDirection:"column",overflow:"hidden"}}>
                <div className="panel-hd"><span className="panel-title">Quick Log</span></div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"8px",marginBottom:"16px"}}>
                  {["Gym","Studied","Attended class","Slept 8hrs","Cardio","Read","Meal prep"].map(q=>(
                    <button key={q} className="sbtn" style={{borderRadius:"20px",padding:"6px 14px"}} onClick={()=>setActs(p=>[{time:nowTime(),text:q},...p])}>{q}</button>
                  ))}
                </div>
                <div className="irow"><input className="ifield" placeholder="Custom log…" value={actInput} onChange={e=>setActInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addActivity()}/><button className="iplus" onClick={addActivity}>+</button></div>
                <div className="panel-hd" style={{marginTop:"8px"}}><span className="panel-title">Activity Log</span>{activities.length>0&&<button className="sbtn" onClick={()=>setActs([])}>Clear all</button>}</div>
                <div style={{flex:1,overflowY:"auto"}}>
                  {activities.length===0?<div className="empty">Nothing logged yet.</div>:activities.map((a,i)=>(
                    <div className="logitem" key={i}><span className="logtime">{a.time}</span><span className="logtxt">{a.text}</span><button className="logdel" onClick={()=>deleteActivity(a.text)}>✕</button></div>
                  ))}
                </div>
              </div>
              <div className="desktop-panel nova-panel" style={{gridColumn:"span 2",gridRow:"span 2"}}>
                <NovaChat events={events} weekEvents={weekEvents} activities={activities} projects={projects} completedEvents={completedEvents} onAction={handleAction} isDesktop={isDesktop} desktopSidebarOpen={desktopSidebarOpen} setDesktopSidebarOpen={setDesktopSidebarOpen}/>
              </div>
            </>)}

            {tab==="projects"&&(<>
              {activeProject
                ?<div style={{gridColumn:"span 3",gridRow:"span 2",overflow:"hidden"}}>
                    <ProjectWorkspace project={activeProject} projects={projects} setProjects={setProjects} onBack={()=>setActiveProject(null)} events={events} weekEvents={weekEvents} activities={activities} completedEvents={completedEvents} onAction={handleAction}/>
                  </div>
                :<>
                    <div className="desktop-panel" style={{gridColumn:"span 2",gridRow:"span 2",display:"flex",flexDirection:"column",overflow:"hidden"}}>
                      <Projects projects={projects} setProjects={setProjects} onOpenProject={setActiveProject} activeProject={activeProject}/>
                    </div>
                    <div className="desktop-panel nova-panel">
                      <NovaChat events={events} weekEvents={weekEvents} activities={activities} projects={projects} completedEvents={completedEvents} onAction={handleAction} isDesktop={isDesktop} desktopSidebarOpen={desktopSidebarOpen} setDesktopSidebarOpen={setDesktopSidebarOpen}/>
                    </div>
                  </>
              }
            </>)}
          </div>
        )}

        {/* ── MOBILE LAYOUT ── */}
        {!isDesktop&&(<>
          {tab==="today"&&(<>
            {recapCard&&(
              <div className="recap-card">
                <div className="recap-hd"><span className="recap-title">☀️ Morning Recap</span><button className="recap-close" onClick={()=>setRecapCard(null)}>✕</button></div>
                <div className="recap-body">{recapCard.text}</div>
              </div>
            )}
            <NovaSummary events={events} activities={activities} completedEvents={completedEvents}/>
            <FocusList items={focusItems} setItems={setFocusItems}/>
            <div className="sec">
              <div className="sh">
                <span className="stitle">Calendar</span>
                <div className="sbtn-row">
                  <button className="sbtn" onClick={()=>setShowAddEvent(true)}>+ Event</button>
                  <button className="sbtn" onClick={fetchToday}>{calLoad?"…":"↻"}</button>
                </div>
              </div>
              {synced&&<div className="syncbar"><div className="sdot"/>Synced · auto-refreshes</div>}
              {calLoad&&<div className="empty">Fetching events…</div>}
              {!calLoad&&!synced&&(
                <div style={{textAlign:"center",padding:"16px 0"}}>
                  {googleConnected?<div className="empty">Calendar connected.<br/><button className="sbtn" style={{marginTop:"8px"}} onClick={fetchToday}>Refresh</button></div>
                    :<div><div style={{fontSize:"13px",color:"var(--muted)",marginBottom:"12px"}}>Connect Google Calendar to see your events.</div><CalConnectBtn/></div>}
                </div>
              )}
              {!calLoad&&synced&&events.length===0&&(
                <div className="cal-empty" style={{padding:"16px 0"}}>
                  <div className="cal-empty-msg">No events today</div>
                  {novaMotivation&&<div className="cal-nova-msg">✦ {novaMotivation}</div>}
                </div>
              )}
              {events.map((ev,i)=>{
                const key=ev.id||ev.title; const isDone=completedEvents.has(key); const s=evStatus(ev.start);
                return(
                  <div className="ev" key={i} style={{opacity:isDone?.6:1,cursor:"pointer",animationDelay:`${i*.05}s`}} onClick={()=>toggleCompletedEvent(key)}>
                    <div className="edot" style={{background:ev.color}}/>
                    <div className="ebody">
                      <div className="etitle" style={{textDecoration:isDone?"line-through":"none"}}>{ev.title}</div>
                      <div className="etime">{fmtTime(ev.start)}{ev.end?` – ${fmtTime(ev.end)}`:""}</div>
                    </div>
                    <div className={`etag ${tCls[s]}`}>{isDone?"Done":tLabel[s]}</div>
                  </div>
                );
              })}
            </div>
            <div className="spacer"/>
          </>)}

          {tab==="week"&&(
            <div className="sec">
              <div className="sh"><span className="stitle">Upcoming Week</span><div className="sbtn-row"><button className="sbtn" onClick={()=>setShowAddEvent(true)}>+ Event</button><button className="sbtn" onClick={fetchWeek}>{weekCalLoad?"Syncing…":"↻"}</button></div></div>
              {weekCalLoad&&<div className="syncbar"><div className="sdot"/>Syncing…</div>}
              {!weekCalLoad&&weekEvents.length>0&&<div className="syncbar"><div className="sdot"/>{weekEvents.length} events synced</div>}
              <WeekView weekTasks={weekTasks} setWeekTasks={setWeekTasks} weekEvents={weekEvents} weekCalLoad={weekCalLoad}/>
              <div className="spacer"/>
            </div>
          )}

          {/* Nova tab — sidebar toggle + chat at bottom */}
          {tab==="nova"&&(
            <NovaChat events={events} weekEvents={weekEvents} activities={activities} projects={projects} completedEvents={completedEvents} onAction={handleAction} isDesktop={false} desktopSidebarOpen={false} setDesktopSidebarOpen={()=>{}}/>
          )}

          {/* Log tab — log at bottom, nova removed */}
          {tab==="log"&&(
            <div className="sec">
              <div className="sh"><span className="stitle">Activity Log</span>{activities.length>0&&<button className="sbtn" onClick={()=>setActs([])}>Clear</button>}</div>
              <div className="irow"><input className="ifield" placeholder="What did you just do?" value={actInput} onChange={e=>setActInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addActivity()}/><button className="iplus" onClick={addActivity}>+</button></div>
              {activities.length===0?<div className="empty">Nothing logged yet.</div>:activities.map((a,i)=>(
                <div className="logitem" key={i} style={{animationDelay:`${i*.04}s`}}>
                  <span className="logtime">{a.time}</span>
                  <span className="logtxt">{a.text}</span>
                  <button className="logdel" onClick={()=>deleteActivity(a.text)}>✕</button>
                </div>
              ))}
              <div className="spacer"/>
            </div>
          )}

          {/* Projects tab — no nova at bottom on mobile */}
          {tab==="projects"&&(
            activeProject
              ?<ProjectWorkspace project={activeProject} projects={projects} setProjects={setProjects} onBack={()=>setActiveProject(null)} events={events} weekEvents={weekEvents} activities={activities} completedEvents={completedEvents} onAction={handleAction}/>
              :<Projects projects={projects} setProjects={setProjects} onOpenProject={setActiveProject} activeProject={activeProject}/>
          )}
        </>)}

        {/* Mobile nav */}
        {!isDesktop&&(
          <div className="nav">
            {TABS.map(n=>(<button key={n.id} className={`nbtn ${tab===n.id?"a":""}`} onClick={()=>setTab(n.id)}><span className="nico">{n.ico}</span><span className="nlbl">{n.lbl}</span></button>))}
          </div>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
