        </div>
        <ProjectNovaChat project={project} chat={activeChat} onUpdateMessages={msgs=>setChats(p=>p.map(c=>c.id===activeChatId?{...c,messages:msgs}:c))} events={events} activities={activities} completedEvents={completedEvents} onAction={onAction}/>
      </div>
    </div>
  );
}

function ProjectNovaChat({ project, chat, onUpdateMessages, events, activities, completedEvents, onAction }) {
  const INTRO={role:"nova",text:`Hey! I'm Nova. Let's work on "${project.name}". What's the goal?`,time:nowTime(),actions:[]};
  const [msgs,setMsgs]=useState(chat?.messages?.length>0?chat.messages:[INTRO]);
  const [input,setInput]=useState(""); const [loading,setLoading]=useState(false);
  const botRef=useRef(null);
  useEffect(()=>{ botRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs,loading]);
  useEffect(()=>{ onUpdateMessages(msgs); },[msgs]);
  useEffect(()=>{ if(chat?.messages?.length>0) setMsgs(chat.messages); else setMsgs([INTRO]); },[chat?.id]);
  const send=async text=>{
    if(!text?.trim()||loading) return;
    const u={role:"user",text:text.trim(),time:nowTime(),actions:[]};
    const updated=[...msgs,u]; setMsgs(updated); setInput(""); setLoading(true);
    try{
      const api=updated.filter(m=>m!==INTRO).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
      const d=await callAPI(api.slice(-20),{system:`You are Nova in PROJECT MODE for "${project.name}" (${project.tag}, ${project.status}). Notes: ${project.note||"none"}. Tasks: ${(project.tasks||[]).map(t=>`${t.done?"✓":"○"} ${t.text}`).join(", ")||"none"}. Be specific and actionable.`});
      const reply=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim()||"Something went wrong.";
      setMsgs(p=>[...p,{role:"nova",text:reply,time:nowTime(),actions:[]}]);
    }catch{ setMsgs(p=>[...p,{role:"nova",text:"Connection error.",time:nowTime(),actions:[]}]); }
    setLoading(false);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
      <div style={{flex:1,overflowY:"auto",padding:"14px 18px",display:"flex",flexDirection:"column",gap:"10px"}}>
        {msgs.map((m,i)=>(<div key={i} className={`msg ${m.role==="user"?"u":"n"}`}><div className="mbub">{m.text}</div><div className="mtime">{m.time}</div></div>))}
        {loading&&<div className="msg n" style={{opacity:.7}}><div className="mbub" style={{fontSize:"13px",color:"var(--muted)"}}>Nova is thinking…</div></div>}
        <div ref={botRef}/>
      </div>
      <div style={{borderTop:"1px solid var(--b1)",padding:"10px 18px",display:"flex",gap:"8px",alignItems:"flex-end",flexShrink:0,background:"var(--surf)"}}>
        <textarea className="chatinput" placeholder={`Ask Nova about ${project.name}…`} value={input} rows={1} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);setInput("");}}} style={{flex:1}}/>
        <button className="csend" onClick={()=>{send(input);setInput("");}} disabled={!input.trim()||loading}>↑</button>
      </div>
    </div>
  );
}

// ── SETTINGS MODAL ──
function SettingsModal({ onClose, notifPermission, onEnableNotifs }) {
  const [twoFAEnabled,setTwoFAEnabled]=useState(()=>!!LS.get("totp_enabled",false));
  const [pendingSecret,setPendingSecret]=useState(null);
  const [setupStep,setSetupStep]=useState(null);
  const [verifyCode,setVerifyCode]=useState(""); const [verifyErr,setVerifyErr]=useState(""); const [verifying,setVerifying]=useState(false);
  const qrRef=useRef(null); const [qrRendered,setQrRendered]=useState(false);
  const startSetup=()=>{ const s=TOTP.generateSecret(); setPendingSecret(s); setSetupStep('qr'); setVerifyCode(""); setVerifyErr(""); setQrRendered(false); };
  useEffect(()=>{
    if(setupStep==='qr'&&pendingSecret&&qrRef.current&&!qrRendered){
      qrRef.current.innerHTML="";
      try{ new QRCode(qrRef.current,{text:TOTP.otpauthUrl(pendingSecret),width:160,height:160,correctLevel:QRCode.CorrectLevel.M}); setQrRendered(true); }
      catch{ qrRef.current.innerHTML=`<div style="font-size:11px;color:var(--muted);padding:8px;text-align:center">QR unavailable — enter secret manually</div>`; }
    }
  },[setupStep,pendingSecret,qrRendered]);
  const doVerify=async()=>{
    if(verifyCode.length!==6){setVerifyErr("Enter the 6-digit code.");return;}
    setVerifying(true); setVerifyErr("");
    const ok=await TOTP.verify(pendingSecret,verifyCode);
    if(ok){ LS.set("totp_secret",pendingSecret); LS.set("totp_enabled",true); setTwoFAEnabled(true); setSetupStep('done'); }
    else setVerifyErr("Code didn't match — try again.");
    setVerifying(false);
  };
  const notifLabel=notifPermission==='granted'?'✓ Enabled':notifPermission==='denied'?'Blocked in browser':'Not enabled';
  const notifColor=notifPermission==='granted'?'var(--green)':notifPermission==='denied'?'var(--red)':'var(--muted)';
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="settings-modal">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}}>
          <div style={{fontSize:"18px",fontWeight:"600"}}>Settings</div>
          <button className="sbtn" onClick={onClose}>Done</button>
        </div>
        <div className="settings-section">
          <div className="settings-section-title">Notifications</div>
          <div className="settings-row">
            <div><div className="settings-row-label">Push notifications</div><div className="settings-row-sub" style={{color:notifColor}}>{notifLabel}</div></div>
            {notifPermission==='default'&&<button className="sbtn" style={{color:"var(--nova)",borderColor:"var(--nova-border)"}} onClick={onEnableNotifs}>Enable</button>}
          </div>
          <div className="settings-row">
            <div><div className="settings-row-label">Daily recap</div><div className="settings-row-sub">9:00 AM — notification + dashboard card</div></div>
            <span style={{fontSize:"12px",color:notifPermission==='granted'?"var(--green)":"var(--muted)"}}>{notifPermission==='granted'?"Active":"Needs notifications"}</span>
          </div>
          <div className="settings-row">
            <div><div className="settings-row-label">Event reminders</div><div className="settings-row-sub">30 min + 10 min before events</div></div>
            <span style={{fontSize:"12px",color:notifPermission==='granted'?"var(--green)":"var(--muted)"}}>{notifPermission==='granted'?"Active":"Needs notifications"}</span>
          </div>
        </div>
        <div className="settings-section">
          <div className="settings-section-title">Security</div>
          <div className="settings-row">
            <div><div className="settings-row-label">Two-factor authentication</div><div className="settings-row-sub">TOTP — Google Authenticator, Authy</div></div>
            {twoFAEnabled?<span className="totp-active-badge">✓ On</span>:<button className="sbtn" style={{color:"var(--nova)",borderColor:"var(--nova-border)"}} onClick={startSetup}>Set up</button>}
          </div>
          {twoFAEnabled&&!setupStep&&<div style={{paddingTop:"8px",display:"flex",gap:"8px"}}><button className="sbtn" onClick={startSetup}>Regenerate</button><button className="sbtn" style={{color:"var(--red)",borderColor:"rgba(248,113,113,.3)"}} onClick={()=>{LS.set("totp_enabled",false);LS.del("totp_secret");setTwoFAEnabled(false);setSetupStep(null);}}>Disable 2FA</button></div>}
          {setupStep==='qr'&&pendingSecret&&(
            <div className="qr-wrap">
              <div style={{fontSize:"13px",color:"var(--soft)",textAlign:"center"}}>Scan with your authenticator app</div>
              <div className="qr-box" ref={qrRef}/>
              <div className="secret-display">{pendingSecret}</div>
              <ol className="totp-steps"><li>Open Google Authenticator or Authy</li><li>Tap + → Scan QR code</li><li>Enter the 6-digit code to confirm</li></ol>
              <div className="totp-verify-row">
                <input className="totp-input" placeholder="000000" maxLength={6} value={verifyCode} onChange={e=>setVerifyCode(e.target.value.replace(/\D/g,""))} onKeyDown={e=>e.key==="Enter"&&doVerify()}/>
                <button className="totp-verify-btn" onClick={doVerify} disabled={verifying}>{verifying?"…":"Verify"}</button>
              </div>
              {verifyErr&&<div style={{fontSize:"12px",color:"var(--red)",textAlign:"center"}}>{verifyErr}</div>}
              <button className="sbtn" onClick={()=>setSetupStep(null)}>Cancel</button>
            </div>
          )}
          {setupStep==='done'&&<div style={{textAlign:"center",padding:"12px 0",fontSize:"13px",color:"var(--green)"}}>✓ 2FA is now active.</div>}
        </div>
        <div className="settings-section">
          <div className="settings-section-title">Account</div>
          <div className="settings-row">
            <div><div className="settings-row-label">Lock session</div></div>
            <button className="sbtn" onClick={()=>{AUTH.clear();window.location.reload();}}>Lock now</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── DAY SCHEDULE WIDGET ──
function DayWidget({ selectedDay, weekEvents, weekTasks, onClose }) {
  if(!selectedDay) return null;
  const { date, label } = selectedDay;
  const dayEvents = weekEvents.filter(ev=>{
    try{ return new Date(ev.start).toISOString().split("T")[0]===date; }catch{return false;}
  }).sort((a,b)=>new Date(a.start)-new Date(b.start));
  const dayTasks = weekTasks[date]||[];
  const total = dayEvents.length + dayTasks.length;
  const dow = new Date(date+"T12:00:00").toLocaleDateString("en-US",{weekday:"long"});
  const formatted = new Date(date+"T12:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric"});
  return(
    <div style={{background:"var(--card)",border:"1px solid var(--nova-border)",borderRadius:"14px",padding:"16px 18px",marginBottom:"16px",position:"relative",overflow:"hidden",animation:"up .3s ease both"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:"2px",background:"var(--nova)",opacity:.7}}/>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"14px"}}>
        <div>
          <div style={{fontSize:"16px",fontWeight:"600",color:"var(--text)",marginBottom:"2px"}}>{label||dow}</div>
          <div style={{fontSize:"12px",color:"var(--muted)"}}>{formatted}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
          <span style={{fontSize:"11px",color:"var(--nova)",background:"var(--nova-bg)",border:"1px solid var(--nova-border)",borderRadius:"20px",padding:"3px 10px"}}>{total} {total===1?"item":"items"}</span>
          <button onClick={onClose} style={{fontSize:"14px",color:"var(--muted)",background:"none",border:"none",cursor:"pointer",padding:"2px 4px"}}>✕</button>
        </div>
      </div>
      {total===0&&<div style={{textAlign:"center",padding:"12px 0",fontSize:"13px",color:"var(--muted)"}}>Nothing scheduled — free day ✦</div>}
      {dayEvents.map((ev,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:"12px",padding:"10px 12px",marginBottom:"6px",background:"var(--surf)",borderRadius:"10px",border:"1px solid var(--b1)"}}>
          <div style={{width:"3px",alignSelf:"stretch",borderRadius:"3px",background:ev.color||"var(--nova)",flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:"13px",fontWeight:"500",color:"var(--text)",marginBottom:"2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ev.title}</div>
            <div style={{fontSize:"11px",color:"var(--muted)"}}>{fmtTime(ev.start)}{ev.end?" — "+fmtTime(ev.end):""}</div>
          </div>
          {ev.location&&<div style={{fontSize:"10px",color:"var(--muted)",flexShrink:0}}>📍</div>}
        </div>
      ))}
      {dayTasks.map((t,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",marginBottom:"6px",background:"var(--surf)",borderRadius:"10px",border:"1px solid var(--b1)",opacity:t.done?.6:1}}>
          <div style={{width:"16px",height:"16px",borderRadius:"50%",border:"1.5px solid var(--b2)",background:t.done?"var(--green)":"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",color:t.done?"var(--bg)":"transparent",flexShrink:0}}>{t.done?"✓":""}</div>
          <div style={{fontSize:"13px",color:t.done?"var(--muted)":"var(--soft)",textDecoration:t.done?"line-through":"none",flex:1}}>{t.text}</div>
          <div style={{fontSize:"10px",color:"var(--muted)",flexShrink:0}}>task</div>
        </div>
      ))}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════════════════════
function App() {
  const [authed,setAuthed]       = useState(()=>AUTH.isValid());
  const [isDesktop,setIsDesktop] = useState(()=>window.innerWidth>=768);
  const [tab,setTab]             = useState("today");

  // ── ALL STATE PERSISTED ──
  const [events,setEvents]         = useState(()=>LS.get("events_today",[]));
  const [weekEvents,setWeekEvents] = useState(()=>LS.get("events_week",[]));
  const [activities,setActs]       = useState(()=>LS.get("activities",[]));
  const [actInput,setActInput]     = useState("");
  const [weekTasks,setWeekTasks]   = useState(()=>LS.get("weekTasks",{}));
  const [focusItems,setFocusItems] = useState(()=>{
    // Reset focus items daily
    const saved = LS.get("focus_items",{});
    if(saved.date===todayStr()) return saved.items||[];
    return [];
  });
  const [completedEvents,setCompletedEvents] = useState(()=>{
    const saved = LS.get("completed_events",{});
    if(saved.date===todayStr()) return new Set(saved.keys||[]);
    return new Set();
  });
  const [projects,setProjects]     = useState(()=>LS.get("projects",[]));
  const [activeProject,setActiveProject] = useState(null);
  const [selectedDay,setSelectedDay]     = useState(null); // {date, label}
  const [googleConnected,setGoogleConnected] = useState(false);
  const [synced,setSynced]         = useState(false);
  const [calLoad,setCalLoad]       = useState(false);
  const [weekCalLoad,setWkLoad]    = useState(false);
  const [showAddEvent,setShowAddEvent] = useState(false);
  const [addingEvent,setAddingEvent]   = useState(false);
  const [showSettings,setShowSettings] = useState(false);
  const [notifPermission,setNotifPerm] = useState(()=>PUSH.ok()?PUSH.perm():'unsupported');
  const [novaMotivation,setNovaMotivation] = useState(()=>LS.get("nova_motivation",""));
  const [recapCard,setRecapCard]   = useState(null); // kept for SW compat
  const [desktopSidebarOpen,setDesktopSidebarOpen] = useState(false);
  // Auto-refresh timer
  const syncTimerRef = useRef(null);

  useEffect(()=>{
    const h=()=>setIsDesktop(window.innerWidth>=768);
    window.addEventListener('resize',h);
    return()=>window.removeEventListener('resize',h);
  },[]);

  // ── PERSIST ALL STATE + broadcast to other tabs/devices ──
  useEffect(()=>{ LS.set("activities",activities); syncBroadcast("activities",activities); },[activities]);
  useEffect(()=>{ LS.set("weekTasks",weekTasks); },[weekTasks]);
  useEffect(()=>{ LS.set("projects",projects); syncBroadcast("projects",projects); },[projects]);
  useEffect(()=>{ LS.set("focus_items",{date:todayStr(),items:focusItems}); syncBroadcast("focus_items",focusItems); },[focusItems]);
  useEffect(()=>{ LS.set("completed_events",{date:todayStr(),keys:[...completedEvents]}); syncBroadcast("completed_events",[...completedEvents]); },[completedEvents]);
  useEffect(()=>{ LS.set("events_today",events); syncBroadcast("events",events); },[events]);
  useEffect(()=>{ LS.set("events_week",weekEvents); syncBroadcast("week_events",weekEvents); },[weekEvents]);

  // ── CROSS-DEVICE SYNC ──
  useCrossDeviceSync(setEvents,setWeekEvents,setActs,setFocusItems,setCompletedEvents,setProjects);

  // ── INIT ──
  useEffect(()=>{
    if(!authed) return;
    // Check OAuth return
    const params=new URLSearchParams(window.location.search);
    if(params.get("cal")==="connected"||params.get("code")){
      setGoogleConnected(true);
      window.history.replaceState({},"",window.location.pathname);
    }
    // Register SW
    if(PUSH.ok()) PUSH.regSW();
    // Check google status + fetch calendar
    checkGoogleStatus().then(connected=>{
      setGoogleConnected(connected);
      if(connected){ fetchToday(); fetchWeek(); }
    });
    // Auto-refresh every 5 minutes (#9)
    syncTimerRef.current = setInterval(()=>{
      checkGoogleStatus().then(c=>{ if(c){ fetchToday(); fetchWeek(); } });
    }, 5*60*1000);
    // Listen for SW background sync signal
    if('serviceWorker' in navigator){
      navigator.serviceWorker.addEventListener('message',e=>{
        if(e.data?.type==='BG_SYNC_CALENDAR'){ fetchToday(); fetchWeek(); }
      });
    }
    // Generate motivation for empty days
    fetchNovaMotivation();
    return()=>clearInterval(syncTimerRef.current);
  },[authed]);

  // Schedule push reminders whenever events or permission changes
  useEffect(()=>{
    if(notifPermission==='granted'&&events.length>0){
      PUSH.scheduleAll(events);
    }
  },[events,notifPermission]);

  const fetchNovaMotivation=async()=>{
    const saved=LS.get("nova_motivation_date","");
    if(saved===todayStr()) return;
    try{
      const d=await callAPI([{role:"user",content:"Give Demetri one short (max 12 words), punchy motivational message for a free day. No emojis. Just the message."}]);
      const t=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      if(t){ setNovaMotivation(t); LS.set("nova_motivation",t); LS.set("nova_motivation_date",todayStr()); }
    }catch{}
  };

  const checkRecapCard=()=>{
    const saved=LS.get("recap_card_date","");
    if(saved===todayStr()){
      const card=LS.get("recap_card_data",null);
      if(card) setRecapCard(card);
    }
  };

  const generateRecapCard=useCallback(async(evts)=>{
    if(LS.get("recap_card_date","")===todayStr()) return;
    try{
      const evtList=evts.slice(0,5).map(e=>`${fmtTime(e.start)} ${e.title}`).join(", ")||"no events";
      const d=await callAPI([{role:"user",content:`You are Nova. Write a warm 2-sentence morning recap for Demetri's day. Events: ${evtList}. Be specific and encouraging.`}]);
      const t=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      if(t){
        const card={text:t,time:nowTime()};
        setRecapCard(card);
        LS.set("recap_card_data",card);
        LS.set("recap_card_date",todayStr());
        PUSH.sendRecap(evts,t);
      }
    }catch{}
  },[]);

  const fetchToday=async()=>{
    setCalLoad(true); setSynced(false);
    try{
      const today=new Date();
      const start=new Date(today.setHours(0,0,0,0)).toISOString();
      const end=new Date(today.setHours(23,59,59,999)).toISOString();
      const data=await fetchCalendarEvents(start,end);
      if(data.error&&data.notConnected){ setSynced(false); setCalLoad(false); return; }
      if(data.events){
        const colored=data.events.map((e,i)=>({...e,color:EVT_COLORS[i%EVT_COLORS.length]}));
        setEvents(colored); setSynced(true);
      }
    }catch(e){ console.error(e); }
    setCalLoad(false);
  };

  const fetchWeek=async()=>{
    setWkLoad(true);
    try{
      const s=new Date(); s.setDate(s.getDate()+1); s.setHours(0,0,0,0);
      const e=new Date(); e.setDate(e.getDate()+7); e.setHours(23,59,59,999);
      const data=await fetchCalendarEvents(s.toISOString(),e.toISOString());
      if(data.events) setWeekEvents(data.events.map((ev,i)=>({...ev,color:EVT_COLORS[i%EVT_COLORS.length]})));
    }catch{}
    setWkLoad(false);
  };

  const addEventToCalendar=async({title,date,time,duration_minutes=60})=>{
    setAddingEvent(true);
    try{
      // Resolve relative dates
      let resolvedDate = date;
      if(!date || date==="tomorrow"){
        const d=new Date(); d.setDate(d.getDate()+1);
        resolvedDate = dateKey(d);
      } else if(date==="today"){
        resolvedDate = dateKey(new Date());
      }
      // Always correct wrong year — Nova often generates 2025 dates
      if(resolvedDate) {
        const currentYear = new Date().getFullYear();
        const parts = resolvedDate.split("-");
        if(parts.length === 3 && parseInt(parts[0]) < currentYear) {
          parts[0] = String(currentYear);
          resolvedDate = parts.join("-");
        }
      }
      // Log exactly what we're sending
      console.log("addEventToCalendar called with:", JSON.stringify({title, date, resolvedDate, time, duration_minutes}));
      const result = await addCalendarEvent(title,resolvedDate,time,duration_minutes);
      setAddingEvent(false); setShowAddEvent(false);
      if(result.success){
        setTimeout(()=>{fetchToday();fetchWeek();},1500);
        const calInfo = result.calendarId ? ` (calendar: ${result.calendarId})` : "";
        const link = result.htmlLink ? ` — <a href="${result.htmlLink}" target="_blank" style="color:var(--nova2)">view in Google</a>` : "";
        console.log("Event added:", result);
        return { success:true, message:`✓ "${title}" added — ${resolvedDate} at ${time||"09:00"}${calInfo}` };
      } else {
        console.error("Calendar add failed:",result);
        return { success:false, message:`Failed to add "${title}": ${result.error||JSON.stringify(result)}` };
      }
    }catch(e){
      console.error("addEventToCalendar threw:",e);
      setAddingEvent(false); setShowAddEvent(false);
      return { success:false, message:`Network error adding "${title}": ${e.message}. Check that your Cloudflare Worker is deployed and TAVILY_KEY is set.` };
    }
  };

  const handleAction=useCallback(async (tool,input)=>{
    switch(tool){
      case "log_activity":      setActs(p=>[{time:nowTime(),text:input.text},...p]); return `Logged: "${input.text}"`;
      case "delete_log":        setActs(p=>p.filter(a=>!a.text.toLowerCase().includes(input.text?.toLowerCase()))); return `Deleted log entry`;
      case "clear_log":         setActs([]); return "Activity log cleared";
      case "navigate_to":       setTab(input.tab); return `Switched to ${input.tab}`;
      case "add_project":       setProjects(p=>[{id:Date.now(),name:input.name,tag:input.tag||"personal",status:"To do",note:"",tasks:[],ti:""},...p]); return `Project "${input.name}" added`;
      case "add_calendar_event":{
        const r = await addEventToCalendar(input);
        return r.message;
      }
      case "add_week_task":     setWeekTasks(p=>({...p,[input.date]:[...(p[input.date]||[]),{text:input.text,done:false}]})); return `Task added for ${input.date}`;
      case "set_focus":         setFocusItems((input.items||[]).slice(0,3).map((t,i)=>({id:Date.now()+i,text:t,done:false}))); return "Focus list updated";
      case "complete_event_task":setCompletedEvents(p=>{ const n=new Set(p); const ev=events.find(e=>e.title.toLowerCase().includes(input.title?.toLowerCase())); if(ev) n.add(ev.id||ev.title); return n; }); return `Marked "${input.title}" done`;
      case "delete_calendar_event":{
        // Try to find the real event ID first
        const ev = events.find(e=>e.title.toLowerCase().includes(input.title?.toLowerCase()));
        if(ev?.id){
          try{
            await callWorker("calendar_delete",{eventId:ev.id});
            setEvents(p=>p.filter(e=>e.id!==ev.id));
            setTimeout(()=>{fetchToday();fetchWeek();},1200);
            return `✓ Deleted "${ev.title}" from Google Calendar`;
          }catch(e){ return `Failed to delete: ${e.message}`; }
        }
        setEvents(p=>p.filter(e=>!e.title.toLowerCase().includes(input.title?.toLowerCase())));
        return `Removed "${input.title}" from view`;
      }
      case "reschedule_event":{
        const r = await addEventToCalendar({title:input.title,date:input.new_date,time:input.new_time||"09:00",duration_minutes:60});
        return r.message;
      }
      case "predict_schedule":  return "Generating optimized schedule…";
      case "search_web":        return null;
      case "update_project":{
        setProjects(p=>p.map(pr=>{
          if(!pr.name.toLowerCase().includes(input.name?.toLowerCase())) return pr;
          return {...pr, ...(input.status?{status:input.status}:{}), ...(input.note!==undefined?{note:input.note}:{})};
        }));
        return `Updated project "${input.name}"`;
      }
      case "add_project_task":{
        setProjects(p=>p.map(pr=>{
          if(!pr.name.toLowerCase().includes(input.project_name?.toLowerCase())) return pr;
          return {...pr, tasks:[...(pr.tasks||[]),{id:Date.now(),text:input.task,done:false}]};
        }));
        return `Added task "${input.task}" to ${input.project_name}`;
      }
      case "update_focus":
        setFocusItems((input.items||[]).slice(0,3).map((t,i)=>({id:Date.now()+i,text:t,done:false})));
        return "Focus list updated";
      case "clear_focus":
        setFocusItems([]);
        return "Focus list cleared";
      case "delete_week_task":
        setWeekTasks(p=>({...p,[input.date]:(p[input.date]||[]).filter(t=>!t.text.toLowerCase().includes(input.text?.toLowerCase()))}));
        return `Deleted task from ${input.date}`;
      case "show_day_schedule":{
        // Resolve relative dates
        let d = input.date;
        if(d==="tomorrow"){ const n=new Date(); n.setDate(n.getDate()+1); d=dateKey(n); }
        else if(d==="today"){ d=dateKey(new Date()); }
        setSelectedDay({date:d, label:input.label||d});
        setTab("week");
        return `Showing schedule for ${input.label||d}`;
      }
      default: return null;
    }
  },[events, projects, weekTasks]);

  const toggleCompletedEvent=useCallback(key=>{
    setCompletedEvents(p=>{ const n=new Set(p); n.has(key)?n.delete(key):n.add(key); return n; });
  },[]);

  const addActivity=()=>{ if(!actInput.trim()) return; setActs(p=>[{time:nowTime(),text:actInput.trim()},...p]); setActInput(""); };
  const deleteActivity=text=>setActs(p=>p.filter(a=>a.text!==text));

  const enableNotifications=async()=>{
    const r=await PUSH.request(); setNotifPerm(r);
    if(r==='granted'){ await PUSH.regSW(); PUSH.scheduleAll(events); }
  };

  if(!authed) return <><style>{css}</style><Login onLogin={()=>setAuthed(true)}/></>;

  const tLabel={soon:"Soon",later:"Later",done:"Done"};
  const tCls  ={soon:"t-soon",later:"t-later",done:"t-done"};

  const CalConnectBtn=()=>(
    <button style={{background:"#fff",color:"#111",border:"none",borderRadius:"10px",padding:"8px 16px",fontFamily:"inherit",fontSize:"13px",fontWeight:"600",cursor:"pointer"}}
      onClick={async()=>{ const url=await getGoogleAuthUrl(); window.location.href=url; }}>
      📅 Connect Google Calendar
    </button>
  );

  // ── Desktop stats ──
  const total=events.length, doneEvts=[...completedEvents].length;
  const pct=total>0?Math.round((doneEvts/total)*100):0;

  return(
    <>
      <style>{css}</style>
      {showAddEvent&&<AddEventModal onSave={addEventToCalendar} onClose={()=>setShowAddEvent(false)} adding={addingEvent}/>}
      {showSettings&&<SettingsModal onClose={()=>setShowSettings(false)} notifPermission={notifPermission} onEnableNotifs={enableNotifications}/>}

      <div className="shell">
        {/* ── HEADER ── */}
        <div className="hd">
          <div><div className="hd-g">{greeting()}</div><div className="hd-n">Demetri</div></div>
          {isDesktop&&(
            <div className="desktop-tabs">
              {TABS.map(n=>(<button key={n.id} className={`dtab ${tab===n.id?"a":""}`} onClick={()=>setTab(n.id)}>{n.lbl}</button>))}
            </div>
          )}
          <div className="hd-r">
            <div className="hd-d">{fmtDate()}</div>
            <div className="hd-btns">
              {googleConnected&&<button className="lockbtn" onClick={async()=>{await callWorker("google_disconnect",{});setGoogleConnected(false);setSynced(false);setEvents([]);setWeekEvents([]);}}>Disconnect Cal</button>}
              <button className="lockbtn" onClick={()=>setShowSettings(true)}>⚙ Settings</button>
              <button className="lockbtn" onClick={()=>{AUTH.clear();setAuthed(false);}}>Lock</button>
            </div>
          </div>
        </div>

        {/* ── DESKTOP LAYOUT ── */}
        {isDesktop&&(
          <div className="desktop-body">
            {tab==="today"&&(<>
              {/* Col 1: Summary + Calendar */}
              <div className="desktop-panel" style={{gridRow:"span 2",display:"flex",flexDirection:"column",padding:0,overflow:"hidden"}}>
                <div style={{padding:"14px 16px 0",flexShrink:0}}>
                  <NovaSummary events={events} activities={activities} completedEvents={completedEvents}/>
                  {recapCard&&(
                    <div className="recap-card" style={{margin:"12px 0 0"}}>
                      <div className="recap-hd"><span className="recap-title">☀️ Morning Recap</span><button className="recap-close" onClick={()=>setRecapCard(null)}>✕</button></div>
                      <div className="recap-body">{recapCard.text}</div>
                    </div>
                  )}
                </div>
                <div style={{padding:"14px 16px 0",flex:1,overflowY:"auto"}}>
                  <div className="panel-hd">
                    <span className="panel-title">Today's Schedule</span>
                    <div className="sbtn-row">
                      <button className="sbtn" onClick={()=>setShowAddEvent(true)}>+ Event</button>
                      <button className="sbtn" onClick={fetchToday}>{calLoad?"…":"↻"}</button>
                    </div>
                  </div>
                  {/* Desktop progress bar */}
                  {total>0&&(
                    <div style={{marginBottom:"12px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:"12px",color:"var(--muted)",marginBottom:"6px"}}>
                        <span>{doneEvts}/{total} complete</span><span>{pct}%</span>
                      </div>
                      <div style={{height:"4px",background:"var(--b1)",borderRadius:"99px",overflow:"hidden"}}>
                        <div style={{height:"100%",borderRadius:"99px",background:pct===100?"var(--green)":"var(--nova)",width:`${pct}%`,transition:"width .5s ease"}}/>
                      </div>
                    </div>
                  )}
                  {synced&&<div className="syncbar"><div className="sdot"/>Synced · auto-refreshes every 5 min</div>}
                  {calLoad&&<div className="empty">Fetching events…</div>}
                  {!calLoad&&!synced&&<div style={{textAlign:"center",padding:"12px 0"}}>{!googleConnected&&<CalConnectBtn/>}</div>}
                  {!calLoad&&synced&&events.length===0&&(

// ── CROSS-DEVICE SYNC ──
// Broadcasts state changes via localStorage `storage` event so all open
// tabs/windows (same browser, same device) stay in real-time sync.
function useCrossDeviceSync(setEvents, setWeekEvents, setActs, setFocusItems, setCompletedEvents, setProjects) {
  useEffect(()=>{
    const SYNC_KEY = "nova_sync_broadcast";
    const handler = (e) => {
      if(e.key !== SYNC_KEY || !e.newValue) return;
      try {
        const { type, data, ts } = JSON.parse(e.newValue);
        if(Date.now() - ts > 10000) return; // ignore stale (>10s)
        if(type === "activities")       setActs(data);
        if(type === "focus_items")      setFocusItems(data);
        if(type === "projects")         setProjects(data);
        if(type === "completed_events") setCompletedEvents(new Set(data));
        if(type === "events")           setEvents(data);
        if(type === "week_events")      setWeekEvents(data);
        if(type === "nova_sessions")    LS.set("nova_sessions", data); // NovaChat reads this on next mount
      } catch {}
    };
    window.addEventListener("storage", handler);
    return () => window.removeEventListener("storage", handler);
  }, []);
}

// Call this whenever you mutate shared state to broadcast to other tabs
function syncBroadcast(type, data) {
  try {
    localStorage.setItem("nova_sync_broadcast", JSON.stringify({ type, data, ts: Date.now() }));
  } catch {}
}

// ── WEATHER CARD (London, Ontario) ──
function WeatherCard() {
  const [weather, setWeather] = useState(null);
  const [outfit,  setOutfit]  = useState("");
  const [load,    setLoad]    = useState(true);
  const [err,     setErr]     = useState(false);

  useEffect(()=>{
    // Cache for the day
    const saved = LS.get("weather_cache", null);
    if(saved && saved.date === todayStr()) { setWeather(saved); buildOutfit(saved); setLoad(false); return; }
    fetchWeather();
  },[]);

  const fetchWeather = async () => {
    setLoad(true); setErr(false);
    try {
      // Open-Meteo — London, Ontario lat/lng, no API key required
      const res = await fetch(
        "https://api.open-meteo.com/v1/forecast?latitude=42.9849&longitude=-81.2453&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,precipitation&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode&timezone=America%2FToronto&forecast_days=1&temperature_unit=celsius"
      );
      const data = await res.json();
      const c = data.current;
      const d = data.daily;
      const w = {
        date: todayStr(),
        temp: Math.round(c.temperature_2m),
        feels: Math.round(c.apparent_temperature),
        wind: Math.round(c.windspeed_10m),
        precip: c.precipitation,
        code: c.weathercode,
        high: Math.round(d.temperature_2m_max[0]),
        low:  Math.round(d.temperature_2m_min[0]),
        dailyPrecip: d.precipitation_sum[0],
      };
      LS.set("weather_cache", w);
      setWeather(w);
      buildOutfit(w);
    } catch(e) { setErr(true); }
    setLoad(false);
  };

  const buildOutfit = (w) => {
    const feels = w.feels ?? w.temp;
    const rainy = w.dailyPrecip > 2 || [61,63,65,80,81,82].includes(w.code);
    const snowy = [71,73,75,77,85,86].includes(w.code);
    let top, bottom, extra = [];

    if(feels <= -10)      { top="Heavy winter coat"; bottom="Thermal base layer + thick joggers or jeans"; }
    else if(feels <= 0)   { top="Winter coat"; bottom="Jeans or thick pants"; }
    else if(feels <= 8)   { top="Thick sweater or hoodie"; bottom="Jeans"; }
    else if(feels <= 14)  { top="Light jacket or hoodie"; bottom="Jeans or chinos"; }
    else if(feels <= 19)  { top="Long sleeve shirt"; bottom="Jeans or chinos"; }
    else if(feels <= 24)  { top="T-shirt"; bottom="Chinos or jeans"; }
    else                  { top="T-shirt"; bottom="Shorts"; }

    if(rainy) extra.push("bring an umbrella ☂");
    if(snowy) extra.push("wear boots 🥾");
    if(w.wind > 30) extra.push("it's windy — layer up");

    setOutfit(`${top}, ${bottom}${extra.length ? " · " + extra.join(", ") : ""}`);
  };

  const wIcon = (code) => {
    if(code===0) return "☀️";
    if([1,2,3].includes(code)) return "⛅";
    if([45,48].includes(code)) return "🌫️";
    if([51,53,55,61,63,65,80,81,82].includes(code)) return "🌧️";
    if([71,73,75,77,85,86].includes(code)) return "❄️";
    if([95,96,99].includes(code)) return "⛈️";
    return "🌡️";
  };

  if(load) return(
    <div style={{background:"var(--card)",border:"1px solid var(--b1)",borderRadius:"14px",padding:"16px 18px",marginBottom:"14px"}}>
      <div className="inbox-skel" style={{width:"60%",marginBottom:"8px"}}/>
      <div className="inbox-skel" style={{width:"40%"}}/>
    </div>
  );

  if(err) return null;

  return(
    <div style={{background:"var(--card)",border:"1px solid var(--b1)",borderRadius:"14px",padding:"16px 18px",marginBottom:"14px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:"2px",background:"linear-gradient(90deg,var(--blue),var(--nova))",opacity:.7}}/>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"10px"}}>
        <div>
          <div style={{fontSize:"10px",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".8px",marginBottom:"4px"}}>London, Ontario</div>
          <div style={{display:"flex",alignItems:"baseline",gap:"8px"}}>
            <span style={{fontSize:"28px",fontWeight:600,lineHeight:1}}>{weather.temp}°C</span>
            <span style={{fontSize:"13px",color:"var(--muted)"}}>feels {weather.feels}°</span>
          </div>
          <div style={{fontSize:"11px",color:"var(--muted)",marginTop:"3px"}}>H {weather.high}° · L {weather.low}° · Wind {weather.wind} km/h</div>
        </div>
        <div style={{fontSize:"36px",lineHeight:1}}>{wIcon(weather.code)}</div>
      </div>
      <div style={{background:"var(--surf)",border:"1px solid var(--b1)",borderRadius:"8px",padding:"9px 12px",display:"flex",alignItems:"flex-start",gap:"8px"}}>
        <span style={{fontSize:"12px",flexShrink:0}}>👕</span>
        <div>
          <span style={{fontSize:"10px",color:"var(--nova2)",fontWeight:500,textTransform:"uppercase",letterSpacing:".5px"}}>Nova suggests · </span>
          <span style={{fontSize:"12px",color:"var(--soft)"}}>{outfit}</span>
        </div>
      </div>
      <button onClick={fetchWeather} style={{position:"absolute",top:"14px",right:"52px",background:"none",border:"none",color:"var(--muted)",fontSize:"11px",cursor:"pointer",padding:"2px 4px"}}>↻</button>
    </div>
  );
}
function InboxTab({ events, weekEvents, activities, projects, completedEvents, onAction, isDesktop }) {
  const [emails,      setEmails]      = useState([]);
  const [status,      setStatus]      = useState("idle");
  const [statusMsg,   setStatusMsg]   = useState("Ready to scan");
  const [filter,      setFilter]      = useState("all");
  const [scanned,     setScanned]     = useState(false);
  const [lastScan,    setLastScan]    = useState(null);
  const [badgeCount,  setBadgeCount]  = useState(0);
  const [needsReauth, setNeedsReauth] = useState(false);

  useEffect(()=>{ if(!scanned) runScan(); },[]);

  const setS = (s, msg) => { setStatus(s); setStatusMsg(msg); };

  const runScan = async () => {
    setS("scanning","Fetching inbox…");
    setEmails([]);
    setNeedsReauth(false);
    try {
      // Step 1 — fetch raw emails from Gmail via Worker
      const listRes = await callWorker("gmail_list", { maxResults: 20 });

      if (listRes.error === "gmail_scope_missing") {
        setNeedsReauth(true);
        setS("error","Gmail permission missing — reconnect Google below.");
        return;
      }
      if (!listRes.success) throw new Error(listRes.error || "Failed to fetch emails");

      const rawEmails = listRes.emails || [];
      if (rawEmails.length === 0) {
        setEmails([]); setScanned(true);
        setS("done","Inbox is empty."); return;
      }

      setS("analyzing",`Analyzing ${rawEmails.length} emails with Nova…`);

      // Step 2 — analyze with Claude
      const analyzeData = await callAPI([{
        role:"user",
        content:`Analyze these emails. Return a JSON array — same order as input. Each object adds:
- priority: "high"|"medium"|"low"
- tags: array from ["event","deadline","action","info"]
- summary: one sentence, max 15 words
- suggestion: null OR {type:"calendar_event",title:string,date:"YYYY-MM-DD",time:string|null,reason:string max 12 words}
Return ONLY a valid JSON array. No markdown, no extra text.
Today: ${new Date().toISOString().split("T")[0]}

Emails: ${JSON.stringify(rawEmails)}`
      }]);

      const raw = (analyzeData.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").replace(/```json|```/g,"").trim();
      const s = raw.indexOf("["), e = raw.lastIndexOf("]");
      if(s===-1) throw new Error("Claude returned no analysis");
      const analyzed = JSON.parse(raw.slice(s,e+1));
      const merged = analyzed.map((a,i)=>({...rawEmails[i],...a,_dismissed:false,_added:false,_calLoading:false,_calError:null}));

      setEmails(merged);
      setBadgeCount(merged.filter(m=>m.priority==="high"||m.suggestion).length);
      setScanned(true);
      setLastScan(new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
      setS("done",`${merged.length} emails · ${merged.filter(m=>m.suggestion).length} Nova suggestions`);
    } catch(err) {
      console.error(err);
      setS("error", err.message || "Scan failed");
    }
  };

  const addToCalendar = async (email, idx) => {
    const sg = email.suggestion;
    setEmails(p=>p.map((e,i)=>i===idx?{...e,_calLoading:true}:e));
    try {
      const result = await callWorker("calendar_add",{
        title: sg.title,
        date: sg.date,
        time: sg.time || "09:00",
        duration_minutes: 60,
      });
      if(result.success) {
        setEmails(p=>p.map((e,i)=>i===idx?{...e,_added:true,_calLoading:false}:e));
      } else {
        throw new Error(result.error||"Calendar add failed");
      }
    } catch(err) {
      setEmails(p=>p.map((e,i)=>i===idx?{...e,_calError:err.message,_calLoading:false}:e));
    }
  };

  const dismiss = idx => setEmails(p=>p.map((e,i)=>i===idx?{...e,_dismissed:true}:e));

  const filtered = filter==="all" ? emails : emails.filter(e=>e.tags?.includes(filter));

  const fmtEmailDate = d => {
    if(!d) return "";
    const dt = new Date(d);
    if(isNaN(dt)) return d;
    const diff = Date.now()-dt;
    if(diff<3600000) return Math.floor(diff/60000)+"m ago";
    if(diff<86400000) return Math.floor(diff/3600000)+"h ago";
    return dt.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  };

  const tagColor = {
    event:   {bg:"rgba(96,165,250,.12)",  color:"var(--blue)",   border:"rgba(96,165,250,.25)"},
    deadline:{bg:"rgba(248,113,113,.12)", color:"var(--red)",    border:"rgba(248,113,113,.25)"},
    action:  {bg:"rgba(245,158,11,.12)",  color:"var(--amber)",  border:"rgba(245,158,11,.25)"},
    info:    {bg:"rgba(34,197,94,.12)",   color:"var(--green)",  border:"rgba(34,197,94,.25)"},
  };
  const priorityLeft = {high:"2px solid var(--red)",medium:"2px solid var(--amber)",low:"1px solid var(--b1)"};
  const dotCls = {idle:"",scanning:"inbox-dot-scanning",analyzing:"inbox-dot-scanning",done:"inbox-dot-done",error:"inbox-dot-error"};

  return(
    <div className={isDesktop?"":"sec"} style={{paddingBottom:isDesktop?"0":"80px"}}>

      {/* Header */}
      <div className="sh" style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
          <span className="stitle">Inbox</span>
          {badgeCount>0&&<span style={{fontSize:"9px",background:"var(--nova)",color:"#fff",borderRadius:"20px",padding:"1px 6px",fontWeight:600}}>{badgeCount}</span>}
        </div>
        <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
          {lastScan&&<span style={{fontSize:"10px",color:"var(--muted)"}}>last scan {lastScan}</span>}
          <button className="sbtn" onClick={runScan}
            disabled={status==="scanning"||status==="analyzing"}
            style={{opacity:(status==="scanning"||status==="analyzing")?0.5:1}}>
            {status==="scanning"||status==="analyzing"?"…":"↻ Scan"}
          </button>
        </div>
      </div>

      {/* Status bar */}
      <div style={{display:"flex",alignItems:"center",gap:"8px",padding:"10px 14px",background:"var(--card)",border:"1px solid var(--b1)",borderRadius:"10px",marginBottom:"14px",fontSize:"12px",color:"var(--muted)"}}>
        <div className={`inbox-dot ${dotCls[status]||""}`}/>
        <span>{statusMsg}</span>
      </div>

      {/* Re-auth prompt */}
      {needsReauth&&(
        <div style={{background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.25)",borderRadius:"10px",padding:"14px 16px",marginBottom:"14px",fontSize:"12px",color:"var(--amber)",lineHeight:1.6}}>
          <strong>Gmail access needed.</strong> Your Google connection doesn't include Gmail permission yet.<br/>
          Click Disconnect Cal in the header, then reconnect — the new OAuth flow includes the Gmail scope.
        </div>
      )}

      {/* Skeletons */}
      {(status==="scanning"||status==="analyzing")&&[0,1,2].map(i=>(
        <div key={i} style={{background:"var(--card)",border:"1px solid var(--b1)",borderRadius:"10px",padding:"14px 16px",marginBottom:"10px"}}>
          {["40%","72%","52%"].map((w,j)=>(<div key={j} className="inbox-skel" style={{width:w,marginBottom:j<2?"8px":"0"}}/>))}
        </div>
      ))}

      {/* Error */}
      {status==="error"&&!needsReauth&&(
        <div style={{textAlign:"center",padding:"28px 16px",color:"var(--muted)",fontSize:"13px",lineHeight:1.7}}>
          <div style={{fontSize:"22px",marginBottom:"8px",opacity:.4}}>⚠</div>
          {statusMsg}<br/>
          <button className="sbtn" style={{marginTop:"12px"}} onClick={runScan}>Retry</button>
        </div>
      )}

      {/* Filter chips */}
      {status==="done"&&emails.length>0&&(
        <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"14px"}}>
          {["all","event","deadline","action","info"].map(f=>(
            <button key={f} onClick={()=>setFilter(f)} style={{
              fontSize:"10px",padding:"4px 12px",borderRadius:"20px",fontFamily:"inherit",cursor:"pointer",transition:"all .15s",
              border:`1px solid ${filter===f?"var(--nova)":"var(--b1)"}`,
              background:filter===f?"var(--nova-bg)":"none",
              color:filter===f?"var(--nova2)":"var(--muted)",
            }}>{f[0].toUpperCase()+f.slice(1)}</button>
          ))}
        </div>
      )}

      {/* Empty */}
      {status==="done"&&filtered.length===0&&<div className="empty">No emails matching this filter.</div>}

      {/* Email cards */}
      {status==="done"&&filtered.map((email,i)=>(
        <div key={email.id||i} style={{
          background:"var(--card)",borderRadius:"10px",marginBottom:"10px",padding:"14px 16px",
          borderLeft: priorityLeft[email.priority]||"1px solid var(--b1)",
          border: email.priority==="high"||email.priority==="medium" ? "" : "1px solid var(--b1)",
          animation:"up .3s ease both",animationDelay:`${i*.04}s`,
        }}>
          {/* Top row */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"4px",gap:"10px"}}>
            <span style={{fontSize:"13px",fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{email.sender||email.senderEmail||"Unknown"}</span>
            <span style={{fontSize:"10px",color:"var(--muted)",flexShrink:0}}>{fmtEmailDate(email.date)}</span>
          </div>
          <div style={{fontSize:"12px",color:"var(--soft)",marginBottom:"5px",lineHeight:1.5}}>{email.subject}</div>
          {email.summary&&<div style={{fontSize:"11px",color:"var(--muted)",marginBottom:"8px"}}>{email.summary}</div>}

          {/* Tags */}
          {email.tags?.length>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"8px"}}>
              {email.tags.map(t=>{
                const tc = tagColor[t]||tagColor.info;
                return <span key={t} style={{fontSize:"9px",padding:"2px 7px",borderRadius:"20px",background:tc.bg,color:tc.color,border:`1px solid ${tc.border}`}}>{t}</span>;
              })}
            </div>
          )}

          {/* Nova suggestion */}
          {email.suggestion&&!email._dismissed&&(
            <div style={{background:"var(--surf)",border:"1px solid var(--nova-border)",borderRadius:"8px",padding:"10px 12px",display:"flex",alignItems:"flex-start",gap:"10px",marginTop:"6px"}}>
              <div style={{width:"20px",height:"20px",borderRadius:"6px",background:"var(--nova-bg)",border:"1px solid var(--nova-border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",color:"var(--nova2)",flexShrink:0}}>✦</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:"11px",color:"var(--soft)",lineHeight:1.5,marginBottom:"7px"}}>
                  <span style={{color:"var(--text)",fontWeight:500}}>Nova suggests:</span>{" "}
                  Add <em>"{email.suggestion.title}"</em>
                  {email.suggestion.date?` — ${email.suggestion.date}`:""}
                  {email.suggestion.time?` at ${email.suggestion.time}`:""}
                  {email.suggestion.reason&&<div style={{fontSize:"10px",color:"var(--muted)",marginTop:"2px"}}>{email.suggestion.reason}</div>}
                </div>
                <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                  {email._added
                    ? <span style={{fontSize:"10px",color:"var(--green)",padding:"4px 10px",border:"1px solid rgba(34,197,94,.3)",borderRadius:"6px"}}>✓ Added to Calendar</span>
                    : email._calError
                    ? <span style={{fontSize:"10px",color:"var(--red)"}}>{email._calError}</span>
                    : <>
                        <button className="sbtn" style={{fontSize:"10px",color:"var(--green)",borderColor:"rgba(34,197,94,.3)",opacity:email._calLoading?.5:1}}
                          onClick={()=>addToCalendar(email,emails.indexOf(email))} disabled={email._calLoading}>
                          {email._calLoading?"Adding…":"+ Calendar"}
                        </button>
                        <button className="sbtn" style={{fontSize:"10px"}} onClick={()=>dismiss(emails.indexOf(email))}>Dismiss</button>
                      </>
                  }
                </div>
              </div>
            </div>
          )}
        </div>
      ))}

      {/* Mobile Nova handled globally by MobileNovaFloat */}
      <div className="spacer"/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
