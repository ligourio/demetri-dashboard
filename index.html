const LS = {
  get: (k,d) => { try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch{ return d; } },
  set: (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} },
};

// ── AUTH HELPERS ──
const AUTH = {
  getToken: () => LS.get("session_token", null),
  getExpiry: () => LS.get("session_expiry", null),
  isValid: () => {
    const token = LS.get("session_token", null);
    const expiry = LS.get("session_expiry", null);
    if (!token || !expiry) return false;
    return new Date(expiry) > new Date();
  },
  save: (token, expiresAt) => {
    LS.set("session_token", token);
    LS.set("session_expiry", expiresAt);
  },
  clear: () => {
    localStorage.removeItem("session_token");
    localStorage.removeItem("session_expiry");
  },
};

const callWorker = async (action, payload={}, token=null) => {
  const headers = { "Content-Type": "application/json" };
  const t = token || AUTH.getToken();
  if (t) headers["X-Session-Token"] = t;
  const res = await fetch(API, {
    method: "POST",
    headers,
    body: JSON.stringify({ action, ...payload }),
  });
  return res.json();
};

const callAPI = async (messages, opts={}) => {
  const res = await callWorker("ai", { payload: { model: MODEL, max_tokens: 2000, ...opts, messages } });
  return res;
};

const parseCalJSON = data => {
  const candidates = [];
  for (const b of (data.content||[])) {
    const raw = (b.type==="mcp_tool_result" ? b.content?.[0]?.text : null) || b.text || "";
    if (!raw) continue;
    // try direct parse
    try { const a=JSON.parse(raw.replace(/```json|```/g,"").trim()); if(Array.isArray(a)){ candidates.push(...a); continue; } } catch {}
    // extract JSON array from text
    const m = raw.match(/\[[\s\S]*?\]/g);
    if (m) for (const s of m) try { const a=JSON.parse(s); if(Array.isArray(a)) candidates.push(...a); } catch {}
  }
  return candidates;
};

// ── LOGIN ──
function Login({ onLogin }) {
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const go=async()=>{
    if(!pw.trim()||loading) return;
    setLoading(true); setErr("");
    try {
      const data = await callWorker("login", { password: pw });
      if (data.token) {
        AUTH.save(data.token, data.expiresAt);
        onLogin(data.token);
      } else {
        setErr(data.error || "Incorrect password.");
        if (data.locked) setErr(data.error);
      }
    } catch {
      setErr("Connection error. Check your internet and try again.");
    }
    setPw(""); setLoading(false);
  };

  return (
    <div className="lw"><div className="lb">
      <div className="lt">Welcome back, Demetri.</div>
      <div className="ls">Enter your password to continue.</div>
      <label className="fl">Password</label>
      <input className="fi" type="password" placeholder="••••••••••" value={pw}
        onChange={e=>{setPw(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&go()} autoFocus/>
      <button className="lbtn" onClick={go} style={{opacity:loading?.7:1}}>
        {loading?"Signing in…":"Sign in"}
      </button>
      {err&&<div className="lerr">{err}</div>}
    </div></div>
  );
}

// ── NOVA SUMMARY ──
function NovaSummary({ habits, events, activities, habitTimes }) {
  const [text,setText]=useState(""); const [eta,setEta]=useState(""); const [load,setLoad]=useState(false);
  const run=useCallback(async()=>{
    setLoad(true); setText(""); setEta("");
    try{
      const done=habits.filter(h=>h.done).map(h=>h.name);
      const rem=habits.filter(h=>!h.done).map(h=>habitTimes[h.name]?`${h.name}(~${habitTimes[h.name]}min)`:h.name);
      const evts=events.map(e=>`${e.title}${e.start?" at "+fmtTime(e.start):""}`).slice(0,4);
      const logs=activities.slice(0,4).map(a=>`${a.time}:${a.text}`);
      const data=await callAPI([{role:"user",content:`You are Nova, Demetri's assistant. Warm brief daily summary (3-4 sentences): what's done, what's left, one sleep/routine tip. End exactly with: ETA: [time or "All done!"]
Time:${new Date().toLocaleTimeString()} | ${fmtDate()}
Done:${done.join(",")||"none"} | Remaining:${rem.join(",")||"all done!"}
Calendar:${evts.join(",")||"none"} | Log:${logs.join(";")||"empty"}
Avg times:${Object.entries(habitTimes).map(([k,v])=>`${k}:${v}min`).join(",")||"none tracked"}`}]);
      const full=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      const m=full.match(/ETA:\s*(.+)/i);
      if(m){setEta(m[1].trim());setText(full.replace(/ETA:\s*.+/i,"").trim());}else setText(full);
    }catch{}
    setLoad(false);
  },[habits,events,activities,habitTimes]);
  useEffect(()=>{run();},[]);
  useEffect(()=>{ if(habits.filter(h=>h.done).length>0) run(); },[habits.filter(h=>h.done).length]);
  return (
    <div className="nsum">
      <div className="nst">
        <div className="nav2">✦</div>
        <span className="nlbl">Nova · Daily Summary</span>
        <button className="nref" onClick={run}>↻</button>
      </div>
      {load?<div className="dots"><div className="dot"/><div className="dot"/><div className="dot"/></div>
           :<div className="ntxt">{text||"Complete some habits to get your summary."}</div>}
      {eta&&<div className="neta">⏱ Estimated finish: <b>{eta}</b></div>}
    </div>
  );
}

// ── FOCUS LIST ──
function FocusList({ items, setItems }) {
  const [input,setInput]=useState("");
  const add=()=>{
    if(!input.trim()||items.length>=3) return;
    setItems(p=>[...p,{id:Date.now(),text:input.trim(),done:false}]);
    setInput("");
  };
  const toggle=id=>setItems(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const del=id=>setItems(p=>p.filter(t=>t.id!==id));
  const nums=["1","2","3"]; const numCls=["p1","p2","p3"];
  return (
    <div className="focus-wrap">
      <div className="focus-card">
        <div className="focus-hd">
          <span className="focus-title">Top 3 Focus</span>
          <span style={{fontSize:"11px",color:"var(--muted)"}}>{items.length}/3</span>
        </div>
        {items.length===0&&<div className="focus-empty">What are your 3 priorities today?</div>}
        {items.map((t,i)=>(
          <div className="focus-item" key={t.id} style={{cursor:"pointer"}} onClick={()=>toggle(t.id)}>
            <span className={`focus-num ${numCls[i]||""}`}>{nums[i]}</span>
            <div className={`focus-ck ${t.done?"on":""}`}>{t.done?"✓":""}</div>
            <span className={`focus-txt ${t.done?"on":""}`}>{t.text}</span>
            <button style={{fontSize:"13px",color:"var(--muted)",background:"none",border:"none",cursor:"pointer",opacity:.6,padding:"0 2px"}}
              onClick={e=>{e.stopPropagation();del(t.id);}}>✕</button>
          </div>
        ))}
        {items.length<3&&(
          <div className="focus-input-row">
            <input className="focus-input" placeholder={`Priority ${items.length+1}…`} value={input}
              onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
            <button className="focus-add" onClick={add}>+</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── WEEK VIEW ──
function WeekView({ weekTasks, setWeekTasks, weekEvents, weekCalLoad }) {
  const days=next7();
  const [expanded,setExpanded]=useState({});
  const [inputs,setInputs]=useState({});
  const toggle=k=>setExpanded(p=>({...p,[k]:!p[k]}));
  const toggleTask=(k,i)=>setWeekTasks(p=>({...p,[k]:(p[k]||[]).map((t,j)=>j===i?{...t,done:!t.done}:t)}));
  const addTask=k=>{ const v=(inputs[k]||"").trim(); if(!v) return; setWeekTasks(p=>({...p,[k]:[...(p[k]||[]),{text:v,done:false}]})); setInputs(p=>({...p,[k]:""})); };
  const calForDay=d=>weekEvents.filter(ev=>{ try{ return new Date(ev.start).toDateString()===d.toDateString(); }catch{return false;} });
  return (
    <div>
      {days.map((day,i)=>{
        const k=dateKey(day); const tasks=weekTasks[k]||[]; const cal=calForDay(day); const total=tasks.length+cal.length; const open=expanded[k];
        return (
          <div className="wday" key={k} style={{animationDelay:`${i*.05}s`}}>
            <div className="wdh" onClick={()=>toggle(k)}>
              <div className="wdhl">
                <span className="wdow">{DOW[day.getDay()]}</span>
                <span className="wdate">{day.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
              </div>
              <span className={`wcount${total>0?" has":""}`}>{weekCalLoad?"…":total>0?`${total} item${total>1?"s":""}`:"Free"} {open?"▲":"▼"}</span>
            </div>
            {open&&<>
              <div className="wbody">
                {cal.map((ev,j)=>(
                  <div className="witem" key={`c${j}`}>
                    <div className="wdot" style={{background:ev.color||"#60a5fa"}}/>
                    <span className="wtime">{fmtTime(ev.start)}</span>
                    <span className="wtxt">{ev.title}</span>
                  </div>
                ))}
                {tasks.map((t,j)=>(
                  <div className="witem" key={`t${j}`} style={{cursor:"pointer"}} onClick={()=>toggleTask(k,j)}>
                    <div className={`wck ${t.done?"on":""}`}>{t.done?"✓":""}</div>
                    <span className="wtxt" style={{textDecoration:t.done?"line-through":"none",color:t.done?"var(--muted)":"var(--soft)"}}>{t.text}</span>
                  </div>
                ))}
                {total===0&&<div style={{fontSize:"12px",color:"var(--muted)",padding:"7px 0",borderTop:"1px solid var(--b1)"}}>Nothing scheduled</div>}
              </div>
              <div className="wadd">
                <input className="winput" placeholder="Add a task…" value={inputs[k]||""}
                  onChange={e=>setInputs(p=>({...p,[k]:e.target.value}))}
                  onKeyDown={e=>e.key==="Enter"&&addTask(k)}/>
                <button className="wplus" onClick={()=>addTask(k)}>+</button>
              </div>
            </>}
          </div>
        );
      })}
    </div>
  );
}

// ── NOVA CHAT (full tab) ──
function NovaChat({ habits, events, weekEvents, activities, projects, habitTimes, onAction, onSendFromBar }) {
  const savedSessions=LS.get("nova_sessions",[]);
  const INTRO={role:"nova",text:"Hey! I'm Nova — your personal assistant. I remember our past conversations. Try: \"predict my schedule\", \"add gym tomorrow at 7am\", or \"what do I have this week?\"",time:nowTime(),actions:[]};
  const [sessions,setSessions]=useState(savedSessions);
  const [current,setCurrent]=useState([INTRO]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [rec,setRec]=useState(false);
  const [showHistory,setShowHistory]=useState(false);
  const botRef=useRef(null); const recRef=useRef(null);

  useEffect(()=>{ botRef.current?.scrollIntoView({behavior:"smooth"}); },[current,loading]);
  useEffect(()=>{ LS.set("nova_sessions",sessions); },[sessions]);

  // Expose send function so the quick bar on home can trigger it
  useEffect(()=>{ if(onSendFromBar) onSendFromBar.ref=send; },[]);

  const sysPrompt=()=>{
    const done=habits.filter(h=>h.done).map(h=>h.name);
    const evts=events.map(e=>`${e.title}${e.start?" at "+fmtTime(e.start):""}`).slice(0,5);
    const wevts=weekEvents.slice(0,10).map(e=>`${e.title} on ${fmtShort(e.start)}${e.start?" at "+fmtTime(e.start):""}`);
    const log=activities.slice(0,6).map(a=>`${a.time}:${a.text}`);
    const projs=projects.map(p=>`${p.name}(${p.tag},${p.status})`).slice(0,5);
    const times=Object.entries(habitTimes).map(([k,v])=>`${k}:${v}min`).join(",");
    const past=sessions.slice(-3).map(s=>s.messages.filter(m=>m.role==="user").map(m=>m.text).slice(-2).join(" | ")).join("\n");
    return `You are Nova, Demetri's smart personal assistant at Western University. Be warm, concise, helpful. Use tools when intent matches. Confirm tool use briefly.
State — ${fmtDate()} | ${new Date().toLocaleTimeString()}
Habits done:${done.join(",")||"none"} | Today:${evts.join(",")||"none"}
Week:${wevts.join("; ")||"none"} | Log:${log.join(";")||"empty"}
Projects:${projs.join(";")||"none"} | Avg habit times:${times||"none"}
Past sessions:\n${past||"none"}`;
  };

  const send=useCallback(async text=>{
    if(!text?.trim()||loading) return;
    const userMsg={role:"user",text:text.trim(),time:nowTime(),actions:[]};
    const updated=[...current,userMsg];
    setCurrent(updated); setLoading(true);
    try{
      const apiMsgs=updated.filter(m=>m!==INTRO).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
      const data=await callAPI(apiMsgs.slice(-20),{system:sysPrompt(),tools:TOOLS});
      const tblocks=(data.content||[]).filter(b=>b.type==="text");
      const tooluse=(data.content||[]).filter(b=>b.type==="tool_use");
      const acts=[]; for(const t of tooluse){const r=onAction(t.name,t.input);if(r)acts.push(r);}
      const reply=tblocks.map(b=>b.text).join("").trim()||(acts.length?"Done!":"Something went wrong.");
      const novaMsg={role:"nova",text:reply,time:nowTime(),actions:acts};
      const final=[...updated,novaMsg];
      setCurrent(final);
      const sid=sessId();
      setSessions(p=>{ const ex=p.findIndex(s=>s.id===sid); const entry={id:sid,messages:final.filter(m=>m!==INTRO)}; if(ex>=0){const n=[...p];n[ex]=entry;return n;} return [...p,entry].slice(-20); });
    }catch{ setCurrent(p=>[...p,{role:"nova",text:"Something went wrong. Check your connection.",time:nowTime(),actions:[]}]); }
    setLoading(false);
  },[current,loading,habits,events,weekEvents,activities,projects,habitTimes,sessions,onAction]);

  // Keep ref updated for bar access
  if(onSendFromBar) onSendFromBar.ref=send;

  const startVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Voice not supported. Try Chrome.");return;}
    if(rec){recRef.current?.stop();return;}
    const r=new SR(); r.lang="en-US"; r.interimResults=false; r.continuous=false; recRef.current=r;
    r.onstart=()=>setRec(true); r.onend=()=>setRec(false); r.onerror=()=>setRec(false);
    r.onresult=e=>setInput(e.results[0][0].transcript);
    r.start();
  };

  return (
    <div className="novawrap">
      <div className="novahd">
        <div className="novaav">✦</div>
        <div style={{flex:1}}>
          <div className="novanm">Nova</div>
          <div className="novast"><div className="novastd"/>Online</div>
        </div>
        <button className="sbtn" onClick={()=>setShowHistory(p=>!p)}>{showHistory?"← Back":"History"}</button>
        {showHistory&&sessions.length>0&&<button className="sbtn" style={{marginLeft:"6px"}} onClick={()=>{setSessions([]);LS.set("nova_sessions",[]);}}>Clear</button>}
      </div>

      <div className="chatmsgs">
        {!showHistory&&current.map((m,i)=>(
          <div key={i} className={`msg ${m.role==="user"?"u":"n"}`}>
            <div className="mbub">{m.text}</div>
            {m.actions?.map((a,j)=><div key={j} className="apill">✓ {a}</div>)}
            <div className="mtime">{m.time}</div>
          </div>
        ))}
        {showHistory&&sessions.length===0&&<div className="empty">No conversation history yet.</div>}
        {showHistory&&[...sessions].reverse().map((s,si)=>(
          <div key={si}>
            <div className="sess-div">
              <div className="sess-line"/>
              <span className="sess-lbl" onClick={()=>{setCurrent([INTRO,...s.messages]);setShowHistory(false);}}>
                {s.id} — tap to restore
              </span>
              <div className="sess-line"/>
            </div>
            {s.messages.slice(-3).map((m,j)=>(
              <div key={j} className={`msg ${m.role==="user"?"u":"n"}`}>
                <div className="mbub">{m.text}</div>
                <div className="mtime">{m.time}</div>
              </div>
            ))}
          </div>
        ))}
        {loading&&<div className="msg n" style={{opacity:.7}}><div className="mbub" style={{fontSize:"13px",color:"var(--muted)"}}>Nova is thinking…</div></div>}
        <div ref={botRef}/>
      </div>

      {!showHistory&&<>
        <div className="chatia">
          <button className={`micbtn ${rec?"rec":""}`} onClick={startVoice}>{rec?"⏹":"🎤"}</button>
          <textarea className="chatinput" placeholder="Ask Nova anything…" value={input} rows={1}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);setInput("");}}}/>
          <button className="csend" onClick={()=>{send(input);setInput("");}} disabled={!input.trim()||loading}>↑</button>
        </div>
        <div className="novahint">{rec?"🔴 Listening…":"Enter to send · Try: \"predict my schedule\""}</div>
      </>}
      <div className="spacer"/>
    </div>
  );
}

// ── PROJECTS ──
function Projects({ projects, setProjects }) {
  const [name,setName]=useState(""); const [tag,setTag]=useState("personal"); const [filter,setFilter]=useState("all");
  const tags=["personal","creative","work"];
  const statusColor={"To do":"var(--muted)","In progress":"var(--amber)","Done":"var(--green)"};
  const tagActiveCls={personal:"ap",creative:"ac",work:"aw"};
  const add=()=>{ if(!name.trim()) return; setProjects(p=>[{id:Date.now(),name:name.trim(),tag,status:"To do",note:"",tasks:[],ti:""},...p]); setName(""); };
  const upd=(id,f,v)=>setProjects(p=>p.map(pr=>pr.id===id?{...pr,[f]:v}:pr));
  const del=id=>setProjects(p=>p.filter(pr=>pr.id!==id));
  const addTask=id=>setProjects(p=>p.map(pr=>{ if(pr.id!==id||!pr.ti?.trim()) return pr; return{...pr,tasks:[...(pr.tasks||[]),{id:Date.now(),text:pr.ti.trim(),done:false}],ti:""}; }));
  const toggleTask=(pid,tid)=>setProjects(p=>p.map(pr=>pr.id===pid?{...pr,tasks:(pr.tasks||[]).map(t=>t.id===tid?{...t,done:!t.done}:t)}:pr));
  const filtered=filter==="all"?projects:projects.filter(p=>p.tag===filter);
  return (
    <div className="projwrap">
      <div className="irow">
        <input className="ifield" placeholder="New project name…" value={name}
          onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
        <button className="iplus" onClick={add}>+</button>
      </div>
      <div className="ptagrow">
        {tags.map(t=><button key={t} className={`ptbtn ${tag===t?tagActiveCls[t]:""}`} onClick={()=>setTag(t)}>{t[0].toUpperCase()+t.slice(1)}</button>)}
      </div>
      <div className="frow">
        {["all",...tags].map(f=><button key={f} className={`fbtn${filter===f?" a":""}`} onClick={()=>setFilter(f)}>{f[0].toUpperCase()+f.slice(1)}</button>)}
      </div>
      {filtered.length===0
        ?<div className="empty">No projects yet.<br/>Add one above to start your workspace.</div>
        :filtered.map((pr,i)=>(
          <div className="pcard" key={pr.id} style={{animationDelay:`${i*.05}s`}}>
            <div className="pctop">
              <span className="pctitle">{pr.name}</span>
              <span className={`pctag tg-${pr.tag}`}>{pr.tag}</span>
              <select className="pcstat" value={pr.status} style={{color:statusColor[pr.status]||"var(--muted)"}}
                onChange={e=>upd(pr.id,"status",e.target.value)}>
                {["To do","In progress","Done"].map(s=><option key={s}>{s}</option>)}
              </select>
              <button className="pcdel" onClick={()=>del(pr.id)}>✕</button>
            </div>
            <textarea className="pcnote" rows={2} placeholder="Notes & ideas…" value={pr.note}
              onChange={e=>upd(pr.id,"note",e.target.value)}/>
            <div className="pctasks">
              {(pr.tasks||[]).map(t=>(
                <div className="pcti" key={t.id}>
                  <div className={`pctick ${t.done?"on":""}`} onClick={()=>toggleTask(pr.id,t.id)}>{t.done?"✓":""}</div>
                  <span className={t.done?"pcstrike":""}>{t.text}</span>
                </div>
              ))}
              <div className="pcadd">
                <input className="pcinput" placeholder="Add a task…" value={pr.ti||""}
                  onChange={e=>upd(pr.id,"ti",e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&addTask(pr.id)}/>
                <button className="pcplus" onClick={()=>addTask(pr.id)}>+</button>
              </div>
            </div>
          </div>
        ))
      }
      <div className="spacer"/>
    </div>
  );
}

// ── APP ──
function App() {
  const [authed,setAuthed]         = useState(()=>AUTH.isValid());
  const [sessionToken,setSessionToken] = useState(()=>AUTH.getToken());
  const [tab,setTab]               = useState("today");
  const [habits,setHabits]         = useState(HABITS_DEF.map(h=>({...h,done:false,startTime:null})));
  const [habitTimes,setHabitTimes] = useState({});
  const [events,setEvents]         = useState([]);
  const [weekEvents,setWeekEvents] = useState([]);
  const [activities,setActs]       = useState(()=>LS.get("activities",[]));
  const [actInput,setActInput]     = useState("");
  const [synced,setSynced]         = useState(false);
  const [calLoad,setCalLoad]       = useState(false);
  const [weekCalLoad,setWkLoad]    = useState(false);
  const [weekTasks,setWeekTasks]   = useState(()=>LS.get("weekTasks",{}));
  const [focusItems,setFocusItems] = useState([]);
  const [projects,setProjects]     = useState(()=>LS.get("projects",[]));
  const [showAddEvent,setShowAddEvent] = useState(false);
  const [addingEvent,setAddingEvent]   = useState(false);
  // Quick bar state
  const [barInput,setBarInput]     = useState("");
  const [barReply,setBarReply]     = useState("");
  const [barLoading,setBarLoading] = useState(false);
  // Ref to Nova's send function
  const novaSendRef = useRef({ref:null});

  useEffect(()=>{ LS.set("activities",activities); },[activities]);
  useEffect(()=>{ LS.set("weekTasks",weekTasks); },[weekTasks]);
  useEffect(()=>{ LS.set("projects",projects); },[projects]);

  useEffect(()=>{ if(authed){ fetchToday(); fetchWeek(); } },[authed]);

  const fetchToday=async()=>{
    setCalLoad(true); setSynced(false);
    try{
      const today=dateKey(new Date());
      const data=await callAPI(
        [{role:"user",content:`Please list all events from my Google Calendar for today, ${today}. Return the result as a plain JSON array with objects containing: title (string), start (ISO datetime string), end (ISO datetime string). Return only the JSON array, nothing else.`}],
        {mcp_servers:[{type:"url",url:CAL_MCP,name:"gcal"}]}
      );
      const parsed=parseCalJSON(data);
      if(parsed.length>=0){
        setEvents(parsed.map((e,i)=>({...e,color:EVT_COLORS[i%EVT_COLORS.length]})));
        setSynced(true);
      }
    }catch(err){ console.error(err); }
    setCalLoad(false);
  };

  const fetchWeek=async()=>{
    setWkLoad(true);
    try{
      const s=new Date(); s.setDate(s.getDate()+1);
      const e=new Date(); e.setDate(e.getDate()+7);
      const data=await callAPI(
        [{role:"user",content:`Please list all events from my Google Calendar between ${dateKey(s)} and ${dateKey(e)} inclusive. Return a plain JSON array with objects: title (string), start (ISO datetime), end (ISO datetime). Only the JSON array, nothing else.`}],
        {max_tokens:3000, mcp_servers:[{type:"url",url:CAL_MCP,name:"gcal"}]}
      );
      const parsed=parseCalJSON(data);
      setWeekEvents(parsed.map((e,i)=>({...e,color:EVT_COLORS[i%EVT_COLORS.length]})));
    }catch{}
    setWkLoad(false);
  };

  const addEventToCalendar=async({title,date,time,duration_minutes})=>{
    setAddingEvent(true);
    try{
      const start=`${date}T${time||"09:00"}:00`;
      const end=new Date(new Date(start).getTime()+(duration_minutes||60)*60000).toISOString();
      await callAPI(
        [{role:"user",content:`Add a new event to my Google Calendar: title="${title}", start="${start}", end="${end}". Please create this event now.`}],
        {mcp_servers:[{type:"url",url:CAL_MCP,name:"gcal"}]}
      );
      setTimeout(()=>{ fetchToday(); fetchWeek(); },2000);
    }catch{}
    setAddingEvent(false);
    setShowAddEvent(false);
  };

  const handleAction=useCallback((tool,input)=>{
    switch(tool){
      case "mark_habit":
        setHabits(p=>p.map(h=>h.name.toLowerCase()===input.habit_name?.toLowerCase()?{...h,done:input.done}:h));
        return `${input.habit_name} marked ${input.done?"done":"undone"}`;
      case "log_activity":{
        setActs(p=>[{time:nowTime(),text:input.text},...p]); return `Logged: "${input.text}"`;
      }
      case "clear_log": setActs([]); return "Activity log cleared";
      case "navigate_to": setTab(input.tab); return `Switched to ${input.tab}`;
      case "add_project":
        setProjects(p=>[{id:Date.now(),name:input.name,tag:input.tag||"personal",status:"To do",note:"",tasks:[],ti:""},...p]);
        return `Project "${input.name}" added`;
      case "log_habit_time":
        setHabitTimes(p=>({...p,[input.habit_name]:Math.round(((p[input.habit_name]||input.minutes)+input.minutes)/2)}));
        return `Logged ${input.minutes}min for ${input.habit_name}`;
      case "add_calendar_event":
        addEventToCalendar(input);
        return `Adding "${input.title}" to calendar…`;
      case "add_week_task":
        setWeekTasks(p=>({...p,[input.date]:[...(p[input.date]||[]),{text:input.text,done:false}]}));
        return `Task added for ${input.date}`;
      case "set_focus":
        setFocusItems((input.items||[]).slice(0,3).map((t,i)=>({id:Date.now()+i,text:t,done:false})));
        return "Focus list updated";
      case "predict_schedule":
        return "Generating schedule prediction…";
      default: return null;
    }
  },[]);

  // Quick bar: lightweight Nova call without full chat context
  const sendBarMessage=async()=>{
    if(!barInput.trim()||barLoading) return;
    const msg=barInput.trim(); setBarInput(""); setBarLoading(true); setBarReply("");
    try{
      const done=habits.filter(h=>h.done).map(h=>h.name);
      const evts=events.map(e=>e.title).slice(0,3);
      const data=await callAPI(
        [{role:"user",content:`You are Nova, Demetri's assistant. Answer briefly (1-2 sentences max) or take action. Use tools if needed.
Context: habits done=${done.join(",")||"none"}, today=${evts.join(",")||"none"}, time=${nowTime()}
Message: ${msg}`}],
        {system:"You are Nova. Be extremely concise — 1-2 sentences. Use tools when action is implied.",tools:TOOLS}
      );
      const tooluse=(data.content||[]).filter(b=>b.type==="tool_use");
      const acts=[]; for(const t of tooluse){const r=handleAction(t.name,t.input);if(r)acts.push(r);}
      const reply=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      setBarReply(reply||(acts.length?acts.join(" · "):"Done!"));
    }catch{ setBarReply("Something went wrong."); }
    setBarLoading(false);
  };

  const toggleHabit=id=>setHabits(p=>p.map(h=>{
    if(h.id!==id) return h;
    if(!h.done){
      if(h.startTime){ const m=Math.round((Date.now()-h.startTime)/60000); if(m>1&&m<600) setHabitTimes(prev=>({...prev,[h.name]:Math.round(((prev[h.name]||m)+m)/2)})); }
      return{...h,done:true,startTime:null};
    }
    return{...h,done:false,startTime:Date.now()};
  }));

  const addActivity=()=>{ if(!actInput.trim()) return; setActs(p=>[{time:nowTime(),text:actInput.trim()},...p]); setActInput(""); };

  if(!authed) return <><style>{css}</style><Login onLogin={(tok)=>{ setAuthed(true); setSessionToken(tok); }}/></>;

  const done=habits.filter(h=>h.done).length;
  const pct=Math.round((done/habits.length)*100);
  const tLabel={soon:"Soon",later:"Later",done:"Done"};
  const tCls={soon:"t-soon",later:"t-later",done:"t-done"};
  const showBar = tab!=="nova"; // bar hidden on Nova tab since it has its own input

  return (
    <>
      <style>{css}</style>
      {showAddEvent&&<AddEventModal onSave={addEventToCalendar} onClose={()=>setShowAddEvent(false)} adding={addingEvent}/>}

      <div className="shell">
        <div className="hd">
          <div><div className="hd-g">{greeting()}</div><div className="hd-n">Demetri</div></div>
          <div className="hd-r">
            <div className="hd-d">{fmtDate()}</div>
            <button className="lockbtn" onClick={async()=>{
            await callWorker("logout",{},{token:sessionToken}).catch(()=>{});
            AUTH.clear(); setAuthed(false); setSessionToken(null);
          }}>Lock</button>
          </div>
        </div>

        <div className="pw">
          <div className="pr"><span className="pl">Today's progress</span><span className="pp">{pct}%</span></div>
          <div className="pt"><div className="pf" style={{width:`${pct}%`}}/></div>
          <div className="pst">
            <div className="psi"><b>{done}/{habits.length}</b> habits</div>
            <div className="psi"><b>{events.length}</b> events</div>
            <div className="psi"><b>{activities.length}</b> logged</div>
            <div className="psi"><b>{projects.length}</b> projects</div>
          </div>
        </div>

        {/* ── TODAY ── */}
        {tab==="today"&&(<>
          <NovaSummary habits={habits} events={events} activities={activities} habitTimes={habitTimes}/>

          <FocusList items={focusItems} setItems={setFocusItems}/>

          <div className="sec">
            <div className="sh">
              <span className="stitle">Calendar</span>
              <div className="sbtn-row">
                <button className="sbtn" onClick={()=>setShowAddEvent(true)}>+ Event</button>
                <button className="sbtn" onClick={fetchToday}>{calLoad?"…":"Refresh"}</button>
              </div>
            </div>
            {synced&&<div className="syncbar"><div className="sdot"/>Synced with Google Calendar</div>}
            {calLoad&&<div className="empty">Fetching events…</div>}
            {!calLoad&&!synced&&<div className="empty">Calendar not connected.<br/>Tap Refresh to try again.</div>}
            {!calLoad&&synced&&events.length===0&&<div className="empty">No events today — enjoy the free day!</div>}
            {events.map((ev,i)=>{
              const s=evStatus(ev.start);
              return(
                <div className="ev" key={i} style={{animationDelay:`${i*.05}s`}}>
                  <div className="edot" style={{background:ev.color}}/>
                  <div className="ebody">
                    <div className="etitle">{ev.title}</div>
                    <div className="etime">{fmtTime(ev.start)}{ev.end?` – ${fmtTime(ev.end)}`:""}</div>
                  </div>
                  <div className={`etag ${tCls[s]}`}>{tLabel[s]}</div>
                </div>
              );
            })}
          </div>

          <div className="sec">
            <div className="sh"><span className="stitle">Habits</span></div>
            {habits.map(h=>(
              <div key={h.id} className={`hab ${h.done?"on":""}`} onClick={()=>toggleHabit(h.id)}>
                <div className="hico">{h.icon}</div>
                <div className="hbody">
                  <div className="hname">{h.name}</div>
                  <div className="hstr">🔥 <b>{h.streak+(h.done?1:0)} day streak</b></div>
                </div>
                {habitTimes[h.name]&&<span className="havg">~{habitTimes[h.name]}min</span>}
                <div className="hck">{h.done?"✓":""}</div>
              </div>
            ))}
          </div>
          <div className="spacer"/>
        </>)}

        {/* ── WEEK ── */}
        {tab==="week"&&(
          <div className="sec">
            <div className="sh">
              <span className="stitle">Upcoming Week</span>
              <div className="sbtn-row">
                <button className="sbtn" onClick={()=>setShowAddEvent(true)}>+ Event</button>
                <button className="sbtn" onClick={fetchWeek}>{weekCalLoad?"Syncing…":"↻ Sync"}</button>
              </div>
            </div>
            {weekCalLoad&&<div className="syncbar"><div className="sdot"/>Syncing calendar…</div>}
            {!weekCalLoad&&weekEvents.length>0&&<div className="syncbar"><div className="sdot"/>{weekEvents.length} events synced from Google Calendar</div>}
            {!weekCalLoad&&weekEvents.length===0&&<div className="empty" style={{padding:"8px 0"}}>No events found — tap ↻ Sync to fetch.</div>}
            <WeekView weekTasks={weekTasks} setWeekTasks={setWeekTasks} weekEvents={weekEvents} weekCalLoad={weekCalLoad}/>
            <div className="spacer"/>
          </div>
        )}

        {/* ── NOVA ── */}
        {tab==="nova"&&(
          <NovaChat
            habits={habits} events={events} weekEvents={weekEvents}
            activities={activities} projects={projects} habitTimes={habitTimes}
            onAction={handleAction} onSendFromBar={novaSendRef.current}/>
        )}

        {/* ── LOG ── */}
        {tab==="log"&&(
          <div className="sec">
            <div className="sh">
              <span className="stitle">Activity Log</span>
              {activities.length>0&&<button className="sbtn" onClick={()=>setActs([])}>Clear</button>}
            </div>
            <div className="irow">
              <input className="ifield" placeholder="What did you just do?" value={actInput}
                onChange={e=>setActInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addActivity()}/>
              <button className="iplus" onClick={addActivity}>+</button>
            </div>
            {activities.length===0
              ?<div className="empty">Nothing logged yet.<br/>Start tracking your day above.</div>
              :activities.map((a,i)=>(
                <div className="logitem" key={i} style={{animationDelay:`${i*.04}s`}}>
                  <span className="logtime">{a.time}</span>
                  <span className="logtxt">{a.text}</span>
                </div>
              ))
            }
            <div className="spacer"/>
          </div>
        )}

        {/* ── PROJECTS ── */}
        {tab==="projects"&&<Projects projects={projects} setProjects={setProjects}/>}

        {/* ── NOVA QUICK BAR (hidden on Nova tab) ── */}
        {showBar&&(
          <div className="nova-bar">
            <div className="nova-bar-av">✦</div>
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:"4px"}}>
              {barReply&&<div className="nova-bar-reply">{barReply}</div>}
              <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                <input className="nova-bar-input" placeholder="Ask Nova…"
                  value={barInput} onChange={e=>setBarInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&sendBarMessage()}/>
                <button className="nova-bar-send" onClick={sendBarMessage} disabled={!barInput.trim()||barLoading}>
                  {barLoading?"…":"↑"}
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ── NAV ── */}
        <div className="nav">
          {TABS.map(n=>(
            <button key={n.id} className={`nbtn ${tab===n.id?"a":""}`} onClick={()=>setTab(n.id)}>
              <span className="nico">{n.ico}</span>
              <span className="nlbl">{n.lbl}</span>
            </button>
          ))}
        </div>
      </div>
    </>
  );
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
