// ── AUTH ──
const AUTH = {
  isValid: () => {
    const t=LS.get("session_token",null), e=LS.get("session_expiry",null);
    return !!(t && e && new Date(e) > new Date());
  },
  save:  (token,expiresAt) => { LS.set("session_token",token); LS.set("session_expiry",expiresAt); },
  clear: () => { LS.del("session_token"); LS.del("session_expiry"); },
  token: () => LS.get("session_token",null),
};

// ── TOTP (2FA) ──
const TOTP = {
  generateSecret: () => { const c='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567'; let s=''; for(let i=0;i<32;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; },
  b32decode: s => { const c='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567'; let bits=0,val=0; const out=[]; for(const ch of s.toUpperCase().replace(/=+$/,'')){ val=(val<<5)|c.indexOf(ch); bits+=5; if(bits>=8){bits-=8;out.push((val>>bits)&0xff);}} return new Uint8Array(out); },
  hmacSHA1: async (k,m) => { const key=await crypto.subtle.importKey('raw',k,{name:'HMAC',hash:'SHA-1'},false,['sign']); return new Uint8Array(await crypto.subtle.sign('HMAC',key,m)); },
  generate: async secret => {
    const ctr=Math.floor(Date.now()/1000/30), msg=new ArrayBuffer(8), v=new DataView(msg);
    v.setUint32(4,ctr,false);
    const h=await TOTP.hmacSHA1(TOTP.b32decode(secret),new Uint8Array(msg));
    const off=h[h.length-1]&0x0f;
    return String(((h[off]&0x7f)<<24|h[off+1]<<16|h[off+2]<<8|h[off+3])%1000000).padStart(6,'0');
  },
  verify: async (secret,token) => {
    const ctr=Math.floor(Date.now()/1000/30);
    for(let d=-1;d<=1;d++){
      const msg=new ArrayBuffer(8); new DataView(msg).setUint32(4,ctr+d,false);
      const h=await TOTP.hmacSHA1(TOTP.b32decode(secret),new Uint8Array(msg));
      const off=h[h.length-1]&0x0f;
      if(String(((h[off]&0x7f)<<24|h[off+1]<<16|h[off+2]<<8|h[off+3])%1000000).padStart(6,'0')===token) return true;
    }
    return false;
  },
  otpauthUrl: (s,l='Nova Dashboard',i='Nova') => `otpauth://totp/${encodeURIComponent(i)}:${encodeURIComponent(l)}?secret=${s}&issuer=${encodeURIComponent(i)}&algorithm=SHA1&digits=6&period=30`,
};

// ── PUSH ──
const PUSH = {
  ok:      () => 'serviceWorker' in navigator && 'Notification' in window,
  perm:    () => PUSH.ok() ? Notification.permission : 'unsupported',
  request: async () => { if(!PUSH.ok()) return 'unsupported'; return Notification.requestPermission(); },
  regSW:   async () => {
    if(!('serviceWorker' in navigator)) return null;
    try { return await navigator.serviceWorker.register('./sw.js',{scope:'/Nova-Dashboard/'}); } catch(e){ console.warn('SW:',e); return null; }
  },
  scheduleAll: async events => {
    if(!('serviceWorker' in navigator)) return;
    const reg = await navigator.serviceWorker.ready.catch(()=>null);
    reg?.active?.postMessage({ type:'SCHEDULE_ALL', events });
  },
  sendRecap: async (events,summary) => {
    if(!('serviceWorker' in navigator)||PUSH.perm()!=='granted') return;
    const reg = await navigator.serviceWorker.ready.catch(()=>null);
    reg?.active?.postMessage({ type:'SHOW_RECAP', events, summary });
  },
};

// ── API CALLS ──
const callWorker = async (action, payload={}, retries=1) => {
  const headers = {"Content-Type":"application/json"};
  const t = AUTH.token();
  if(t) headers["X-Session-Token"] = t;
  let lastErr = null;
  for(let i=0; i<=retries; i++){
    try{
      const controller = new AbortController();
      const timeout = setTimeout(()=>controller.abort(), 20000);
      const res = await fetch(API,{
        method:"POST", headers,
        body:JSON.stringify({action,...payload}),
        signal: controller.signal,
      });
      clearTimeout(timeout);
      // Always parse JSON — even error responses have useful info
      const data = await res.json().catch(()=>({error:`HTTP ${res.status} (no body)`}));
      return data;
    }catch(e){
      lastErr = e.name==="AbortError" ? new Error("Request timed out — check your connection") : e;
      if(i<retries) await new Promise(r=>setTimeout(r,1500));
    }
  }
  throw lastErr;
};

// ── MARKDOWN RENDERER ──
function renderMarkdown(text) {
  if (!text) return "";
  const lines = text.split("\n");
  const out = [];
  let listItems = [];
  let listType = null;

  const flushList = () => {
    if (!listItems.length) return;
    const tag = listType === "ul" ? "ul" : "ol";
    out.push(`<${tag} style="margin:6px 0 6px 18px;padding:0;">${listItems.join("")}</${tag}>`);
    listItems = []; listType = null;
  };

  const inline = s => s
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.*?)\*/g,"<em>$1</em>")
    .replace(/`(.*?)`/g,'<code style="background:rgba(255,255,255,.1);border-radius:3px;padding:1px 4px;font-size:12px;font-family:monospace;">$1</code>');

  for (const raw of lines) {
    const line = raw.trimEnd();
    const bullet   = line.match(/^[\s]*[-•*]\s+(.+)/);
    const numbered = line.match(/^[\s]*\d+\.\s+(.+)/);
    const h2 = line.match(/^#{1,2}\s+(.+)/);
    const h3 = line.match(/^###\s+(.+)/);

    if (bullet) {
      if (listType !== "ul") { flushList(); listType = "ul"; }
      listItems.push(`<li style="margin:2px 0;line-height:1.55;">${inline(bullet[1])}</li>`);
    } else if (numbered) {
      if (listType !== "ol") { flushList(); listType = "ol"; }
      listItems.push(`<li style="margin:2px 0;line-height:1.55;">${inline(numbered[1])}</li>`);
    } else if (h3) {
      flushList();
      out.push(`<p style="font-size:13px;font-weight:600;margin:8px 0 3px;">${inline(h3[1])}</p>`);
    } else if (h2) {
      flushList();
      out.push(`<p style="font-size:14px;font-weight:600;margin:8px 0 3px;">${inline(h2[1])}</p>`);
    } else if (line.trim() === "") {
      flushList();
      if (out.length) out.push('<p style="margin:3px 0;"></p>');
    } else {
      flushList();
      out.push(`<p style="margin:2px 0;line-height:1.55;">${inline(line)}</p>`);
    }
  }
  flushList();
  return out.join("");
}

  /* SECTION */
  .sec{padding:22px 24px 0;}
  .sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .stitle{font-size:11px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted);}
  .sbtn{font-size:12px;color:var(--muted);background:none;border:1px solid var(--b1);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit;transition:all .15s;}
  .sbtn:hover{color:var(--soft);border-color:var(--b2);}
  .sbtn-row{display:flex;gap:6px;}

  /* SYNC BAR */
  .syncbar{display:flex;align-items:center;gap:8px;font-size:12px;color:#22c55e;background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);border-radius:9px;padding:8px 13px;margin-bottom:10px;}
  .sdot{width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0;animation:pulse 2.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* EVENTS */
  .ev{background:var(--card);border:1px solid var(--b1);border-radius:12px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:13px;transition:border-color .15s;animation:up .3s ease both;}
  @keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .ev:hover{border-color:var(--b2);}
  .edot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .ebody{flex:1;min-width:0;}
  .etitle{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
  .etime{font-size:12px;color:var(--muted);}
  .etag{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;flex-shrink:0;}
  .t-soon{background:rgba(248,113,113,.12);color:var(--red);}
  .t-later{background:rgba(96,165,250,.12);color:var(--blue);}
  .t-done{background:rgba(74,222,128,.1);color:var(--green);}

  /* WEEK */
  .wday{background:var(--card);border:1px solid var(--b1);border-radius:12px;margin-bottom:8px;overflow:hidden;animation:up .3s ease both;}
  .wdh{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;}
  .wdh:hover{background:rgba(255,255,255,.02);}
  .wdhl{display:flex;align-items:center;gap:10px;}
  .wdow{font-size:14px;font-weight:500;}
  .wdate{font-size:12px;color:var(--muted);}
  .wcount{font-size:11px;color:var(--muted);}
  .wcount.has{color:var(--blue);}
  .wbody{padding:0 16px 4px;}
  .witem{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--b1);}
  .wdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .wtime{font-size:11px;color:var(--muted);flex-shrink:0;min-width:44px;}
  .wtxt{font-size:13px;color:var(--soft);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .wck{width:16px;height:16px;border-radius:50%;border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;cursor:pointer;transition:all .2s;flex-shrink:0;}
  .wck.on{background:#22c55e;border-color:#22c55e;color:var(--bg);}
  .wadd{display:flex;align-items:center;gap:8px;padding:8px 16px;border-top:1px solid var(--b1);}
  .winput{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:13px;color:var(--text);}
  .winput::placeholder{color:var(--muted);}
  .wplus{font-size:18px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0 2px;}

  /* LOG */
  .irow{display:flex;gap:8px;margin-bottom:14px;}
  .ifield{flex:1;background:var(--card);border:1px solid var(--b1);border-radius:10px;padding:12px 14px;font-family:inherit;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;}
  .ifield:focus{border-color:var(--b2);}
  .ifield::placeholder{color:var(--muted);}
  .iplus{width:44px;height:44px;border-radius:10px;background:var(--nova);border:none;cursor:pointer;font-size:20px;color:#fff;font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .iplus:hover{opacity:.85;}
  .logitem{display:flex;gap:12px;padding:11px 14px;background:var(--card);border:1px solid var(--b1);border-radius:10px;margin-bottom:7px;animation:up .25s ease both;align-items:flex-start;}
  .logtime{font-size:11px;color:var(--muted);flex-shrink:0;padding-top:2px;min-width:42px;}
  .logtxt{font-size:13px;color:var(--soft);line-height:1.4;flex:1;}
  .logdel{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;opacity:0;flex-shrink:0;padding:0 2px;}
  .logitem:hover .logdel{opacity:.6;}

  /* NOVA CHAT ── full layout */
  .nova-page{display:flex;flex-direction:column;height:calc(100vh - 68px);position:relative;}
  .nova-sidebar-toggle{position:absolute;top:0;left:0;z-index:10;background:none;border:none;cursor:pointer;padding:8px;color:var(--muted);font-size:18px;}
  .nova-sidebar-toggle:hover{color:var(--text);}
  .nova-sidebar{position:absolute;top:0;left:0;bottom:0;width:260px;background:var(--surf);border-right:1px solid var(--b1);z-index:20;display:flex;flex-direction:column;overflow:hidden;transform:translateX(-100%);transition:transform .25s ease;}
  .nova-sidebar.open{transform:translateX(0);}
  .nova-sidebar-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:15;display:none;}
  .nova-sidebar-overlay.open{display:block;}
  .nova-sidebar-hd{padding:14px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;}
  .nova-sidebar-title{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
  .nova-sidebar-close{font-size:18px;color:var(--muted);background:none;border:none;cursor:pointer;}
  .nova-sidebar-list{flex:1;overflow-y:auto;padding:10px 12px;}
  .nova-sidebar-list::-webkit-scrollbar{width:3px;}
  .nova-sidebar-list::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}
  .nova-sess-item{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:6px;border:1px solid transparent;transition:border-color .15s;}
  .nova-sess-item:hover{background:var(--card);border-color:var(--b1);}
  .nova-sess-item.active{background:var(--nova-bg);border-color:var(--nova-border);}
  .nova-sess-id{font-size:11px;font-weight:600;color:var(--soft);margin-bottom:3px;}
  .nova-sess-preview{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .nova-sess-cont{font-size:10px;color:var(--nova);margin-top:3px;}

  .novawrap{display:flex;flex-direction:column;flex:1;overflow:hidden;}
  .novahd{padding:14px 16px 0;display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .novaav{width:34px;height:34px;border-radius:50%;background:var(--nova);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
  .novanm{font-size:15px;font-weight:600;}
  .novast{font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;}
  .novastd{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite;}
  .chatmsgs{flex:1;overflow-y:auto;padding:0 16px;display:flex;flex-direction:column;gap:10px;}
  .chatmsgs::-webkit-scrollbar{width:4px;}
  .chatmsgs::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px;}
  .msg{display:flex;flex-direction:column;animation:up .25s ease both;max-width:86%;min-width:0;}
  .msg.u{align-self:flex-end;align-items:flex-end;}
  .msg.n{align-self:flex-start;align-items:flex-start;}
  .mbub{padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.55;word-break:break-word;overflow-wrap:break-word;min-width:0;}
  .mbub *{max-width:100%;word-break:break-word;}
  .msg.u .mbub{background:var(--nova);color:#fff;border-bottom-right-radius:4px;}
  .msg.n .mbub{background:var(--card);border:1px solid var(--b1);color:var(--soft);border-bottom-left-radius:4px;}
  .mtime{font-size:10px;color:var(--muted);margin-top:4px;padding:0 4px;}
  .apill{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:var(--nova-bg);border:1px solid var(--nova-border);color:var(--nova2);border-radius:20px;padding:4px 10px;margin-top:6px;}
  .chatia{padding:10px 16px 0;display:flex;gap:8px;align-items:flex-end;}
  .chatinput{flex:1;background:var(--card);border:1px solid var(--b1);border-radius:12px;padding:12px 14px;font-family:inherit;font-size:14px;color:var(--text);outline:none;resize:none;min-height:46px;max-height:120px;line-height:1.4;}
  .chatinput:focus{border-color:var(--b2);}
  .chatinput::placeholder{color:var(--muted);}
  .csend{width:44px;height:44px;border-radius:10px;background:var(--nova);border:none;cursor:pointer;font-size:18px;color:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .csend:hover{opacity:.85;}
  .csend:disabled{opacity:.3;cursor:default;}
  .micbtn{width:44px;height:44px;border-radius:10px;background:var(--surf);border:1px solid var(--b1);cursor:pointer;font-size:18px;color:var(--soft);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .micbtn:hover{border-color:var(--b2);color:var(--text);}
  .micbtn.rec{background:rgba(248,113,113,.12);border-color:var(--red);color:var(--red);}

  /* ADD EVENT MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px;}
  .modal{background:var(--surf);border:1px solid var(--b2);border-radius:16px;padding:24px;width:100%;max-width:360px;}
  .modal-title{font-size:16px;font-weight:600;margin-bottom:18px;}
  .mfield{width:100%;background:var(--card);border:1px solid var(--b1);border-radius:10px;padding:11px 14px;font-family:inherit;font-size:14px;color:var(--text);outline:none;margin-bottom:10px;}
  .mfield:focus{border-color:var(--b2);}
  .mfield::placeholder{color:var(--muted);}
  .mrow{display:flex;gap:8px;}
  .mbtnrow{display:flex;gap:8px;margin-top:6px;}
  .mok{flex:1;background:#fff;color:#111;border:none;border-radius:10px;padding:11px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}
  .mok:hover{opacity:.88;}
  .mcancel{flex:1;background:none;color:var(--soft);border:1px solid var(--b1);border-radius:10px;padding:11px;font-family:inherit;font-size:14px;cursor:pointer;}
  .mcancel:hover{border-color:var(--b2);color:var(--text);}

  /* PROJECTS */
  .projwrap{padding:22px 24px 0;}
  .ptagrow{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .ptbtn{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--b1);background:none;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s;}
  .ptbtn.ap{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.3);color:var(--blue);}
  .ptbtn.ac{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.3);color:var(--nova);}
  .ptbtn.aw{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3);color:var(--amber);}
  .frow{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .fbtn{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--b1);background:none;color:var(--muted);cursor:pointer;font-family:inherit;}
  .fbtn.a{background:var(--surf);border-color:var(--b2);color:var(--text);}
  .pcard{background:var(--card);border:1px solid var(--b1);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,transform .15s;animation:up .3s ease both;position:relative;overflow:hidden;}
  .pcard::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
  .pcard.tag-personal::before{background:var(--blue);}
  .pcard.tag-creative::before{background:var(--nova);}
  .pcard.tag-work::before{background:var(--amber);}
  .pcard:hover{border-color:var(--b2);transform:translateY(-1px);}
  .pcard.active{border-color:var(--nova);}
  .pctop{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-left:6px;}
  .pctitle{font-size:14px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
  .pctag{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:500;flex-shrink:0;}
  .tg-personal{background:rgba(96,165,250,.1);color:var(--blue);}
  .tg-creative{background:rgba(167,139,250,.1);color:var(--nova);}
  .tg-work{background:rgba(251,191,36,.1);color:var(--amber);}
  .pstatus{font-size:11px;font-weight:500;padding:2px 10px;border-radius:20px;flex-shrink:0;}
  .ps-todo{background:rgba(107,107,128,.12);color:var(--muted);}
  .ps-progress{background:rgba(245,158,11,.1);color:var(--amber);}
  .ps-done{background:rgba(34,197,94,.1);color:var(--green);}
  .proj-progress{padding-left:6px;margin-bottom:8px;}
  .proj-progress-bar{height:3px;background:var(--b1);border-radius:99px;overflow:hidden;margin-top:4px;}
  .proj-progress-fill{height:100%;border-radius:99px;transition:width .4s ease;}
  .proj-progress-label{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;}
  .popen{font-size:11px;color:var(--nova);background:var(--nova-bg);border:1px solid var(--nova-border);border-radius:20px;padding:3px 10px;white-space:nowrap;flex-shrink:0;}
  .pcdel{font-size:14px;color:var(--muted);background:none;border:none;cursor:pointer;opacity:0;flex-shrink:0;padding:2px 4px;}
  .pcard:hover .pcdel{opacity:1;}
  .pcnote{width:100%;background:var(--surf);border:1px solid var(--b1);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:12px;color:var(--soft);outline:none;resize:none;margin-top:2px;line-height:1.5;}
  .pcnote:focus{border-color:var(--b2);}
  .pcnote::placeholder{color:var(--muted);}
  .pctasks{margin-top:8px;border-top:1px solid var(--b1);padding-top:8px;}
  .pcti{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;color:var(--soft);border-bottom:1px solid var(--b1);}
  .pctick{width:15px;height:15px;border-radius:50%;border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;cursor:pointer;flex-shrink:0;}
  .pctick.on{background:#22c55e;border-color:#22c55e;color:var(--bg);}
  .pcstrike{text-decoration:line-through;color:var(--muted);}
  .pcadd{display:flex;gap:6px;margin-top:6px;}
  .pcinput{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:12px;color:var(--text);border-bottom:1px solid var(--b1);padding:4px 0;}
  .pcinput::placeholder{color:var(--muted);}
  .pcplus{font-size:17px;color:var(--muted);background:none;border:none;cursor:pointer;}
  .proj-stats{display:flex;gap:8px;margin-bottom:16px;}
  .proj-stat{flex:1;background:var(--card);border:1px solid var(--b1);border-radius:10px;padding:10px;text-align:center;}
  .proj-stat-val{font-size:18px;font-weight:600;margin-bottom:2px;}
  .proj-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .proj-empty{text-align:center;padding:40px 24px;color:var(--muted);}
  .proj-empty-icon{font-size:32px;margin-bottom:12px;}
  .proj-empty-title{font-size:15px;font-weight:500;color:var(--soft);margin-bottom:6px;}

  /* SETTINGS */
  .settings-modal{background:var(--surf);border:1px solid var(--b2);border-radius:20px;padding:28px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;}
  .settings-modal::-webkit-scrollbar{width:4px;}
  .settings-modal::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px;}
  .settings-section{margin-bottom:24px;}
  .settings-section-title{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--b1);}
  .settings-row:last-child{border-bottom:none;}
  .settings-row-label{font-size:14px;color:var(--text);}
  .settings-row-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .qr-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:16px 0;}
  .qr-box{background:#fff;border-radius:12px;padding:12px;display:inline-block;}
  .secret-display{font-family:monospace;font-size:13px;letter-spacing:2px;background:var(--b1);border:1px solid var(--b2);border-radius:8px;padding:8px 14px;color:var(--soft);word-break:break-all;text-align:center;}
  .totp-steps{font-size:12px;color:var(--muted);line-height:1.7;}
  .totp-steps li{margin-left:16px;margin-bottom:4px;}
  .totp-verify-row{display:flex;gap:8px;margin-top:10px;}
  .totp-input{flex:1;background:var(--card);border:1px solid var(--b1);border-radius:10px;padding:10px 14px;font-family:monospace;font-size:18px;color:var(--text);outline:none;text-align:center;letter-spacing:4px;}
  .totp-input:focus{border-color:var(--nova);}
  .totp-verify-btn{background:var(--nova);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}
  .totp-active-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--green);background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:20px;padding:4px 12px;}

  /* MISC */
  .dots{display:flex;gap:4px;padding:3px 0;}
  .dot{width:4px;height:4px;border-radius:50%;background:var(--muted);animation:bounce 1.2s ease-in-out infinite;}
  .dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:20px 0;line-height:1.6;}
  .spacer{height:80px;}

  /* INBOX */
  .inbox-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s;}
  .inbox-dot-scanning{background:var(--amber);animation:inboxPulse 1s ease-in-out infinite;}
  .inbox-dot-done{background:var(--green);}
  .inbox-dot-error{background:var(--red);}
  @keyframes inboxPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
  .inbox-skel{height:9px;background:var(--surf);border-radius:4px;animation:inboxShim 1.4s ease infinite;}
  @keyframes inboxShim{0%,100%{opacity:.3}50%{opacity:.7}}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

  /* NAV */
  .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:rgba(17,17,17,.97);backdrop-filter:blur(20px);border-top:1px solid var(--b1);display:flex;padding:10px 12px 24px;gap:4px;z-index:50;}
  .nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:10px;cursor:pointer;background:none;border:1px solid transparent;color:var(--muted);font-family:inherit;transition:all .15s;}
  .nbtn.a{color:var(--text);background:var(--surf);border-color:var(--b2);}
  .nico{font-size:16px;line-height:1;}
  .nlbl{font-size:9px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;}

  /* ── DESKTOP (768px+) ── */
  @media(min-width:768px){
    body{overflow:hidden;height:100vh;}
    .shell{max-width:100%;height:100vh;overflow:hidden;}
    .hd{padding:0;background:var(--surf);border-bottom:1px solid var(--b1);height:52px;display:flex;align-items:center;padding:0 24px;flex-shrink:0;}
    .hd-g{display:none;}
    .hd-n{font-size:16px;font-weight:600;}
    .hd-r{flex-direction:row;align-items:center;gap:12px;margin-left:auto;}
    .hd-d{margin-bottom:0;font-size:12px;}
    .hd-btns{flex-wrap:nowrap;}
    .desktop-tabs{display:flex;align-items:center;gap:2px;margin-left:28px;}
    .dtab{font-size:12px;font-weight:500;color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;border:none;background:none;font-family:inherit;transition:all .15s;}
    .dtab:hover{color:var(--text);background:var(--card);}
    .dtab.a{color:var(--text);background:var(--card);border:1px solid var(--b2);border-bottom:2px solid var(--nova);}
    .nav{display:none;}
    .cal-progress{display:none;}
    .desktop-body{display:grid;grid-template-columns:1fr 1fr 380px;grid-template-rows:1fr 1fr;gap:12px;padding:12px;flex:1;overflow:hidden;height:calc(100vh - 52px);}

function Login({ onLogin }) {
  const [pw,setPw]         = useState("");
  const [totp,setTotp]     = useState("");
  const [err,setErr]       = useState("");
  const [loading,setLoading] = useState(false);
  const [step,setStep]     = useState("password"); // "password" | "totp"
  const [preToken,setPreToken] = useState("");

  const goPassword = async () => {
    if(!pw.trim()||loading) return;
    setLoading(true); setErr("");
    try {
      const d = await callWorker("login", { password: pw });
      if(d.requiresTOTP && d.preToken) {
        setPreToken(d.preToken);
        setStep("totp");
      } else if(d.token) {
        AUTH.save(d.token, d.expiresAt); onLogin(d.token);
      } else {
        setErr(d.error || "Incorrect password.");
      }
    } catch { setErr("Connection error."); }
    setPw(""); setLoading(false);
  };

  const goTOTP = async () => {
    if(totp.length !== 6 || loading) return;
    setLoading(true); setErr("");
    try {
      const d = await callWorker("verify_totp", { preToken, totpCode: totp });
      if(d.token) {
        AUTH.save(d.token, d.expiresAt); onLogin(d.token);
      } else {
        setErr(d.error || "Incorrect code.");
      }
    } catch { setErr("Connection error."); }
    setTotp(""); setLoading(false);
  };

  if(step === "totp") return(
    <div className="lw"><div className="lb">
      <div className="lt">Two-factor auth</div>
      <div className="ls">Enter the 6-digit code from your authenticator app.</div>
      <label className="fl">Authenticator Code</label>
      <input className="fi" type="text" inputMode="numeric" placeholder="000000" maxLength={6}
        value={totp} onChange={e=>{setTotp(e.target.value.replace(/\D/g,""));setErr("");}}
        onKeyDown={e=>e.key==="Enter"&&goTOTP()} autoFocus style={{letterSpacing:"6px",fontSize:"22px",textAlign:"center"}}/>
      <button className="lbtn" onClick={goTOTP} style={{opacity:loading?.7:1}}>{loading?"Verifying…":"Verify"}</button>
      {err&&<div className="lerr">{err}</div>}
      <button onClick={()=>{setStep("password");setErr("");setPreToken("");}} style={{marginTop:"12px",background:"none",border:"none",color:"var(--muted)",fontSize:"12px",cursor:"pointer",fontFamily:"inherit"}}>← Back to password</button>
    </div></div>
  );

  return(
    <div className="lw"><div className="lb">
      <div className="lt">Welcome back, Demetri.</div>
      <div className="ls">Enter your password to continue.</div>
      <label className="fl">Password</label>
      <input className="fi" type="password" placeholder="••••••••••" value={pw}
        onChange={e=>{setPw(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&goPassword()} autoFocus/>
      <button className="lbtn" onClick={goPassword} style={{opacity:loading?.7:1}}>{loading?"Signing in…":"Sign in"}</button>
      {err&&<div className="lerr">{err}</div>}
    </div></div>
  );
}

// ── CALENDAR PROGRESS (replaces habits) ──
function CalendarProgress({ events, completedEvents, onToggle, novaMotivation }) {
  const total = events.length;
  const done  = events.filter(e=>completedEvents.has(e.id||e.title)).length;
  const pct   = total>0 ? Math.round((done/total)*100) : 0;
  const allDone = total>0 && done===total;

  return(
    <div className="cal-progress">
      <div className="cal-prog-hd">
        <span className="cal-prog-label">{allDone?"🎉 All done for today!":"Today's schedule"}</span>
        <span className="cal-prog-pct">{total>0?`${pct}%`:""}</span>
      </div>
      <div className="cal-prog-bar">
        <div className={`cal-prog-fill${allDone?" done":""}`} style={{width:`${total>0?pct:0}%`}}/>
      </div>
      {total===0 ? (
        <div className="cal-empty">
          <div className="cal-empty-msg">No events today</div>
          {novaMotivation&&<div className="cal-nova-msg">✦ {novaMotivation}</div>}
        </div>
      ) : (
        <div className="cal-tasks">
          {events.map((ev,i)=>{
            const key=ev.id||ev.title;
            const isDone=completedEvents.has(key);
            return(
              <div key={i} className={`cal-task${isDone?" done":""}`} onClick={()=>onToggle(key)}>
                <div className="cal-task-ck">{isDone?"✓":""}</div>
                <div className="cal-task-body">
                  <div className="cal-task-title">{ev.title}</div>
                  <div className="cal-task-time">{fmtTime(ev.start)}{ev.end?` – ${fmtTime(ev.end)}`:""}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── NOVA SUMMARY ──
function NovaSummary({ events, activities, completedEvents }) {
  const [text,setText]=useState(""); const [eta,setEta]=useState(""); const [load,setLoad]=useState(false);
  const run=useCallback(async()=>{
    setLoad(true); setText(""); setEta("");
    try{
      const done=events.filter(e=>completedEvents.has(e.id||e.title)).map(e=>e.title);
      const rem=events.filter(e=>!completedEvents.has(e.id||e.title)).map(e=>`${e.title}${e.start?" at "+fmtTime(e.start):""}`);
      const logs=activities.slice(0,4).map(a=>`${a.time}:${a.text}`);
      const d=await callAPI([{role:"user",content:`You are Nova. Warm brief daily summary (3-4 sentences): what's done, what's left, one tip. End exactly with: ETA: [time or "All done!"]
Time:${new Date().toLocaleTimeString()} | ${fmtDate()}
Done:${done.join(",")||"none"} | Remaining:${rem.join(",")||"all done!"}
Log:${logs.join(";")||"empty"}`}]);
      const full=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      const m=full.match(/ETA:\s*(.+)/i);
      if(m){setEta(m[1].trim());setText(full.replace(/ETA:\s*.+/i,"").trim());}else setText(full);
    }catch{}
    setLoad(false);
  },[events,activities,completedEvents]);
  useEffect(()=>{run();},[]);
  return(
    <div className="nsum">
      <div className="nst"><div className="nav2">✦</div><span className="nlbl">Nova · Daily Summary</span><button className="nref" onClick={run}>↻</button></div>
      {load?<div className="dots"><div className="dot"/><div className="dot"/><div className="dot"/></div>
           :<div className="ntxt">{text||"No events yet — add some to get your summary."}</div>}
      {eta&&<div className="neta">⏱ Estimated finish: <b>{eta}</b></div>}
    </div>
  );
}

// ── FOCUS LIST (persisted) ──
function FocusList({ items, setItems }) {
  const [input,setInput]=useState("");
  const add=()=>{ if(!input.trim()||items.length>=3) return; setItems(p=>[...p,{id:Date.now(),text:input.trim(),done:false}]); setInput(""); };
  const toggle=id=>setItems(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const del=id=>setItems(p=>p.filter(t=>t.id!==id));
  const nums=["1","2","3"]; const numCls=["p1","p2","p3"];
  return(
    <div className="focus-wrap">
      <div className="focus-card">
        <div className="focus-hd"><span className="focus-title">Top 3 Focus</span><span style={{fontSize:"11px",color:"var(--muted)"}}>{items.length}/3</span></div>
        {items.length===0&&<div className="focus-empty">What are your 3 priorities today?</div>}
        {items.map((t,i)=>(
          <div className="focus-item" key={t.id}>
            <span className={`focus-num ${numCls[i]||""}`}>{nums[i]}</span>
            <div className={`focus-ck ${t.done?"on":""}`} onClick={()=>toggle(t.id)}>{t.done?"✓":""}</div>
            <span className={`focus-txt ${t.done?"on":""}`} style={{cursor:"pointer"}} onClick={()=>toggle(t.id)}>{t.text}</span>
            <button className="focus-del" onClick={e=>{e.stopPropagation();del(t.id);}}>✕</button>
          </div>
        ))}
        {items.length<3&&(
          <div className="focus-input-row">
            <input className="focus-input" placeholder={`Priority ${items.length+1}…`} value={input}
              onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
            <button className="focus-add" onClick={add}>+</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── WEEK VIEW ──
function WeekView({ weekTasks, setWeekTasks, weekEvents, weekCalLoad }) {
  const days=next7();
  const [expanded,setExpanded]=useState({});
  const [inputs,setInputs]=useState({});
  const toggle=k=>setExpanded(p=>({...p,[k]:!p[k]}));
  const toggleTask=(k,i)=>setWeekTasks(p=>({...p,[k]:(p[k]||[]).map((t,j)=>j===i?{...t,done:!t.done}:t)}));
  const addTask=k=>{ const v=(inputs[k]||"").trim(); if(!v) return; setWeekTasks(p=>({...p,[k]:[...(p[k]||[]),{text:v,done:false}]})); setInputs(p=>({...p,[k]:""})); };
  const calForDay=d=>weekEvents.filter(ev=>{ try{ return new Date(ev.start).toDateString()===d.toDateString(); }catch{return false;}});
  return(
    <div>
      {days.map((day,i)=>{
        const k=dateKey(day); const tasks=weekTasks[k]||[]; const cal=calForDay(day); const total=tasks.length+cal.length; const open=expanded[k];
        return(
          <div className="wday" key={k} style={{animationDelay:`${i*.05}s`}}>
            <div className="wdh" onClick={()=>toggle(k)}>
              <div className="wdhl"><span className="wdow">{DOW[day.getDay()]}</span><span className="wdate">{day.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span></div>
              <span className={`wcount${total>0?" has":""}`}>{weekCalLoad?"…":total>0?`${total} item${total>1?"s":""}`:"Free"} {open?"▲":"▼"}</span>
            </div>
            {open&&<>
              <div className="wbody">
                {cal.map((ev,j)=>(<div className="witem" key={`c${j}`}><div className="wdot" style={{background:ev.color||"#60a5fa"}}/><span className="wtime">{fmtTime(ev.start)}</span><span className="wtxt">{ev.title}</span></div>))}
                {tasks.map((t,j)=>(<div className="witem" key={`t${j}`} style={{cursor:"pointer"}} onClick={()=>toggleTask(k,j)}><div className={`wck ${t.done?"on":""}`}>{t.done?"✓":""}</div><span className="wtxt" style={{textDecoration:t.done?"line-through":"none",color:t.done?"var(--muted)":"var(--soft)"}}>{t.text}</span></div>))}
                {total===0&&<div style={{fontSize:"12px",color:"var(--muted)",padding:"7px 0",borderTop:"1px solid var(--b1)"}}>Nothing scheduled</div>}
              </div>
              <div className="wadd">
                <input className="winput" placeholder="Add a task…" value={inputs[k]||""} onChange={e=>setInputs(p=>({...p,[k]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addTask(k)}/>
                <button className="wplus" onClick={()=>addTask(k)}>+</button>
              </div>
            </>}
          </div>
        );
      })}
    </div>
  );
}

// ── NOVA CHAT — BUILD B (persistent memory + web search + verified tools) ──
function NovaChat({ events, weekEvents, activities, projects, completedEvents, onAction, isDesktop, desktopSidebarOpen, setDesktopSidebarOpen }) {
  const INTRO = {role:"nova",text:"Hey! I'm Nova — your personal Jarvis. I remember everything across our sessions, I can search the web, and I have full control of your dashboard. What do you need?",time:nowTime(),actions:[]};
  const [sessions,setSessions]   = useState(()=>LS.get("nova_sessions",[]));
  const [current,setCurrent]     = useState([INTRO]);
  const [input,setInput]         = useState("");
  const [loading,setLoading]     = useState(false);
  const [rec,setRec]             = useState(false);
  const [mobileSidebarOpen,setMobileSidebarOpen] = useState(false);
  const [supabaseMemory,setSupabaseMemory] = useState([]);
  const [memoryLoaded,setMemoryLoaded]     = useState(false);
  const botRef = useRef(null); const recRef = useRef(null); const fileRef = useRef(null);

  const sidebarOpen    = isDesktop ? desktopSidebarOpen : mobileSidebarOpen;
  const setSidebarOpen = isDesktop ? setDesktopSidebarOpen : setMobileSidebarOpen;

  useEffect(()=>{ botRef.current?.scrollIntoView({behavior:"smooth"}); },[current,loading]);
  useEffect(()=>{ LS.set("nova_sessions",sessions); syncBroadcast("nova_sessions",sessions); },[sessions]);

  // Load persistent memory from Supabase on mount
  useEffect(()=>{
    if(memoryLoaded) return;
    getMemories(30).then(data=>{
      if(data.memories) setSupabaseMemory(data.memories);
      setMemoryLoaded(true);
    }).catch(()=>setMemoryLoaded(true));
  },[]);

  // Build memory string from Supabase + local sessions
  const buildMemory = () => {
    const supaLines = supabaseMemory.slice(0,20).map(m=>{
      const date = new Date(m.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric"});
      return `[${date}] ${m.summary}`;
    });
    const localLines = sessions.slice(-5).map(s=>{
      const msgs = s.messages.filter(m=>m.role==="user").map(m=>m.text).slice(-2).join(" | ");
      return `[${s.id}] ${msgs}`;
    });
    const all = [...supaLines, ...localLines];
    return all.length ? all.join("\n") : "No prior sessions yet.";
  };

  const sysPrompt = () => {
    const done  = events.filter(e=>completedEvents.has(e.id||e.title)).map(e=>e.title);
    const rem   = events.filter(e=>!completedEvents.has(e.id||e.title)).map(e=>`${e.title}${e.start?" at "+fmtTime(e.start):""}`);
    const wevts = weekEvents.slice(0,8).map(e=>`${e.title} on ${fmtShort(e.start)}`);
    const log   = activities.slice(0,6).map(a=>`${a.time}:${a.text}`);
    const projs = projects.map(p=>`${p.name}(${p.tag},${p.status})`).slice(0,5);
    const mem   = buildMemory();
    return `You are Nova, Demetri's personal AI assistant — his Jarvis. You have full control of his dashboard and can search the web for real-time information.

CURRENT DATE & TIME: ${fmtDate()} | ${new Date().toLocaleTimeString()} | YEAR: ${new Date().getFullYear()}
TODAY IS: ${new Date().toISOString().split("T")[0]} — always use this year (${new Date().getFullYear()}) when generating dates. Never use 2025.
Tomorrow is: ${(()=>{ const d=new Date(); d.setDate(d.getDate()+1); return d.toISOString().split("T")[0]; })()}
Today done: ${done.join(",")||"none"}
Today remaining: ${rem.join(",")||"all done!"}
This week: ${wevts.join("; ")||"none"}
Activity log: ${log.join(";")||"empty"}
Projects: ${projs.join(";")||"none"}

MEMORY (past sessions):
${mem}

INSTRUCTIONS:
- **Always format responses.** Use **bold** for key info, bullet points (-) for lists, numbered lists (1.) for steps. Never send unbroken walls of text.
- Never open with filler like "Of course!", "Sure!", "Certainly!". Get straight to the answer.
- Use tools immediately without asking permission — the dashboard is your terminal for output.
- You can control everything: add/delete/reschedule calendar events, log/delete activities, navigate tabs, add/update/note projects, add project tasks, set/update/clear focus items, mark events complete, add/delete week tasks, predict schedule, search the web.
- Use search_web AGGRESSIVELY. Search whenever the question involves current events, weather, news, sports, prices, dates, or anything you aren't 100% certain about. When in doubt — search.
- When Demetri shares personal info, acknowledge briefly. It is being saved to memory.
- Jarvis energy: calm, capable, direct, always formatted.`;
  };

  // Save memory at end of session (every 5 turns or when starting a new chat)
  const autoSaveMemory = useCallback(async (messages, sid) => {
    try {
      const userMsgs = messages.filter(m=>m.role==="user");
      // Only save every 5 user messages to avoid spamming
      if(userMsgs.length === 0 || userMsgs.length % 10 !== 0) return;
      const recentUser = userMsgs.slice(-5).map(m=>m.text).join(" | ");
      const recentNova = messages.filter(m=>m.role==="nova").slice(-3).map(m=>m.text).join(" | ");
      const summaryData = await callAPI([{role:"user",content:`Summarise this conversation in 2-3 sentences. Focus on what Demetri shared, asked for, or decided. Be specific — include names, preferences, goals mentioned.
User said: ${recentUser}
Nova replied: ${recentNova}`}]);
      const summary = (summaryData.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      if(summary){
        await saveMemory(sid, summary);
        setSupabaseMemory(p=>[{session_id:sid,summary,created_at:new Date().toISOString()},...p].slice(0,30));
      }
    } catch(e){ console.warn("Memory save failed:", e); }
  },[]);

  const send = useCallback(async text=>{
    if(!text?.trim()||loading) return;
    const userMsg={role:"user",text:text.trim(),time:nowTime(),actions:[]};
    const updated=[...current,userMsg];
    setCurrent(updated); setLoading(true);
    try{
      const apiMsgs=updated.filter(m=>m!==INTRO).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
      const data=await callAPI(apiMsgs.slice(-20),{system:sysPrompt(),tools:TOOLS});
      const tblocks=(data.content||[]).filter(b=>b.type==="text");
      const tooluse=(data.content||[]).filter(b=>b.type==="tool_use");

      // Handle tools sequentially — critical for multiple calendar adds
      const acts=[];
      const searchResults=[];
      const toolResults=[];
      for(const t of tooluse){
        if(t.name==="search_web"){
          try{
            const sr=await searchWeb(t.input.query, t.input.max_results||5);
            searchResults.push({query:t.input.query, ...sr});
            toolResults.push(`search_web("${t.input.query}"): found ${sr.results?.length||0} results`);
          }catch(e){
            toolResults.push(`search_web failed: ${e.message}`);
          }
        } else {
          const r = await onAction(t.name, t.input);
          if(r){
            acts.push(r);
            toolResults.push(`${t.name}: ${r}`);
          }
          // Small delay between calendar operations to avoid race conditions
          if(t.name==="add_calendar_event"||t.name==="delete_calendar_event"||t.name==="reschedule_event"){
            await new Promise(res=>setTimeout(res,500));
          }
        }
      }

      // Build the reply — if Nova already wrote a response, use it
      // Only do a follow-up if Nova sent NO text (pure tool-call response)
      let reply = tblocks.map(b=>b.text).join("").trim();

      // If Nova wrote no text but tools ran — build a simple confirmation locally (no API call)
      if(!reply && toolResults.length>0 && searchResults.length===0){
        reply = toolResults
          .filter(r=>!r.startsWith("search_web"))
          .map(r=>r.includes(":")?r.split(":").slice(1).join(":").trim():r)
          .join("\n") || "Done.";
      }

      // Only use API follow-up for search results
      if(searchResults.length>0){
        const searchContext = searchResults.map(sr=>{
          const top = sr.results?.slice(0,3).map(r=>`${r.title}: ${r.content}`).join("\n") || "";
          return `Search: "${sr.query}"\nDirect answer: ${sr.answer||"none"}\nTop results:\n${top}`;
        }).join("\n\n");
        const followUp = await callAPI([
          ...apiMsgs.slice(-10),
          {role:"user", content:`Web search results:\n\n${searchContext}\n\nAnswer directly and concisely using only these results.`}
        ],{system:sysPrompt()});
        reply=(followUp.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      }

      if(!reply) reply = acts.length ? acts.join("\n") : "Something went wrong — please try again.";

      // Only show non-calendar actions as pills — calendar results are covered in Nova's reply
      const pillActions = acts.filter(a=>
        a && !a.startsWith("✓") && !a.includes("added to Google Calendar") && !a.includes("Deleted") && !a.includes("Rescheduling")
      );
      const novaMsg={role:"nova",text:reply,time:nowTime(),actions:pillActions};
      const final=[...updated,novaMsg];
      setCurrent(final);

      // Save to local sessions
      const sid=sessId();
      setSessions(p=>{ const ex=p.findIndex(s=>s.id===sid); const entry={id:sid,messages:final.filter(m=>m!==INTRO)}; if(ex>=0){const n=[...p];n[ex]=entry;return n;} return [...p,entry].slice(-30); });

      // Auto-save memory to Supabase
      autoSaveMemory(final.filter(m=>m!==INTRO), sid);
    }catch(e){
      setCurrent(p=>[...p,{role:"nova",text:"Something went wrong. Check your connection.",time:nowTime(),actions:[]}]);
      console.error(e);
    }
    setLoading(false);
  },[current,loading,events,weekEvents,activities,projects,completedEvents,sessions,supabaseMemory,onAction,autoSaveMemory]);

  const loadSession=s=>{ setCurrent([INTRO,...s.messages]); setSidebarOpen(false); };
  const deleteSession=id=>setSessions(p=>p.filter(s=>s.id!==id));

  const startVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Voice not supported. Try Chrome.");return;}
    if(rec){recRef.current?.stop();return;}
    const r=new SR(); r.lang="en-US"; r.interimResults=false; r.continuous=false; recRef.current=r;
    r.onstart=()=>setRec(true); r.onend=()=>setRec(false); r.onerror=()=>setRec(false);
    r.onresult=e=>setInput(e.results[0][0].transcript);
    r.start();
  };

  const SidebarContent = ()=>(
    <>
      <div className="nova-sidebar-hd">
        <span className="nova-sidebar-title">Conversations</span>
        <div style={{display:"flex",gap:"6px",alignItems:"center"}}>

          <button className="nova-sidebar-close" onClick={()=>setSidebarOpen(false)}>✕</button>
        </div>
      </div>
      <div className="nova-sidebar-list">
        {sessions.length===0&&<div className="empty" style={{padding:"20px 8px"}}>No conversations yet.</div>}
        {[...sessions].reverse().map((s,i)=>{
          const msgCount = s.messages?.length||0;
          const firstMsg = s.messages?.find(m=>m.role==="user")?.text||"";
          const lastMsg  = s.messages?.filter(m=>m.role==="user").slice(-1)[0]?.text||"";
          return(
            <div key={i} className="nova-sess-item" style={{position:"relative"}}>
              <div onClick={()=>loadSession(s)}>
                <div className="nova-sess-id" style={{fontSize:"11px",fontWeight:"600",color:"var(--soft)",marginBottom:"3px"}}>{s.id}</div>
                <div style={{fontSize:"11px",color:"var(--muted)",marginBottom:"2px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{firstMsg.slice(0,45)||"…"}</div>
                {msgCount>2&&<div style={{fontSize:"10px",color:"var(--muted)",marginBottom:"2px"}}>{msgCount} messages</div>}
                {lastMsg!==firstMsg&&<div style={{fontSize:"10px",color:"var(--muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontStyle:"italic"}}>Last: {lastMsg.slice(0,40)}</div>}
                <div className="nova-sess-cont" style={{fontSize:"10px",color:"var(--nova)",marginTop:"4px"}}>Tap to continue →</div>
              </div>
              <button style={{position:"absolute",top:"8px",right:"8px",fontSize:"11px",color:"var(--muted)",background:"none",border:"none",cursor:"pointer",opacity:.5}} onClick={e=>{e.stopPropagation();deleteSession(s.id);}}>✕</button>
            </div>
          );
        })}
      </div>
    </>
  );

  return(
    <div className="nova-page">
      {/* Sidebar overlay (mobile) */}
      {!isDesktop&&<div className={`nova-sidebar-overlay${sidebarOpen?" open":""}`} onClick={()=>setSidebarOpen(false)}/>}
      {/* Sidebar */}
      <div className={`nova-sidebar${sidebarOpen?" open":""}`}><SidebarContent/></div>
      {/* Main chat */}
      <div className="novawrap">
        <div className="novahd">
          <button className="nova-sidebar-toggle" style={{position:"relative",width:"34px",height:"34px",padding:0}} onClick={()=>setSidebarOpen(p=>!p)}>☰</button>
          <div className="novaav" style={{marginLeft:"4px"}}>✦</div>
          <div style={{flex:1,marginLeft:"8px"}}>
            <div className="novanm">Nova</div>
          </div>
          <button className="sbtn" onClick={()=>setCurrent([INTRO])}>New chat</button>
        </div>
        <div className="chatmsgs" style={{paddingBottom: isDesktop?"0":"80px"}}>
          {current.map((m,i)=>(
            <div key={i} className={`msg ${m.role==="user"?"u":"n"}`}>
              {m.role==="user"
                ? <div className="mbub">{m.text}</div>
                : <div className="mbub" dangerouslySetInnerHTML={{__html:renderMarkdown(m.text)}}/>
              }
              {m.actions?.filter(a=>a&&a.trim()).length>0&&(
                <div style={{display:"flex",flexDirection:"column",gap:"4px",marginTop:"6px",alignSelf:"flex-start"}}>
                  {m.actions.filter(a=>a&&a.trim()).map((a,j)=>(
                    <div key={j} className="apill">✓ {a}</div>
                  ))}
                </div>
              )}
              <div className="mtime">{m.time}</div>
            </div>
          ))}
          {loading&&<div className="msg n" style={{opacity:.7}}><div className="mbub" style={{fontSize:"13px",color:"var(--muted)"}}>Nova is thinking…</div></div>}
          <div ref={botRef}/>
        </div>
        <div className="chatia" style={!isDesktop?{position:"fixed",bottom:"64px",left:0,right:0,zIndex:40,background:"var(--surf)",borderTop:"1px solid var(--b1)",padding:"10px 16px"}:{}}>
          <button className={`micbtn ${rec?"rec":""}`} onClick={startVoice}>{rec?"⏹":"🎤"}</button>
          <textarea className="chatinput" placeholder="Ask Nova anything…" value={input} rows={1}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);setInput("");}}}/>
          <button className="micbtn" onClick={()=>fileRef.current?.click()}>📎</button>

  );
}

// ── PROJECTS ──
function Projects({ projects, setProjects, onOpenProject, activeProject }) {
  const [name,setName]=useState(""); const [tag,setTag]=useState("personal"); const [filter,setFilter]=useState("all");
  const tags=["personal","creative","work"];
  const tagActiveCls={personal:"ap",creative:"ac",work:"aw"};
  const statusCls={"To do":"ps-todo","In progress":"ps-progress","Done":"ps-done"};
  const add=()=>{
    if(!name.trim()) return;
    const p={id:Date.now(),name:name.trim(),tag,status:"To do",note:"",tasks:[],ti:""};
    setProjects(prev=>[p,...prev]); setName("");
    if(onOpenProject) onOpenProject(p);
  };
  const del=(id,e)=>{ e.stopPropagation(); setProjects(p=>p.filter(pr=>pr.id!==id)); };
  const filtered=filter==="all"?projects:projects.filter(p=>p.tag===filter);
  const total=projects.length, inProg=projects.filter(p=>p.status==="In progress").length, done=projects.filter(p=>p.status==="Done").length;
  const totalTasks=projects.reduce((a,p)=>a+(p.tasks||[]).length,0);
  const doneTasks=projects.reduce((a,p)=>a+(p.tasks||[]).filter(t=>t.done).length,0);
  return(
    <div className="projwrap">
      <div className="irow">
        <input className="ifield" placeholder="New project… (Enter to create)" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
        <button className="iplus" onClick={add}>+</button>
      </div>
      <div className="ptagrow">
        {tags.map(t=><button key={t} className={`ptbtn ${tag===t?tagActiveCls[t]:""}`} onClick={()=>setTag(t)}>{t[0].toUpperCase()+t.slice(1)}</button>)}
      </div>
      {total>0&&(
        <div className="proj-stats">
          <div className="proj-stat"><div className="proj-stat-val" style={{color:"var(--blue)"}}>{total}</div><div className="proj-stat-lbl">Total</div></div>
          <div className="proj-stat"><div className="proj-stat-val" style={{color:"var(--amber)"}}>{inProg}</div><div className="proj-stat-lbl">Active</div></div>
          <div className="proj-stat"><div className="proj-stat-val" style={{color:"var(--green)"}}>{done}</div><div className="proj-stat-lbl">Done</div></div>
          <div className="proj-stat"><div className="proj-stat-val" style={{color:"var(--nova)"}}>{totalTasks>0?Math.round((doneTasks/totalTasks)*100):0}%</div><div className="proj-stat-lbl">Tasks</div></div>
        </div>
      )}
      <div className="frow">
        {["all",...tags].map(f=><button key={f} className={`fbtn${filter===f?" a":""}`} onClick={()=>setFilter(f)}>{f[0].toUpperCase()+f.slice(1)}</button>)}
      </div>
      {filtered.length===0&&(
        <div className="proj-empty"><div className="proj-empty-icon">◫</div><div className="proj-empty-title">No projects yet</div></div>
      )}
      {filtered.map((pr,i)=>{
        const tc=(pr.tasks||[]).length, td=(pr.tasks||[]).filter(t=>t.done).length;
        const pct=tc>0?Math.round((td/tc)*100):0;
        return(
          <div key={pr.id} className={`pcard tag-${pr.tag}${activeProject?.id===pr.id?" active":""}`} style={{animationDelay:`${i*.05}s`}} onClick={()=>onOpenProject&&onOpenProject(pr)}>
            <div className="pctop">
              <span className="pctitle">{pr.name}</span>
              <span className={`pctag tg-${pr.tag}`}>{pr.tag}</span>
              <span className={`pstatus ${statusCls[pr.status]||"ps-todo"}`}>{pr.status}</span>
              <span className="popen">{activeProject?.id===pr.id?"Active ✦":"Open →"}</span>
              <button className="pcdel" onClick={e=>del(pr.id,e)}>✕</button>
            </div>
            {pr.note&&<div style={{fontSize:"12px",color:"var(--muted)",marginBottom:"8px",paddingLeft:"6px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pr.note}</div>}
            {tc>0&&(
              <div className="proj-progress">
                <div className="proj-progress-label"><span>{td}/{tc} tasks</span><span>{pct}%</span></div>
                <div className="proj-progress-bar">
                  <div className="proj-progress-fill" style={{width:`${pct}%`,background:pct===100?"var(--green)":pr.tag==="work"?"var(--amber)":pr.tag==="creative"?"var(--nova)":"var(--blue)"}}/>
                </div>
              </div>
            )}
          </div>
        );
      })}
      <div className="spacer"/>
    </div>
  );
}

function ProjectWorkspace({ project, projects, setProjects, onBack, events, weekEvents, activities, completedEvents, onAction }) {
  const storageKey=`proj_chats_${project.id}`;
  const makeChat=()=>({id:Date.now(),name:`Chat ${Date.now()}`,messages:[],created:nowTime()});
  const [chats,setChats]=useState(()=>{ const s=LS.get(storageKey,[]); return s.length>0?s:[makeChat()]; });
  const [activeChatId,setActiveChatId]=useState(()=>{ const s=LS.get(storageKey,[]); return s[0]?.id||Date.now(); });
  const [editingName,setEditingName]=useState(false);
  useEffect(()=>{ LS.set(storageKey,chats); },[chats]);
  const activeChat=chats.find(c=>c.id===activeChatId)||chats[0];
  const upd=(f,v)=>setProjects(p=>p.map(pr=>pr.id===project.id?{...pr,[f]:v}:pr));
  const addTask=()=>{ if(!project.ti?.trim()) return; setProjects(p=>p.map(pr=>pr.id===project.id?{...pr,tasks:[...(pr.tasks||[]),{id:Date.now(),text:pr.ti.trim(),done:false}],ti:""}:pr)); };
  const toggleTask=tid=>setProjects(p=>p.map(pr=>pr.id===project.id?{...pr,tasks:(pr.tasks||[]).map(t=>t.id===tid?{...t,done:!t.done}:t)}:pr));
  const statusColor={"To do":"var(--muted)","In progress":"var(--amber)","Done":"var(--green)"};
  return(
    <div style={{display:"flex",height:"calc(100vh - 52px)",overflow:"hidden"}}>
      <div style={{width:"220px",flexShrink:0,background:"var(--surf)",borderRight:"1px solid var(--b1)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"12px 14px",borderBottom:"1px solid var(--b1)"}}>
          <button className="sbtn" style={{marginBottom:"8px",fontSize:"11px"}} onClick={onBack}>← All Projects</button>
          <div style={{fontSize:"14px",fontWeight:"600",marginBottom:"4px"}}>{project.name}</div>
          <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
            <span className={`pctag tg-${project.tag}`}>{project.tag}</span>
            <select style={{fontSize:"11px",background:"none",border:"1px solid var(--b1)",borderRadius:"6px",color:statusColor[project.status],padding:"2px 6px",fontFamily:"inherit",cursor:"pointer",outline:"none"}} value={project.status} onChange={e=>upd("status",e.target.value)}>
              {["To do","In progress","Done"].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <div style={{padding:"10px 14px",borderBottom:"1px solid var(--b1)"}}>
          <div style={{fontSize:"10px",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:"5px"}}>Notes</div>
          <textarea className="pcnote" rows={3} placeholder="Notes…" value={project.note||""} onChange={e=>upd("note",e.target.value)} style={{width:"100%"}}/>
        </div>
        <div style={{padding:"10px 14px",borderBottom:"1px solid var(--b1)"}}>
          <div style={{fontSize:"10px",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:"5px"}}>Tasks</div>
          <div style={{maxHeight:"100px",overflowY:"auto"}}>
            {(project.tasks||[]).map(t=>(<div key={t.id} className="pcti" style={{cursor:"pointer"}} onClick={()=>toggleTask(t.id)}><div className={`pctick ${t.done?"on":""}`}>{t.done?"✓":""}</div><span className={t.done?"pcstrike":""}>{t.text}</span></div>))}
          </div>
          <div className="pcadd" style={{marginTop:"4px"}}>
            <input className="pcinput" placeholder="Add task…" value={project.ti||""} onChange={e=>upd("ti",e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()}/>
            <button className="pcplus" onClick={addTask}>+</button>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"8px 10px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"6px"}}>
            <div style={{fontSize:"10px",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".5px"}}>Chats</div>
            <button className="sbtn" style={{fontSize:"10px",padding:"2px 6px"}} onClick={()=>{ const c=makeChat(); setChats(p=>[...p,c]); setActiveChatId(c.id); }}>+</button>
          </div>
          {chats.map(c=>(<div key={c.id} style={{padding:"7px 8px",borderRadius:"8px",cursor:"pointer",marginBottom:"3px",background:c.id===activeChatId?"var(--nova-bg)":"none",border:`1px solid ${c.id===activeChatId?"var(--nova-border)":"transparent"}`,display:"flex",alignItems:"center",gap:"5px"}} onClick={()=>setActiveChatId(c.id)}>
            <div style={{flex:1,overflow:"hidden"}}><div style={{fontSize:"11px",color:c.id===activeChatId?"var(--nova2)":"var(--soft)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div></div>

      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{height:"40px",borderBottom:"1px solid var(--b1)",display:"flex",alignItems:"center",padding:"0 14px",gap:"8px",flexShrink:0,background:"var(--surf)"}}>
          <div style={{width:"22px",height:"22px",borderRadius:"50%",background:"var(--nova)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",color:"#fff"}}>✦</div>
          {editingName
            ?<input style={{flex:1,background:"none",border:"none",outline:"none",fontFamily:"inherit",fontSize:"13px",fontWeight:"500",color:"var(--text)"}} value={activeChat?.name||""} autoFocus onChange={e=>setChats(p=>p.map(c=>c.id===activeChatId?{...c,name:e.target.value}:c))} onBlur={()=>setEditingName(false)} onKeyDown={e=>e.key==="Enter"&&setEditingName(false)}/>
            :<div style={{flex:1,fontSize:"13px",fontWeight:"500",cursor:"pointer"}} onClick={()=>setEditingName(true)}>{activeChat?.name} <span style={{fontSize:"10px",color:"var(--muted)"}}>· rename</span></div>
