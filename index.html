// ── GMAIL MINI WIDGET — top 3 priority emails on Today tab ──
// ── INBOX WIDGET CONTENT — reads from shared gmail cache, no Claude call ──
function InboxWidgetContent({ onNavigate }) {
  const [emails, setEmails] = useState([]);
  const [status, setStatus] = useState("idle");

  useEffect(()=>{
    const cached = LS.get("gmail_analyzed_" + todayStr(), []);
    if(cached.length > 0) {
      const sorted = [...cached].sort((a,b)=>{
        const p={"high":0,"medium":1,"low":2};
        return (p[a.priority]||2)-(p[b.priority]||2);
      }).slice(0,8);
      setEmails(sorted); setStatus("done"); return;
    }
    // Lightweight fetch — no Claude, just list
    setStatus("loading");
    callWorker("gmail_list",{maxResults:8}).then(res=>{
      if(res.success && res.emails?.length) {
        // Show raw emails without AI analysis
        const simple = res.emails.slice(0,8).map(e=>({...e,priority:"medium",tag:"info",summary:e.snippet?.slice(0,50)||""}));
        setEmails(simple);
      }
      setStatus("done");
    }).catch(()=>setStatus("done"));
  },[]);

  const tagColor={event:"var(--blue2)",deadline:"var(--red)",action:"var(--amber)",info:"var(--green)"};
  const tagBg={event:"rgba(59,130,246,.12)",deadline:"rgba(248,113,113,.1)",action:"rgba(245,158,11,.1)",info:"rgba(34,197,94,.1)"};
  const priDot={"high":"var(--red)","medium":"var(--amber)","low":"var(--muted)"};

  if(status==="loading") return(
    <div style={{padding:"4px 0"}}>
      {[0,1,2,3].map(i=><div key={i} className="inbox-skel" style={{width:["70%","85%","60%","75%"][i],marginBottom:"10px"}}/>)}
    </div>
  );

  if(!emails.length) return(
    <div style={{fontSize:"12px",color:"rgba(255,255,255,0.25)",fontStyle:"italic",padding:"8px 0"}}>No emails cached — open Inbox to scan.</div>
  );

  return(
    <div>
      {emails.map((e,i)=>(
        <div key={i} onClick={onNavigate} style={{display:"flex",alignItems:"flex-start",gap:"8px",padding:"8px 0",borderBottom:i<emails.length-1?"1px solid rgba(255,255,255,0.05)":"none",cursor:"pointer",transition:"opacity .15s"}}
          onMouseEnter={el=>el.currentTarget.style.opacity=".7"} onMouseLeave={el=>el.currentTarget.style.opacity="1"}>
          <div style={{width:"6px",height:"6px",borderRadius:"50%",background:priDot[e.priority]||priDot.medium,flexShrink:0,marginTop:"5px"}}/>
          <span style={{fontSize:"9px",padding:"2px 6px",borderRadius:"20px",background:tagBg[e.tag]||tagBg.info,color:tagColor[e.tag]||tagColor.info,flexShrink:0,marginTop:"1px"}}>{e.tag||"info"}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:"12px",fontWeight:500,color:"rgba(255,255,255,0.85)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.sender}</div>
            <div style={{fontSize:"11px",color:"rgba(255,255,255,0.35)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.summary||e.snippet?.slice(0,50)||e.subject}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── CHANGE 3: Priority Inbox widget — top 5, shared cache with InboxTab ──
function GmailMiniWidget({ onNavigate }) {
  const [emails, setEmails] = useState([]);
  const [status, setStatus] = useState("idle");

  useEffect(()=>{
    // Try shared InboxTab cache first (Change 3)
    const sharedCache = LS.get("gmail_analyzed_" + todayStr(), []);
    if(sharedCache.length > 0) {
      const top5 = [...sharedCache].sort((a,b)=>{
        const p={"high":0,"medium":1,"low":2};
        return (p[a.priority]||2)-(p[b.priority]||2);
      }).slice(0,5);
      setEmails(top5); setStatus("done"); return;
    }
    // Fallback: own lightweight fetch (no Claude call — just list)
    fetchTop5();
  },[]);

  const fetchTop5 = async () => {
    setStatus("loading");
    try {
      const listRes = await callWorker("gmail_list", { maxResults: 10 });
      if(!listRes.success || !listRes.emails?.length) { setStatus("done"); return; }
      const top5Prompt = "Return JSON array of TOP 5 most important emails. Each: {id,sender,subject,summary(max 8 words),priority:\"high\"|\"medium\"|\"low\",tag:\"event\"|\"deadline\"|\"action\"|\"info\"}. ONLY JSON.\nEmails: "+JSON.stringify(listRes.emails.map(e=>({id:e.id,sender:e.sender,subject:e.subject,snippet:e.snippet?.slice(0,80)})));
      const analyzeData = await callAPI([{role:"user",content:top5Prompt}],{max_tokens:500});
      const raw=(analyzeData.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").replace(/\u0060\u0060\u0060json|\u0060\u0060\u0060/g,"").trim();
      const si=raw.indexOf("["),ei=raw.lastIndexOf("]");
      if(si===-1){setStatus("done");return;}
      const top5=JSON.parse(raw.slice(si,ei+1)).slice(0,5);
      // Store in shared cache so InboxTab can reuse
      const withMeta = top5.map(e=>({...e,_dismissed:false,_added:false,_calLoading:false,_calError:null}));
      LS.set("gmail_analyzed_"+todayStr(), withMeta);
      setEmails(top5); setStatus("done");
    } catch { setStatus("error"); }
  };

  const tagColor={event:"var(--blue2)",deadline:"var(--red)",action:"var(--amber)",info:"var(--green)"};
  const tagBg={event:"rgba(59,130,246,.12)",deadline:"rgba(248,113,113,.1)",action:"rgba(245,158,11,.1)",info:"rgba(34,197,94,.1)"};
  const priDot={"high":"var(--red)","medium":"var(--amber)","low":"var(--muted)"};

  if(status==="loading") return(
    <div style={{margin:"0",background:"rgba(255,255,255,0.04)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"16px",padding:"16px 18px"}}>
      <div style={{fontSize:"11px",fontWeight:600,letterSpacing:"1px",textTransform:"uppercase",color:"rgba(255,255,255,0.35)",marginBottom:"12px"}}>Priority Inbox</div>
      {[0,1,2,3,4].map(i=><div key={i} className="inbox-skel" style={{width:["60%","85%","50%","75%","40%"][i],marginBottom:"10px"}}/>)}
    </div>
  );

  if(status==="error"||emails.length===0) return null;

  return(
    <div style={{margin:"0",background:"rgba(255,255,255,0.04)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"16px",padding:"16px 18px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:"2px",background:"linear-gradient(90deg,var(--blue),var(--nova))",opacity:.6}}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
        <span style={{fontSize:"11px",fontWeight:600,letterSpacing:"1px",textTransform:"uppercase",color:"rgba(255,255,255,0.35)"}}>Priority Inbox</span>
        <button onClick={onNavigate} style={{fontSize:"11px",color:"var(--blue2)",background:"var(--blue-bg)",border:"1px solid var(--blue-border)",borderRadius:"20px",padding:"2px 10px",cursor:"pointer",fontFamily:"inherit"}}>View all →</button>
      </div>
      {emails.map((e,i)=>(
        <div key={i} onClick={onNavigate} style={{display:"flex",alignItems:"flex-start",gap:"10px",padding:"9px 0",borderBottom:i<emails.length-1?"1px solid rgba(255,255,255,0.05)":"none",cursor:"pointer",transition:"opacity .15s"}}
          onMouseEnter={el=>el.currentTarget.style.opacity=".7"} onMouseLeave={el=>el.currentTarget.style.opacity="1"}>
          <div style={{width:"6px",height:"6px",borderRadius:"50%",background:priDot[e.priority]||priDot.low,flexShrink:0,marginTop:"5px"}}/>
          <span style={{fontSize:"9px",padding:"2px 6px",borderRadius:"20px",background:tagBg[e.tag]||tagBg.info,color:tagColor[e.tag]||tagColor.info,flexShrink:0,marginTop:"1px"}}>{e.tag}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:"12px",fontWeight:500,color:"rgba(255,255,255,0.9)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.sender}</div>
            <div style={{fontSize:"11px",color:"rgba(255,255,255,0.4)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.summary}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── SPORTS TAB ──

function _GymTab_REMOVED({ isDesktop }) { return null; }
// REMOVED: GymTab, ExerciseLogger, ScheduleEditor replaced by SportsTab

const SPORT_LEAGUES = [
  { id:"nhl", label:"NHL", key:"icehockey_nhl" },
  { id:"nba", label:"NBA", key:"basketball_nba" },
  { id:"nfl", label:"NFL", key:"americanfootball_nfl" },
  { id:"mlb", label:"MLB", key:"baseball_mlb" },
];

const ODDS_CACHE_TTL = 2 * 60 * 60 * 1000; // 2 hours

function SportsTab({ isDesktop }) {
  // Load preferred league from nova_facts if set
  const preferredLeague = (() => {
    try {
      const facts = LS.get("nova_facts_cache", []);
      const pref = facts.find(f=>f.key==="favorite_sport"||f.key==="preferred_league"||f.key==="favorite_league");
      const leagueIds = ["nhl","nba","nfl","mlb"];
      if(pref) { const v = pref.value.toLowerCase(); return leagueIds.find(l=>v.includes(l))||"nhl"; }
    } catch {}
    return "nhl";
  })();
  const [league,        setLeague]       = useState(preferredLeague);
  const [games,         setGames]        = useState([]);
  const [loading,       setLoading]      = useState(false);
  const [error,         setError]        = useState("");
  const [selectedGame,  setSelectedGame] = useState(null); // null = list view, object = detail view
  const [novaChat,      setNovaChat]     = useState([]);
  const [novaInput,     setNovaInput]    = useState("");
  const [novaLoading,   setNovaLoading]  = useState(false);
  const [quotaLeft,     setQuotaLeft]    = useState(null);
  const [mobileNovaOpen,setMobileNovaOpen] = useState(false);
  const [top5,          setTop5]         = useState(null);
  const [top5Loading,   setTop5Loading]  = useState(false);
  const [showAccuracy,  setShowAccuracy] = useState(false);
  const [gameForm,       setGameForm]     = useState(null); // {team_a, team_b} form data

  useEffect(()=>{ fetchGames(league); },[league]);

  // Auto-verify yesterday's picks
  useEffect(()=>{ autoVerifyPicks(); },[]);

  const autoVerifyPicks = async () => {
    try {
      // Get unverified picks from Supabase
      const res = await callWorker("picks_get", { unverified_only: true, limit: 10 });
      if (!res.success || !res.picks?.length) return;

      const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
      const ydStr = yesterday.toISOString().split("T")[0];

      // Only verify yesterday's picks to avoid burning Tavily quota
      const toVerify = res.picks.filter(p => p.game_date === ydStr).slice(0, 3);
      if (!toVerify.length) return;

      for (const pick of toVerify) {
        try {
          const sr = await callWorker("search_web", {
            query: pick.pick+" "+pick.league.toUpperCase()+" result score "+ydStr,
            max_results: 2,
          });
          if (sr.answer) {
            const won  = /win|won|correct|covered|over hit/i.test(sr.answer);
            const lost = /loss|lost|wrong|didn't cover|under hit/i.test(sr.answer);
            if (won && !lost)       await callWorker("picks_verify", { game_id: pick.game_id, correct: true,  result: sr.answer.slice(0,100) });
            else if (lost && !won)  await callWorker("picks_verify", { game_id: pick.game_id, correct: false, result: sr.answer.slice(0,100) });
          }
        } catch {}
      }

      // Refresh accuracy cache from Supabase
      const accRes = await callWorker("picks_accuracy", {});
      if (accRes.success) {
        LS.set("nova_picks_accuracy", { total: accRes.total, wins: accRes.wins, pct: accRes.pct, by_league: accRes.by_league, fetched: Date.now() });
      }
    } catch(e) { console.warn("autoVerifyPicks failed:", e); }
  };

  // Use local date (not UTC) so cache doesn't flip at midnight
  const localDate = () => { const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0'); };
  const cacheKey = l => "sports_odds_"+l+"_"+localDate();
  const cacheTimeKey = l => "sports_odds_time_"+l;
  const top5CacheKey = l => "nova_top5_"+l+"_"+localDate();

  const fetchGames = async (l) => {
    setLoading(true); setError(""); setGames([]); setSelectedGame(null); setNovaChat([]); setTop5(null); setGameForm(null);
    const cached = LS.get(cacheKey(l), null);
    const cachedTime = LS.get(cacheTimeKey(l), 0);
    if(cached && Date.now() - cachedTime < ODDS_CACHE_TTL) {
      setGames(cached); setLoading(false);
      // Top5 is lazy — user triggers it
      const cachedTop5 = LS.get("nova_top5_"+l+"_"+dateKey(new Date()), null);
      if(cachedTop5) setTop5(cachedTop5); // restore from cache silently if already done
      return;
    }
    try {
      const sport = SPORT_LEAGUES.find(s=>s.id===l)?.key || l;
      const res = await callWorker("odds_fetch", { sport });
      if(res.error) throw new Error(res.error);
      const raw = res.data || [];
      if(res.quota_remaining !== undefined) setQuotaLeft(res.quota_remaining);
      const processed = raw.slice(0,12).map(g => {
        // Get consensus odds by averaging across bookmakers
        const allH2H = g.bookmakers?.flatMap(b => b.markets?.filter(m=>m.key==="h2h") || []) || [];
        const allSpreads = g.bookmakers?.flatMap(b => b.markets?.filter(m=>m.key==="spreads") || []) || [];
        const allTotals = g.bookmakers?.flatMap(b => b.markets?.filter(m=>m.key==="totals") || []) || [];
        const avgOdds = (outcomes, name) => {
          const vals = outcomes.flatMap(m => m.outcomes?.filter(o=>o.name===name).map(o=>o.price) || []);
          return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : null;
        };
        const homeOdds = avgOdds(allH2H, g.home_team);
        const awayOdds = avgOdds(allH2H, g.away_team);
        const homeProb = homeOdds && awayOdds ? americanToProb(homeOdds, awayOdds) : 50;
        const spreadHome = allSpreads[0]?.outcomes?.find(o=>o.name===g.home_team);
        const total = allTotals[0]?.outcomes?.find(o=>o.name==="Over");
        return {
          id: g.id,
          home: abbrev(g.home_team), away: abbrev(g.away_team),
          homeFull: g.home_team, awayFull: g.away_team,
          homeProb: Math.round(homeProb),
          time: g.commence_time ? new Date(g.commence_time).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",timeZoneName:"short"}) : "TBD",
          date: g.commence_time ? gameDate(g.commence_time) : "Upcoming",
          homeOdds, awayOdds,
          spread: spreadHome ? (spreadHome.point>0?"+":"")+spreadHome.point : null,
          spreadOdds: spreadHome?.price || null,
          total: total ? total.point : null,
          raw: g,
        };
      });
      setGames(processed);
      LS.set(cacheKey(l), processed);
      LS.set(cacheTimeKey(l), Date.now());
      // Top5 lazy — restore cache only
      const cachedTop5 = LS.get("nova_top5_"+l+"_"+dateKey(new Date()), null);
      if(cachedTop5) setTop5(cachedTop5);
    } catch(e) {
      setError(e.message || "Failed to fetch odds. Check ODDS_API_KEY in Worker.");
    }
    setLoading(false);
  };

  const loadTop5 = async (l, gamesData) => {
    const cached = LS.get(top5CacheKey(l), null);
    if(cached) { setTop5(cached); return; }
    setTop5Loading(true);
    try {
      // Only today's games for efficiency — shorter prompt
      const todayGames = gamesData.filter(g=>g.date==="Today").slice(0,6);
      const pickGames = todayGames.length >= 2 ? todayGames : gamesData.slice(0,6);
      const gameList = pickGames.map(g =>
        g.awayFull+" @ "+g.homeFull+" | Home prob: "+g.homeProb+"% | ML: "+fmtOdds(g.awayOdds)+"/"+fmtOdds(g.homeOdds)+(g.spread?" | Spread: "+g.spread:"")+(g.total?" | O/U: "+g.total:"")
      ).join("\n");
      const d = await callWorker("ai", { payload: { model: MODEL, max_tokens: 500,
        system: "You are Nova, a sharp sports analyst. Return ONLY valid JSON, no markdown, no extra text.",
        messages: [{ role: "user", content: "Based on these " + l.toUpperCase() + " games and consensus odds, pick the TOP 5 best statistical bets for today. For each pick, include a parlay suggestion where possible (max 2-leg, max +350 combined).\n\nGames:\n" + gameList + "\n\nReturn JSON: {picks:[{rank:1,pick:'team/bet',odds:'+120',type:'ML|Spread|Total',reason:'max 12 words',confidence:'High|Medium',gameId:''}],parlay:{legs:['pick1','pick2'],combined_odds:'+280',reason:'max 10 words'}}" }] } });
      const text = (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").replace(/\u0060\u0060\u0060json|\u0060\u0060\u0060/g,"").trim();
      const si = text.indexOf("{"), ei = text.lastIndexOf("}");
      if(si>=0) {
        const parsed = JSON.parse(text.slice(si,ei+1));
        setTop5(parsed);
        LS.set(top5CacheKey(l), parsed);
        // Save top pick to banner so proactive strip can reference it
        if(parsed.picks?.[0]) LS.set("nova_banner_pick", parsed.picks[0].pick+" "+parsed.picks[0].odds);
      }
    } catch {}
    setTop5Loading(false);
  };

  const analyzeGame = async (g, forceRefresh=false) => {
    setSelectedGame(g);
    setMobileNovaOpen(true);
    const ck = "sports_analysis_"+g.id+"_"+localDate();
    const cached = LS.get(ck, null);
    const cachedAt = LS.get(ck+"_at", 0);
    if(!forceRefresh && cached && Date.now() - cachedAt < ANALYSIS_TTL) {
      setNovaChat([{role:"nova",text:cached,_cachedAt:new Date(cachedAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}]);
      setNovaLoading(false); return;
    }
    setNovaChat([]); setNovaLoading(true);
    try {
      const leagueContext = {
        nfl: "Focus on: coverage schemes (man vs zone splits), target share, yards before/after contact, pace, rest advantage, weather, line movement.",
        nhl: "Focus on: goalie save% last 10 starts, back-to-back fatigue, PP ice time, shots/60 at 5v5, puck line ATS record, shot volume.",
        nba: "Focus on: pace, 3PT rate, home/away splits, rest days, defensive rating vs position, player usage% and recent form.",
        mlb: "Focus on: pitcher ERA last 3 starts, batter vs L/R splits, bullpen ERA, park factor, weather."
      };
      const odds = g.awayFull + " (" + fmtOdds(g.awayOdds) + ") at " + g.homeFull + " (" + fmtOdds(g.homeOdds) + "). Home win prob: " + g.homeProb + "%" + (g.spread ? ". Spread: " + g.home + " " + g.spread : "") + (g.total ? ". O/U: " + g.total : "") + ".";
      const currentYear = new Date().getFullYear();
      const sportKeyMap = { nhl:"icehockey_nhl", nba:"basketball_nba", nfl:"americanfootball_nfl", mlb:"baseball_mlb" };
      const sportKey = sportKeyMap[league] || league;

      // Parallel: fetch player props + game intel + team form — no extra Claude calls
      const [propsRes, intelRes, formRes] = await Promise.allSettled([
        callWorker("props_fetch", { sport: sportKey, event_id: g.id }),
        callWorker("game_intel", { away: g.awayFull, home: g.homeFull, league }),
        callWorker("team_form", { league, team_a: g.away, team_b: g.home }),
      ]);

      const props = propsRes.status==="fulfilled" && propsRes.value?.success && propsRes.value?.available
        ? propsRes.value.props.slice(0, 12) : [];
      const intel = intelRes.status==="fulfilled" && intelRes.value?.success ? intelRes.value : null;
      const form  = formRes.status==="fulfilled" && formRes.value?.success ? formRes.value : null;
      if(form) setGameForm(form);

      // Build sys prompt AFTER fetches so propsInstruction can reference props
      const propsInstruction = props.length > 0
        ? "\n• Prop 1: [Player] [stat line] — [reason, cite the live line provided]\n• Prop 2: [Player] [stat line] — [reason]\n• Prop 3: [Player] [stat line] — [reason]"
        : "\n• Props: No live lines available — skip this section entirely.";
      const sys = "You are Nova, Demetri's AI sports analyst. " + (leagueContext[league]||"") + "\n\nRespond with this EXACT structure:\n\n**STAT BREAKDOWN**\n• [Away team] — [2-3 key stats]\n• [Home team] — [2-3 key stats]\n• Key edge: [one tactical sentence]\n\n**PICKS**\n• Spread: [pick + line + reason, max 12 words]\n• Total: [Over/Under line + reason, max 12 words]" + propsInstruction + "\n\n**CONFIDENCE:** High/Medium/Low — [one sentence]";

      const propsCtx = props.length > 0
        ? "\n\nCURRENT "+currentYear+" SEASON PLAYER PROPS (live lines):\n" + props.map(p =>
            p.player+" "+(p.market||"").replace(/_/g," ")+" "+p.side+" "+p.line+" ("+(p.odds>0?"+":"")+p.odds+")"
          ).join("\n")
        : "\n\nNote: Use only "+currentYear+" season stats. Props API unavailable for this game — do not invent lines.";

      const intelCtx = intel ? [
        intel.injury_lineup?.answer  ? "\nINJURY/LINEUP: "+intel.injury_lineup.answer         : "",
        intel.betting_consensus?.answer ? "\nPUBLIC BETTING: "+intel.betting_consensus.answer : "",
        intel.referee?.answer        ? "\nREFEREE TRENDS: "+intel.referee.answer               : "",
        intel.weather                ? "\nWEATHER: "+intel.weather.temp_f+"°F, wind "+intel.weather.wind_mph+"mph" : "",
      ].filter(Boolean).join("") : "";

      const formCtx = form ? [
        form.team_a?.form?.length ? "\nFORM "+g.away+" (last "+form.team_a.form.length+"): "+form.team_a.form.map(f=>f.result).join("-")+" | "+form.team_a.record : "",
        form.team_b?.form?.length ? "\nFORM "+g.home+" (last "+form.team_b.form.length+"): "+form.team_b.form.map(f=>f.result).join("-")+" | "+form.team_b.record : "",
      ].filter(Boolean).join("") : "";

      const d = await callWorker("ai", { payload: { model: MODEL, max_tokens: 600, system: sys,
        messages: [{ role: "user", content: "Analyze: "+odds+" Game: "+g.time+", "+g.date+". League: "+league.toUpperCase()+". CURRENT YEAR: "+currentYear+"."+formCtx+propsCtx+intelCtx }] }});
      const text = (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      LS.set(ck, text); LS.set(ck+"_at", Date.now());
      setNovaChat([{role:"nova",text}]);

      // Auto-log Nova's primary pick to Supabase for accuracy tracking
      try {
        const spreadMatch = text.match(/Spread[:\s•\-]+([^\n]+)/i);
        const pickText = spreadMatch ? spreadMatch[1].trim().slice(0, 80) : g.awayFull+" @ "+g.homeFull;
        await callWorker("picks_save", {
          game_id: g.id,
          league,
          pick: pickText,
          pick_type: spreadMatch ? "Spread" : "ML",
          game_date: g.date === "Today" ? new Date().toISOString().split("T")[0] : g.date,
        });
      } catch(e) { console.warn("Pick log failed:", e); }
    } catch { setNovaChat([{role:"nova",text:"Couldn't reach Nova — check Worker connection."}]); }
    setNovaLoading(false);
  };

  const ANALYSIS_TTL = 4 * 60 * 60 * 1000;

  const askNova = async () => {
    const q = novaInput.trim(); if(!q) return;
    setNovaInput("");
    const history = [...novaChat, {role:"user",text:q}];
    setNovaChat(history); setNovaLoading(true);
    try {
      const api = history.map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
      const ctx = selectedGame ? selectedGame.awayFull+" @ "+selectedGame.homeFull+", home win prob "+selectedGame.homeProb+"%" : "sports discussion";
      const d = await callWorker("ai",{payload:{model:MODEL,max_tokens:300,system:"You are Nova, a sharp personal AI sports analyst. Context: "+ctx+". Be concise and specific.",messages:api.slice(-10)}});
      const text = (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      setNovaChat(p=>[...p,{role:"nova",text}]);
    } catch { setNovaChat(p=>[...p,{role:"nova",text:"Connection error."}]); }
    setNovaLoading(false);
  };

  const americanToProb = (home, away) => {
    const toDecimal = o => o > 0 ? (o/100)+1 : (100/Math.abs(o))+1;
    const hD = toDecimal(home), aD = toDecimal(away);
    const hImp = 1/hD, aImp = 1/aD;
    return (hImp / (hImp + aImp)) * 100;
  };

  const abbrev = name => {
    const words = name.split(" ");
    if(words.length === 1) return name.slice(0,3).toUpperCase();
    return words.slice(-1)[0].slice(0,3).toUpperCase();
  };

  const gameDate = iso => {
    const d = new Date(iso);
    const today = new Date(); today.setHours(0,0,0,0);
    const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
    d.setHours(0,0,0,0);
    if(d.getTime()===today.getTime()) return "Today";
    if(d.getTime()===tomorrow.getTime()) return "Tomorrow";
    return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  };

  const fmtOdds = o => !o ? "—" : o > 0 ? "+"+o : ""+o;


  // ── GAME DETAIL VIEW ──
  const GameDetailView = ({ g }) => (
    <div>
      <div className="sp-detail-back" onClick={()=>{setSelectedGame(null);setNovaChat([]);}}>
        ← Back to games
      </div>
      <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"12px",padding:"16px",marginBottom:"12px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}}>
          <div style={{textAlign:"center",flex:1}}>
            <div style={{fontSize:"22px",fontWeight:700,color:"var(--text)"}}>{g.away}</div>
            <div style={{fontSize:"11px",color:"rgba(255,255,255,0.4)",marginTop:"2px"}}>{g.awayFull}</div>
            <div style={{fontSize:"13px",fontWeight:600,color:"rgba(255,255,255,0.5)",marginTop:"4px"}}>{100-g.homeProb}%</div>
          </div>
          <div style={{textAlign:"center",padding:"0 16px"}}>
            <div style={{fontSize:"11px",color:"rgba(255,255,255,0.3)"}}>@</div>
            <div style={{fontSize:"12px",fontWeight:500,color:"rgba(255,255,255,0.6)",marginTop:"4px"}}>{g.time}</div>
            <div style={{fontSize:"10px",color:"rgba(255,255,255,0.3)",marginTop:"2px"}}>{g.date}</div>
          </div>
          <div style={{textAlign:"center",flex:1}}>
            <div style={{fontSize:"22px",fontWeight:700,color:"var(--text)"}}>{g.home}</div>
            <div style={{fontSize:"11px",color:"rgba(255,255,255,0.4)",marginTop:"2px"}}>{g.homeFull}</div>
            <div style={{fontSize:"13px",fontWeight:600,color:"var(--blue2)",marginTop:"4px"}}>{g.homeProb}%</div>
          </div>
        </div>
        <div style={{height:"6px",borderRadius:"3px",background:"rgba(255,255,255,0.08)",overflow:"hidden",marginBottom:"12px"}}>
          <div style={{height:"100%",borderRadius:"3px",background:"linear-gradient(90deg,var(--blue),var(--nova))",width:g.homeProb+"%",transition:"width .4s ease"}}/>
        </div>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap",fontSize:"11px"}}>
          <span style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"6px",padding:"3px 9px",color:"rgba(255,255,255,0.5)"}}>
            ML {g.awayFull.split(" ").slice(-1)[0]} {fmtOdds(g.awayOdds)} / {g.homeFull.split(" ").slice(-1)[0]} {fmtOdds(g.homeOdds)}
          </span>
          {g.spread&&<span style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"6px",padding:"3px 9px",color:"rgba(255,255,255,0.5)"}}>
            Spread {g.home} {g.spread} ({fmtOdds(g.spreadOdds)})
          </span>}
          {g.total&&<span style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"6px",padding:"3px 9px",color:"rgba(255,255,255,0.5)"}}>
            O/U {g.total}
          </span>}
        </div>
      </div>
      {/* W/L Form Strip */}
      {gameForm&&(gameForm.team_a?.form?.length>0||gameForm.team_b?.form?.length>0)&&(
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"12px",padding:"12px 14px",marginBottom:"12px"}}>
          <div style={{fontSize:"10px",color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:".8px",marginBottom:"10px"}}>Last 7 Games</div>
          {[{team:g.away,data:gameForm.team_a},{team:g.home,data:gameForm.team_b}].map(({team,data})=>data?.form?.length>0&&(
            <div key={team} style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
              <span style={{fontSize:"11px",fontWeight:600,color:"rgba(255,255,255,0.5)",width:"32px",flexShrink:0}}>{team}</span>
              <div style={{display:"flex",gap:"3px",flex:1}}>
                {data.form.map((f,i)=>(
                  <div key={i} title={"vs "+f.opp+" "+f.score} style={{
                    width:"22px",height:"22px",borderRadius:"5px",display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:"10px",fontWeight:700,flexShrink:0,cursor:"default",
                    background:f.result==="W"?"rgba(34,197,94,0.15)":"rgba(248,113,113,0.12)",
                    border:"1px solid "+(f.result==="W"?"rgba(34,197,94,0.3)":"rgba(248,113,113,0.25)"),
                    color:f.result==="W"?"var(--green)":"var(--red)",
                  }}>{f.result}</div>
                ))}
              </div>
              <span style={{fontSize:"10px",color:"rgba(255,255,255,0.3)",flexShrink:0}}>{data.record}</span>
            </div>
          ))}
        </div>
      )}
      {/* Nova analysis */}
      <div style={{background:"rgba(129,140,248,0.04)",border:"1px solid rgba(129,140,248,0.15)",borderRadius:"12px",padding:"14px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
          <span style={{fontSize:"11px",fontWeight:600,letterSpacing:".8px",textTransform:"uppercase",color:"var(--nova2)"}}>✦ Nova Analysis</span>
          <button onClick={()=>analyzeGame(g,true)} style={{background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"6px",color:"rgba(255,255,255,0.4)",fontSize:"11px",cursor:"pointer",padding:"2px 8px",fontFamily:"inherit"}}>↻ Refresh</button>
        </div>
        {novaLoading&&<div className="dots"><div className="dot"/><div className="dot"/><div className="dot"/></div>}
        {!novaLoading&&novaChat.map((m,i)=>(
          <div key={i} className={"nova-smsg "+m.role} style={m.role==="user"?{background:"rgba(255,255,255,0.06)",padding:"7px 9px",borderRadius:"8px",marginBottom:"8px"}:{marginBottom:"8px"}}>
            <span dangerouslySetInnerHTML={{__html:renderMarkdown(m.text)}}/>
            {m._cachedAt&&<div style={{fontSize:"10px",color:"rgba(255,255,255,0.25)",marginTop:"6px"}}>Cached · {m._cachedAt} · Refresh for latest</div>}
            {m.role==="nova"&&i===0&&(
              <div style={{marginTop:"12px",paddingTop:"10px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
                <div style={{fontSize:"10px",color:"rgba(255,255,255,0.3)",marginBottom:"6px",textTransform:"uppercase",letterSpacing:".5px"}}>After game — was Nova correct?</div>
                <div style={{display:"flex",gap:"6px"}}>
                  <button onClick={()=>{SportsAccuracy.record(g.id,league,m.text,"won",true);}}
                    style={{flex:1,background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.25)",borderRadius:"8px",padding:"6px",fontFamily:"inherit",fontSize:"12px",color:"var(--green)",cursor:"pointer"}}>✓ Correct</button>
                  <button onClick={()=>{SportsAccuracy.record(g.id,league,m.text,"lost",false);}}
                    style={{flex:1,background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.25)",borderRadius:"8px",padding:"6px",fontFamily:"inherit",fontSize:"12px",color:"var(--red)",cursor:"pointer"}}>✗ Wrong</button>
                </div>
              </div>
            )}
          </div>
        ))}
        {!novaLoading&&novaChat.length===0&&(
          <div style={{fontSize:"12px",color:"rgba(255,255,255,0.3)",fontStyle:"italic"}}>Tap to load Nova's analysis…
            <button onClick={()=>analyzeGame(g)} style={{marginLeft:"8px",background:"var(--blue-bg)",border:"1px solid var(--blue-border)",borderRadius:"6px",padding:"3px 10px",fontFamily:"inherit",fontSize:"11px",color:"var(--blue2)",cursor:"pointer"}}>Analyze ✦</button>
          </div>
        )}
        <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:"10px",marginTop:"8px",display:"flex",gap:"7px"}}>
          <input value={novaInput} onChange={e=>setNovaInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&askNova()}
            placeholder="Ask Nova about this game…"
            style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"8px",padding:"7px 10px",fontFamily:"inherit",fontSize:"12px",color:"var(--text)",outline:"none"}}/>
          <button onClick={askNova} style={{background:"linear-gradient(135deg,var(--blue),var(--nova))",color:"#fff",border:"none",borderRadius:"8px",padding:"7px 14px",fontFamily:"inherit",fontSize:"12px",cursor:"pointer",fontWeight:500}}>Ask</button>
        </div>
      </div>
    </div>
  );

  // ── TOP 5 PICKS PANEL ──
  const Top5Panel = () => (
    <div className="nova-sports" style={{minHeight:"280px"}}>
      <div className="nova-sports-hd">
        <div className="nova-sdot"/>
        Nova · Top 5 Picks Today
        <span style={{marginLeft:"auto",fontSize:"10px",color:"rgba(255,255,255,0.3)"}}>{league.toUpperCase()}</span>
        <button onClick={()=>{LS.del(top5CacheKey(league));loadTop5(league,games);}} style={{background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"6px",color:"rgba(255,255,255,0.4)",fontSize:"11px",cursor:"pointer",padding:"2px 7px",fontFamily:"inherit",marginLeft:"4px"}}>↻</button>
      </div>
      <div className="nova-sbody">
        {top5Loading&&<div className="nova-smsg"><div className="dots"><div className="dot"/><div className="dot"/><div className="dot"/></div></div>}
        {!top5Loading&&!top5&&games.length===0&&<div className="nova-smsg" style={{fontStyle:"italic",opacity:.5}}>Load games to enable picks.</div>}
        {!top5Loading&&!top5&&games.length>0&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"10px",padding:"20px 0"}}>
            <div style={{fontSize:"12px",color:"rgba(255,255,255,0.4)",textAlign:"center",lineHeight:1.5}}>Nova will analyze today's {league.toUpperCase()} odds and pick the 5 strongest statistical bets.</div>
            <button onClick={()=>loadTop5(league,games)} style={{background:"linear-gradient(135deg,var(--blue),var(--nova))",color:"#fff",border:"none",borderRadius:"10px",padding:"9px 20px",fontFamily:"inherit",fontSize:"13px",fontWeight:600,cursor:"pointer"}}>✦ Generate Picks</button>
          </div>
        )}
        {top5?.picks?.map((p,i)=>(
          <div key={i} className="sp-pick">
            <div className="sp-pick-rank">{p.rank||i+1}</div>
            <div className="sp-pick-body">
              <div className="sp-pick-name">{p.pick}</div>
              <div className="sp-pick-reason">{p.reason}</div>
              <div style={{fontSize:"10px",marginTop:"3px",color:p.confidence==="High"?"var(--green)":"var(--amber)"}}>{p.confidence} confidence · {p.type}</div>
            </div>
            <div className="sp-pick-odds">{p.odds}</div>
          </div>
        ))}
        {top5?.parlay&&(
          <div className="sp-parlay">
            <div className="sp-parlay-hd">✦ Parlay: {top5.parlay.combined_odds}</div>
            <div style={{fontSize:"11px",color:"rgba(255,255,255,0.5)",lineHeight:1.5}}>{top5.parlay.legs?.join(" + ")}</div>
            <div style={{fontSize:"10px",color:"rgba(255,255,255,0.35)",marginTop:"3px"}}>{top5.parlay.reason}</div>
          </div>
        )}
        {(()=>{ const s=SportsAccuracy.stats(league); return s.total>0?(
          <div style={{padding:"6px 0",fontSize:"11px",color:"rgba(255,255,255,0.3)",display:"flex",alignItems:"center",gap:"6px",borderTop:"1px solid rgba(255,255,255,0.05)",marginTop:"4px",paddingTop:"8px"}}>
            <span style={{color:s.pct>=55?"var(--green)":s.pct>=45?"var(--amber)":"var(--red)",fontWeight:500}}>{s.pct}%</span>
            <span>accuracy · {s.wins}/{s.total} tracked picks</span>
          </div>
        ):null; })()}
      </div>
    </div>
  );

  let lastDate = "";

  // ── ACCURACY MODAL ──
  const AccuracyModal = () => {
    // Read from Supabase-backed cache if fresh (< 1hr), else fall back to localStorage
    const supabaseAcc = LS.get("nova_picks_accuracy", null);
    const useSupabase = supabaseAcc && (Date.now() - (supabaseAcc.fetched||0) < 3600000);
    const allRecords = useSupabase
      ? Object.entries(supabaseAcc.by_league || {}).flatMap(([lg, s]) =>
          Array.from({length: s.total}, (_, i) => ({
            league: lg,
            correct: i < s.wins ? true : null,
            pick: lg.toUpperCase()+" pick",
            date: new Date().toISOString(),
          }))
        )
      : SportsAccuracy.get();
    const today = dateKey(new Date());
    const yesterday = dateKey(new Date(Date.now() - 86400000));
    const leagues = ["nhl","nba","nfl","mlb"];

    const byDate = (date) => allRecords.filter(r => r.date?.startsWith(date));
    const byLeague = (recs, lg) => recs.filter(r => r.league === lg);

    const statsFor = (recs) => {
      const done = recs.filter(r => r.correct !== null);
      const wins = done.filter(r => r.correct).length;
      return { total: recs.length, done: done.length, wins, pct: done.length > 0 ? Math.round((wins/done.length)*100) : null };
    };

    const todayRecs = byDate(today);
    const ydRecs    = byDate(yesterday);
    const allDone   = allRecords.filter(r => r.correct !== null);
    const overallWins = allDone.filter(r => r.correct).length;
    const overallPct = allDone.length > 0 ? Math.round((overallWins/allDone.length)*100) : null;

    const PctBadge = ({pct}) => {
      if(pct===null) return <span style={{fontSize:"11px",color:"rgba(255,255,255,0.3)"}}>—</span>;
      const c = pct>=55?"var(--green)":pct>=45?"var(--amber)":"var(--red)";
      return <span style={{fontSize:"13px",fontWeight:700,color:c}}>{pct}%</span>;
    };

    const RecordRow = ({r,i}) => {
      const isCorrect = r.correct === true;
      const isWrong   = r.correct === false;
      const isPending = r.correct === null;
      return (
        <div key={i} style={{display:"flex",alignItems:"flex-start",gap:"8px",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
          <div style={{width:"18px",height:"18px",borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",marginTop:"1px",
            background:isCorrect?"rgba(34,197,94,0.15)":isWrong?"rgba(248,113,113,0.15)":"rgba(255,255,255,0.05)",
            border:"1px solid "+(isCorrect?"rgba(34,197,94,0.3)":isWrong?"rgba(248,113,113,0.3)":"rgba(255,255,255,0.1)"),
            color:isCorrect?"var(--green)":isWrong?"var(--red)":"rgba(255,255,255,0.3)"}}>
            {isCorrect?"✓":isWrong?"✗":"·"}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:"12px",color:isPending?"rgba(255,255,255,0.4)":isCorrect?"rgba(255,255,255,0.8)":"rgba(255,255,255,0.5)",
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textDecoration:isWrong?"line-through":"none"}}>
              {r.pick?.split("\n")[0]?.replace(/\*\*/g,"")?.slice(0,60) || "Pick"}
            </div>
            <div style={{fontSize:"10px",color:"rgba(255,255,255,0.25)",marginTop:"2px"}}>
              {r.league?.toUpperCase()} · {isPending?"Pending":isCorrect?"Correct":"Wrong"}
              {r.outcome&&r.outcome!=="won"&&r.outcome!=="lost"&&<span> · {r.outcome.slice(0,40)}</span>}
            </div>
          </div>
          {isPending&&(
            <div style={{display:"flex",gap:"4px",flexShrink:0}}>
              <button onClick={()=>{SportsAccuracy.record(r.gameId,r.league,r.pick,"won",true);setShowAccuracy(false);setTimeout(()=>setShowAccuracy(true),50);}}
                style={{background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:"5px",padding:"2px 7px",fontFamily:"inherit",fontSize:"10px",color:"var(--green)",cursor:"pointer"}}>✓</button>
              <button onClick={()=>{SportsAccuracy.record(r.gameId,r.league,r.pick,"lost",false);setShowAccuracy(false);setTimeout(()=>setShowAccuracy(true),50);}}
                style={{background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:"5px",padding:"2px 7px",fontFamily:"inherit",fontSize:"10px",color:"var(--red)",cursor:"pointer"}}>✗</button>
            </div>
          )}
        </div>
      );
    };

    return (
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",zIndex:90,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}
        onClick={e=>e.target===e.currentTarget&&setShowAccuracy(false)}>
        <div style={{background:"rgba(8,8,14,0.98)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"20px",width:"100%",maxWidth:"480px",maxHeight:"85vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {/* Header */}
          <div style={{padding:"16px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <div>
              <div style={{fontSize:"15px",fontWeight:600,color:"var(--text)"}}>📊 Nova Accuracy</div>
              <div style={{fontSize:"11px",color:"rgba(255,255,255,0.35)",marginTop:"2px"}}>Sports picks tracking</div>
            </div>
            <button onClick={()=>setShowAccuracy(false)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.4)",fontSize:"20px",cursor:"pointer",lineHeight:1}}>✕</button>
          </div>
          <div style={{overflowY:"auto",flex:1,padding:"16px 20px"}}>
            {/* Overall stats row */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px",marginBottom:"20px"}}>
              {[["Overall",{pct:overallPct,wins:overallWins,done:allDone.length}],
                ...leagues.map(lg=>[lg.toUpperCase(),statsFor(allRecords.filter(r=>r.league===lg))])
              ].map(([lbl,s],i)=>(
                <div key={i} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"10px",padding:"10px 8px",textAlign:"center"}}>
                  <div style={{fontSize:"10px",color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:"5px"}}>{lbl}</div>
                  <PctBadge pct={typeof s.pct==="number"?s.pct:s.pct}/>
                  <div style={{fontSize:"10px",color:"rgba(255,255,255,0.25)",marginTop:"3px"}}>{s.wins||0}/{s.done||0}</div>
                </div>
              ))}
            </div>

            {/* Yesterday section */}
            <div style={{marginBottom:"16px"}}>
              <div style={{fontSize:"11px",fontWeight:600,letterSpacing:".8px",textTransform:"uppercase",color:"rgba(255,255,255,0.35)",marginBottom:"8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span>Yesterday</span>
                {ydRecs.length>0&&<span style={{color:statsFor(ydRecs).pct>=50?"var(--green)":"var(--red)",fontWeight:700}}>{statsFor(ydRecs).pct}% · {statsFor(ydRecs).wins}/{statsFor(ydRecs).done}</span>}
              </div>
              {ydRecs.length===0
                ? <div style={{fontSize:"12px",color:"rgba(255,255,255,0.25)",fontStyle:"italic"}}>No picks recorded yesterday.</div>
                : ydRecs.map((r,i)=><RecordRow key={i} r={r} i={i}/>)
              }
            </div>

            {/* Today section */}
            <div style={{marginBottom:"16px"}}>
              <div style={{fontSize:"11px",fontWeight:600,letterSpacing:".8px",textTransform:"uppercase",color:"rgba(255,255,255,0.35)",marginBottom:"8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span>Today</span>
                {todayRecs.filter(r=>r.correct!==null).length>0&&(
                  <span style={{color:statsFor(todayRecs).pct>=50?"var(--green)":"var(--red)",fontWeight:700}}>{statsFor(todayRecs).pct}% · {statsFor(todayRecs).wins}/{statsFor(todayRecs).done}</span>
                )}
              </div>
              {todayRecs.length===0
                ? <div style={{fontSize:"12px",color:"rgba(255,255,255,0.25)",fontStyle:"italic"}}>No picks recorded today yet.</div>
                : todayRecs.map((r,i)=><RecordRow key={i} r={r} i={i}/>)
              }
            </div>

            {/* All time section */}
            {allRecords.length > (todayRecs.length + ydRecs.length) && (
              <div>
                <div style={{fontSize:"11px",fontWeight:600,letterSpacing:".8px",textTransform:"uppercase",color:"rgba(255,255,255,0.35)",marginBottom:"8px"}}>All time</div>
                {allRecords
                  .filter(r=>!r.date?.startsWith(today)&&!r.date?.startsWith(yesterday))
                  .slice(0,15)
                  .map((r,i)=><RecordRow key={i} r={r} i={i}/>)
                }
              </div>
            )}

            {allRecords.length===0&&(
              <div style={{textAlign:"center",padding:"24px 0",color:"rgba(255,255,255,0.25)",fontSize:"13px",fontStyle:"italic"}}>
                No picks tracked yet. Analyze games and mark results to build your accuracy history.
              </div>
            )}
          </div>
          <div style={{padding:"12px 20px",borderTop:"1px solid rgba(255,255,255,0.07)",flexShrink:0,display:"flex",justifyContent:"flex-end"}}>
            <button onClick={()=>{if(window.confirm("Clear all accuracy history?")) { LS.set("nova_sports_accuracy",[]); setShowAccuracy(false); }}}
              style={{background:"none",border:"none",color:"rgba(255,255,255,0.25)",fontSize:"11px",cursor:"pointer",fontFamily:"inherit"}}>Clear history</button>
          </div>
        </div>
      </div>
    );
  };

  return(
    <div style={{padding:isDesktop?"0":"0 0 100px"}}>
            {showAccuracy&&<AccuracyModal/>}
      {/* Mobile floating Nova panel */}
      {!isDesktop&&selectedGame&&(
        <button style={{position:"fixed",bottom:"80px",right:"16px",background:"linear-gradient(135deg,var(--blue),var(--nova))",color:"#fff",border:"none",borderRadius:"20px",padding:"8px 16px",fontFamily:"inherit",fontSize:"13px",fontWeight:600,cursor:"pointer",zIndex:40,display:"flex",alignItems:"center",gap:"6px"}}
          onClick={()=>setMobileNovaOpen(p=>!p)}>
          ✦ {mobileNovaOpen?"Hide Nova":"Nova's Analysis"}
        </button>
      )}
      {!isDesktop&&mobileNovaOpen&&selectedGame&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,height:"60vh",background:"rgba(5,5,10,0.97)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderTop:"1px solid var(--nova-border)",borderTopLeftRadius:"16px",borderTopRightRadius:"16px",zIndex:48,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{display:"flex",justifyContent:"center",padding:"8px 0",flexShrink:0}} onClick={()=>setMobileNovaOpen(false)}>
            <div style={{width:"32px",height:"3px",borderRadius:"2px",background:"rgba(255,255,255,0.2)"}}/>
          </div>
          <div style={{flex:1,overflow:"auto",padding:"0 14px 14px"}}>
            <GameDetailView g={selectedGame}/>
          </div>
        </div>
      )}

      <div style={isDesktop?{display:"flex",flexDirection:"column",height:"calc(100vh - 54px)",padding:"16px",gap:"0"}:{padding:"16px"}}>
        {/* Header row */}
        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"14px",flexWrap:"wrap",flexShrink:0}}>
          <div className="sp-leagues">
            {SPORT_LEAGUES.map(l=>(
              <button key={l.id} className={"sp-lbtn"+(league===l.id?" on":"")} onClick={()=>setLeague(l.id)}>{l.label}</button>
            ))}
          </div>
          {selectedGame&&<button onClick={()=>{setSelectedGame(null);setNovaChat([]);}} style={{fontSize:"12px",color:"var(--blue2)",background:"var(--blue-bg)",border:"1px solid var(--blue-border)",borderRadius:"20px",padding:"4px 12px",cursor:"pointer",fontFamily:"inherit"}}>← All Games</button>}
          {quotaLeft!==null&&<span className="sp-quota">{quotaLeft} calls left</span>}
          <button onClick={()=>setShowAccuracy(true)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"8px",padding:"5px 12px",fontFamily:"inherit",fontSize:"12px",color:"rgba(255,255,255,0.5)",cursor:"pointer"}}>📊 Accuracy</button>
          <button className="sbtn" style={{marginLeft:"auto"}} onClick={()=>{LS.del(cacheKey(league));LS.del(cacheTimeKey(league));fetchGames(league);}}>↻ Refresh</button>
        </div>

        {isDesktop?(
          <div className="sp-layout" style={{flex:1,overflow:"hidden",minHeight:0}}>
            {/* Left: game list or detail */}
            <div style={{overflowY:"auto"}}>
              {loading&&<div className="empty">Fetching odds…</div>}
              {error&&<div className="empty" style={{color:"var(--red)"}}>{error}</div>}
              {!loading&&!error&&games.length===0&&<div className="empty">No upcoming games. Check Odds API key in Cloudflare.</div>}
              {!loading&&!selectedGame&&games.map(g=>{
                let dateSep = null;
                if(g.date!==lastDate){dateSep=<div key={"d"+g.date} className="sp-date">{g.date}</div>;lastDate=g.date;}
                return [dateSep,<GameCard key={g.id} g={g} selected={false} onSelect={()=>analyzeGame(g)} fmtOdds={fmtOdds}/>];
              })}
              {!loading&&selectedGame&&<GameDetailView g={selectedGame}/>}
            </div>
            {/* Right: Top 5 picks */}
            <div style={{overflow:"hidden",display:"flex",flexDirection:"column"}}>
              <Top5Panel/>
            </div>
          </div>
        ):(
          <div>
            {loading&&<div className="empty">Fetching odds…</div>}
            {error&&<div className="empty" style={{color:"var(--red)"}}>{error}</div>}
            {!loading&&!error&&games.length===0&&<div className="empty">No upcoming games.</div>}
            {/* Mobile Top Picks panel */}
            {!loading&&!selectedGame&&games.length>0&&(
              <div style={{marginBottom:"12px",background:"rgba(129,140,248,0.06)",border:"1px solid var(--nova-border)",borderRadius:"12px",padding:"12px 14px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
                  <span style={{fontSize:"12px",fontWeight:600,color:"var(--nova2)"}}>✦ Nova's Top Picks</span>
                  {!top5&&<button className="sbtn" style={{fontSize:"11px",color:"var(--nova)",borderColor:"var(--nova-border)"}}
                    onClick={()=>loadTop5(league,games)} disabled={top5Loading}>
                    {top5Loading?"Generating…":"Generate Picks ✦"}
                  </button>}
                  {top5&&<button className="sbtn" style={{fontSize:"10px"}} onClick={()=>{LS.del(top5CacheKey(league));setTop5(null);}}>↻ Refresh</button>}
                </div>
                {top5Loading&&<div className="dots"><div className="dot"/><div className="dot"/><div className="dot"/></div>}
                {top5&&top5.picks&&(
                  <div>
                    {top5.picks.slice(0,3).map((p,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"flex-start",gap:"8px",padding:"7px 0",borderBottom:i<2?"1px solid rgba(255,255,255,0.05)":"none"}}>
                        <span style={{fontSize:"10px",color:"var(--nova2)",background:"var(--nova-bg)",border:"1px solid var(--nova-border)",borderRadius:"20px",padding:"1px 7px",flexShrink:0,marginTop:"2px"}}>#{p.rank}</span>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:"12px",fontWeight:600,color:"var(--text)"}}>{p.pick} <span style={{color:"var(--green)",fontSize:"11px"}}>{p.odds}</span></div>
                          <div style={{fontSize:"11px",color:"var(--muted)",marginTop:"1px"}}>{p.reason}</div>
                        </div>
                        <span style={{fontSize:"10px",color:p.confidence==="High"?"var(--green)":"var(--amber)",flexShrink:0,marginTop:"2px"}}>{p.confidence}</span>
                      </div>
                    ))}
                    {top5.parlay&&(
                      <div style={{marginTop:"8px",padding:"8px 10px",background:"rgba(34,197,94,0.06)",border:"1px solid rgba(34,197,94,0.15)",borderRadius:"8px"}}>
                        <div style={{fontSize:"10px",color:"var(--green)",fontWeight:600,marginBottom:"3px"}}>⚡ Parlay: {top5.parlay.combined_odds}</div>
                        <div style={{fontSize:"11px",color:"rgba(255,255,255,0.5)"}}>{top5.parlay.legs?.join(" + ")}</div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}
            {/* Mobile: show detail OR list */}
            {!loading&&selectedGame&&<GameDetailView g={selectedGame}/>}
            {!loading&&!selectedGame&&games.map(g=>{
              let dateSep = null;
              if(g.date!==lastDate){dateSep=<div key={"d"+g.date} className="sp-date">{g.date}</div>;lastDate=g.date;}
              return [dateSep,<GameCard key={g.id} g={g} selected={false} onSelect={()=>{setSelectedGame(g);analyzeGame(g);}} fmtOdds={fmtOdds}/>];
            })}
          </div>
        )}
      </div>
    </div>
  );
}


function GameCard({ g, selected, onSelect, fmtOdds }) {
  return(
    <div className={"sp-card"+(selected?" sel":"")} onClick={onSelect}>
      <div className="sp-teams">
        <div className="sp-team">
          <div className="sp-abbr">{g.away}</div>
          <div className="sp-full">{g.awayFull}</div>
          <div className="sp-prob" style={{color:"var(--muted)"}}>{100-g.homeProb}%</div>
        </div>
        <div className="sp-vs">
          <div className="sp-at">@</div>
          <div className="sp-time">{g.time}</div>
        </div>
        <div className="sp-team">
          <div className="sp-abbr">{g.home}</div>
          <div className="sp-full">{g.homeFull}</div>
          <div className="sp-prob" style={{color:"var(--blue2)",fontWeight:600}}>{g.homeProb}%</div>
        </div>
      </div>
      <div className="sp-bar-wrap">
        <div className="sp-bar-lbs">
          <span>{g.away} win prob</span>
          <span>{g.home} win prob</span>
        </div>
        <div className="sp-bar"><div className="sp-bar-fill" style={{width:g.homeProb+"%"}}/></div>
      </div>
      <div className="sp-odds">
        <span>{g.awayFull.split(" ").slice(-1)[0]} {fmtOdds(g.awayOdds)}</span>
        <span>{g.homeFull.split(" ").slice(-1)[0]} {fmtOdds(g.homeOdds)}</span>
        {selected&&<span style={{marginLeft:"auto",color:"var(--nova2)",borderColor:"var(--nova-border)",background:"var(--nova-bg)"}}>✦ Analyzed</span>}
      </div>
    </div>
  );
}

function _GymTabPlaceholder({ isDesktop }) {
  return null;
}
