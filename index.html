  <title>Nova Dashboard</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #000; }
    #root { height: 100%; }
    body { overscroll-behavior: none; }

  *::-webkit-scrollbar{width:4px;height:4px;background:transparent;}
  *::-webkit-scrollbar-track{background:transparent;}
  *::-webkit-scrollbar-thumb{background:transparent;border-radius:4px;}
  *::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.08);}
  *{scrollbar-width:none;}
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#000000;
    --surf:rgba(255,255,255,0.03);
    --card:rgba(255,255,255,0.05);
    --card-solid:#0d0d0d;
    --b1:rgba(255,255,255,0.07);
    --b2:rgba(255,255,255,0.13);
    --text:#ffffff;
    --muted:rgba(255,255,255,0.35);
    --soft:rgba(255,255,255,0.6);
    --green:#22c55e;--red:#f87171;--amber:#f59e0b;
    --blue:#3b82f6;--blue2:#60a5fa;--blue-bg:rgba(59,130,246,0.1);--blue-border:rgba(59,130,246,0.25);--blue-glow:0 0 20px rgba(59,130,246,0.35);
    --nova:#818cf8;--nova2:#a5b4fc;--nova-bg:rgba(129,140,248,0.08);--nova-border:rgba(129,140,248,0.2);--nova-glow:0 0 20px rgba(129,140,248,0.35);
    --glass:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.08);--blur:blur(16px);--radius:14px;
  }
  body{font-family:'Geist',-apple-system,sans-serif;background:#000;color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
  .shell{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  .glass{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--radius);}
  @supports not (backdrop-filter:blur(1px)){.glass{background:rgba(20,20,28,0.95);}}

  /* LOGIN */
  .lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .lb{width:100%;max-width:340px;background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:36px 32px;}
  .lt{font-size:22px;font-weight:600;margin-bottom:6px;letter-spacing:-.3px;}
  .ls{font-size:13px;color:var(--muted);margin-bottom:32px;}
  .fl{font-size:12px;font-weight:500;color:var(--soft);margin-bottom:8px;display:block;}
  .fi{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:13px 16px;font-family:inherit;font-size:15px;color:var(--text);outline:none;margin-bottom:16px;}
  .fi:focus{border-color:var(--blue-border);box-shadow:0 0 0 3px rgba(59,130,246,0.15);}
  .fi::placeholder{color:var(--muted);}
  .lbtn{width:100%;background:linear-gradient(135deg,var(--blue),var(--nova));color:#fff;border:none;border-radius:10px;padding:13px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;}
  .lbtn:hover{opacity:.9;}
  .lerr{font-size:13px;color:var(--red);margin-top:12px;text-align:center;}

  /* HEADER */
  .hd{padding:36px 24px 0 64px;display:flex;justify-content:space-between;align-items:flex-start;}
  .hd-g{font-size:13px;color:var(--muted);margin-bottom:4px;}
  .hd-n{font-size:26px;font-weight:600;letter-spacing:-.5px;}
  .hd-r{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .hd-d{font-size:12px;color:var(--muted);}
  .hd-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
  .lockbtn{font-size:12px;color:var(--soft);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:5px 10px;cursor:pointer;font-family:inherit;transition:all .15s;}
  .lockbtn:hover{color:var(--text);border-color:var(--blue-border);background:var(--blue-bg);}

  /* CALENDAR PROGRESS (replaces habits) */
  .cal-progress{margin:20px 24px 0;background:rgba(255,255,255,0.04);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--radius);padding:16px 20px;}
  .cal-prog-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .cal-prog-label{font-size:13px;color:var(--soft);}
  .cal-prog-pct{font-size:13px;font-weight:600;}
  .cal-prog-bar{height:5px;background:var(--b1);border-radius:99px;overflow:hidden;margin-bottom:10px;}
  .cal-prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--nova));transition:width .5s ease;}
  .cal-prog-fill.done{background:var(--green);}
  .cal-tasks{display:flex;flex-direction:column;gap:6px;}
  .cal-task{display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;cursor:pointer;transition:all .15s;}
  .cal-task:hover{border-color:var(--blue-border);background:var(--blue-bg);}
  .cal-task.done{opacity:.55;}
  .cal-task-ck{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;flex-shrink:0;transition:all .2s;}
  .cal-task.done .cal-task-ck{background:var(--green);border-color:var(--green);color:var(--bg);}
  .cal-task-body{flex:1;min-width:0;}
  .cal-task-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cal-task.done .cal-task-title{text-decoration:line-through;color:var(--muted);}
  .cal-task-time{font-size:11px;color:var(--muted);}
  .cal-empty{text-align:center;padding:12px 0;}
  .cal-empty-msg{font-size:13px;color:var(--soft);line-height:1.6;margin-bottom:4px;}
  .cal-nova-msg{font-size:12px;color:var(--nova);font-style:italic;}

  /* NOVA SUMMARY */
  .nsum{margin:14px 24px 0;background:rgba(129,140,248,0.06);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--nova-border);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden;}
  .nsum::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--nova));opacity:.8;}
  .nst{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .nav2{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--nova));display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
  .nlbl{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--nova);}
  .nref{margin-left:auto;font-size:11px;color:var(--muted);background:none;border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:3px 8px;cursor:pointer;font-family:inherit;}
  .nref:hover{color:var(--text);}
  .ntxt{font-size:13.5px;line-height:1.65;color:var(--soft);}
  .neta{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.07);font-size:12px;color:var(--muted);}
  .neta b{color:var(--amber);font-weight:500;}

  /* RECAP CARD */
  .recap-card{margin:14px 24px 0;background:rgba(129,140,248,0.06);backdrop-filter:blur(12px);border:1px solid var(--nova-border);border-radius:14px;padding:14px 16px;}
  .recap-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .recap-title{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--nova);}
  .recap-close{font-size:14px;color:var(--muted);background:none;border:none;cursor:pointer;}
  .recap-body{font-size:13px;color:var(--soft);line-height:1.6;}

  /* FOCUS LIST */
  .focus-wrap{margin:14px 24px 0;}
  .focus-card{background:rgba(255,255,255,0.04);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--radius);padding:14px 16px;}
  .focus-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .focus-title{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);}
  .focus-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
  .focus-item:last-child{border-bottom:none;padding-bottom:0;}
  .focus-num{font-size:11px;font-weight:600;color:var(--muted);width:16px;flex-shrink:0;text-align:center;}
  .focus-num.p1{color:#fbbf24;}.focus-num.p2{color:rgba(255,255,255,0.5);}.focus-num.p3{color:rgba(255,255,255,0.3);}
  .focus-ck{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;cursor:pointer;transition:all .2s;flex-shrink:0;}
  .focus-ck.on{background:#22c55e;border-color:#22c55e;color:var(--bg);}
  .focus-txt{flex:1;font-size:14px;color:var(--text);}
  .focus-txt.on{text-decoration:line-through;color:var(--muted);}
  .focus-del{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;opacity:0;padding:0 2px;flex-shrink:0;}
  .focus-item:hover .focus-del{opacity:.6;}
  .focus-input-row{display:flex;align-items:center;gap:8px;padding:8px 0 0;}
  .focus-input{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:13px;color:var(--text);}
  .focus-input::placeholder{color:var(--muted);}
  .focus-add{font-size:18px;color:var(--muted);background:none;border:none;cursor:pointer;}
  .focus-empty{font-size:13px;color:var(--muted);padding:8px 0;font-style:italic;}

  /* SECTION */
  .sec{padding:22px 24px 0;}
  .sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .stitle{font-size:11px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted);}
  .sbtn{font-size:12px;color:var(--muted);background:none;border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit;transition:all .15s;}
  .sbtn:hover{color:var(--soft);border-color:var(--b2);}
  .sbtn-row{display:flex;gap:6px;}

  /* SYNC BAR */
  .syncbar{display:flex;align-items:center;gap:8px;font-size:12px;color:#22c55e;background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);border-radius:9px;padding:8px 13px;margin-bottom:10px;}
  .sdot{width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0;animation:pulse 2.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* EVENTS */
  .ev{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:13px;transition:all .15s;animation:up .3s ease both;}
  @keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .ev:hover{border-color:var(--blue-border);background:var(--blue-bg);}
  .edot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .ebody{flex:1;min-width:0;}
  .etitle{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
  .etime{font-size:12px;color:var(--muted);}
  .etag{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;flex-shrink:0;}
  .t-soon{background:rgba(248,113,113,.12);color:var(--red);}
  .t-later{background:rgba(96,165,250,.12);color:var(--blue);}
  .t-done{background:rgba(74,222,128,.1);color:var(--green);}

  /* WEEK */
  .wday{background:rgba(255,255,255,0.03);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.06);border-radius:12px;margin-bottom:8px;overflow:hidden;animation:up .3s ease both;}
  .wdh{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;}
  .wdh:hover{background:rgba(255,255,255,.02);}
  .wdhl{display:flex;align-items:center;gap:10px;}
  .wdow{font-size:14px;font-weight:500;}
  .wdate{font-size:12px;color:var(--muted);}
  .wcount{font-size:11px;color:var(--muted);}
  .wcount.has{color:var(--blue);}
  .wbody{padding:0 16px 4px;}
  .witem{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid rgba(255,255,255,0.07);}
  .wdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .wtime{font-size:11px;color:var(--muted);flex-shrink:0;min-width:44px;}
  .wtxt{font-size:13px;color:var(--soft);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .wck{width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;cursor:pointer;transition:all .2s;flex-shrink:0;}
  .wck.on{background:#22c55e;border-color:#22c55e;color:var(--bg);}
  .wadd{display:flex;align-items:center;gap:8px;padding:8px 16px;border-top:1px solid rgba(255,255,255,0.07);}
  .winput{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:13px;color:var(--text);}
  .winput::placeholder{color:var(--muted);}
  .wplus{font-size:18px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0 2px;}

  /* LOG */
  .irow{display:flex;gap:8px;margin-bottom:14px;}
  .ifield{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 14px;font-family:inherit;font-size:14px;color:var(--text);outline:none;transition:all .15s;}
  .ifield:focus{border-color:var(--blue-border);box-shadow:0 0 0 3px rgba(59,130,246,0.12);}
  .ifield::placeholder{color:var(--muted);}
  .iplus{width:44px;height:44px;border-radius:10px;background:var(--nova);border:none;cursor:pointer;font-size:20px;color:#fff;font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .iplus:hover{opacity:.85;}
  .logitem{display:flex;gap:12px;padding:11px 14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;margin-bottom:7px;animation:up .25s ease both;align-items:flex-start;}
  .logtime{font-size:11px;color:var(--muted);flex-shrink:0;padding-top:2px;min-width:42px;}
  .logtxt{font-size:13px;color:var(--soft);line-height:1.4;flex:1;}
  .logdel{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;opacity:0;flex-shrink:0;padding:0 2px;}
  .logitem:hover .logdel{opacity:.6;}

  /* NOVA CHAT ── full layout */
  .nova-page{display:flex;flex-direction:column;height:calc(100vh - 68px);position:relative;}
  .nova-page.in-drawer{height:100%;min-height:0;}
  .nova-sidebar-toggle{position:absolute;top:0;left:0;z-index:10;background:none;border:none;cursor:pointer;padding:8px;color:var(--muted);font-size:18px;}
  .nova-sidebar-toggle:hover{color:var(--text);}
  /* Sidebar: slide over on mobile, push content right on desktop */
  .nova-page{display:flex;flex-direction:row;height:100%;overflow:hidden;}
  .nova-sidebar{width:0;min-width:0;flex-shrink:0;background:rgba(255,255,255,0.04);border-right:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;overflow:hidden;transition:width .25s ease,min-width .25s ease;}
  .nova-sidebar.open{width:240px;min-width:240px;}
  .novawrap{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
  /* Mobile: slide-over overlay instead of push */
  @media(max-width:767px){
    .nova-sidebar{position:absolute;top:0;left:0;bottom:0;width:240px;z-index:20;transform:translateX(-100%);transition:transform .25s ease;}
    .nova-sidebar.open{transform:translateX(0);width:240px;min-width:240px;}
    .novawrap{width:100%;}
  }
  .nova-sidebar-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:15;display:none;}
  .nova-sidebar-overlay.open{display:block;}
  .nova-sidebar-hd{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;}
  .nova-sidebar-title{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
  .nova-sidebar-close{font-size:18px;color:var(--muted);background:none;border:none;cursor:pointer;}
  .nova-sidebar-list{flex:1;overflow-y:auto;padding:10px 12px;}
  .nova-sidebar-list::-webkit-scrollbar{width:3px;background:transparent;}
  .nova-sidebar-list::-webkit-scrollbar-thumb{background:transparent;border-radius:3px;}
  .nova-sess-item{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:6px;border:1px solid transparent;transition:border-color .15s;}

  .frow{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}

  /* SETTINGS */
  .settings-modal{background:rgba(10,10,15,0.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:28px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;}

  /* MISC */
  .dots{display:flex;gap:4px;padding:3px 0;}
  .dot{width:4px;height:4px;border-radius:50%;background:var(--muted);animation:bounce 1.2s ease-in-out infinite;}
  .dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:20px 0;line-height:1.6;}
  .spacer{height:32px;}

  /* INBOX */
  .inbox-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s;}

  .inbox-dot-done{background:var(--green);}
  .inbox-dot-error{background:var(--red);}
  @keyframes inboxPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

  @keyframes inboxShim{0%,100%{opacity:.3}50%{opacity:.7}}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes voicePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

// ── TOTP (2FA) ──
const TOTP = {
  generateSecret: () => { const c='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567'; let s=''; for(let i=0;i<32;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; },
  b32decode: s => { const c='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567'; let bits=0,val=0; const out=[]; for(const ch of s.toUpperCase().replace(/=+$/,'')){ val=(val<<5)|c.indexOf(ch); bits+=5; if(bits>=8){bits-=8;out.push((val>>bits)&0xff);}} return new Uint8Array(out); },
  hmacSHA1: async (k,m) => { const key=await crypto.subtle.importKey('raw',k,{name:'HMAC',hash:'SHA-1'},false,['sign']); return new Uint8Array(await crypto.subtle.sign('HMAC',key,m)); },
  generate: async secret => {
    const ctr=Math.floor(Date.now()/1000/30), msg=new ArrayBuffer(8), v=new DataView(msg);
    v.setUint32(4,ctr,false);
    const h=await TOTP.hmacSHA1(TOTP.b32decode(secret),new Uint8Array(msg));
    const off=h[h.length-1]&0x0f;
    return String(((h[off]&0x7f)<<24|h[off+1]<<16|h[off+2]<<8|h[off+3])%1000000).padStart(6,'0');
  },
  verify: async (secret,token) => {
    const ctr=Math.floor(Date.now()/1000/30);
    for(let d=-1;d<=1;d++){
      const msg=new ArrayBuffer(8); new DataView(msg).setUint32(4,ctr+d,false);
      const h=await TOTP.hmacSHA1(TOTP.b32decode(secret),new Uint8Array(msg));
      const off=h[h.length-1]&0x0f;
      if(String(((h[off]&0x7f)<<24|h[off+1]<<16|h[off+2]<<8|h[off+3])%1000000).padStart(6,'0')===token) return true;
    }
    return false;
  },
  otpauthUrl: (s,l='Nova Dashboard',i='Nova') => `otpauth://totp/${encodeURIComponent(i)}:${encodeURIComponent(l)}?secret=${s}&issuer=${encodeURIComponent(i)}&algorithm=SHA1&digits=6&period=30`,
};

const callWorker = async (action, payload={}, retries=1) => {
  const headers = {"Content-Type":"application/json"};
  const t = AUTH.token();
  if(t) headers["X-Session-Token"] = t;
  let lastErr = null;
  for(let i=0; i<=retries; i++){
    try{
      const controller = new AbortController();
      const timeout = setTimeout(()=>controller.abort(), 20000);
      const res = await fetch(API,{
        method:"POST", headers,
        body:JSON.stringify({action,...payload}),
        signal: controller.signal,
      });
      clearTimeout(timeout);
      // If Worker issued a new rotated token, save it automatically
      const newToken = res.headers.get("X-New-Token");
      if(newToken) {
        const expiry = new Date(Date.now() + 7*24*60*60*1000).toISOString();
        AUTH.save(newToken, expiry);
      }
      const data = await res.json().catch(()=>({error:"HTTP "+res.status+" (no body)"}));
      return data;
    }catch(e){
      lastErr = e.name==="AbortError" ? new Error("Request timed out — check your connection") : e;
      if(i<retries) await new Promise(r=>setTimeout(r,1500));
    }
  }
  throw lastErr;
};

// ── MARKDOWN RENDERER ──
function renderMarkdown(text) {
  if (!text) return "";
  const lines = text.split("\n");
  const out = [];
  let listItems = [];
  let listType = null;

  const flushList = () => {
    if (!listItems.length) return;
    const tag = listType === "ul" ? "ul" : "ol";
    out.push("<" + tag + " style=\"margin:6px 0 6px 18px;padding:0;\">" + listItems.join("") + "</" + tag + ">");
    listItems = []; listType = null;
  };

  const inline = s => s
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.*?)\*/g,"<em>$1</em>")
    .replace(/\u0060(.*?)\u0060/g,'<code style="background:rgba(255,255,255,.1);border-radius:3px;padding:1px 4px;font-size:12px;font-family:monospace;">$1</code>');

  for (const raw of lines) {
    const line = raw.trimEnd();
    const bullet   = line.match(/^[\s]*[-•*]\s+(.+)/);
    const numbered = line.match(/^[\s]*\d+\.\s+(.+)/);
    // Order matters: h3 (###) must be checked before h2 (##) and h1 (#)
    const h3 = line.match(/^###\s+(.+)/);
    const h2 = line.match(/^##\s+(.+)/);
    const h1 = line.match(/^#\s+(.+)/);
    const hr = line.match(/^[-*_]{3,}$/) || line.match(/^[━─═]{3,}$/);

    if (bullet) {
      if (listType !== "ul") { flushList(); listType = "ul"; }
      listItems.push("<li style=\"margin:2px 0;line-height:1.55;\">" + inline(bullet[1]) + "</li>");
    } else if (numbered) {
      if (listType !== "ol") { flushList(); listType = "ol"; }
      listItems.push("<li style=\"margin:2px 0;line-height:1.55;\">" + inline(numbered[1]) + "</li>");
    } else if (h3) {
      flushList();
      out.push("<p style=\"font-size:13px;font-weight:600;margin:10px 0 3px;color:var(--soft);\">" + inline(h3[1]) + "</p>");
    } else if (h2) {
      flushList();
      out.push("<p style=\"font-size:13px;font-weight:600;margin:10px 0 3px;color:var(--soft);\">" + inline(h2[1]) + "</p>");
    } else if (h1) {
      flushList();
      out.push("<p style=\"font-size:14px;font-weight:600;margin:8px 0 3px;color:var(--text);\">" + inline(h1[1]) + "</p>");
    } else if (hr) {
      flushList();
      out.push("<p style=\"margin:4px 0;\"></p>");
    } else if (line.trim() === "") {
      flushList();
      if (out.length) out.push('<p style="margin:3px 0;"></p>');
    } else {
      flushList();
      out.push("<p style=\"margin:2px 0;line-height:1.55;\">" + inline(line) + "</p>");
    }
  }
  flushList();
  return out.join("");
}

function Login({ onLogin }) {
  const [pw,setPw]             = useState("");
  const [totp,setTotp]         = useState("");
  const [err,setErr]           = useState("");
  const [loading,setLoading]   = useState(false);
  const [step,setStep]         = useState("password"); // "password" | "totp"
  const [preToken,setPreToken] = useState("");
  const [tsToken,setTsToken]   = useState(""); // Turnstile token
  const [tsReady,setTsReady]   = useState(false);
  const tsRef = useRef(null);
  const tsWidgetId = useRef(null);

  // Mount Turnstile widget on login page
  useEffect(()=>{
    if(step !== "password") return;
    const tryMount = () => {
      if(!window.turnstile || !tsRef.current) return;
      if(tsWidgetId.current) return; // already mounted
      tsWidgetId.current = window.turnstile.render(tsRef.current, {
        sitekey: TURNSTILE_SITE_KEY,
        theme: "dark",
        size: "normal",
        callback: (token) => { setTsToken(token); setTsReady(true); },
        "expired-callback": () => { setTsToken(""); setTsReady(false); },
        "error-callback": () => { setTsToken(""); setTsReady(false); },
      });
    };
    // Try immediately, then retry until Turnstile script loads
    tryMount();
    const interval = setInterval(()=>{ if(window.turnstile){ tryMount(); clearInterval(interval); } }, 200);
    return () => {
      clearInterval(interval);
      if(tsWidgetId.current && window.turnstile) {
        window.turnstile.remove(tsWidgetId.current);
        tsWidgetId.current = null;
      }
    };
  },[step]);

  const goPassword = async () => {
    if(!pw.trim() || loading) return;
    if(!tsToken) { setErr("Please wait for the security check to complete."); return; }
    setLoading(true); setErr("");
    try {
      const d = await callWorker("login", { password: pw, turnstileToken: tsToken });
      if(d.requiresTOTP && d.preToken) {
        setPreToken(d.preToken);
        setStep("totp");
      } else if(d.token) {
        AUTH.save(d.token, d.expiresAt); onLogin(d.token);
      } else {
        setErr(d.error || "Incorrect password.");
        // Reset Turnstile on failure
        if(tsWidgetId.current && window.turnstile) {
          window.turnstile.reset(tsWidgetId.current);
          setTsToken(""); setTsReady(false);
        }
      }
    } catch { setErr("Connection error."); }
    setPw(""); setLoading(false);
  };

  const goTOTP = async () => {
    if(totp.length !== 6 || loading) return;
    setLoading(true); setErr("");
    try {
      const d = await callWorker("verify_totp", { preToken, totpCode: totp });
      if(d.token) {
        AUTH.save(d.token, d.expiresAt); onLogin(d.token);
      } else {
        setErr(d.error || "Incorrect code.");
      }
    } catch { setErr("Connection error."); }
    setTotp(""); setLoading(false);
  };

  if(step === "totp") return(
    <div className="lw"><div className="lb">
      <div className="lt">Two-factor auth</div>
      <div className="ls">Enter the 6-digit code from your authenticator app.</div>
      <label className="fl">Authenticator Code</label>
      <input className="fi" type="text" inputMode="numeric" placeholder="000000" maxLength={6}
        value={totp} onChange={e=>{setTotp(e.target.value.replace(/\D/g,""));setErr("");}}
        onKeyDown={e=>e.key==="Enter"&&goTOTP()} autoFocus style={{letterSpacing:"6px",fontSize:"22px",textAlign:"center"}}/>
      <button className="lbtn" onClick={goTOTP} style={{opacity:loading?.7:1}}>{loading?"Verifying…":"Verify"}</button>
      {err&&<div className="lerr">{err}</div>}
      <button onClick={()=>{setStep("password");setErr("");setPreToken("");}} style={{marginTop:"12px",background:"none",border:"none",color:"var(--muted)",fontSize:"12px",cursor:"pointer",fontFamily:"inherit"}}>← Back to password</button>
    </div></div>
  );

  return(
    <div className="lw"><div className="lb">
      <div className="lt">Welcome back, Demetri.</div>
      <div className="ls">Enter your password to continue.</div>
      <label className="fl">Password</label>
      <input className="fi" type="password" placeholder="••••••••••" value={pw}
        onChange={e=>{setPw(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&goPassword()} autoFocus/>
      {/* Turnstile widget — auto-verifies in background */}
      <div ref={tsRef} style={{margin:"12px 0"}}/>

// ── CALENDAR PROGRESS (replaces habits) ──

  return(
    <div className="cal-progress">

        <span className="cal-prog-label">{allDone?"🎉 All done for today!":"Today's schedule"}</span>

        <div className="cal-empty">
          <div className="cal-empty-msg">No events today</div>

// ── MORNING BRIEF — auto-fires once per day, speaks on first open ──
function DailyGamePlan({ events, activities, completedEvents, focusItems, projects }) {
  const CACHE_KEY  = "nova_brief_text";
  const CACHE_DATE = "nova_brief_date";
  const SPOKE_KEY  = "nova_brief_spoke";

  const isCached = LS.get(CACHE_DATE,"") === todayStr();
  const [text, setText] = useState(isCached ? LS.get(CACHE_KEY,"") : "");
  const [load, setLoad] = useState(false);
  const hasSpoken = useRef(false);

  const speak = (t) => {
    if(!window.speechSynthesis || hasSpoken.current) return;
    if(LS.get(SPOKE_KEY,"") === todayStr()) return; // only speak once per day
    hasSpoken.current = true;
    LS.set(SPOKE_KEY, todayStr());
    const clean = t.replace(/\*\*(.*?)\*\*/g,"$1").replace(/\*(.*?)\*/g,"$1").replace(/\n+/g," ").trim();
    const utt = new SpeechSynthesisUtterance(clean);
    utt.rate = 1.05; utt.pitch = 1.0; utt.volume = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(v=>v.name.includes("Samantha")||v.name.includes("Karen")||v.name.includes("Google UK English Female"));
    if(v) utt.voice = v;
    window.speechSynthesis.speak(utt);
  };

  const generate = useCallback(async (auto=false) => {
    setLoad(true); if(!auto) setText("");
    try {
      const done  = events.filter(e=>completedEvents.has(e.id||e.title)).map(e=>e.title);
      const rem   = events.filter(e=>!completedEvents.has(e.id||e.title)).map(e=>e.title+(e.start?" at "+fmtTime(e.start):""));
      const focus = focusItems.filter(f=>!f.done).map(f=>f.text);
      const todayDate = new Date().toISOString().split("T")[0];
      const logs  = activities.filter(a=>{ const d=a.log_date||(a.created_at?a.created_at.split("T")[0]:null); return !d||d===todayDate; }).slice(0,3).map(a=>a.text);
      const projs = projects.filter(p=>p.status==="In progress").map(p=>p.name).slice(0,3);
      const hour  = new Date().getHours();
      const tone  = hour<12?"energizing morning brief":hour<17?"afternoon check-in":"evening wrap-up";

      const briefPrompt = "You are Nova — Demetri's Jarvis. Write a "+tone+" in 3 sentences max. Be specific, reference real items by name. No filler. Jarvis energy only.\n\nEvents remaining: "+(rem.join(", ")||"none")+"\nFocus: "+(focus.join(", ")||"none set")+"\nProjects active: "+(projs.join(", ")||"none")+"\nRecent activity: "+(logs.join(", ")||"nothing yet")+"\nDate: "+fmtDate();
      const d = await callAPI([{role:"user",content:briefPrompt}],{max_tokens:200});

      const t = (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      setText(t);
      LS.set(CACHE_KEY, t);
      LS.set(CACHE_DATE, todayStr());
      // Also store for Nova intro
      LS.set("nova_brief_text", t);
      LS.set("nova_brief_date", new Date().toDateString());
      if(auto) setTimeout(()=>speak(t), 800);
    } catch(e) { if(!auto) setText("Brief unavailable — check connection."); }
    setLoad(false);
  }, [events, activities, completedEvents, focusItems, projects]);

  // Auto-fire once per day when data is loaded
  useEffect(()=>{
    if(isCached && text) return; // already have today's brief
    if(events.length === 0 && focusItems.length === 0) return; // wait for data
    generate(true);
  }, [events.length, focusItems.length]);

  return(
    <div className="nsum">
      <div className="nst">
        <div className="nav2">✦</div>
        <span className="nlbl">Nova · Morning Brief</span>
        <button className="nref" onClick={()=>generate(false)} disabled={load} title="Refresh">↻</button>
      </div>
      {load
        ? <div className="dots"><div className="dot"/><div className="dot"/><div className="dot"/></div>
        : text
          ? <div className="ntxt">{text}</div>
          : <div className="ntxt" style={{fontStyle:"italic",opacity:.5}}>Loading your brief…</div>
      }
    </div>
  );
}

// ── FOCUS LIST ──
function FocusList({ items, setItems, onSave }) {
  const [input,setInput]=useState("");
  const latestItems = useRef(items);
  const saveTimer = useRef(null);

  // Keep ref in sync with latest items
  useEffect(()=>{ latestItems.current = items; }, [items]);

  // Immediate save for toggles/deletes — debounced only for typing new items
  const saveNow = (newItems) => {
    latestItems.current = newItems;
    if(saveTimer.current) clearTimeout(saveTimer.current);
    if(onSave) onSave(newItems);
  };
  const saveLater = (newItems) => {
    latestItems.current = newItems;
    if(saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(()=>{ if(onSave) onSave(latestItems.current); }, 600);
  };

  const add=()=>{
    if(!input.trim()||items.length>=3) return;
    const newItems=[...items,{id:"f_"+Date.now(),text:input.trim(),done:false}];
    setItems(newItems); saveLater(newItems); setInput("");
  };
  const toggle=id=>{ const newItems=items.map(t=>t.id===id?{...t,done:!t.done}:t); setItems(newItems); saveNow(newItems); };
  const del=id=>{ const newItems=items.filter(t=>t.id!==id); setItems(newItems); saveNow(newItems); };
  const nums=["1","2","3"]; const numCls=["p1","p2","p3"];
  return(
    <div className="focus-wrap">
      <div className="focus-card">
        <div className="focus-hd"><span className="focus-title">Top 3 Focus</span><span style={{fontSize:"11px",color:"var(--muted)"}}>{items.length}/3</span></div>
        {items.length===0&&<div className="focus-empty">What are your 3 priorities today?</div>}
        {items.map((t,i)=>(
          <div className="focus-item" key={t.id}>
            <span className={"focus-num "+(numCls[i]||"")}>{nums[i]}</span>
            <div className={"focus-ck "+(t.done?"on":"")} onClick={()=>toggle(t.id)}>{t.done?"✓":""}</div>
            <span className={"focus-txt "+(t.done?"on":"")} style={{cursor:"pointer"}} onClick={()=>toggle(t.id)}>{t.text}</span>
            <button className="focus-del" onClick={e=>{e.stopPropagation();del(t.id);}}>✕</button>
          </div>
        ))}
        {items.length<3&&(
          <div className="focus-input-row">
            <input className="focus-input" placeholder={"Priority "+(items.length+1)+"…"} value={input}
              onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
            <button className="focus-add" onClick={add}>+</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── WEEK VIEW ──

                {cal.map((ev,j)=>(<div className="witem" key={"c"+j}><div className="wdot" style={{background:ev.color||"#60a5fa"}}/><span className="wtime">{fmtTime(ev.start)}</span><span className="wtxt">{ev.title}</span></div>))}

// ── NOVA CHAT — BUILD B (persistent memory + web search + verified tools) ──
function NovaChat({ events, weekEvents, activities, projects, completedEvents, onAction, isDesktop, desktopSidebarOpen, setDesktopSidebarOpen, inDrawer=false }) {
  const hour = new Date().getHours();
  const briefCached = LS.get("nova_brief_text", null);
  const briefDate = LS.get("nova_brief_date", "");
  const briefText = briefDate === new Date().toDateString() && briefCached ? briefCached : null;
  const introText = briefText
    ? briefText
    : hour < 12
      ? "Morning. I have your day loaded — what do you need?"
      : hour < 17
        ? "Afternoon. I'm up to speed on your day — what's next?"
        : "Evening. I've got your full context. What do you need?";
  const INTRO = {role:"nova",text:introText,time:nowTime(),actions:[]};
  const [sessions,setSessions]   = useState(()=>LS.get("nova_sessions",[]));
  // Load sessions from Supabase on mount — true cross-device sync
  useEffect(()=>{
    callWorker("nova_sessions_get", {}).then(res=>{
      if(res.success && res.sessions && res.sessions.length > 0) {
        setSessions(res.sessions);
        LS.set("nova_sessions", res.sessions);
      } else {
        // Fallback: rebuild from memory summaries
        getMemories(10).then(mems=>{
          if(!mems?.memories?.length) return;
          const rebuilt = mems.memories.slice(0,10).map(m=>({
            id: m.session_id,
            messages: [{role:"nova",text:"[Resumed] "+m.summary,time:"",actions:[]}],
          }));
          setSessions(rebuilt);
        }).catch(()=>{});
      }
    }).catch(()=>{});
  },[]);
  const [current,setCurrent]     = useState([INTRO]);
  const [input,setInput]         = useState("");
  const [loading,setLoading]     = useState(false);
  const [rec,setRec]             = useState(false);
  const [mobileSidebarOpen,setMobileSidebarOpen] = useState(false);
  const [supabaseMemory,setSupabaseMemory] = useState([]);
  const [memoryLoaded,setMemoryLoaded]     = useState(false);
  const [novaFacts,setNovaFacts]           = useState([]);
  const botRef = useRef(null); const recRef = useRef(null); const fileRef = useRef(null);

  const sidebarOpen    = isDesktop ? desktopSidebarOpen : mobileSidebarOpen;
  const setSidebarOpen = isDesktop ? setDesktopSidebarOpen : setMobileSidebarOpen;

  useEffect(()=>{ botRef.current?.scrollIntoView({behavior:"smooth"}); },[current,loading]);
  useEffect(()=>{ LS.set("nova_sessions",sessions); syncBroadcast("nova_sessions",sessions); },[sessions]);

  // Load persistent memory + facts from Supabase on mount
  useEffect(()=>{
    if(memoryLoaded) return;
    Promise.all([
      getMemories(30),
      callWorker("nova_facts_get", {}),
    ]).then(([memData, factsData])=>{
      if(memData.memories) setSupabaseMemory(memData.memories);
      if(factsData.success) {
        setNovaFacts(factsData.facts || []);
        LS.set("nova_facts_cache", factsData.facts || []);
      }
      setMemoryLoaded(true);
    }).catch(()=>setMemoryLoaded(true));
  },[]);

  // Build facts string — structured key facts about Demetri
  const buildFacts = () => {
    if(!novaFacts.length) return "No facts stored yet.";
    const grouped = {};
    novaFacts.forEach(f=>{
      if(!grouped[f.category]) grouped[f.category]=[];
      grouped[f.category].push(f.key+": "+f.value);
    });
    return Object.entries(grouped).map(([cat,items])=>"["+cat.toUpperCase()+"]\n"+items.join("\n")).join("\n\n");
  };

  // Build memory string from Supabase + local sessions
  const buildMemory = () => {
    const supaLines = supabaseMemory.slice(0,15).map(m=>{
      const date = new Date(m.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric"});
      return "["+date+"] "+m.summary;
    });
    const localLines = sessions.slice(-3).map(s=>{
      const msgs = s.messages.filter(m=>m.role==="user").map(m=>m.text).slice(-2).join(" | ");
      return "["+s.id+"] "+msgs;
    });
    const all = [...supaLines, ...localLines];
    return all.length ? all.join("\n") : "No prior sessions yet.";
  };

  const sysPrompt = () => {
    const done  = events.filter(e=>completedEvents.has(e.id||e.title)).map(e=>e.title);
    const rem   = events.filter(e=>!completedEvents.has(e.id||e.title)).map(e=>e.title+(e.start?" at "+fmtTime(e.start):""));
    const wevts = weekEvents.slice(0,8).map(e=>e.title+" on "+fmtShort(e.start));
    const log   = activities.slice(0,6).map(a=>a.time+":"+a.text);
    const projs = projects.map(p=>p.name+"("+p.tag+","+p.status+")").slice(0,5);
    const facts = buildFacts();
    const mem   = buildMemory();
    const hour = new Date().getHours();
    const timeCtx = hour < 12 ? "morning" : hour < 17 ? "afternoon" : "evening";
    const focusDone = focusItems.filter(f=>f.done).length;
    return (
      "You are Nova — Demetri's Jarvis. Sharp, direct, calm. You know his schedule, projects, goals, and history. You control his entire dashboard.\n\n" +
      "DATE: "+fmtDate()+" | TIME: "+new Date().toLocaleTimeString()+" | "+timeCtx.toUpperCase()+"\n" +
      "TODAY: done="+(done.join(",")||"none")+" | remaining="+(rem.join(",")||"clear")+"\n" +
      "FOCUS: "+(focusItems.length>0?(focusDone+"/"+focusItems.length+" — "+(focusItems.filter(f=>!f.done).map(f=>f.text).join(", ")||"all done")):"none set")+"\n" +
      "LOG: "+(log.join(";")||"empty")+"\n" +
      "WEEK: "+(wevts.join("; ")||"none")+"\n" +
      "PROJECTS: "+(projs.join(";")||"none")+"\n\n" +
      "FACTS:\n"+facts+"\n\n" +
      "MEMORY:\n"+mem+"\n\n" +
      "RULES:\n" +
      "- Be Jarvis. 1-3 sentences unless a list is genuinely needed. No essays.\n" +
      "- Never say \"Of course\", \"Sure\", \"Certainly\", \"Great\", \"Absolutely\". Start with the answer.\n" +
      "- No filler openers. If asked how you can help, tell him what you see in his day right now.\n" +
      "- Bullet points only for actual lists (3+ items). Numbers only for steps.\n" +
      "- No unicode box characters. Clean standard markdown only.\n" +
      "- Use tools immediately — no permission needed.\n" +
      "- search_web: use whenever not certain. Sports, weather, news, prices — always search first.\n" +
      "- save_fact: whenever Demetri mentions anything personal, save it instantly without asking.\n" +
      "- Morning: be energizing. Afternoon: be efficient. Evening: be winding-down calm."
    );

  // Save memory at end of session (every 5 turns or when starting a new chat)
  const autoSaveMemory = useCallback(async (messages, sid) => {
    try {
      const userMsgs = messages.filter(m=>m.role==="user");
      // Only save every 5 user messages to avoid spamming
      if(userMsgs.length === 0 || userMsgs.length % 10 !== 0) return;
      const recentUser = userMsgs.slice(-5).map(m=>m.text).join(" | ");
      const recentNova = messages.filter(m=>m.role==="nova").slice(-3).map(m=>m.text).join(" | ");
      const summaryData = await callAPI([{role:"user",content:"Summarise this conversation in 2-3 sentences. Focus on what Demetri shared, asked for, or decided. Be specific — include names, preferences, goals mentioned.\nUser said: "+recentUser+"\nNova replied: "+recentNova}],{max_tokens:200});
      const summary = (summaryData.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      if(summary){
        await saveMemory(sid, summary);
        setSupabaseMemory(p=>[{session_id:sid,summary,created_at:new Date().toISOString()},...p].slice(0,30));
      }
    } catch(e){ console.warn("Memory save failed:", e); }
  },[]);

  // Change 2+6: summarize conversation after 10 exchanges, cap at 12 msgs
  const compressContext = useCallback(async (msgs) => {
    const filtered = msgs.filter(m=>m!==INTRO);
    if(filtered.length <= 10) return filtered.map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
    // Check for existing summary
    const summaryKey = "nova_chat_summary";
    const existingSummary = LS.get(summaryKey, null);
    const lastSummaryAt = LS.get("nova_summary_at", 0);
    // Re-summarize every 10 new messages since last summary
    const needsSummary = filtered.length - lastSummaryAt >= 10;
    if(needsSummary) {
      try {
        const toSummarize = filtered.slice(0, -3).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
        const convText = toSummarize.map(m=>m.role+": "+m.content).join("\n");
        const res = await callAPI([{role:"user",content:"Summarize this Nova conversation in 2-3 sentences. Focus on what Demetri shared, decided, or asked for. Be specific.\n\n"+convText}],{max_tokens:200});
        const summary = (res.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
        if(summary) { LS.set(summaryKey, summary); LS.set("nova_summary_at", filtered.length); }
      } catch {}
    }
    const summary = LS.get(summaryKey, null);
    const last3 = filtered.slice(-3).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
    if(summary) { return [{role:"user",content:"[Conversation summary: "+summary+"]"},{role:"assistant",content:"Understood, I have context from our earlier conversation."},...last3]; }
    return filtered.slice(-12).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
  },[]);

  const send = useCallback(async text=>{
    if(!text?.trim()||loading) return;
    const userMsg={role:"user",text:text.trim(),time:nowTime(),actions:[]};
    const updated=[...current,userMsg];
    setCurrent(updated); setLoading(true);
    try{
      const apiMsgs = await compressContext(updated);
      const data=await callAPI(apiMsgs,{system:sysPrompt(),tools:TOOLS});
      const tblocks=(data.content||[]).filter(b=>b.type==="text");
      const tooluse=(data.content||[]).filter(b=>b.type==="tool_use");

      // Handle tools sequentially — critical for multiple calendar adds
      const acts=[];
      const searchResults=[];
      const toolResults=[];
      const savedFacts=[];
      for(const t of tooluse){
        if(t.name==="search_web"){
          try{
            const sr=await searchWeb(t.input.query, t.input.max_results||5);
            searchResults.push({query:t.input.query, ...sr});
            toolResults.push("search_web(\""+t.input.query+"\"): found "+(sr.results?.length||0)+" results");
          }catch(e){
            toolResults.push("search_web failed: "+e.message);
          }
        } else if(t.name==="save_fact"){
          try{
            const {category,key,value} = t.input;
            await callWorker("nova_facts_set",{category,key,value});
            // Update local state immediately
            setNovaFacts(prev=>{
              const filtered = prev.filter(f=>f.key!==key);
              return [...filtered,{category,key,value,created_at:new Date().toISOString(),updated_at:new Date().toISOString()}];
            });
            savedFacts.push(key+": "+value);
            toolResults.push("save_fact: saved \""+key+"\"");
          }catch(e){
            toolResults.push("save_fact failed: "+e.message);
          }
        } else {
          const r = await onAction(t.name, t.input);
          if(r){
            acts.push(r);
            toolResults.push(t.name+": "+r);
          }
          // Small delay between calendar operations to avoid race conditions
          if(t.name==="add_calendar_event"||t.name==="delete_calendar_event"||t.name==="reschedule_event"){
            await new Promise(res=>setTimeout(res,500));
          }
        }
      }

      // Build the reply — if Nova already wrote a response, use it
      // Only do a follow-up if Nova sent NO text (pure tool-call response)
      let reply = tblocks.map(b=>b.text).join("").trim();

      // If Nova wrote no text but tools ran — build a simple confirmation locally (no API call)
      if(!reply && toolResults.length>0 && searchResults.length===0){
        reply = toolResults
          .filter(r=>!r.startsWith("search_web"))
          .map(r=>r.includes(":")?r.split(":").slice(1).join(":").trim():r)
          .join("\n") || "Done.";
      }

      // Only use API follow-up for search results
      if(searchResults.length>0){
        const searchContext = searchResults.map(sr=>{
          const top = sr.results?.slice(0,3).map(r=>r.title+": "+r.content).join("\n") || "";
          return "Search: \""+sr.query+"\"\nDirect answer: "+(sr.answer||"none")+"\nTop results:\n"+top;
        }).join("\n\n");
        const followUp = await callAPI([
          ...apiMsgs.slice(-10),
          {role:"user", content:"Web search results:\n\n"+searchContext+"\n\nAnswer directly and concisely using only these results."}
        ],{system:sysPrompt()});
        reply=(followUp.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      }

      if(!reply) reply = acts.length ? acts.join("\n") : "Something went wrong — please try again.";

      // Only show non-calendar actions as pills — calendar results are covered in Nova's reply
      const pillActions = acts.filter(a=>
        a && !a.startsWith("✓") && !a.includes("added to Google Calendar") && !a.includes("Deleted") && !a.includes("Rescheduling")
      );
      // Add saved fact confirmations as special pills
      const factPills = savedFacts.map(f=>"✦ Saved fact: "+f);
      const novaMsg={role:"nova",text:reply,time:nowTime(),actions:[...pillActions,...factPills]};
      const final=[...updated,novaMsg];
      setCurrent(final);

      // Speak Nova's reply if voice mode is active
      if(voiceActive.current) speak(reply);

      // Save to local sessions + Supabase for cross-device sync
      const sid=sessId();
      setSessions(p=>{
        const ex=p.findIndex(s=>s.id===sid);
        const entry={id:sid,messages:final.filter(m=>m!==INTRO)};
        const updated = ex>=0 ? [...p.slice(0,ex),entry,...p.slice(ex+1)] : [...p,entry].slice(-30);
        // Persist to Supabase (fire-and-forget)
        callWorker("nova_sessions_save", { session_id: sid, messages: entry.messages }).catch(()=>{});
        LS.set("nova_sessions", updated);
        return updated;
      });

      // Auto-save memory to Supabase
      autoSaveMemory(final.filter(m=>m!==INTRO), sid);
    }catch(e){
      setCurrent(p=>[...p,{role:"nova",text:"Something went wrong. Check your connection.",time:nowTime(),actions:[]}]);
      console.error(e);
    }
    setLoading(false);
  },[current,loading,events,weekEvents,activities,projects,completedEvents,sessions,supabaseMemory,onAction,autoSaveMemory]);

  const loadSession=s=>{ setCurrent([INTRO,...s.messages]); setSidebarOpen(false); };
  const deleteSession=id=>setSessions(p=>p.filter(s=>s.id!==id));

  // ── VOICE MODE ──
  const [voiceMode, setVoiceMode]   = useState(false); // toggle on/off
  const [listening, setListening]   = useState(false); // mic actively open
  const [speaking,  setSpeaking]    = useState(false); // TTS playing
  const [transcript,setTranscript]  = useState("");    // interim transcript
  const synthRef  = useRef(null);
  const voiceActive = useRef(false); // track across async calls

  // Stop TTS
  const stopSpeaking = () => {
    window.speechSynthesis?.cancel();
    setSpeaking(false);
  };

  // Speak Nova's response
  const speak = (text) => {
    if(!window.speechSynthesis) return;
    stopSpeaking();
    // Strip markdown so it sounds natural
    const clean = text
      .replace(/\*\*(.*?)\*\*/g,"$1")
      .replace(/\*(.*?)\*/g,"$1")
      .replace(/#{1,3}\s/g,"")
      .replace(/\u0060([^\u0060]+)\u0060/g,"$1")
      .replace(/\n+/g," ")
      .trim();
    const utt = new SpeechSynthesisUtterance(clean);
    utt.rate  = 1.05;
    utt.pitch = 1.0;
    utt.volume= 1.0;
    // Pick a good English voice
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v=>v.name.includes("Samantha")||v.name.includes("Karen")||v.name.includes("Moira")||v.name.includes("Google UK English Female")||v.name.includes("Microsoft Zira"));
    if(preferred) utt.voice = preferred;
    utt.onstart = () => setSpeaking(true);
    utt.onend   = () => {
      setSpeaking(false);
      // Auto-relisten after Nova finishes speaking
      if(voiceActive.current) startListening();
    };
    utt.onerror = () => setSpeaking(false);
    synthRef.current = utt;
    window.speechSynthesis.speak(utt);
  };

  // Start listening once
  const startListening = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR || !voiceActive.current) return;
    const r = new SR();
    r.lang = "en-US"; r.interimResults = true; r.continuous = false;
    recRef.current = r;
    r.onstart  = () => setListening(true);
    r.onend    = () => { setListening(false); setTranscript(""); };
    r.onerror  = () => { setListening(false); setTranscript(""); };
    r.onresult = (e) => {
      const t = Array.from(e.results).map(r=>r[0].transcript).join("");
      setTranscript(t);
      if(e.results[e.results.length-1].isFinal && t.trim()) {
        r.stop();
        setTranscript("");
        send(t.trim()); // send to Nova
      }
    };
    try { r.start(); } catch {}
  };

  // Toggle voice mode on/off
  const toggleVoiceMode = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR) { alert("Voice not supported. Use Chrome or Safari."); return; }
    if(voiceMode) {
      // Turn off
      voiceActive.current = false;
      setVoiceMode(false);
      recRef.current?.stop();
      stopSpeaking();
      setListening(false);
      setTranscript("");
    } else {
      // Turn on
      voiceActive.current = true;
      setVoiceMode(true);
      startListening();
    }
  };

  // Stop voice mode when component unmounts
  useEffect(()=>()=>{ voiceActive.current=false; recRef.current?.stop(); stopSpeaking(); },[]);

  // Legacy mic button for manual one-shot recording (when voice mode is off)
  const startVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Voice not supported. Try Chrome.");return;}
    if(rec){recRef.current?.stop();setRec(false);return;}
    const r=new SR(); r.lang="en-US"; r.interimResults=false; r.continuous=false; recRef.current=r;
    r.onstart=()=>setRec(true); r.onend=()=>setRec(false); r.onerror=()=>setRec(false);
    r.onresult=e=>setInput(e.results[0][0].transcript);
    r.start();
  };

  const SidebarContent = ()=>(
    <>
      <div className="nova-sidebar-hd">
        <span className="nova-sidebar-title">Conversations</span>
        <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
          {sessions.length>0&&<button className="sbtn" style={{fontSize:"10px",padding:"2px 8px"}} onClick={()=>{setSessions([]);LS.set("nova_sessions",[]);}}>Clear all</button>}
          <button className="nova-sidebar-close" onClick={()=>setSidebarOpen(false)}>✕</button>
        </div>
      </div>
      <div className="nova-sidebar-list">
        {sessions.length===0&&<div className="empty" style={{padding:"20px 8px"}}>No conversations yet.</div>}
        {[...sessions].reverse().map((s,i)=>{
          const msgCount = s.messages?.length||0;
          const firstMsg = s.messages?.find(m=>m.role==="user")?.text||"";
          const lastMsg  = s.messages?.filter(m=>m.role==="user").slice(-1)[0]?.text||"";
          return(
            <div key={i} className="nova-sess-item" style={{position:"relative"}}>
              <div onClick={()=>loadSession(s)}>
                <div className="nova-sess-id" style={{fontSize:"11px",fontWeight:"600",color:"var(--soft)",marginBottom:"3px"}}>{s.id}</div>
                <div style={{fontSize:"11px",color:"var(--muted)",marginBottom:"2px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{firstMsg.slice(0,45)||"…"}</div>
                {msgCount>2&&<div style={{fontSize:"10px",color:"var(--muted)",marginBottom:"2px"}}>{msgCount} messages</div>}
                {lastMsg!==firstMsg&&<div style={{fontSize:"10px",color:"var(--muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontStyle:"italic"}}>Last: {lastMsg.slice(0,40)}</div>}
                <div className="nova-sess-cont" style={{fontSize:"10px",color:"var(--nova)",marginTop:"4px"}}>Tap to continue →</div>
              </div>
              <button style={{position:"absolute",top:"8px",right:"8px",fontSize:"11px",color:"var(--muted)",background:"none",border:"none",cursor:"pointer",opacity:.5}} onClick={e=>{e.stopPropagation();deleteSession(s.id);}}>✕</button>
            </div>
          );
        })}
      </div>
    </>
  );

  return(
    <div className={"nova-page"+(inDrawer?" in-drawer":"")}>
      {/* Sidebar overlay (mobile) */}
      {!isDesktop&&<div className={"nova-sidebar-overlay"+(sidebarOpen?" open":"")} onClick={()=>setSidebarOpen(false)}/>}
      {/* Sidebar */}
      <div className={"nova-sidebar"+(sidebarOpen?" open":"")}><SidebarContent/></div>
      {/* Main chat */}
      <div className="novawrap">
        <div className="novahd">
          <button className="nova-sidebar-toggle" style={{position:"relative",width:"34px",height:"34px",padding:0}} onClick={()=>setSidebarOpen(p=>!p)}>☰</button>
          <div className="novaav" style={{marginLeft:"4px"}}>✦</div>
          <div style={{flex:1,marginLeft:"8px"}}>
            <div className="novanm">Nova</div>
          </div>
          <button className="sbtn" onClick={()=>setCurrent([INTRO])}>New chat</button>
        </div>
        {/* Messages — extra bottom padding on mobile Nova tab to clear fixed input */}
        <div className="chatmsgs" style={{paddingBottom: (!isDesktop&&!inDrawer)?"140px":inDrawer?"80px":"0"}}>
          {current.map((m,i)=>(
            <div key={i} className={"msg "+(m.role==="user"?"u":"n")}>
              {m.role==="user"
                ? <div className="mbub">{m.text}</div>
                : <div className="mbub" dangerouslySetInnerHTML={{__html:renderMarkdown(m.text)}}/>
              }
              {m.actions?.filter(a=>a&&a.trim()).length>0&&(
                <div style={{display:"flex",flexDirection:"column",gap:"4px",marginTop:"6px",alignSelf:"flex-start"}}>
                  {m.actions.filter(a=>a&&a.trim()).map((a,j)=>(
                    <div key={j} className={"apill"+(a.startsWith("✦ Saved fact")?" fact":"")}>{a}</div>
                  ))}
                </div>
              )}
              <div className="mtime">{m.time}</div>
            </div>
          ))}
          {loading&&<div className="msg n" style={{opacity:.7}}><div className="mbub" style={{fontSize:"13px",color:"var(--muted)"}}>Nova is thinking…</div></div>}
          <div ref={botRef}/>
        </div>
        {/* Input bar:
            - Desktop: normal flow at bottom of panel
            - Mobile Nova tab (not inDrawer): fixed above nav bar
            - Inside drawer: sticky at bottom of drawer
        */}
        <div className="chatia" style={
          inDrawer
            ? {flexShrink:0, padding:"10px 16px 12px"}
            : (!isDesktop)
              ? {position:"fixed",bottom:"24px",left:0,right:0,zIndex:40,background:"rgba(255,255,255,0.04)",borderTop:"1px solid rgba(255,255,255,0.07)",padding:"10px 16px 12px"}
              : {}
        }>
          {/* Voice mode active — show pulsing mic + transcript */}
          {voiceMode ? (
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:"8px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                {/* Animated voice orb */}
                <button onClick={toggleVoiceMode} style={{
                  width:"44px",height:"44px",borderRadius:"50%",border:"none",cursor:"pointer",flexShrink:0,
                  background: listening?"rgba(99,102,241,.2)":speaking?"rgba(34,197,94,.2)":"var(--surf)",
                  boxShadow: listening?"0 0 0 6px rgba(99,102,241,.15)":speaking?"0 0 0 6px rgba(34,197,94,.15)":"none",
                  transition:"all .3s",fontSize:"18px",
                  animation: listening||speaking?"voicePulse 1.2s ease-in-out infinite":"none",
                }}>
                  {speaking?"🔊":listening?"🎙":"✦"}
                </button>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:"11px",color:"var(--nova2)",fontWeight:500,marginBottom:"2px"}}>
                    {speaking?"Nova is speaking…":listening?"Listening…":"Voice mode on — tap orb to stop"}
                  </div>
                  {transcript&&<div style={{fontSize:"12px",color:"var(--soft)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontStyle:"italic"}}>"{transcript}"</div>}
                </div>
                {/* Still allow typing in voice mode */}
                <button className="csend" onClick={()=>{send(input);setInput("");}} disabled={!input.trim()||loading} style={{flexShrink:0}}>↑</button>
              </div>
              {/* Optional text input in voice mode */}
              <textarea className="chatinput" placeholder="Or type instead…" value={input} rows={1}
                onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);setInput("");}}}
                style={{fontSize:"13px",minHeight:"38px"}}/>
            </div>
          ) : (
            <>
              {/* Normal mode — mic button opens one-shot recording */}
              <button className={"micbtn "+(rec?"rec":"")} onClick={startVoice} title="One-shot mic">{rec?"⏹":"🎤"}</button>
              <textarea className="chatinput" placeholder="Chat…" value={input} rows={1}
                onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);setInput("");}}}/>
              {/* Voice mode toggle */}
              <button className="micbtn" onClick={toggleVoiceMode} title="Toggle voice conversation mode"
                style={{fontSize:"14px"}}>✦</button>
              <button className="micbtn" onClick={()=>fileRef.current?.click()}>📎</button>
              <input ref={fileRef} type="file" style={{display:"none"}} accept="*/*" multiple onChange={()=>{}}/>
              <button className="csend" onClick={()=>{send(input);setInput("");}} disabled={!input.trim()||loading}>↑</button>
            </>
          )}
        </div>
        {/* Spacer so last message isn't hidden behind fixed input on mobile Nova tab */}
        {!isDesktop&&!inDrawer&&<div style={{height:"80px"}}/>}
      </div>
    </div>
  );
}

// ── PROJECTS ──
function Projects({ projects, setProjects, onOpenProject, activeProject, onSave, onDelete }) {
  const [name,setName]=useState(""); const [tag,setTag]=useState("personal"); const [filter,setFilter]=useState("all");
  const tags=["personal","creative","work"];
  const tagActiveCls={personal:"ap",creative:"ac",work:"aw"};
  const statusCls={"To do":"ps-todo","In progress":"ps-progress","Done":"ps-done"};
  const add=()=>{
    if(!name.trim()) return;
    const p={id:Date.now(),name:name.trim(),tag,status:"To do",note:"",tasks:[],ti:"",created_at:new Date().toISOString()};
    setProjects(prev=>[p,...prev]); setName("");
    if(onSave) onSave(p);
    if(onOpenProject) onOpenProject(p);
  };
  const del=(id,e)=>{ e.stopPropagation(); setProjects(p=>p.filter(pr=>pr.id!==id)); if(onDelete) onDelete(id); };
  const filtered=filter==="all"?projects:projects.filter(p=>p.tag===filter);
  const total=projects.length, inProg=projects.filter(p=>p.status==="In progress").length, done=projects.filter(p=>p.status==="Done").length;
  const totalTasks=projects.reduce((a,p)=>a+(p.tasks||[]).length,0);
  const doneTasks=projects.reduce((a,p)=>a+(p.tasks||[]).filter(t=>t.done).length,0);
  return(
    <div className="projwrap">
      <div className="irow">
        <input className="ifield" placeholder="New project… (Enter to create)" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
        <button className="iplus" onClick={add}>+</button>
      </div>
      <div className="ptagrow">
        {tags.map(t=><button key={t} className={"ptbtn "+(tag===t?tagActiveCls[t]:"")} onClick={()=>setTag(t)}>{t[0].toUpperCase()+t.slice(1)}</button>)}
      </div>
      {total>0&&(
        <div className="proj-stats">
          <div className="proj-stat"><div className="proj-stat-val" style={{color:"var(--blue)"}}>{total}</div><div className="proj-stat-lbl">Total</div></div>
          <div className="proj-stat"><div className="proj-stat-val" style={{color:"var(--amber)"}}>{inProg}</div><div className="proj-stat-lbl">Active</div></div>
          <div className="proj-stat"><div className="proj-stat-val" style={{color:"var(--green)"}}>{done}</div><div className="proj-stat-lbl">Done</div></div>
          <div className="proj-stat"><div className="proj-stat-val" style={{color:"var(--nova)"}}>{totalTasks>0?Math.round((doneTasks/totalTasks)*100):0}%</div><div className="proj-stat-lbl">Tasks</div></div>
        </div>
      )}
      <div className="frow">
        {["all",...tags].map(f=><button key={f} className={"fbtn"+(filter===f?" a":"")} onClick={()=>setFilter(f)}>{f[0].toUpperCase()+f.slice(1)}</button>)}
      </div>
      {filtered.length===0&&(
        <div className="proj-empty"><div className="proj-empty-icon">◫</div><div className="proj-empty-title">No projects yet</div></div>
      )}
      {filtered.map((pr,i)=>{
        const tc=(pr.tasks||[]).length, td=(pr.tasks||[]).filter(t=>t.done).length;
        const pct=tc>0?Math.round((td/tc)*100):0;
        return(
          <div key={pr.id} className={"pcard tag-"+pr.tag+(activeProject?.id===pr.id?" active":"")} style={{animationDelay:(i*.05)+"s"}} onClick={()=>onOpenProject&&onOpenProject(pr)}>
            <div className="pctop">
              <span className="pctitle">{pr.name}</span>
              <span className={"pctag tg-"+pr.tag}>{pr.tag}</span>
              <span className={"pstatus "+(statusCls[pr.status]||"ps-todo")}>{pr.status}</span>
              <span className="popen">{activeProject?.id===pr.id?"Active ✦":"Open →"}</span>
              <button className="pcdel" onClick={e=>del(pr.id,e)}>✕</button>
            </div>
            {pr.note&&<div style={{fontSize:"12px",color:"var(--muted)",marginBottom:"8px",paddingLeft:"6px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pr.note}</div>}
            {tc>0&&(
              <div className="proj-progress">
                <div className="proj-progress-label"><span>{td}/{tc} tasks</span><span>{pct}%</span></div>
                <div className="proj-progress-bar">
                  <div className="proj-progress-fill" style={{width:pct+"%",background:pct===100?"var(--green)":pr.tag==="work"?"var(--amber)":pr.tag==="creative"?"var(--nova)":"var(--blue)"}}/>
                </div>
              </div>
            )}
          </div>
        );
      })}
      <div className="spacer"/>
    </div>
  );
}

// ── PROJECT WORKSPACE ──
function ProjectWorkspace({ project, projects, setProjects, onBack, events, weekEvents, activities, completedEvents, onAction, onSave }) {
  const storageKey="proj_chats_"+project.id;
  const makeChat=()=>({id:Date.now(),name:"Chat "+Date.now(),messages:[],created:nowTime()});
  const [chats,setChats]=useState(()=>{ const s=LS.get(storageKey,[]); return s.length>0?s:[makeChat()]; });
  const [activeChatId,setActiveChatId]=useState(()=>{ const s=LS.get(storageKey,[]); return s[0]?.id||Date.now(); });
  const [editingName,setEditingName]=useState(false);

  // Load project chats from Supabase on mount for cross-device sync
  useEffect(()=>{
    callWorker("proj_chats_get", { project_id: project.id }).then(res=>{
      if(res.success && res.chats && res.chats.length > 0) {
        setChats(res.chats);
        LS.set(storageKey, res.chats);
      }
    }).catch(()=>{});
  },[project.id]);

  // Save to localStorage on every change
  useEffect(()=>{ LS.set(storageKey,chats); },[chats]);
  const activeChat=chats.find(c=>c.id===activeChatId)||chats[0];
  const upd=(f,v)=>{
    setProjects(p=>p.map(pr=>{
      if(pr.id!==project.id) return pr;
      const updated={...pr,[f]:v};
      if(onSave) onSave(updated);
      return updated;
    }));
  };
  const addTask=()=>{
    if(!project.ti?.trim()) return;
    const newTasks=[...(project.tasks||[]),{id:Date.now(),text:project.ti.trim(),done:false}];
    setProjects(p=>p.map(pr=>{
      if(pr.id!==project.id) return pr;
      const updated={...pr,tasks:newTasks,ti:""};
      if(onSave) onSave(updated);
      return updated;
    }));
  };
  const toggleTask=tid=>{
    const newTasks=(project.tasks||[]).map(t=>t.id===tid?{...t,done:!t.done}:t);
    setProjects(p=>p.map(pr=>{
      if(pr.id!==project.id) return pr;
      const updated={...pr,tasks:newTasks};
      if(onSave) onSave(updated);
      return updated;
    }));
  };
  const statusColor={"To do":"var(--muted)","In progress":"var(--amber)","Done":"var(--green)"};
  return(
    <div style={{display:"flex",height:"calc(100vh - 52px)",overflow:"hidden"}}>
      <div style={{width:"220px",flexShrink:0,background:"rgba(255,255,255,0.04)",borderRight:"1px solid rgba(255,255,255,0.07)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"12px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
          <button className="sbtn" style={{marginBottom:"8px",fontSize:"11px"}} onClick={onBack}>← All Projects</button>
          <div style={{fontSize:"14px",fontWeight:"600",marginBottom:"4px"}}>{project.name}</div>
          <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
            <span className={"pctag tg-"+project.tag}>{project.tag}</span>
            <select style={{fontSize:"11px",background:"none",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"6px",color:statusColor[project.status],padding:"2px 6px",fontFamily:"inherit",cursor:"pointer",outline:"none"}} value={project.status} onChange={e=>upd("status",e.target.value)}>
              {["To do","In progress","Done"].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <div style={{padding:"10px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
          <div style={{fontSize:"10px",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:"5px"}}>Notes</div>
          <textarea className="pcnote" rows={8} placeholder="Notes… (auto-saved)" value={project.note||""} onChange={e=>upd("note",e.target.value)} style={{width:"100%",minHeight:"160px",fontSize:"13px",lineHeight:1.6}}/>
        </div>
        <div style={{padding:"10px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>

function ProjectNovaChat({ project, chat, onUpdateMessages, events, activities, completedEvents, onAction }) {
  const INTRO={role:"nova",text:"Hey! I'm Nova. Let's work on \""+project.name+"\". What's the goal?",time:nowTime(),actions:[]};
  const [msgs,setMsgs]=useState(chat?.messages?.length>0?chat.messages:[INTRO]);
  const [input,setInput]=useState(""); const [loading,setLoading]=useState(false);
  const botRef=useRef(null);
  useEffect(()=>{ botRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs,loading]);
  useEffect(()=>{ onUpdateMessages(msgs); },[msgs]);
  useEffect(()=>{ if(chat?.messages?.length>0) setMsgs(chat.messages); else setMsgs([INTRO]); },[chat?.id]);
  // Change 10: compress project chat context
  const compressProjCtx = async (allMsgs) => {
    const filtered = allMsgs.filter(m=>m!==INTRO);
    if(filtered.length <= 10) return filtered.map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
    const summKey = "proj_summary_"+project.id+"_"+(chat?.id||"main");
    const summAt  = LS.get(summKey+"_at", 0);
    if(filtered.length - summAt >= 10) {
      try {
        const toSum = filtered.slice(0,-3).map(m=>m.role+": "+m.text).join("\n");
        const res = await callAPI([{role:"user",content:"Summarize this project chat in 2 sentences. Focus on decisions, blockers, and progress for \""+project.name+"\".\n"+toSum}],{max_tokens:150});
        const sum = (res.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
        if(sum) { LS.set(summKey, sum); LS.set(summKey+"_at", filtered.length); }
      } catch {}
    }
    const sum = LS.get(summKey, null);
    const last3 = filtered.slice(-3).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
    if(sum) { return [{role:"user",content:"[Project chat summary: "+sum+"]"},{role:"assistant",content:"Got it."},...last3]; }
    return filtered.slice(-12).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
  };

  const send=async text=>{
    if(!text?.trim()||loading) return;
    const u={role:"user",text:text.trim(),time:nowTime(),actions:[]};
    const updated=[...msgs,u]; setMsgs(updated); setInput(""); setLoading(true);
    try{
      const api = await compressProjCtx(updated);
      const projCtx = "You are Nova — Demetri's Jarvis. Project focus: \""+project.name+"\" ("+project.tag+", "+project.status+"). Notes: "+(project.note?.slice(0,300)||"none")+". Tasks: "+((project.tasks||[]).map(t=>(t.done?"✓":"○")+" "+t.text).join(", ")||"none")+". Be direct and specific. 1-3 sentences unless a list is needed. No filler.";
      const d=await callAPI(api,{system:projCtx,max_tokens:600});
      const reply=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim()||"Something went wrong.";
      const newMsgs=[...updated,{role:"nova",text:reply,time:nowTime(),actions:[]}];
      setMsgs(newMsgs);
      // Save to Supabase for cross-device sync
      callWorker("proj_chats_save", {
        project_id: project.id,
        chat_id: String(chat?.id||"main"),
        name: chat?.name||"Chat",
        messages: newMsgs,
      }).catch(()=>{});
    }catch{ setMsgs(p=>[...p,{role:"nova",text:"Connection error.",time:nowTime(),actions:[]}]); }
    setLoading(false);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
      <div style={{flex:1,overflowY:"auto",padding:"14px 18px",display:"flex",flexDirection:"column",gap:"10px"}}>
        {msgs.map((m,i)=>(<div key={i} className={"msg "+(m.role==="user"?"u":"n")}>
          {m.role==="user"
            ? <div className="mbub">{m.text}</div>
            : <div className="mbub" dangerouslySetInnerHTML={{__html:renderMarkdown(m.text)}}/>
          }
          <div className="mtime">{m.time}</div>
        </div>))}
        {loading&&<div className="msg n" style={{opacity:.7}}><div className="mbub" style={{fontSize:"13px",color:"var(--muted)"}}>Nova is thinking…</div></div>}
        <div ref={botRef}/>
      </div>
      <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",padding:"10px 18px",display:"flex",gap:"8px",alignItems:"flex-end",flexShrink:0,background:"rgba(255,255,255,0.04)"}}>
        <textarea className="chatinput" placeholder="Chat…" value={input} rows={1} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);setInput("");}}} style={{flex:1}}/>
        <button className="csend" onClick={()=>{send(input);setInput("");}} disabled={!input.trim()||loading}>↑</button>
      </div>
    </div>
  );
}

function SettingsModal({ onClose, notifPermission, onEnableNotifs }) {
  const [twoFAEnabled,setTwoFAEnabled]=useState(()=>!!LS.get("totp_enabled",false));
  const [pendingSecret,setPendingSecret]=useState(null);
  const [setupStep,setSetupStep]=useState(null);
  const [verifyCode,setVerifyCode]=useState(""); const [verifyErr,setVerifyErr]=useState(""); const [verifying,setVerifying]=useState(false);
  const qrRef=useRef(null); const [qrRendered,setQrRendered]=useState(false);
  const startSetup=()=>{ const s=TOTP.generateSecret(); setPendingSecret(s); setSetupStep('qr'); setVerifyCode(""); setVerifyErr(""); setQrRendered(false); };
  useEffect(()=>{
    if(setupStep==='qr'&&pendingSecret&&qrRef.current&&!qrRendered){
      qrRef.current.innerHTML="";
      try{ new QRCode(qrRef.current,{text:TOTP.otpauthUrl(pendingSecret),width:160,height:160,correctLevel:QRCode.CorrectLevel.M}); setQrRendered(true); }
      catch{ qrRef.current.innerHTML="<div style=\"font-size:11px;color:var(--muted);padding:8px;text-align:center\">QR unavailable — enter secret manually</div>"; }
    }
  },[setupStep,pendingSecret,qrRendered]);
  const doVerify=async()=>{
    if(verifyCode.length!==6){setVerifyErr("Enter the 6-digit code.");return;}
    setVerifying(true); setVerifyErr("");
    const ok=await TOTP.verify(pendingSecret,verifyCode);
    if(ok){ LS.set("totp_secret",pendingSecret); LS.set("totp_enabled",true); setTwoFAEnabled(true); setSetupStep('done'); }
    else setVerifyErr("Code didn't match — try again.");
    setVerifying(false);
  };
  const notifLabel=notifPermission==='granted'?'✓ Enabled':notifPermission==='denied'?'Blocked in browser':'Not enabled';
  const notifColor=notifPermission==='granted'?'var(--green)':notifPermission==='denied'?'var(--red)':'var(--muted)';
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="settings-modal">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}}>
          <div style={{fontSize:"18px",fontWeight:"600"}}>Settings</div>
          <button className="sbtn" onClick={onClose}>Done</button>
        </div>
        <div className="settings-section">
          <div className="settings-section-title">Notifications</div>
          <div className="settings-row">
            <div><div className="settings-row-label">Push notifications</div><div className="settings-row-sub" style={{color:notifColor}}>{notifLabel}</div></div>
            {notifPermission==='default'&&<button className="sbtn" style={{color:"var(--nova)",borderColor:"var(--nova-border)"}} onClick={onEnableNotifs}>Enable</button>}
          </div>
          <div className="settings-row">
            <div><div className="settings-row-label">Daily recap</div><div className="settings-row-sub">9:00 AM — notification + dashboard card</div></div>
            <span style={{fontSize:"12px",color:notifPermission==='granted'?"var(--green)":"var(--muted)"}}>{notifPermission==='granted'?"Active":"Needs notifications"}</span>
          </div>
          <div className="settings-row">
            <div><div className="settings-row-label">Event reminders</div><div className="settings-row-sub">30 min + 10 min before events</div></div>
            <span style={{fontSize:"12px",color:notifPermission==='granted'?"var(--green)":"var(--muted)"}}>{notifPermission==='granted'?"Active":"Needs notifications"}</span>
          </div>
        </div>
        <div className="settings-section">
          <div className="settings-section-title">Security</div>
          <div className="settings-row">
            <div><div className="settings-row-label">Two-factor authentication</div><div className="settings-row-sub">TOTP — Google Authenticator, Authy</div></div>
            {twoFAEnabled?<span className="totp-active-badge">✓ On</span>:<button className="sbtn" style={{color:"var(--nova)",borderColor:"var(--nova-border)"}} onClick={startSetup}>Set up</button>}
          </div>
          {twoFAEnabled&&!setupStep&&<div style={{paddingTop:"8px",display:"flex",gap:"8px"}}><button className="sbtn" onClick={startSetup}>Regenerate</button><button className="sbtn" style={{color:"var(--red)",borderColor:"rgba(248,113,113,.3)"}} onClick={()=>{LS.set("totp_enabled",false);LS.del("totp_secret");setTwoFAEnabled(false);setSetupStep(null);}}>Disable 2FA</button></div>}
          {setupStep==='qr'&&pendingSecret&&(
            <div className="qr-wrap">
              <div style={{fontSize:"13px",color:"var(--soft)",textAlign:"center"}}>Scan with your authenticator app</div>
              <div className="qr-box" ref={qrRef}/>
              <div className="secret-display">{pendingSecret}</div>
              <ol className="totp-steps"><li>Open Google Authenticator or Authy</li><li>Tap + → Scan QR code</li><li>Enter the 6-digit code to confirm</li></ol>
              <div className="totp-verify-row">
                <input className="totp-input" placeholder="000000" maxLength={6} value={verifyCode} onChange={e=>setVerifyCode(e.target.value.replace(/\D/g,""))} onKeyDown={e=>e.key==="Enter"&&doVerify()}/>
                <button className="totp-verify-btn" onClick={doVerify} disabled={verifying}>{verifying?"…":"Verify"}</button>
              </div>
              {verifyErr&&<div style={{fontSize:"12px",color:"var(--red)",textAlign:"center"}}>{verifyErr}</div>}
              <button className="sbtn" onClick={()=>setSetupStep(null)}>Cancel</button>
            </div>
          )}
          {setupStep==='done'&&<div style={{textAlign:"center",padding:"12px 0",fontSize:"13px",color:"var(--green)"}}>✓ 2FA is now active.</div>}
        </div>
        <div className="settings-section">
          <div className="settings-section-title">Account</div>
          <div className="settings-row">
            <div><div className="settings-row-label">Lock session</div></div>
            <button className="sbtn" onClick={()=>{AUTH.clear();window.location.reload();}}>Lock now</button>
          </div>
        </div>
      </div>
    </div>
  );
}
